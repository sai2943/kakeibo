<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0B1F1E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="台帳">
<title>収支台帳</title>
<style>
  :root{
    --bg:#0B1F1E; --surface:#12302E; --surface2:#1A3E3B; --line:#24504C;
    --amber:#F2B33D; --teal:#2DD4BF; --red:#E57373; --text:#E8F0EF; --muted:#8FAAA7; --blue:#5FA8E8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif; font-size:14px;}
  #app{max-width:560px; margin:0 auto; padding:16px 16px 96px;}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);}
  .teal{color:var(--teal);} .red{color:var(--red);} .amber{color:var(--amber);} .blue{color:var(--blue);}
  .band{display:flex; align-items:center; gap:8px; margin:20px 0 10px;}
  .band .tick{width:4px; height:14px; background:var(--amber); border-radius:2px;}
  .band .label{font-size:12px; letter-spacing:.12em; color:var(--muted); font-weight:600;}
  .band .rule{flex:1; height:1px; background:var(--line);}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .card2{background:var(--surface2); border-radius:8px; padding:8px 10px;}
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .input, select.input, textarea.input{background:var(--surface2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:10px 12px; font-size:14px; outline:none; width:100%;}
  .input.sm{padding:6px 8px; font-size:13px;}
  .input.r{text-align:right;}
  .btn{border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted);
    font-size:13px; padding:9px 12px; cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--amber); color:#1a1508; border:none; font-weight:700;}
  .btn.danger{border-color:var(--red); color:var(--red);}
  .btn.tealb{border-color:var(--teal); color:var(--teal);}
  .btn.sel{border-color:var(--amber); color:var(--amber); background:rgba(242,179,61,.12); font-weight:600;}
  .btn.dash{border-style:dashed; font-size:12px;}
  .btn.full{width:100%;}
  .chip{padding:4px 10px; border-radius:12px; font-size:11px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-family:inherit;}
  .chip.sel{border-color:var(--teal); color:var(--teal); background:rgba(45,212,191,.12);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .tag{font-size:10px; padding:1px 6px; border-radius:4px; white-space:nowrap;}
  .syncbadge{font-size:10px; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap; border:1px solid var(--line); color:var(--muted);}
  .syncbadge.ready{border-color:var(--teal); color:var(--teal);}
  .syncbadge.syncing{border-color:var(--amber); color:var(--amber);}
  .syncbadge.error{border-color:var(--red); color:var(--red);}
  .syncbadge.offline,.syncbadge.off,.syncbadge.nokey{border-color:var(--line); color:var(--muted);}
  .fab{position:fixed; right:20px; bottom:76px; width:54px; height:54px; border-radius:27px;
    background:var(--amber); color:#1a1508; font-size:28px; border:none; cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.4); line-height:0; z-index:5;}
  .tabs{position:fixed; bottom:0; left:0; right:0; background:var(--surface);
    border-top:1px solid var(--line); display:flex; z-index:10;}
  .tabs button{flex:1; padding:13px 0 calc(13px + env(safe-area-inset-bottom)); background:none; border:none;
    cursor:pointer; font-size:13px; color:var(--muted); border-top:2px solid transparent; font-family:inherit;}
  .tabs button.on{color:var(--amber); font-weight:700; border-top-color:var(--amber);}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--surface2);
    border:1px solid var(--teal); color:var(--teal); font-size:12px; padding:6px 16px; border-radius:16px;
    z-index:60; opacity:0; transition:opacity .25s; pointer-events:none;}
  .toast.show{opacity:1;}
  .hdr{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .navbtn{background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; font-family:inherit;}
  h1{font-size:15px; font-weight:700; letter-spacing:.06em; margin:0 0 4px;}
  h1 small{color:var(--muted); font-weight:400; font-size:11px;}
  .listitem{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; cursor:pointer;}
  .ellip{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar{height:5px; background:var(--surface2); border-radius:3px;}
  .bar>div{height:5px; border-radius:3px; opacity:.85;}
  .xbtn{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 2px;}
  .signbtn{width:38px; height:38px; border-radius:6px; font-size:18px; font-weight:700; cursor:pointer;
    flex-shrink:0; line-height:1; background:transparent; font-family:inherit;}
  .amberpanel{background:rgba(242,179,61,.08); border:1px solid rgba(242,179,61,.35); border-radius:8px; padding:9px 10px;}
  textarea.input{height:120px; resize:vertical; font-size:11px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast">保存しました</div>
<script>
"use strict";
/* ============================================================
   収支台帳 v19 (localStorage保存・完全オフライン)
   ============================================================ */
const KEY = "kakeibo:v1";
const EXPENSE_CATS = ["消費","娯楽","自己投資"];
const INCOME_CATS = ["給与","賞与","その他収入"];
const UNIT_LABEL = {medal:"枚", ball:"玉", yen:"円"};
const WD = ["日","月","火","水","木","金","土"];

/* ---------- helpers ---------- */
const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
const fnum = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const yen = n => "¥" + Math.abs(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"−") + yen(n);
const clsPM = n => n>=0 ? "teal" : "red";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const uid = () => Date.now() + Math.floor(Math.random()*1000);

/* ---------- state ---------- */
let S = { entries:[], sessions:[], rates:{medal:"20", ball:"4", push:"245", exchange:"50", pExchange:"250", pushPayout:"230", pushDraw:"245", mjScore:"", mjChip:"", mjBase:"", mjTop:"", mjDrink:""}, mdb:[], mjSessions:[], updatedAt:0 };
let UI = {
  tab:"slot", screen:"main",           // main | session | mdb | backup | entry
  y:new Date().getFullYear(), m:new Date().getMonth()+1,
  draft:null, isNewSess:false,         // セッションドラフト
  entryForm:null, editEntryId:null,    // 家計簿ドラフト
  mdbForm:null,                        // 機種マスタドラフト
  msg:""                               // backup画面メッセージ
};

function migrateEntry(e){
  let ne = e;
  if((e.src==="slot"||e.src==="mahjong") && e.category==="遊技収支")
    ne = Object.assign({}, ne, {category:"遊技"});
  if(e.src==="slot" && typeof e.memo==="string" && (e.memo.includes("乗り打ち")||e.memo.includes("代打ち")))
    ne = Object.assign({}, ne, {memo: e.memo.replace("乗り打ち","乗打").replace("代打ち","代打")});
  return ne;
}
function applyData(d){
  S.entries = (d.entries||[]).map(migrateEntry);
  S.sessions = (d.sessions||[]).map(migrateSession);
  S.rates = Object.assign({medal:"20",ball:"4",push:"245",exchange:"50",pExchange:"250",pushPayout:"230",pushDraw:"245",mjScore:"",mjChip:"",mjBase:"",mjTop:"",mjDrink:""}, d.rates||{});
  S.mdb = Array.isArray(d.mdb)?d.mdb:[];
  S.mjSessions = Array.isArray(d.mjSessions)?d.mjSessions:[];
  S.updatedAt = d.updatedAt || 0;
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) applyData(JSON.parse(raw));
  }catch(e){ /* 壊れていたら初期状態 */ }
}
function saveLocal(){
  localStorage.setItem(KEY, JSON.stringify(S));
}
function save(){
  try{
    S.updatedAt = Date.now();
    saveLocal();
    toast("保存しました");
    schedulePush();
  }catch(e){
    alert("保存に失敗しました: " + e.message + "\nバックアップからエクスポートしてください。");
  }
}
let toastTimer = null;
function toast(t){
  const el = document.getElementById("toast");
  el.textContent = t; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1200);
}

/* ---------- 計算(セッション) ---------- */
const migrateSession = s => {
  /* 旧構造からの移行: 全台に貯玉方式フィールドを補完 */
  const machines = (s.machines||[]).map(m => {
    const nm = Object.assign({who:"me"}, m);
    if(nm.startStock===undefined) nm.startStock="";
    if(nm.endStock===undefined) nm.endStock="";
    if(nm.holdBalls===undefined) nm.holdBalls="";
    if(!nm.cash) nm.cash=[];
    if(nm.kind==="slot"){ delete nm.rsegs; delete nm.hits; } /* 旧判別ログ破棄 */
    return nm;
  });
  const out = Object.assign({}, s, {machines});
  if(out.exchange===undefined) out.exchange="";
  if(out.pExchange===undefined) out.pExchange="";
  if(out.pushPayout===undefined) out.pushPayout="";
  if(out.pushDraw===undefined) out.pushDraw="";
  /* 旧区間の pushes/pp フィールドは残っていても新計算では無視される */
  delete out.results; delete out.own; delete out.partner;
  return out;
};
/* ---------- 計算(貯玉方式・台ごと) ----------
   差枚 = 終了貯玉 − 開始貯玉 + 持ち玉
   収支(円) = 差枚 ÷ 交換枚数 × 1000 − 現金投資合計 */
const machCash = m => (m.cash||[]).reduce((a,c)=>a+num(c.amount),0);
const machSabai = m => num(m.endStock) - num(m.startStock) + num(m.holdBalls);
const machYen = (m, exch) => {
  const ex = num(exch);
  const gross = ex>0 ? Math.round(machSabai(m)/ex*1000) : 0;
  return gross - machCash(m);
};
const machHasData = m => m.startStock!=="" || m.endStock!=="" || m.holdBalls!=="" || machCash(m)>0;
/* 台の換算レート: スロット=交換枚数, パチンコ=換金玉数 */
const machExch = (m, s) => m.kind==="pachi" ? s.pExchange : s.exchange;
const machYenS = (m, s) => machYen(m, machExch(m, s));
/* 収支対象台(スロット+貯玉入力のあるパチンコ) */
const incomeMachines = (s, who) => (s.machines||[]).filter(m =>
  (m.kind==="slot" || (m.kind==="pachi" && machHasData(m))) && (!who || (m.who||"me")===who));
const slotMachines = (s, who) => (s.machines||[]).filter(m => m.kind==="slot" && (!who || (m.who||"me")===who));
const personSlotYen = (s, who) => incomeMachines(s, who).reduce((a,m)=>a+machYenS(m, s), 0);
const poolTotal = s => personSlotYen(s,"me") + personSlotYen(s,"partner");
const expTotal = s => (s.expenses||[]).reduce((a,e)=>a+num(e.amount),0);
/* 乗り打ちの折半調整: myShareが入力されていればそれを自分の取り分に使う(なければ折半) */
const halfSplit = s => Math.round(poolTotal(s)/2);
const myShare = s => (s.myShare!==undefined && s.myShare!=="") ? num(s.myShare) : halfSplit(s);
const partnerShare = s => poolTotal(s) - myShare(s);
/* 家計簿へ流れる自分の生収支(経費前) */
const grossOwn = s => s.mode==="dai" ? num(s.fee)
                    : s.mode==="nori" ? myShare(s)
                    : personSlotYen(s,"me");
const finalOwn = s => grossOwn(s) - expTotal(s);
/* 代打ちの台勝敗(報告用・家計簿非反映) */
const daiResult = s => incomeMachines(s).reduce((a,m)=>a+machYenS(m, s), 0);

/* ---------- 計算(麻雀) ---------- */
const mjRankCount = m => m.rule==="3" ? 3 : 4;
const mjRanks = m => { const rc=mjRankCount(m); return (m.ranks||[]).map(x=>num(x)).map((v,i)=> i<rc?v:0); };
const mjHanchan = m => mjRanks(m).reduce((a,b)=>a+b,0);
const mjGameFee = m => m.category==="free"
  ? num(m.baseFee)*mjHanchan(m) + num(m.topBonus)*num((m.ranks||[])[0]) + num(m.drinkFee)
  : num(m.setFee);
const mjScoreYen = m => Math.round(fnum(m.score)*fnum(m.scoreRate));
const mjChipYen = m => Math.round(fnum(m.chips)*fnum(m.chipRate));
const mjRaw = m => mjScoreYen(m) + mjChipYen(m);          // ゲーム代抜き(麻雀のみの収支)
const mjFinal = m => mjRaw(m) - mjGameFee(m);             // ゲーム代込み(家計簿へ)
const mjAvgRank = m => {
  const h = mjHanchan(m); if(!h) return null;
  const r = mjRanks(m);
  let s=0; for(let i=0;i<r.length;i++) s += (i+1)*r[i];
  return s/h;
};
const modeLabel = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";
const modeShort = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";

/* ---------- 計算(パチンコ区間) ----------
   貯玉プッシュ: プッシュ数 = 開始残プッシュ − 終了残プッシュ
   台に入った玉(回転率用) = プッシュ数×払出玉 + 開始残玉 − 当たり時残玉
   引き落とし玉(コスト用) = プッシュ数×引き落とし玉 + 開始残玉 − 当たり時残玉 */
const segPushes = g => Math.max(0, num(g.rpStart) - num(g.rpEnd));
const segUsed = (g, s) => { s=s||UI.draft; return g.kind==="push"
  ? Math.max(0, segPushes(g)*num((s&&s.pushPayout)||230) + num(g.sb) - num(g.eb))
  : Math.max(0, num(g.sb) - num(g.eb)); };
const segCost = (g, s) => { s=s||UI.draft; return g.kind==="push"
  ? Math.max(0, segPushes(g)*num((s&&s.pushDraw)||245) + num(g.sb) - num(g.eb))
  : segUsed(g, s); };
const segSpins = g => Math.max(0, num(g.es) - num(g.ss));
const segDone = g => g.kind==="push"
  ? (g.rpStart!=="" && g.rpEnd!=="" && g.ss!=="" && g.es!=="")
  : (g.sb!=="" && g.eb!=="" && g.ss!=="" && g.es!=="");
function machineTotals(m, s){
  s = s||UI.draft;
  const segs = (m.segments||[]).filter(segDone);
  const balls = segs.reduce((a,g)=>a+segUsed(g, s),0);
  const spins = segs.reduce((a,g)=>a+segSpins(g),0);
  const costBalls = segs.reduce((a,g)=>a+segCost(g, s),0);
  const payouts = [];
  for(let i=0;i<segs.length-1;i++){
    if(segs[i].eb!=="" && segs[i+1].sb!==""){
      const p = num(segs[i+1].sb) - num(segs[i].eb);
      if(p>0) payouts.push(p);
    }
  }
  const avgTY = payouts.length ? payouts.reduce((a,b)=>a+b,0)/payouts.length : null;
  return { balls, spins, payouts, avgTY,
    rate250: balls>0 ? spins/(balls/250) : null,
    costRate250: costBalls>0 ? spins/(costBalls/250) : null };
}
const findMaster = m => S.mdb.find(x => x.kind==="pachi" && (x.name||"").trim()
  && (x.name||"").trim() === (m.name||"").trim());

/* ---------- 月データ ---------- */
const monthKey = () => UI.y + "-" + String(UI.m).padStart(2,"0");
function moveMonth(d){ UI.m += d;
  if(UI.m<1){UI.m=12;UI.y--;} if(UI.m>12){UI.m=1;UI.y++;}
  render(); }
</script>
<script>
/* ============================================================
   レンダリング
   ============================================================ */
function render(){
  const app = document.getElementById("app");
  if(UI.screen==="session"){ app.innerHTML = viewSession(); bindSession(); return; }
  if(UI.screen==="mahjong-edit"){ app.innerHTML = viewMj(); bindMj(); return; }
  if(UI.screen==="mdb"){ app.innerHTML = viewMdb(); bindMdb(); return; }
  if(UI.screen==="backup"){ app.innerHTML = viewBackup(); bindBackup(); return; }
  if(UI.screen==="entry"){ app.innerHTML = viewEntry(); bindEntry(); return; }
  app.innerHTML = viewMain(); bindMain();
}

/* ---------- 共通部品 ---------- */
const band = t => '<div class="band"><div class="tick"></div><div class="label">'+esc(t)+'</div><div class="rule"></div></div>';
const monthNav = () =>
  '<div class="row" style="justify-content:center;margin-top:8px">'+
  '<button class="navbtn" style="font-size:22px;padding:0 12px" data-a="mprev">‹</button>'+
  '<div style="font-size:14px;font-weight:600;letter-spacing:.08em;width:120px;text-align:center">'+UI.y+'年 '+UI.m+'月</div>'+
  '<button class="navbtn" style="font-size:22px;padding:0 12px" data-a="mnext">›</button></div>';

/* ---------- メイン画面 ---------- */
function viewMain(){
  let h = '<div class="row between" style="align-items:baseline">'+
    '<h1>収支台帳 <small>LEDGER</small></h1><div class="row" style="gap:6px">';
  if(UI.tab==="ledger") h += '<button class="btn" style="font-size:11px;padding:4px 10px" data-a="csv">CSV出力</button>';
  if(UI.tab==="slot") h += '<button class="btn" style="font-size:11px;padding:4px 10px" data-a="mdb">機種データ</button>';
  h += '<span class="syncbadge '+syncState+'" id="syncbadge">'+syncLabel()+'</span>';
  h += '<button class="btn" style="font-size:11px;padding:4px 10px" data-a="backup">backup</button></div></div>';

  h += monthNav();
  if(UI.tab==="ledger") h += viewLedger();
  if(UI.tab==="slot") h += viewSlot();
  if(UI.tab==="mahjong") h += viewMahjong();

  h += '<button class="fab" data-a="add">＋</button>';
  h += '<div class="tabs">'+
    [["ledger","家計簿"],["mahjong","麻雀"],["slot","スロット"]].map(([v,l])=>
      '<button class="'+(UI.tab===v?"on":"")+'" data-a="tab" data-v="'+v+'">'+l+'</button>').join("")+
    '</div>';
  return h;
}

function viewLedger(){
  const mk = monthKey();
  const me = S.entries.filter(e=>e.date.startsWith(mk))
    .sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : (String(b.id)>String(a.id)?1:-1));
  /* 収支カテゴリ(純額で見る独立セクション): 勝ち負けする活動。将来の投資もここに追加できる */
  const NET_SRCS = ["slot","mahjong"]; // 収支カテゴリとして扱うsrc
  const isNetEntry = e => NET_SRCS.includes(e.src);
  const income = me.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const expense = me.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  const bal = income-expense;
  /* 内訳用: 収支カテゴリを除いた通常の収入・支出 */
  const normIncome = me.filter(e=>e.type==="income" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  const normExpense = me.filter(e=>e.type==="expense" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  let h = '<div class="card" style="margin-top:10px"><div style="text-align:center;margin:4px 0 6px">'+
    '<div style="font-size:11px;letter-spacing:.15em" class="muted">当月収支</div>'+
    '<div class="mono '+clsPM(bal)+'" style="font-size:36px;font-weight:700;line-height:1.2">'+signYen(bal)+'</div></div>'+
    '<div class="row" style="border-top:1px solid var(--line);padding-top:10px;margin-top:8px">'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">収入</div><div class="mono teal" style="font-size:16px">'+yen(normIncome)+'</div></div>'+
    '<div style="width:1px;background:var(--line)"></div>'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">支出</div><div class="mono red" style="font-size:16px">'+yen(normExpense)+'</div></div></div></div>';

  /* 遊技サマリー(独立・種目別+トータル) */
  const gameNet = (src) => me.filter(e=>e.src===src).reduce((a,e)=> a + (e.type==="income"?e.amount:-e.amount), 0);
  const gameGross = (src) => ({
    inc: me.filter(e=>e.src===src && e.type==="income").reduce((a,e)=>a+e.amount,0),
    exp: me.filter(e=>e.src===src && e.type==="expense").reduce((a,e)=>a+e.amount,0)
  });
  const hasGame = me.some(e=>e.src==="slot"||e.src==="mahjong");
  if(hasGame){
    const gTotal = gameNet("slot") + gameNet("mahjong");
    h += band("当月の遊技収支");
    /* トータル */
    h += '<div class="card" style="margin-bottom:8px"><div class="row between" style="align-items:baseline">'+
      '<span style="font-size:12px;font-weight:700">遊技トータル</span>'+
      '<span class="mono '+clsPM(gTotal)+'" style="font-size:26px;font-weight:700">'+signYen(gTotal)+'</span></div></div>';
    /* 種目別 */
    h += '<div class="row" style="gap:8px">';
    [["slot","パチスロ"],["mahjong","麻雀"]].forEach(([src,label])=>{
      const net = gameNet(src), g = gameGross(src);
      if(g.inc===0 && g.exp===0) return;
      h += '<div class="card" style="flex:1;padding:12px 12px">'+
        '<div class="muted" style="font-size:11px;text-align:center;margin-bottom:4px">'+label+'</div>'+
        '<div class="mono '+clsPM(net)+'" style="font-size:22px;font-weight:700;text-align:center;line-height:1.2">'+signYen(net)+'</div>'+
        '<div class="row between" style="font-size:10px;margin-top:8px;border-top:1px solid var(--line);padding-top:6px">'+
        '<span class="muted">収入</span><span class="mono teal">'+yen(g.inc)+'</span></div>'+
        '<div class="row between" style="font-size:10px;margin-top:2px">'+
        '<span class="muted">支出</span><span class="mono red">'+yen(g.exp)+'</span></div></div>';
    });
    h += '</div>';
  }

  /* 収入内訳(収支カテゴリを除く) */
  const incCats = {};
  me.filter(e=>e.type==="income" && !isNetEntry(e)).forEach(e=>incCats[e.category]=(incCats[e.category]||0)+e.amount);
  const ict = Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
  if(ict.length){
    h += band("収入内訳") + '<div class="card">' + ict.map(([c,a])=>
      '<div style="margin:8px 0"><div class="row between" style="font-size:12px;margin-bottom:3px">'+
      '<span>'+esc(c)+'</span><span class="mono muted">'+yen(a)+' <span style="font-size:10px">('+Math.round(a/normIncome*100)+'%)</span></span></div>'+
      '<div class="bar"><div style="width:'+(a/normIncome*100)+'%;background:var(--teal)"></div></div></div>'
    ).join("") + '</div>';
  }

  const cats = {};
  me.filter(e=>e.type==="expense" && !isNetEntry(e)).forEach(e=>cats[e.category]=(cats[e.category]||0)+e.amount);
  const ct = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const QCOL = {"消費":"var(--teal)","娯楽":"var(--amber)","自己投資":"var(--blue)"};
  if(ct.length){
    h += band("支出内訳") + '<div class="card">' + ct.map(([c,a])=>{
      const col = QCOL[c] || "var(--teal)";
      return '<div style="margin:8px 0"><div class="row between" style="font-size:12px;margin-bottom:3px">'+
      '<span>'+esc(c)+'</span><span class="mono muted">'+yen(a)+' <span style="font-size:10px">('+Math.round(a/normExpense*100)+'%)</span></span></div>'+
      '<div class="bar"><div style="width:'+(a/normExpense*100)+'%;background:'+col+'"></div></div></div>';
    }).join("") + '</div>';
  }

  h += band("明細");
  if(!me.length) h += '<div style="text-align:center;padding:28px 0;font-size:13px" class="muted">この月の記録はまだありません。右下の「＋」から追加できます。</div>';
  const byDate = {};
  me.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  Object.entries(byDate).sort((a,b)=>a[0]<b[0]?1:-1).forEach(([d,list])=>{
    h += '<div style="margin-bottom:12px"><div class="mono muted" style="font-size:11px;margin:0 4px 4px">'+
      d.slice(5).replace("-","/")+' ('+WD[new Date(d+"T00:00:00").getDay()]+')</div>'+
      '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden">'+
      list.map((e,i)=>{
        const signedAmt = e.type==="income" ? e.amount : -e.amount;
        return '<div class="row" style="padding:10px 14px;cursor:pointer;'+(i?'border-top:1px solid var(--line);':'')+'" data-a="eedit" data-v="'+e.id+'">'+
        '<div style="flex:1;min-width:0"><div style="font-size:13px">'+esc(e.category)+
        (e.src==="slot"||e.src==="mahjong"?' <span class="tag amber" style="border:1px solid var(--amber);font-size:9px">連携</span>':'')+'</div>'+
        (e.memo?'<div class="muted ellip" style="font-size:11px">'+esc(e.memo)+'</div>':'')+'</div>'+
        '<div class="mono '+clsPM(signedAmt)+'" style="font-size:14px">'+signYen(signedAmt)+'</div></div>';
      }).join("")+'</div></div>';
  });
  return h;
}

function viewMjStats(){
  /* ルール名 × カテゴリ(フリー/セット)別に集計。同レートで括るのが目的 */
  const groups = {}; // key: category|store
  (S.mjSessions||[]).forEach(s=>{
    const store = (s.store||"").trim() || "(ルール名なし)";
    const key = s.category + "|" + store;
    (groups[key] = groups[key] || {category:s.category, store, list:[]}).list.push(s);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    // フリー→セットの順、その中は半荘数の多い順
    const ga=groups[a], gb=groups[b];
    if(ga.category!==gb.category) return ga.category==="free"?-1:1;
    const ha=ga.list.reduce((x,s)=>x+mjHanchan(s),0), hb=gb.list.reduce((x,s)=>x+mjHanchan(s),0);
    return hb-ha;
  });
  let h = "", any=false;
  keys.forEach(key=>{
    const G = groups[key], list = G.list;
    const H = list.reduce((a,s)=>a+mjHanchan(s),0);
    if(!H) return;
    any = true;
    /* この括りの最大着順数(3麻と4麻が混じっても広い方に合わせる) */
    const rc = Math.max(...list.map(s=>mjRankCount(s)));
    const rankSums = [0,0,0,0];
    list.forEach(s=>{ const r=mjRanks(s); for(let i=0;i<4;i++) rankSums[i]+=(r[i]||0); });
    let rankWeighted=0; for(let i=0;i<4;i++) rankWeighted += (i+1)*rankSums[i];
    const avgRank = rankWeighted/H;
    const sumFinal = list.reduce((a,s)=>a+mjFinal(s),0);
    const sumRaw = list.reduce((a,s)=>a+mjRaw(s),0);
    const sumFee = list.reduce((a,s)=>a+mjGameFee(s),0);
    const sumScore = list.reduce((a,s)=>a+fnum(s.score),0);
    const sumChips = list.reduce((a,s)=>a+fnum(s.chips),0);
    const catC = G.category==="free"?"var(--teal)":"var(--amber)";
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div class="row between" style="margin-bottom:8px;align-items:center"><span style="font-weight:700;font-size:13px" class="ellip">'+
      '<span class="tag" style="border:1px solid '+catC+';color:'+catC+';margin-right:6px">'+(G.category==="free"?"フリー":"セット")+'</span>'+esc(G.store)+'</span>'+
      '<span class="muted" style="font-size:11px;flex-shrink:0">'+H+'半荘 / '+list.length+'日</span></div>'+
      '<div class="row between" style="align-items:baseline;margin-bottom:8px"><span class="muted" style="font-size:12px">平均着順</span>'+
      '<span class="mono amber" style="font-size:18px;font-weight:700">'+avgRank.toFixed(3)+'</span></div>'+
      '<div class="row" style="gap:4px;margin-bottom:10px">'+
      Array.from({length:rc}).map((_,i)=>{
        const pct = H>0 ? Math.round(rankSums[i]/H*100) : 0;
        return '<div style="flex:1;text-align:center;background:var(--surface2);border-radius:6px;padding:5px 0">'+
          '<div class="muted" style="font-size:9px">'+(i+1)+'着</div>'+
          '<div class="mono" style="font-size:13px;font-weight:700">'+rankSums[i]+'</div>'+
          '<div class="muted mono" style="font-size:9px">'+pct+'%</div></div>';
      }).join("")+'</div>'+
      '<div style="border-top:1px solid var(--line);padding-top:8px">'+
      mjStatRow("平均収支(ゲーム代込)", Math.round(sumFinal/H), true)+
      mjStatRow("平均収支(ゲーム代抜)", Math.round(sumRaw/H), true)+
      mjStatRow("平均ゲーム代", -Math.round(sumFee/H), true)+
      mjStatRow("平均スコア", (sumScore/H), false, true)+
      mjStatRow("平均チップ", (sumChips/H), false, true)+
      '</div></div>';
  });
  if(!any) h = '<div style="text-align:center;padding:16px 0;font-size:12px;line-height:1.7" class="muted">まだ記録がありません。記録が貯まるとルール名別の平均着順や収支が出ます。</div>';
  return h;
}
function mjStatRow(label, val, isYen, raw){
  let disp;
  if(raw) disp = (val>=0?"+":"")+val.toFixed(1);
  else if(isYen) disp = signYen(val);
  else disp = "¥"+Math.abs(val).toLocaleString("ja-JP");
  const col = isYen ? clsPM(val) : (raw ? (val>=0?"blue":"red") : "");
  return '<div class="row between" style="font-size:12px;margin:3px 0"><span class="muted">'+label+'</span>'+
    '<span class="mono '+col+'">'+disp+'</span></div>';
}

    '<div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+

    '<button class="signbtn" style="width:34px;height:34px;border:1.5px solid '+(neg?"var(--red)":"var(--teal)")+';color:'+(neg?"var(--red)":"var(--teal)")+
    ';background:'+(neg?"rgba(229,115,115,.1)":"rgba(45,212,191,.1)")+'" data-a="mjsign" data-v="'+field+'">'+(neg?"−":"＋")+'</button>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="0" value="'+esc(String(val||"").replace("-",""))+'" style="flex:1.3;min-width:0" data-in="mjabs" data-v="'+field+'">'+
    '<span class="muted" style="font-size:10px;flex-shrink:0">'+rateLabel+'</span>'+

function mjFeeFormula(m){
  if(m.category!=="free" || !mjHanchan(m)) return "";
  const h=mjHanchan(m), t=num((m.ranks||[])[0]);
  const parts=[];
  if(num(m.baseFee)) parts.push("基本"+num(m.baseFee)+"×"+h);
  if(num(m.topBonus)&&t) parts.push("トップ賞"+num(m.topBonus)+"×"+t);
  if(num(m.drinkFee)) parts.push("ドリンク"+num(m.drinkFee));
  return parts.length ? parts.join(" + ")+" = ¥"+mjGameFee(m).toLocaleString("ja-JP") : "";
}
function mjSummary(m){
  const srow=(l,v,big)=>'<div class="row between" style="'+(big?"align-items:baseline":"font-size:13px;margin:4px 0")+'">'+
    '<span '+(big?'style="font-size:12px;font-weight:700"':'class="muted"')+'>'+l+'</span>'+
    '<span class="mono '+clsPM(v)+'" style="'+(big?"font-size:20px;font-weight:700":"")+'">'+signYen(v)+'</span></div>';
  let h = srow("スコア収支", mjScoreYen(m));
  if(num(m.chips)||fnum(m.chipRate)) h += srow("チップ収支", mjChipYen(m));
  h += '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">麻雀のみ収支(ゲーム代抜)</span>'+
    '<span class="mono '+clsPM(mjRaw(m))+'" style="font-weight:700">'+signYen(mjRaw(m))+'</span></div>';
  h += srow("ゲーム代", -mjGameFee(m));
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>';
  h += srow("最終収支(家計簿へ連携)", mjFinal(m), true);
  return h;
}

function bindMj(){
  const m = UI.mjDraft;
  document.getElementById("mj-date").oninput = e=>m.date=e.target.value;
  document.getElementById("mj-store").oninput = e=>m.store=e.target.value;
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind=el.dataset.in, v=el.dataset.v;
    el.oninput = ()=>{
      if(kind==="mjf"){ m[v]=el.value; refreshMj(); }
      else if(kind==="mjabs"){
        const neg = String(m[v]||"").startsWith("-");
        m[v] = (neg?"-":"") + el.value.replace(/-/g,"");
        refreshMj();
      }
      else if(kind==="mjrank"){ (m.ranks=m.ranks||["","","",""])[num(v)]=el.value; refreshMj(); }
    };
  });
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mjDraft=null; render(); }
      else if(a==="mjcat"){ m.category=v; render(); }
      else if(a==="mjrule"){ m.rule=v; render(); }
      else if(a==="mjsign"){
        const cur=String(m[v]||"");
        m[v] = cur.startsWith("-") ? cur.slice(1) : "-"+cur;
        render();
      }
      else if(a==="rankup"||a==="rankdn"){
        const i=num(v); m.ranks=m.ranks||["","","",""];
        let cur=num(m.ranks[i]); cur += (a==="rankup"?1:-1); if(cur<0) cur=0;
        m.ranks[i]=String(cur); render();
      }
      else if(a==="mjdel"){
        if(!confirm("この麻雀記録を削除しますか?")) return;
        S.entries = S.entries.filter(e=>e.id!=="mj-"+m.id);
        S.mjSessions = (S.mjSessions||[]).filter(x=>x.id!==m.id);
        save(); UI.screen="main"; UI.mjDraft=null; render();
      }
      else if(a==="mjsave") saveMj();
    };
  });
}

function refreshMj(){
  const m = UI.mjDraft;
  const su=document.getElementById("mj-summary"); if(su) su.innerHTML=mjSummary(m);
  const hn=document.getElementById("mj-hanchan"); if(hn) hn.textContent="半荘数 "+mjHanchan(m)+(mjAvgRank(m)!==null?" / 平均着順 "+mjAvgRank(m).toFixed(2):"");
  const ff=document.getElementById("mj-feeformula"); if(ff) ff.textContent=mjFeeFormula(m);
  const fa=document.getElementById("mj-feeauto"); if(fa) fa.textContent="¥"+mjGameFee(m).toLocaleString("ja-JP");
}

function saveMj(){
  const m = UI.mjDraft;
  if(!m.date) return;
  const cleaned = Object.assign({}, m);
  const rc = mjRankCount(cleaned);
  cleaned.ranks = (cleaned.ranks||["","","",""]).slice(0,4).map((x,i)=> i<rc ? x : "");
  if(UI.mjIsNew) S.mjSessions.push(cleaned);
  else S.mjSessions = S.mjSessions.map(x=>x.id===m.id?cleaned:x);
  if(fnum(cleaned.scoreRate)) S.rates.mjScore = cleaned.scoreRate;
  if(fnum(cleaned.chipRate)) S.rates.mjChip = cleaned.chipRate;
  if(num(cleaned.baseFee)) S.rates.mjBase = cleaned.baseFee;
  if(num(cleaned.topBonus)) S.rates.mjTop = cleaned.topBonus;
  if(num(cleaned.drinkFee)) S.rates.mjDrink = cleaned.drinkFee;
  const linkId = "mj-"+m.id;
  const fin = mjFinal(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"mahjong",
      type: fin>0?"income":"expense",
      category: "遊技",
      amount: Math.abs(fin),
      memo: "麻雀"+(cleaned.category==="free"?"(フリー":"(セット")+"・"+cleaned.rule+"麻)"+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.mjDraft=null; render();
}

function bindMain(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a = el.dataset.a, v = el.dataset.v;
      if(a==="tab"){ UI.tab=v; render(); }
      else if(a==="mprev") moveMonth(-1);
      else if(a==="mnext") moveMonth(1);
      else if(a==="csv") exportCsv();
      else if(a==="mdb"){ UI.screen="mdb"; UI.mdbForm=null; render(); }
      else if(a==="backup"){ UI.screen="backup"; UI.msg=""; render(); }
      else if(a==="add"){
        if(UI.tab==="ledger"){ UI.editEntryId=null;
          UI.entryForm={date:todayStr(),type:"expense",category:"消費",amount:"",memo:""};
          UI.screen="entry"; render();
        } else if(UI.tab==="mahjong"){
          UI.mjDraft={id:uid(),date:todayStr(),store:"",category:"free",rule:"4",
            score:S.rates.mjScore!==undefined?"":"", chips:"",
            scoreRate:S.rates.mjScore||"", chipRate:S.rates.mjChip||"",
            ranks:["","","",""], baseFee:S.rates.mjBase||"", topBonus:S.rates.mjTop||"", drinkFee:S.rates.mjDrink||"",
            setFee:"", memo:""};
          UI.mjIsNew=true; UI.screen="mahjong-edit"; render();
        } else {
          UI.draft={id:uid(),date:todayStr(),store:"",mode:"nori",partnerName:"",fee:"",
            exchange:S.rates.exchange||"",pExchange:S.rates.pExchange||"",pushPayout:S.rates.pushPayout||"",pushDraw:S.rates.pushDraw||"",machines:[],expenses:[],memo:""};
          UI.whoTab="me";
          UI.isNewSess=true; UI.screen="session"; render();
        }
      }
      else if(a==="mjedit"){
        const s = (S.mjSessions||[]).find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.screen="mahjong-edit"; render();
      }
      else if(a==="eedit"){
        const e = S.entries.find(x=>String(x.id)===String(v));
        if(!e) return;
        if(e.src==="slot"){
          const s = S.sessions.find(x=>"slot-"+x.id===e.id);
          if(s){ UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.tab="slot"; UI.screen="session"; render(); return; }
        }
        if(e.src==="mahjong"){
          const s = (S.mjSessions||[]).find(x=>"mj-"+x.id===e.id);
          if(s){ UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.tab="mahjong"; UI.screen="mahjong-edit"; render(); return; }
        }
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),memo:e.memo||""};
        UI.screen="entry"; render();
      }
      else if(a==="sedit"){
        const s = S.sessions.find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.screen="session"; render();
      }
    };
  });
}

function exportCsv(){
  const NET_SRCS = ["slot","mahjong"];
  const divLabel = e => NET_SRCS.includes(e.src) ? "遊技" : (e.type==="income"?"収入":"支出");
  const rows = [["日付","区分","カテゴリ","金額","メモ"]];
  S.entries.slice().sort((a,b)=>a.date>b.date?1:-1).forEach(e=>{
    const signed = e.type==="income" ? e.amount : -e.amount;
    rows.push([e.date, divLabel(e), e.category, signed, (e.memo||"").replace(/,/g,"、")]);
  });
  dl("\uFEFF"+rows.map(r=>r.join(",")).join("\n"), "kakeibo.csv", "text/csv");
}
function dl(content, name, type){
  const blob = new Blob([content],{type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

<script>
/* ============================================================
   セッション編集画面

function nameHints(){
  const seen=[];
  S.sessions.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(s=>{
    const n=(s.partnerName||"").trim();
    if(n && !seen.includes(n)) seen.push(n);
  });
  return seen.slice(0,5);
}

function viewSession(){
  const s = UI.draft;
  let h = '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">'+(UI.isNewSess?"稼働を記録":"稼働を編集")+'</div><div style="width:44px"></div></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    '<input class="input" type="date" id="s-date" value="'+esc(s.date)+'" style="flex:1">'+
    '<input class="input" id="s-store" placeholder="店名" value="'+esc(s.store)+'" style="flex:1.4"></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    [["nori","乗打"],["dai","代打"],["solo","単独"]].map(([v,l])=>
      '<button class="btn '+(s.mode===v?"sel":"")+'" style="flex:1" data-a="mode" data-v="'+v+'">'+l+'</button>').join("")+'</div>';

  if(s.mode!=="solo"){

    h += '<div style="margin-bottom:12px"><input class="input" id="s-pname" placeholder="'+

        hints.map(n=>'<button class="chip" data-a="pname" data-v="'+esc(n)+'">'+esc(n)+'</button>').join("")+'</div>':'')+'</div>';
  }

  /* ----- 交換設定(セッション共通) ----- */
  h += band("交換設定");
  h += '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">スロット</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 50" value="'+esc(s.exchange||"")+'" style="flex:1" data-in="exchange">'+

    '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">パチンコ</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 250" value="'+esc(s.pExchange||"")+'" style="flex:1" data-in="pexchange">'+
    '<span class="muted" style="font-size:12px">玉=1000円</span></div>'+
    '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:11px;width:74px">貯玉プッシュ</span>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="払出230" value="'+esc(s.pushPayout||"")+'" style="flex:1" data-in="pushpayout">'+
    '<span class="muted" style="font-size:11px">/</span>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="引落245" value="'+esc(s.pushDraw||"")+'" style="flex:1" data-in="pushdraw">'+
    '<span class="muted" style="font-size:10px">玉/回</span></div>'+
    '<div class="muted" style="font-size:10px">使う方だけ入力。前回値を記憶します。</div>';

  /* ----- 代打ち: 報酬 ----- */
  if(s.mode==="dai"){
    h += band("報酬(家計簿に反映)");
    h += '<div><div class="muted" style="font-size:11px;margin:0 2px 4px">受取報酬(円)</div>'+
      '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 15000" value="'+esc(s.fee)+'" data-in="fee"></div>';
  }

  /* ----- 台データ(貯玉方式) ----- */
  if(s.mode==="nori"){
    /* 乗り打ち: 自分/相方タブ */

    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      [["me","自分"],["partner",pn]].map(([v,l])=>

        ' <span class="mono" style="font-size:11px">'+signYen(personSlotYen(s,v))+'</span></button>').join("")+'</div>';
    slotMachines(s, who).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi" && (m.who||"me")===who).forEach(m=>{ h += viewMachine(m, s); });

function sessionSummary(s){
  const srow = (l,v) => '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">'+l+'</span><span class="mono '+clsPM(v)+'">'+signYen(v)+'</span></div>';
  let h = "";
  if(s.mode==="dai"){
    /* 代打ち: 報酬が家計簿へ。台勝敗は報告用 */
    const dai = daiResult(s);
    if(slotMachines(s).some(machHasData)){
      h += '<div class="card2" style="margin-bottom:10px"><div class="row between" style="align-items:baseline">'+
        '<span style="font-size:11px;font-weight:700">客の玉での勝敗(報告用)</span>'+
        '<span class="mono '+clsPM(dai)+'" style="font-size:16px;font-weight:700">'+signYen(dai)+'</span></div>'+
        '<div class="muted" style="font-size:10px;margin-top:4px">この金額は家計簿には反映されません</div></div>';
    }
    h += srow("報酬", num(s.fee));
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
    return h;
  }
  if(s.mode==="nori"){
    const me = personSlotYen(s,"me"), pt = personSlotYen(s,"partner"), pn = esc((s.partnerName||"").trim()||"相方");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted" style="font-size:10px">自分</div>'+
      '<div class="mono '+clsPM(me)+'" style="font-size:15px;font-weight:700">'+signYen(me)+'</div></div>'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted ellip" style="font-size:10px">'+pn+'</div>'+
      '<div class="mono '+clsPM(pt)+'" style="font-size:15px;font-weight:700">'+signYen(pt)+'</div></div></div>';
    h += srow("2人合計", poolTotal(s));
    /* 折半調整: 自分の取り分を編集可、相方は残りを自動 */
    const half = halfSplit(s), mine = myShare(s), theirs = partnerShare(s);
    const adjusted = (s.myShare!==undefined && s.myShare!=="" && num(s.myShare)!==half);
    h += '<div class="row between" style="align-items:center;font-size:13px;margin:8px 0 4px">'+
      '<span class="muted">自分の取り分</span>'+
      '<div class="row" style="align-items:center;gap:6px">'+
      '<span class="mono muted" style="font-size:12px">¥</span>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="'+half+'" value="'+esc(s.myShare!==undefined?s.myShare:"")+'" style="width:100px" data-in="myshare">'+
      '</div></div>';
    h += '<div class="row between" style="font-size:12px;margin:2px 0 4px"><span class="muted">'+esc((s.partnerName||"").trim()||"相方")+'の取り分(自動)</span>'+
      '<span class="mono '+clsPM(theirs)+'">'+signYen(theirs)+'</span></div>';
    if(adjusted) h += '<div class="muted" style="font-size:10px;margin-bottom:2px">折半'+signYen(half)+'から調整済み(差'+signYen(mine-half)+')</div>';
  }
  if(s.mode==="nori"){
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
    return h;
  }
  h += srow("自分の収支", grossOwn(s));
  h += srow("経費(自分負担分)", -expTotal(s));
  const fin = finalOwn(s);
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
    '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
    '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
  return h;
}
</script>
<script>
/* ---------- 台カード ---------- */
function viewSlotMachine(m, s){
  const q = (m.name||"").trim();
  const hits = S.mdb.filter(x=>x.kind==="slot" && (x.name||"").trim() && x.name.includes(q) && x.name.trim()!==q).slice(0,4);
  const sabai = machSabai(m);
  const yenv = machYen(m, s.exchange);
  let h = '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px">'+
    '<div class="row" style="gap:8px;margin-bottom:8px">'+
    '<span class="tag" style="background:var(--surface2);font-weight:700;color:var(--teal)">スロット</span>'+
    '<input class="input sm" placeholder="機種名" value="'+esc(m.name)+'" style="flex:1" data-in="mname" data-v="'+m.id+'">'+
    '<button class="xbtn" data-a="mdel" data-v="'+m.id+'">×</button></div>'+
    '<div id="msug-'+m.id+'">'+(hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
      hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'')+'</div>';

  /* 貯玉方式の4項目 */
  h += '<div class="grid2" style="margin-bottom:8px">'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">開始貯玉(枚)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.startStock||"")+'" data-in="mstock" data-v="'+m.id+'|startStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">終了貯玉(枚)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.endStock||"")+'" data-in="mstock" data-v="'+m.id+'|endStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">終了時の持ち玉(枚)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.holdBalls||"")+'" data-in="mstock" data-v="'+m.id+'|holdBalls"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">差枚(自動)</div>'+
    '<div id="sabai-'+m.id+'" class="input sm mono r '+clsPM(sabai)+'" style="border-style:dashed">'+(sabai>=0?"+":"")+sabai+'</div></div></div>';

  /* 現金投資(複数行) */
  h += '<div class="muted" style="font-size:9px;margin-bottom:3px">現金投資(円)</div>';
  (m.cash||[]).forEach(c=>{
    h += '<div class="row" style="gap:6px;margin-bottom:5px">'+
      '<input class="input sm" placeholder="メモ(任意)" value="'+esc(c.label||"")+'" style="flex:1.3" data-in="mcash" data-v="'+m.id+'|'+c.id+'|label">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="金額" value="'+esc(c.amount||"")+'" style="flex:1" data-in="mcash" data-v="'+m.id+'|'+c.id+'|amount">'+
      '<button class="xbtn" data-a="mcashdel" data-v="'+m.id+'|'+c.id+'">×</button></div>';
  });
  h += '<button class="btn dash full" style="font-size:11px;margin-bottom:8px" data-a="mcashadd" data-v="'+m.id+'">＋ 現金投資</button>';

  /* 台収支 */
  if(machHasData(m)){
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid var(--line);padding-top:8px">'+
      '<span style="font-size:11px;font-weight:700">台収支</span>'+
      '<span class="mono '+clsPM(yenv)+'" style="font-size:16px;font-weight:700">'+signYen(yenv)+'</span></div>'+
      (num(s.exchange)<=0?'<div class="red" style="font-size:10px;margin-top:4px">交換枚数を入力すると円換算されます</div>':'');
  }
  h += '<input class="input sm" placeholder="メモ(任意)" value="'+esc(m.memo||"")+'" data-in="mmemo" data-v="'+m.id+'" style="margin-top:8px"></div>';
  return h;
}

function viewMachine(m, s){
  const q = (m.name||"").trim();
  const hits = S.mdb.filter(x=>x.kind===m.kind && (x.name||"").trim() && x.name.includes(q) && x.name.trim()!==q).slice(0,4);
  let h = '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px">'+
    '<div class="row" style="gap:8px;margin-bottom:8px">'+
    '<span class="tag" style="background:var(--surface2);font-weight:700;color:'+(m.kind==="slot"?"var(--teal)":"var(--amber)")+'">'+
    (m.kind==="slot"?"スロット":"パチンコ")+'</span>'+
    '<input class="input sm" placeholder="機種名" value="'+esc(m.name)+'" style="flex:1" data-in="mname" data-v="'+m.id+'">'+
    '<button class="xbtn" data-a="mdel" data-v="'+m.id+'">×</button></div>'+
    '<div id="msug-'+m.id+'">'+(hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
      hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'')+'</div>';

  if(m.kind==="pachi"){
    h += '<div style="margin-bottom:8px">';
    (m.segments||[]).forEach((g,gi)=>{
      const isPush = g.kind==="push";
      const fields = isPush
        ? [["rpStart","開始 残プッシュ"],["rpEnd","終了 残プッシュ"],["sb","開始 残玉(通常0)"],["eb","当たり時 残玉"],["ss","開始 回転数"],["es","当たり時 回転数"]]
        : [["sb","開始 玉数"],["ss","開始 回転数"],["eb","終了 玉数(当たり時)"],["es","終了 回転数(当たり時)"]];
      h += '<div class="card2" style="margin-bottom:6px"><div class="row between" style="margin-bottom:6px">'+
        '<div class="row" style="gap:6px"><span class="muted" style="font-size:10px;font-weight:700">通常時 区間'+(gi+1)+'</span>'+
        '<button class="chip" style="font-weight:700;border-color:'+(isPush?"var(--amber)":"var(--teal)")+';color:'+(isPush?"var(--amber)":"var(--teal)")+'" '+
        'data-a="gkind" data-v="'+m.id+'|'+g.id+'">'+(isPush?"貯玉プッシュ":"持ち玉(玉数)")+'</button></div>'+
        '<div class="row" style="gap:8px"><span class="mono muted" style="font-size:10px" id="gstat-'+g.id+'">'+segStat(g)+'</span>'+
        '<button class="xbtn" style="font-size:14px" data-a="gdel" data-v="'+m.id+'|'+g.id+'">×</button></div></div>'+
        '<div class="grid2">'+fields.map(([k,label])=>
          '<div><div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+
          '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(g[k]||"")+'"'+
          (k==="sb"&&isPush?' placeholder="0"':'')+' data-in="gseg" data-v="'+m.id+'|'+g.id+'|'+k+'"></div>').join("")+'</div>'+
        '<div class="mono muted" style="font-size:10px;margin-top:5px" id="gform-'+g.id+'">'+segFormula(g)+'</div></div>';
    });
    h += '<button class="btn dash full" style="margin-bottom:6px" data-a="gadd" data-v="'+m.id+'">＋ 通常時区間(着席時/当たり後の再開時/現金追加時)</button>';
    h += '<div id="mpanel-'+m.id+'">'+borderPanel(m)+'</div></div>';
  }

  /* 収支(貯玉方式・任意) */
  h += '<div style="border-top:1px solid var(--line);margin-top:8px;padding-top:8px">'+
    '<div class="muted" style="font-size:10px;font-weight:700;margin-bottom:6px">収支(貯玉・任意)</div>'+
    '<div class="grid2" style="margin-bottom:6px">'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">開始貯玉(玉)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.startStock||"")+'" data-in="mstock" data-v="'+m.id+'|startStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">終了貯玉(玉)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.endStock||"")+'" data-in="mstock" data-v="'+m.id+'|endStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">終了時の持ち玉(玉)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.holdBalls||"")+'" data-in="mstock" data-v="'+m.id+'|holdBalls"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">差玉(自動)</div>'+
    '<div class="input sm mono r '+clsPM(machSabai(m))+'" style="border-style:dashed">'+(machSabai(m)>=0?"+":"")+machSabai(m)+'</div></div></div>';
  h += '<div class="muted" style="font-size:9px;margin-bottom:3px">現金投資(円)</div>';
  (m.cash||[]).forEach(c=>{
    h += '<div class="row" style="gap:6px;margin-bottom:5px">'+
      '<input class="input sm" placeholder="メモ(任意)" value="'+esc(c.label||"")+'" style="flex:1.3" data-in="mcash" data-v="'+m.id+'|'+c.id+'|label">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="金額" value="'+esc(c.amount||"")+'" style="flex:1" data-in="mcash" data-v="'+m.id+'|'+c.id+'|amount">'+
      '<button class="xbtn" data-a="mcashdel" data-v="'+m.id+'|'+c.id+'">×</button></div>';
  });
  h += '<button class="btn dash full" style="font-size:11px" data-a="mcashadd" data-v="'+m.id+'">＋ 現金投資</button>';
  if(machHasData(m)){
    const yv = machYenS(m, s);
    h += '<div class="row between" style="align-items:baseline;margin-top:8px">'+
      '<span style="font-size:11px;font-weight:700">台収支</span>'+
      '<span class="mono '+clsPM(yv)+'" style="font-size:16px;font-weight:700">'+signYen(yv)+'</span></div>'+
      (num(s.pExchange)<=0?'<div class="red" style="font-size:10px;margin-top:4px">換金玉数(パチンコ)を入力すると円換算されます</div>':'');
  }
  h += '</div>';

  h += '<input class="input sm" placeholder="メモ(据え/挙動/やめ時など)" value="'+esc(m.memo)+'" data-in="mmemo" data-v="'+m.id+'" style="margin-top:8px"></div>';
  return h;
}
const segStat = g => segDone(g) ? segUsed(g)+"発 / "+segSpins(g)+"回転" : "";
const segFormula = g => (g.kind==="push" && segDone(g))
  ? "台入球 = "+segPushes(g)+"プッシュ×"+num((UI.draft&&UI.draft.pushPayout)||230)+(num(g.sb)?" + 残"+num(g.sb):"")+" − "+num(g.eb)+" = "+segUsed(g)+"発" : "";

function borderPanel(m){
  const t = machineTotals(m);
  if(t.rate250===null) return "";
  const master = findMaster(m);
  const denom = master ? fnum(master.denom) : 0;
  const bTheory = denom>0 && master && fnum(master.ty)>0 ? denom*250/fnum(master.ty) : null;
  const bEff = denom>0 && t.avgTY>0 ? denom*250/t.avgTY : null;
  let ab = null;
  if(denom>0) ab = bEff!==null ? bEff : bTheory;
  else {
    const b = fnum(m.border);
    if(b){ const ty=fnum(m.ty); ab = (ty>0 && t.avgTY>0) ? b*(ty/t.avgTY) : b; }
  }
  const dev = ab && t.costRate250!==null ? (t.costRate250/ab-1)*100 : null;

  let h = '<div class="amberpanel"><div class="row between" style="align-items:baseline;margin-bottom:6px">'+
    '<span class="mono muted" style="font-size:11px">累計 '+t.balls+'発 / '+t.spins+'回転</span>'+
    '<span class="mono amber" style="font-size:15px;font-weight:700">≒ '+t.rate250.toFixed(2)+' 回/250発</span></div>';
  if(t.costRate250!==null && Math.abs(t.costRate250-t.rate250)>0.005)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">コスト補正(貯玉手数料込)</span>'+
      '<span class="mono">'+t.costRate250.toFixed(2)+' 回/250発</span></div>';
  if(t.avgTY!==null)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">実測平均出玉('+t.payouts.length+'回)</span>'+
      '<span class="mono">'+Math.round(t.avgTY)+'発</span></div>';
  if(denom>0){
    h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">機種データ: 1/'+fnum(master.denom)+
      (fnum(master.ty)>0?' / 理論TY '+fnum(master.ty)+'発':'')+'</span>'+
      (bTheory!==null?'<span class="mono">理論B '+bTheory.toFixed(2)+'</span>':'')+'</div>';
    if(bEff!==null)
      h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">実効ボーダー(実測TY '+t.payouts.length+'回)</span>'+
        '<span class="mono" style="font-weight:700">'+bEff.toFixed(2)+' 回/250発</span></div>';
  } else {
    h += '<div class="grid2" style="margin:4px 0 6px">'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ボーダー(回/千円)</div>'+
      '<input class="input sm mono r" type="number" inputmode="decimal" step="0.1" value="'+esc(m.border||"")+'" data-in="mborder" data-v="'+m.id+'"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">理論平均出玉(任意)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.ty||"")+'" data-in="mty" data-v="'+m.id+'"></div></div>';
    if(fnum(m.border)>0 && fnum(m.ty)>0 && t.avgTY>0)
      h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">補正ボーダー(削れ反映)</span>'+
        '<span class="mono">'+(fnum(m.border)*fnum(m.ty)/t.avgTY).toFixed(2)+' 回/250発</span></div>';
  }
  if(dev!==null && ab)
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:2px">'+
      '<span style="font-size:11px;font-weight:700">ボーダー乖離</span>'+
      '<span class="mono '+clsPM(dev)+'" style="font-size:15px;font-weight:700">'+(dev>=0?"+":"−")+Math.abs(dev).toFixed(1)+'%'+
      '<span class="muted" style="font-size:10px;font-weight:400"> ('+(t.costRate250>=ab?"+":"−")+Math.abs(t.costRate250-ab).toFixed(2)+'回)</span></span></div>';
  return h+'</div>';
}
</script>
<script>
/* ---------- セッション画面のバインド ---------- */
function bindSession(){
  const s = UI.draft;
  const fm = (id)=>s.machines.find(x=>String(x.id)===String(id));

  /* 入力(再描画なし・計算表示のみ更新) */
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind = el.dataset.in, v = el.dataset.v;
    el.oninput = ()=>{
      if(kind==="fee"){ s.fee=el.value; refreshSummary(); }
      else if(kind==="smemo"){ s.memo=el.value; }
      else if(kind==="exchange"){ s.exchange=el.value; refreshSlot(); }
      else if(kind==="pexchange"){ s.pExchange=el.value; refreshSlot(); }
      else if(kind==="pushpayout"){ s.pushPayout=el.value; refreshSlot(); }
      else if(kind==="pushdraw"){ s.pushDraw=el.value; refreshSlot(); }
      else if(kind==="myshare"){ s.myShare=el.value; refreshSlot(); }
      else if(kind==="xlabel"||kind==="xamount"){
        const x = s.expenses.find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="xlabel") x.label=el.value; else x.amount=el.value;
        refreshSummary();
      }
      else if(kind==="mname"){
        const m=fm(v); if(!m) return;
        m.name=el.value;
        const sug=document.getElementById("msug-"+m.id);
        if(sug){
          const q=(m.name||"").trim();
          const hits=S.mdb.filter(x=>x.kind===m.kind&&(x.name||"").trim()&&x.name.includes(q)&&x.name.trim()!==q).slice(0,4);
          sug.innerHTML = hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
            hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'';
          bindSessionActions();
        }
        if(m.kind==="pachi") refreshPanel(m);
      }
      else if(kind==="mmemo"){ const m=fm(v); if(m) m.memo=el.value; }
      else if(kind==="mstock"){
        const [mid,k]=v.split("|");
        const m=fm(mid); if(m){ m[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mcash"){
        const [mid,cid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const c=(m.cash||[]).find(x=>String(x.id)===String(cid)); if(c){ c[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mborder"||kind==="mty"){
        const m=fm(v); if(!m) return;
        if(kind==="mborder") m.border=el.value; else m.ty=el.value;
        refreshPanel(m, true);
      }
      else if(kind==="gseg"){
        const [mid,gid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const g=(m.segments||[]).find(x=>String(x.id)===String(gid)); if(!g) return;
        g[k]=el.value;
        const st=document.getElementById("gstat-"+g.id); if(st) st.textContent=segStat(g);
        const fo=document.getElementById("gform-"+g.id); if(fo) fo.textContent=segFormula(g);
        refreshPanel(m);
      }
    };
  });
  document.getElementById("s-date").oninput = e=>s.date=e.target.value;
  document.getElementById("s-store").oninput = e=>s.store=e.target.value;
  const pn = document.getElementById("s-pname");
  if(pn) pn.oninput = e=>s.partnerName=e.target.value;

  bindSessionActions();
}

function refreshSlot(){
  /* 貯玉方式は台収支・人合計・サマリー全てが連動するため、フォーカス保持で全再描画 */
  const f = document.activeElement;
  const fv = f && f.dataset && f.dataset.in
    ? {in:f.dataset.in, v:(f.dataset.v!==undefined?f.dataset.v:null)} : null;
  render();
  if(fv){
    const sel = fv.v!==null
      ? '[data-in="'+fv.in+'"][data-v="'+fv.v+'"]'
      : '[data-in="'+fv.in+'"]:not([data-v])';
    const nel = document.querySelector(sel);
    if(nel){ nel.focus(); /* number入力はカーソル末尾で問題ないため位置復元しない */ }
  }
}
function refreshSummary(){
  const el = document.getElementById("ssummary");
  if(el) el.innerHTML = sessionSummary(UI.draft);
}
function refreshPanel(m, keepInputs){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  if(keepInputs){
    /* 手入力欄フォーカス保持のため、乖離部分だけ作り直すのは煩雑なので全体更新+値復元 */
    const focused = document.activeElement;
    const fv = focused && focused.dataset ? {in:focused.dataset.in, v:focused.dataset.v, val:focused.value, ss:focused.selectionStart} : null;
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);

function bindSessionActions(){
  const s = UI.draft;
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.draft=null; render(); }
      else if(a==="mode"){ s.mode=v; render(); }
      else if(a==="pname"){ s.partnerName=v; render(); }
      else if(a==="whotab"){ UI.whoTab=v; render(); }
      else if(a==="madd"){
        const nm = {id:uid(),kind:v,name:"",memo:"",who:"me",startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(v==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="maddw"){
        const [k,who]=v.split("|");
        const nm = {id:uid(),kind:k,name:"",memo:"",who,startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(k==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="mdel"){ if(confirm("この台を削除しますか?")){ s.machines=s.machines.filter(x=>String(x.id)!==String(v)); render(); } }
      else if(a==="msug"){
        const [mid,name]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.name=name; render(); }
      }
      else if(a==="mcashadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.cash=m.cash||[]).push({id:uid(),label:"",amount:""}); render(); }
      }
      else if(a==="mcashdel"){
        const [mid,cid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.cash=(m.cash||[]).filter(x=>String(x.id)!==String(cid)); render(); }
      }
      else if(a==="gadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.segments=m.segments||[]).push({id:uid(),kind:"ball",sb:"",ss:"",eb:"",es:"",rpStart:"",rpEnd:""}); render(); }
      }
      else if(a==="gkind"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        const g=m&&(m.segments||[]).find(x=>String(x.id)===String(gid));
        if(g){ g.kind = g.kind==="push"?"ball":"push"; render(); }
      }
      else if(a==="gdel"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.segments=(m.segments||[]).filter(x=>String(x.id)!==String(gid)); render(); }
      }
      else if(a==="xadd"){ s.expenses.push({id:uid(),label:"",amount:""}); render(); }
      else if(a==="xdel"){ s.expenses=s.expenses.filter(x=>String(x.id)!==String(v)); render(); }
      else if(a==="sdel"){
        if(!confirm("この稼働記録を削除しますか?(家計簿の連携分も消えます)")) return;
        S.entries = S.entries.filter(e=>e.id!=="slot-"+s.id);
        S.sessions = S.sessions.filter(x=>x.id!==s.id);
        save(); UI.screen="main"; UI.draft=null; render();
      }
      else if(a==="ssave") saveSession();
    };
  });
}

function saveSession(){
  const s = UI.draft;
  if(!s.date) return;
  const cleaned = Object.assign({}, s, {
    fee: String(num(s.fee))
  });
  delete cleaned.own; delete cleaned.partner; delete cleaned.results;
  if(UI.isNewSess) S.sessions.push(cleaned);
  else S.sessions = S.sessions.map(x=>x.id===s.id?cleaned:x);
  /* レート記憶 */
  if(num(cleaned.exchange)>0) S.rates.exchange = cleaned.exchange;
  if(num(cleaned.pExchange)>0) S.rates.pExchange = cleaned.pExchange;
  if(num(cleaned.pushPayout)>0) S.rates.pushPayout = cleaned.pushPayout;
  if(num(cleaned.pushDraw)>0) S.rates.pushDraw = cleaned.pushDraw;
  /* 家計簿連携 */
  const linkId = "slot-"+s.id;
  const fin = finalOwn(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"slot",
      type: fin>0?"income":"expense",
      category: "遊技",
      amount: Math.abs(fin),
      memo: modeLabel(cleaned.mode)+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.draft=null; render();
}
</script>

const SB_URL = "https://uxvihnyrchaczwghykot.supabase.co";

let sb = null;            // Supabaseクライアント
let sbSession = null;     // ログインセッション

function initSb(){
  if(sb) return sb;

}
function setSync(s){ syncState = s; updateSyncUi(); }

async function pushCloud(){
  if(!sb || !sbSession) return;
  try{
    setSync("syncing");
    const { error } = await sb.from("app_data").upsert({
      user_id: sbSession.user.id,
      data: S,
      updated_at: new Date().toISOString()
    }, { onConflict: "user_id" });
    if(error) throw error;
    setSync("ready");
  }catch(e){ setSync("error"); }
}
function schedulePush(){
  if(!sb || !sbSession) return;
  clearTimeout(pushTimer);

}
async function fetchCloud(){
  if(!sb || !sbSession) return null;
  const { data, error } = await sb.from("app_data")
    .select("data").eq("user_id", sbSession.user.id).maybeSingle();
  if(error) throw error;
  return data ? data.data : null;
}
async function cloudSync(){
  if(!sb || !sbSession) return;
  try{
    setSync("syncing");
    const cloud = await fetchCloud();
    const localTs = S.updatedAt || 0;
    const cloudTs = cloud ? (cloud.updatedAt || 0) : -1;
    if(cloud && cloudTs > localTs){
      applyData(cloud);         // クラウドが新しい→採用
      saveLocal();
      render();
      toast("クラウドから同期しました");
      setSync("ready");
    }else if(localTs > cloudTs){
      await pushCloud();        // ローカルが新しい→送信
      toast("クラウドへ同期しました");
    }else{
      setSync("ready");
    }
  }catch(e){ setSync("error"); }
}

    '<div class="row" style="gap:8px">'+
    '<button class="btn primary" style="flex:1;font-weight:700;padding:11px 0" data-sa="login">ログイン</button>'+
    '<button class="btn tealb" style="flex:1;font-weight:700;padding:11px 0" data-sa="signup">新規登録</button></div>'+
    (UI.syncMsg?'<div class="'+(UI.syncErr?"red":"teal")+'" style="font-size:11px;margin-top:10px;line-height:1.6">'+esc(UI.syncMsg)+'</div>':'')+'</div>';
}
function bindSyncBox(){
  document.querySelectorAll("[data-sa]").forEach(el=>{
    el.onclick = async ()=>{
      const a = el.dataset.sa;
      if(a==="logout"){ await authSignOut(); UI.syncMsg=""; render(); }
      else if(a==="syncnow"){ await cloudSync(); }
      else if(a==="login" || a==="signup"){
        const email = (document.getElementById("sync-email").value||"").trim();
        const pw = document.getElementById("sync-pw").value||"";
        if(!email || pw.length<6){ UI.syncErr=true; UI.syncMsg="メールアドレスと6文字以上のパスワードを入力してください。"; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg = (a==="login"?"ログイン中…":"登録中…"); updateSyncUi();
        const r = a==="login" ? await authSignIn(email, pw) : await authSignUp(email, pw);
        if(r.error){ UI.syncErr=true; UI.syncMsg = r.error; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg=""; 
        await cloudSync();
        render();
      }
    };
  });
}

/* ---------- 起動 ---------- */
load();
render();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{ /* 未対応環境でも本体は動く */ });
}
setSync("nokey");
whenSbReady(initCloud);
</script>

</html>
