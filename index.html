<style>

     appearance„ÇíÂâ•„Åå„Åó„Å¶Êó•‰ªò„Å®Âêå„Åò„Äå„Åü„ÅÝ„ÅÆÁÆ±„Äç„Å®„Åó„Å¶ÊèèÁîª„Åï„Åõ„Çã */

  body.nopad-top #app{ padding-top:0; }

  @media print{

  /* Á≤æÁÆóÁ•®„ÅÆË¶ã„ÅüÁõÆ(Âç∞Âà∑„Å®ÁîªÈù¢‰∏ä„ÅÆÁ≤æÁÆó„Ç∑„Éº„Éà„ÅßÂÖ±Áî®) */
  .pr-wrap{ color:#000 !important; background:#fff !important; font-family:-apple-system,sans-serif; padding:10mm; border-radius:10px; }

  .pr-latest td{ background:#FBF3DC !important; }
  .pr-no, .pr-lbl{ white-space:nowrap; }
  /* ‚ÜìÁîªÈù¢‰∏ä„ÅÆÁ≤æÁÆó„Ç∑„Éº„ÉàÂ∞ÇÁî®„ÅÆË™øÊï¥(Âç∞Âà∑„ÅØ#print-areaÁµåÁî±„Å™„ÅÆ„Åß‰∏çÂ§â) */
  #app .pr-wrap{ padding:14px 8px; }

<script>
"use strict";
/* ============================================================
   Tally 3.17 (localStorage‰øùÂ≠ò„ÉªÂÆåÂÖ®„Ç™„Éï„É©„Ç§„É≥)
   ============================================================ */
const KEY = "kakeibo:v1";
const EXPENSE_CATS = ["Ê∂àË≤ª","Â®ØÊ•Ω","ÊâøË™ç"];  /* ÊâøË™ç=‰∫ãÂâçÊâøË™çÊ∏à„Åø„ÅÆÁâπÂà•ÊîØÂá∫„ÄÇ‰∫àÁÆó„Éê„ÉºÂØæË±°Â§ñ(ÊâøË™ç„Éó„É≠„Çª„ÇπËá™‰Ωì„ÅåÁµ±Âà∂) */
const INCOME_CATS = ["Áµ¶‰∏é","Ë≥û‰∏é","ÂâØÊ•≠","Ëá®ÊôÇ"];
const UNIT_LABEL = {medal:"Êûö", ball:"Áéâ", yen:"ÂÜÜ"};
const WD = ["Êó•","Êúà","ÁÅ´","Ê∞¥","Êú®","Èáë","Âúü"];

/* ---------- helpers ---------- */
const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
const fnum = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const yen = n => "¬•" + Math.abs(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"‚àí") + yen(n);
const clsPM = n => n>=0 ? "teal" : "red";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const nowHM = () => { const d=new Date(); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); };
const uid = () => Date.now() + Math.floor(Math.random()*1000);

/* ---------- Âõ∫ÂÆöË≤ª(ÂÆöÊúü)„ÉÜ„É≥„Éó„É¨„Éº„Éà ----------
   „ÉÜ„É≥„Éó„É¨„Éº„Éà„ÅåÂÆü„Ç®„É≥„Éà„É™„ÇíÁîüÊàê„Åô„ÇãÊñπÂºè„ÄÇÊó•‰ªò„ÅåÈÅéÂéª„Å™„ÇâÂÆüÁ∏æ„ÄÅÊú™Êù•„Å™„Çâ‰∫àÂÆö„ÄÇ
   ÂΩìÂπ¥12Êúà„Åæ„ÅßÁîüÊàê„ÄÇÂÅúÊ≠¢„Åô„Çã„Å®Êú™Êù•ÂàÜ„ÅÝ„ÅëÂâäÈô§„ÅóÈÅéÂéª„ÅØÊÆã„Åô„ÄÇ */
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();  // m:1-12
/* Êó•Êú¨„ÅÆÁ•ùÊó•Âà§ÂÆö(„Ç™„Éï„É©„Ç§„É≥„ÉªË®àÁÆóÂºè„ÄÇÊò•ÂàÜ/ÁßãÂàÜ„ÅØÂ§©ÊñáËøë‰ºº„ÄÅ„Éè„ÉÉ„Éî„Éº„Éû„É≥„Éá„Éº„ÉªÊåØÊõø‰ºëÊó•„ÉªÂõΩÊ∞ë„ÅÆ‰ºëÊó•„Å´ÂØæÂøú) */
function jpEquinox(y, spring){
  const base = spring ? 20.8431 : 23.2488;
  return Math.floor(base + 0.242194*(y-1980) - Math.floor((y-1980)/4));
}
function isJpHolidayYMD(y, m, d){
  const FIX = {1:[1], 2:[11,23], 4:[29], 5:[3,4,5], 8:[11], 11:[3,23]};
  if(FIX[m] && FIX[m].indexOf(d)>=0) return true;
  if(m===3 && d===jpEquinox(y,true)) return true;
  if(m===9 && d===jpEquinox(y,false)) return true;
  const dow = new Date(y, m-1, d).getDay();
  if(dow===1){
    const week = Math.floor((d-1)/7)+1;
    if(m===1 && week===2) return true;   // Êàê‰∫∫„ÅÆÊó•
    if(m===7 && week===3) return true;   // Êµ∑„ÅÆÊó•
    if(m===9 && week===3) return true;   // Êï¨ËÄÅ„ÅÆÊó•
    if(m===10 && week===2) return true;  // „Çπ„Éù„Éº„ÉÑ„ÅÆÊó•
  }
  return false;

function isJpHoliday(dt){
  const DAY=86400000;
  const y=dt.getFullYear(), m=dt.getMonth()+1, d=dt.getDate();
  if(isJpHolidayYMD(y,m,d)) return true;
  let p=new Date(dt.getTime()-DAY);   // ÊåØÊõø‰ºëÊó•: Áõ¥Ââç„ÅÆÈÄ£Á∂öÁ•ùÊó•„ÅåÊó•Êõú„Åæ„ÅßÈÅ°„Çå„Çã
  while(isJpHolidayYMD(p.getFullYear(),p.getMonth()+1,p.getDate())){
    if(p.getDay()===0) return true;
    p=new Date(p.getTime()-DAY);
  }
  if(dt.getDay()!==0 && dt.getDay()!==6){   // ÂõΩÊ∞ë„ÅÆ‰ºëÊó•: ÂâçÂæå„ÅåÁ•ùÊó•„ÅÆÂπ≥Êó•
    const pv=new Date(dt.getTime()-DAY), nx=new Date(dt.getTime()+DAY);
    if(isJpHolidayYMD(pv.getFullYear(),pv.getMonth()+1,pv.getDate()) && isJpHolidayYMD(nx.getFullYear(),nx.getMonth()+1,nx.getDate())) return true;
  }
  return false;
}
function isNonBusinessDay(dt){ const g=dt.getDay(); return g===0 || g===6 || isJpHoliday(dt); }
function shiftForHoliday(dt, mode){
  const DAY=86400000; let d=new Date(dt.getTime());
  if(mode==="before"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()-DAY); }
  else if(mode==="after"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()+DAY); }
  return d;
}

/* ÈÝªÂ∫¶„Å´Âøú„Åò„ÅüÁô∫ÁîüÊó•„É™„Çπ„Éà„ÇíËøî„Åô(‰ªäÊúà„ÄúÂΩìÂπ¥12Êúà) */
function fixedOccurrences(tpl){
  const now = new Date();
  const y = now.getFullYear();
  let yEnd = new Date(y, 11, 31);
  if(tpl.end){ const e = new Date(tpl.end+"T00:00:00"); if(e < yEnd) yEnd = e; }  /* ÁµÇ‰∫ÜÊó•„ÅßÊâì„Å°Âàá„Çä */
  const floor = new Date(y, now.getMonth(), 1);   // ‰ªäÊúà1Êó•(ÈÅéÂéª„Å∏„ÅÆÈÅ°„ÇäÈò≤Ê≠¢)
  const freq = tpl.freq || "monthly";
  const out = [];
  if(freq==="days"){
    /* ÊõúÊó•ÊåáÂÆö: ÈñãÂßãÊó•„ÄúÁµÇ‰∫ÜÊó•„ÅÆÁØÑÂõ≤„ÅßË©≤ÂΩìÊõúÊó•„Å´ÊØéÂõûÁô∫Áîü(ÈßêËº™ÂÝ¥„ÉªÂá∫Âã§Êó•Á≥ª) */
    const days = Array.isArray(tpl.days) ? tpl.days : [];
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(floor);
    if(d < floor) d = new Date(floor);
    while(d <= yEnd){ if(days.includes(d.getDay())) out.push(new Date(d)); d = new Date(d.getTime()+86400000); }
  } else if(freq==="weekly" || freq==="biweekly"){
    const step = (freq==="weekly"?7:14) * 86400000;
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(y, now.getMonth(), now.getDate());
    while(d < floor) d = new Date(d.getTime()+step);   // Ëµ∑ÁÇπ„Çí‰ªäÊúà„Åæ„ÅßÈÄ≤„ÇÅ„Çã
    while(d <= yEnd){ out.push(new Date(d)); d = new Date(d.getTime()+step); }
  } else {
    const day = num(tpl.day)||1;
    const stepM = (freq==="bimonthly"?2:1);
    for(let m=now.getMonth(); m<=11; m+=stepM){
      const dt = new Date(y, m, Math.min(day, daysInMonth(y, m+1)));
      if(dt <= yEnd) out.push(dt);
    }
  }
  const hs = tpl.holidayShift || "none";
  return (hs==="none") ? out : out.map(dt => shiftForHoliday(dt, hs));
}
/* ÂÆöÊúü„Ç®„É≥„Éà„É™„ÅÆ„ÄåÂá∫ÁîüÊó•„Äç= „Å©„ÅÆÁô∫ÁîüÂõû„Å®„Åó„Å¶Áîü„Åæ„Çå„Åü„Åã„ÄÇ

function fixedOccKey(e){

}

    if(!exists){

   „ÉÜ„É≥„Éó„É¨ÈÄö„Çä„ÅÆÊú™Á∑®ÈõÜ„ÇØ„É≠„Éº„É≥„ÅÝ„Åë„ÇíÊ∂à„Åô(„É¶„Éº„Ç∂„Éº„ÅåËß¶„Å£„ÅüÊñπ=ÈáëÈ°ç/Êó•‰ªò/Â∫ó„ÅåÈÅï„ÅÜÊñπ„ÅØÂøÖ„ÅöÊÆã„Åô)„ÄÇ

function fixedDedupe(){
  const byTpl = {};
  (S.fixed||[]).forEach(t=>{ byTpl[String(t.id)] = t; });
  const groups = {};
  (S.entries||[]).forEach(e=>{
    if(e.fixedId==null) return;
    const k = String(e.fixedId)+"|"+fixedOccKey(e);
    (groups[k]=groups[k]||[]).push(e);
  });
  const removeIds = [];
  Object.keys(groups).forEach(k=>{
    const g = groups[k];
    if(g.length < 2) return;
    const tpl = byTpl[String(g[0].fixedId)];
    const untouched = e => !!tpl
      && e.date === fixedOccKey(e)
      && num(e.amount) === num(tpl.amount)
      && (e.store||"") === (tpl.store||"");
    const touched = g.filter(e=>!untouched(e));
    const keep = touched.length ? touched : [g[0]];
    g.forEach(e=>{ if(!keep.includes(e)) removeIds.push(e.id); });
  });
  if(removeIds.length){
    S.entries = S.entries.filter(e=>!removeIds.includes(e.id));
    saveLocal();
    setTimeout(()=>{ try{ toast("ÂÆöÊúü„ÅÆÈáçË§á"+removeIds.length+"‰ª∂„ÇíËá™ÂãïÊï¥ÁêÜ„Åó„Åæ„Åó„Åü"); }catch(e){} }, 600);
  }
  return removeIds.length;
}

  const old = (S.fixed||[]).find(t=>String(t.id)===String(tpl.id));

  /* È§äÂ≠êÁ∏ÅÁµÑ(v3.14): „Çπ„Ç±„Ç∏„É•„Éº„É´Â§âÊõ¥„ÅßÂá∫ÁîüÊó•„ÅåÊóßÊö¶„ÅÆ„Åæ„ÅæÊÆã„Å£„ÅüÂÆüÁ∏æ„ÇíÊñ∞Êö¶„Å∏„ÄÇ
     Êñ∞„Çπ„Ç±„Ç∏„É•„Éº„É´„ÅÆÁô∫ÁîüÊó•„Å®Âêå„ÅòÊó•‰ªò„ÇíÊåÅ„Å§Ëá™„ÉÜ„É≥„Éó„É¨„ÅÆÂÆüÁ∏æ„Å´ fixedDate „ÇíÂàª„ÅøÁõ¥„Åó„ÄÅ

  const occs = fixedOccurrences(tpl).map(fmtDate);
  S.entries.forEach(e=>{

/* ---------- Ë®àÁÆó(„Çª„ÉÉ„Ç∑„Éß„É≥) ---------- */
const migrateSession = s => {
  /* ÊóßÊßãÈÄÝ„Åã„Çâ„ÅÆÁßªË°å: ÂÖ®Âè∞„Å´Ë≤ØÁéâÊñπÂºè„Éï„Ç£„Éº„É´„Éâ„ÇíË£úÂÆå */
  const machines = (s.machines||[]).map(m => {

    if(nm.startStock===undefined) nm.startStock="";

    return nm;
  });
  const out = Object.assign({}, s, {machines});
  if(out.exchange===undefined) out.exchange="";
  if(out.pExchange===undefined) out.pExchange="";
  if(out.pushPayout===undefined) out.pushPayout="";
  if(out.pushDraw===undefined) out.pushDraw="";
  /* ÊóßÂå∫Èñì„ÅÆ pushes/pp „Éï„Ç£„Éº„É´„Éâ„ÅØÊÆã„Å£„Å¶„ÅÑ„Å¶„ÇÇÊñ∞Ë®àÁÆó„Åß„ÅØÁÑ°Ë¶ñ„Åï„Çå„Çã */
  delete out.results; delete out.own; delete out.partner;
  return out;
};
/* ---------- Ë®àÁÆó(Ë≤ØÁéâÊñπÂºè„ÉªÂè∞„Åî„Å®) ----------
   Â∑ÆÊûö = ÁµÇ‰∫ÜË≤ØÁéâ ‚àí ÈñãÂßãË≤ØÁéâ + ÊåÅ„Å°Áéâ
   ÂèéÊîØ(ÂÜÜ) = Â∑ÆÊûö √∑ ‰∫§ÊèõÊûöÊï∞ √ó 1000 ‚àí ÁèæÈáëÊäïË≥áÂêàË®à */
const machCash = m => (m.cash||[]).reduce((a,c)=>a+num(c.amount),0);
const machSabai = m => num(m.endStock) - num(m.startStock) + num(m.holdBalls);
const machYen = (m, exch) => {
  const ex = num(exch);
  const gross = ex>0 ? Math.round(machSabai(m)/ex*1000) : 0;
  return gross - machCash(m);
};
const machHasData = m => m.startStock!=="" || m.endStock!=="" || m.holdBalls!=="" || machCash(m)>0;
/* Âè∞„ÅÆÊèõÁÆó„É¨„Éº„Éà: „Çπ„É≠„ÉÉ„Éà=‰∫§ÊèõÊûöÊï∞, „Éë„ÉÅ„É≥„Ç≥=ÊèõÈáëÁéâÊï∞ */
const machExch = (m, s) => m.kind==="pachi" ? s.pExchange : s.exchange;
const machYenS = (m, s) => machYen(m, machExch(m, s));
/* ÂèéÊîØÂØæË±°Âè∞(„Çπ„É≠„ÉÉ„Éà+Ë≤ØÁéâÂÖ•Âäõ„ÅÆ„ÅÇ„Çã„Éë„ÉÅ„É≥„Ç≥) */
const incomeMachines = (s, who) => (s.machines||[]).filter(m =>
  (m.kind==="slot" || (m.kind==="pachi" && machHasData(m))) && (!who || (m.who||"me")===who));
const slotMachines = (s, who) => (s.machines||[]).filter(m => m.kind==="slot" && (!who || (m.who||"me")===who));
const personSlotYen = (s, who) => incomeMachines(s, who).reduce((a,m)=>a+machYenS(m, s), 0);
const poolTotal = s => personSlotYen(s,"me") + personSlotYen(s,"partner");
const expTotal = s => (s.expenses||[]).reduce((a,e)=>a+num(e.amount),0);
/* ---------- ÂÆ∂Ë®àÁ∞ø‚Üí„Çª„ÉÉ„Ç∑„Éß„É≥ÁµåË≤ª„Å∏„ÅÆÊåØÊõø ----------
   ÂÄôË£ú: ÊîØÂá∫„ÉªÈùûÈÄ£Êê∫(srcÁÑ°„Åó)„Éª„Çª„ÉÉ„Ç∑„Éß„É≥Êó•¬±3Êó•„ÉªÊú™ÈÅ∏Êäû„ÄÇÂÖÉË®òÈå≤„ÅÆÂâäÈô§„ÅØ‰øùÂ≠òÊôÇ„Å´ÂÆüË°å(„Éà„É©„É≥„Ç∂„ÇØ„Ç∑„Éß„É≥) */
function xferCandidates(dateStr, expenses){
  const used = new Set((expenses||[]).map(x=>String(x.fromEntry)).filter(x=>x!=="undefined"&&x!=="null"));
  const base = new Date((dateStr||todayStr())+"T00:00:00");
  return (S.entries||[]).filter(e=>{
    if(e.type!=="expense" || e.src) return false;
    if(used.has(String(e.id))) return false;
    const d = Math.abs((new Date((e.date||"")+"T00:00:00") - base)/86400000);
    return d<=3;
  }).sort((a,b)=> a.date<b.date?1:-1).slice(0,8);
}

/* ‰πó„ÇäÊâì„Å°„ÅÆÊäòÂçäË™øÊï¥: myShare„ÅåÂÖ•Âäõ„Åï„Çå„Å¶„ÅÑ„Çå„Å∞„Åù„Çå„ÇíËá™ÂàÜ„ÅÆÂèñ„ÇäÂàÜ„Å´‰Ωø„ÅÜ(„Å™„Åë„Çå„Å∞ÊäòÂçä) */
const halfSplit = s => Math.round(poolTotal(s)/2);
const myShare = s => (s.myShare!==undefined && s.myShare!=="") ? num(s.myShare) : halfSplit(s);
const partnerShare = s => poolTotal(s) - myShare(s);
/* ÂÆ∂Ë®àÁ∞ø„Å∏ÊµÅ„Çå„ÇãËá™ÂàÜ„ÅÆÁîüÂèéÊîØ(ÁµåË≤ªÂâç) */
const grossOwn = s => s.mode==="dai" ? num(s.fee)
                    : s.mode==="nori" ? myShare(s)
                    : personSlotYen(s,"me");
const finalOwn = s => grossOwn(s) - expTotal(s);
/* ‰ª£Êâì„Å°„ÅÆÂè∞ÂãùÊïó(ÂÝ±ÂëäÁî®„ÉªÂÆ∂Ë®àÁ∞øÈùûÂèçÊòÝ) */
const daiResult = s => incomeMachines(s).reduce((a,m)=>a+machYenS(m, s), 0);

/* ---------- Ë®àÁÆó(È∫ªÈõÄ) ---------- */
const mjRankCount = m => m.rule==="3" ? 3 : 4;
const mjRanks = m => { const rc=mjRankCount(m); return (m.ranks||[]).map(x=>num(x)).map((v,i)=> i<rc?v:0); };
const mjHanchan = m => mjRanks(m).reduce((a,b)=>a+b,0);
const mjGameFee = m => m.category==="free"
  ? num(m.baseFee)*mjHanchan(m) + num(m.topBonus)*num((m.ranks||[])[0]) + num(m.drinkFee)
  : num(m.setFee);
const mjScoreYen = m => Math.round(fnum(m.score)*fnum(m.scoreRate));
const mjChipYen = m => Math.round(fnum(m.chips)*fnum(m.chipRate));
const mjRaw = m => mjScoreYen(m) + mjChipYen(m);          // „Ç≤„Éº„ÉÝ‰ª£Êäú„Åç(È∫ªÈõÄ„ÅÆ„Åø„ÅÆÂèéÊîØ)
const mjExpTotal = m => (m.expenses||[]).reduce((a,e)=>a+num(e.amount),0); // „Çª„ÉÉ„ÉàÈ£≤È£üÁ≠â„ÅÆÁßÅÁöÑÁµåË≤ª
const mjFinal = m => mjRaw(m) - mjGameFee(m) - mjExpTotal(m); // „Ç≤„Éº„ÉÝ‰ª£„ÉªÁµåË≤ªËæº„Åø(ÂÆ∂Ë®àÁ∞ø„Å∏)
const mjAvgRank = m => {
  const h = mjHanchan(m); if(!h) return null;
  const r = mjRanks(m);
  let s=0; for(let i=0;i<r.length;i++) s += (i+1)*r[i];
  return s/h;
};

/* ---------- Ë®àÁÆó(„Éë„ÉÅ„É≥„Ç≥Âå∫Èñì) ----------
   Ë≤ØÁéâ„Éó„ÉÉ„Ç∑„É•: „Éó„ÉÉ„Ç∑„É•Êï∞ = ÈñãÂßãÊÆã„Éó„ÉÉ„Ç∑„É• ‚àí ÁµÇ‰∫ÜÊÆã„Éó„ÉÉ„Ç∑„É•
   Âè∞„Å´ÂÖ•„Å£„ÅüÁéâ(ÂõûËª¢ÁéáÁî®) = „Éó„ÉÉ„Ç∑„É•Êï∞√óÊâïÂá∫Áéâ + ÈñãÂßãÊÆãÁéâ ‚àí ÂΩì„Åü„ÇäÊôÇÊÆãÁéâ
   Âºï„ÅçËêΩ„Å®„ÅóÁéâ(„Ç≥„Çπ„ÉàÁî®) = „Éó„ÉÉ„Ç∑„É•Êï∞√óÂºï„ÅçËêΩ„Å®„ÅóÁéâ + ÈñãÂßãÊÆãÁéâ ‚àí ÂΩì„Åü„ÇäÊôÇÊÆãÁéâ */
const segPushes = g => Math.max(0, num(g.rpStart) - num(g.rpEnd));
const cashBalls = (g, s) => num(g.cash)>0 ? num(g.cash)*fnum((s&&s.genkin)||250)/1000 : 0;   // ÁèæÈáëÊäïË≥áÈ°ç‚ÜíÁéâ(Ë≤∏Âá∫„É¨„Éº„Éà„ÄÅÂâä„ÇäÂØæÂøú)
const segUsed = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushPayout)||230) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segCost = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushDraw)||245) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segSpins = g => Math.max(0, num(g.es) - num(g.ss));
/* Ë≤ØÁéâ„Éó„ÉÉ„Ç∑„É•‰∏ÄÊú¨Âåñ + ÁèæÈáë: ÊÆã„Éó„ÉÉ„Ç∑„É•Á©∫„ÉªÁèæÈáë„Å™„Åó„Å™„ÇâÊåÅ„Å°Áéâ(ÊÆãÁéâÂ∑Æ)„ÄÇÁèæÈáëÊäïË≥á„Åå„ÅÇ„Çå„Å∞ÁèæÈáëÂå∫Èñì„Å®„Åó„Å¶ÊàêÁ´ã */
const segDone = g => g.ss!=="" && g.es!=="" &&
  ((g.rpStart!=="" && g.rpEnd!=="") || (g.sb!=="" && g.eb!=="") || num(g.cash)>0);
function machineTotals(m, s){
  s = s||UI.draft;
  const segs = (m.segments||[]).filter(segDone);
  const balls = segs.reduce((a,g)=>a+segUsed(g, s),0);
  const spins = segs.reduce((a,g)=>a+segSpins(g),0);
  const costBalls = segs.reduce((a,g)=>a+segCost(g, s),0);
  const payouts = [];
  for(let i=0;i<segs.length-1;i++){
    if(segs[i].eb!=="" && segs[i+1].sb!==""){
      const p = num(segs[i+1].sb) - num(segs[i].eb);
      if(p>0) payouts.push(p);
    }
  }
  const avgTY = payouts.length ? payouts.reduce((a,b)=>a+b,0)/payouts.length : null;
  return { balls, spins, payouts, avgTY,
    rate250: balls>0 ? spins/(balls/250) : null,
    costRate250: costBalls>0 ? spins/(costBalls/250) : null };
}

/* ---------- „Ç´„ÉÜ„Ç¥„É™ÂÜÖË®≥(Â∫óÂà•„Éâ„É™„É´„ÉÄ„Ç¶„É≥) ---------- */
function viewCatDrill(){
  const cat = UI.drillCat || "Ê∂àË≤ª";
  const mk = monthKey();
  const parts = mk.split("-");
  const NET_SRCS = ["slot","mahjong"];
  const isNetEntry = e => NET_SRCS.includes(e.src);
  const list = S.entries.filter(e=> e.date.startsWith(mk) && e.type==="expense" && e.category===cat && !isNetEntry(e));
  const cap = num((S.budgets||{})[cat])||0;
  const spent = list.reduce((a,e)=>a+e.amount,0);
  const pct = cap>0 ? Math.min(100, spent/cap*100) : 0;
  const over = spent - cap;
  if(UI.drillMode==null) UI.drillMode="chain";
  /* „ÉÅ„Çß„Éº„É≥Âêç„ÅÆÂ∞éÂá∫: ÊúÄÂàù„ÅÆÁ©∫ÁôΩ(ÂçäËßí/ÂÖ®Ëßí)„Çà„ÇäÂâç„ÄÇÁ©∫ÁôΩ„Å™„Åó„ÅØÂÖ®‰Ωì„Çí1Â∫ó„Å®„Åó„Å¶Êâ±„ÅÜ */
  const chainKey = n => { const m=n.split(/[\s\u3000]+/).filter(Boolean); return m.length>1 ? m[0] : n; };
  const g = {};
  list.forEach(e=>{
    const ex=(e.store||"").trim()||"Â∫óÂêçÊú™ÂÖ•Âäõ";
    const k = (UI.drillMode==="chain" && ex!=="Â∫óÂêçÊú™ÂÖ•Âäõ") ? chainKey(ex) : ex;
    (g[k]=g[k]||[]).push(e);
  });
  /* „Ç∏„É£„É≥„É´ËæûÊõ∏„ÅÆ„É¨„É≥„Ç∫: „ÉÅ„Çß„Éº„É≥ÂêçÂçò‰Ωç„ÅßÂºï„Åè(1Âõû„ÅÆÂâ≤ÂΩì„ÅåÂÖ®ÊîØÂ∫ó„ÉªÂÖ®ÊúüÈñì„Å´Âäπ„Åè) */
  const genreOf = ch => (S.genres||{})[ch] || "Êú™ÂàÜÈ°û";
  let ggroups = [];

    const gc = {};

      const ex=(e.store||"").trim()||"Â∫óÂêçÊú™ÂÖ•Âäõ";
      const ch = ex==="Â∫óÂêçÊú™ÂÖ•Âäõ" ? ex : chainKey(ex);
      gc[ch]=gc[ch]||{ch:ch, sum:0, n:0}; gc[ch].sum+=e.amount; gc[ch].n++;
    });
    const gg = {};
    Object.values(gc).forEach(c=>{ const gn=genreOf(c.ch); (gg[gn]=gg[gn]||[]).push(c); });
    ggroups = Object.keys(gg).map(gn=>({gn:gn, chains:gg[gn].sort((a2,b2)=>b2.sum-a2.sum),
      sum:gg[gn].reduce((s2,c)=>s2+c.sum,0), n:gg[gn].reduce((s2,c)=>s2+c.n,0)}))
      .sort((a2,b2)=>b2.sum-a2.sum);
  }
  const groups = Object.keys(g).map(k=>({k:k, sum:g[k].reduce((a,e)=>a+e.amount,0), es:g[k].sort((a,b)=>a.date<b.date?1:-1)})).sort((a,b)=>b.sum-a.sum);

  if(UI.drillMode==="genre"){
    const GEN_STARTER=["È£üË≤ª","Êó•Áî®ÂìÅ","‰ΩèÂ±Ö","Ê∞¥ÈÅìÂÖâÁÜ±","ÈÄö‰ø°","‰∫§ÈÄö","ÂåªÁôÇ","Ë∂£Âë≥„ÉªËá™Â∑±ÊäïË≥á"];
    const GEN_SUGG=[...new Set([...GEN_STARTER, ...Object.values(S.genres||{})])];
    if(!ggroups.length){
      h += '<div class="muted" style="text-align:center;font-size:12px;padding:24px 0">„Åì„ÅÆÊúà„ÅÆ'+esc(cat)+'„ÅÆÊîØÂá∫„ÅØ„Åæ„ÅÝ„ÅÇ„Çä„Åæ„Åõ„Çì</div>';
    } else {
      h += '<div class="muted" style="font-size:10px;margin:0 2px 6px">Â∫ó„Çí„Çø„ÉÉ„Éó„Åß„Ç∏„É£„É≥„É´„ÇíÂâ≤ÂΩì(ÂÖ®ÊúüÈñì„ÅÆË®òÈå≤„Å´Âç≥ÂèçÊòÝ)</div>';
      h += '<div class="card" style="padding:2px 12px">';
      ggroups.forEach((G,gi)=>{
        const open = UI.drillOpenStore===("g:"+G.gn);

          '<span class="ellip" style="flex:1;font-size:13px;font-weight:600;min-width:0'+(G.gn==="Êú™ÂàÜÈ°û"?';color:var(--muted)':'')+'">'+esc(G.gn)+'</span>'+
          '<span class="muted" style="flex:none;font-size:10px">'+G.n+'‰ª∂</span>'+
          '<span class="mono" style="flex:none;font-size:14px;font-weight:700">¬•'+G.sum.toLocaleString("ja-JP")+'</span></div>';
        if(open){
          G.chains.forEach(c=>{
            const asg = UI.drillAssign===c.ch;
            h += '<div class="row" data-a="gassign" data-v="'+esc(c.ch)+'" style="gap:8px;align-items:center;padding:6px 0 6px 20px;border-top:1px solid var(--surface2);cursor:pointer">'+

              '<span class="muted" style="flex:none;font-size:10px">'+c.n+'‰ª∂</span>'+
              '<span class="mono" style="flex:none;font-size:12px">¬•'+c.sum.toLocaleString("ja-JP")+'</span></div>';
            if(asg){
              const cur=(S.genres||{})[c.ch]||"";

                GEN_SUGG.map(gn=>'<button class="chip '+(cur===gn?"sel":"")+'" data-a="gset" data-c="'+esc(c.ch)+'" data-v="'+esc(gn)+'">'+esc(gn)+'</button>').join("")+
                '<button class="chip" style="border-style:dashed;color:var(--muted)" data-a="gnew" data-c="'+esc(c.ch)+'">ÔºãÊñ∞Ë¶è</button>'+
                (cur?'<button class="chip" style="color:var(--muted)" data-a="gclear" data-c="'+esc(c.ch)+'">Êú™ÂàÜÈ°û„Å∏</button>':'')+
                '</div>';

      });
      h += '</div>';
    }
  } else if(!groups.length){
    h += '<div class="muted" style="text-align:center;font-size:12px;padding:24px 0">„Åì„ÅÆÊúà„ÅÆ'+esc(cat)+'„ÅÆÊîØÂá∫„ÅØ„Åæ„ÅÝ„ÅÇ„Çä„Åæ„Åõ„Çì</div>';

function bindCatDrill(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="drillback"){ UI.screen="main"; UI.drillOpenStore=null; render(); }
      else if(a==="drillstore"){ UI.drillOpenStore = (UI.drillOpenStore===v ? null : v); render(); }
      else if(a==="drillmode"){ UI.drillMode=v; UI.drillOpenStore=null; UI.drillAssign=null; render(); }
      else if(a==="gassign"){ UI.drillAssign = (UI.drillAssign===v ? null : v); render(); }
      else if(a==="gset"){ const ch=el.dataset.c; S.genres=S.genres||{}; S.genres[ch]=v; UI.drillAssign=null; save(); render(); }
      else if(a==="gnew"){ const ch=el.dataset.c; const gn=prompt("Êñ∞„Åó„ÅÑ„Ç∏„É£„É≥„É´Âêç:"); if(gn==null||!gn.trim())return; S.genres=S.genres||{}; S.genres[ch]=gn.trim(); UI.drillAssign=null; save(); render(); }
      else if(a==="gclear"){ const ch=el.dataset.c; if(S.genres){ delete S.genres[ch]; } UI.drillAssign=null; save(); render(); }
      else if(a==="drilledit"){
        const e=S.entries.find(x=>String(x.id)===String(v)); if(!e) return;
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),store:e.store||"",item:(e.item!=null?e.item:(e.memo||"")),memo:e.memo||""};
        UI.entryReturn="catdrill";
        UI.screen="entry"; render();
      }
      else if(a==="setbudget"){ const cat=v; const p=prompt(cat+"„ÅÆÊúàÈñì‰∫àÁÆó(‰∏äÈôê„ÉªÂÜÜ):", ((S.budgets||{})[cat])||""); if(p===null)return; (S.budgets=S.budgets||{})[cat]=String(num(p)); save(); render(); }
    };
  });
}

function viewLedger(){

  /* ÂèéÊîØ„Ç´„ÉÜ„Ç¥„É™(Á¥îÈ°ç„ÅßË¶ã„ÇãÁã¨Á´ã„Çª„ÇØ„Ç∑„Éß„É≥): Âãù„Å°Ë≤Ý„Åë„Åô„ÇãÊ¥ªÂãï„ÄÇÂ∞ÜÊù•„ÅÆÊäïË≥á„ÇÇ„Åì„Åì„Å´ËøΩÂäÝ„Åß„Åç„Çã */

function viewMjStats(){
  /* „É´„Éº„É´Âêç √ó „Ç´„ÉÜ„Ç¥„É™(„Éï„É™„Éº/„Çª„ÉÉ„Éà)Âà•„Å´ÈõÜË®à„ÄÇÂêå„É¨„Éº„Éà„ÅßÊã¨„Çã„ÅÆ„ÅåÁõÆÁöÑ */
  const groups = {}; // key: category|store
  (S.mjSessions||[]).forEach(s=>{
    const store = (s.store||"").trim() || "(„É´„Éº„É´Âêç„Å™„Åó)";
    const key = s.category + "|" + store;
    (groups[key] = groups[key] || {category:s.category, store, list:[]}).list.push(s);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    // „Éï„É™„Éº‚Üí„Çª„ÉÉ„Éà„ÅÆÈÝÜ„ÄÅ„Åù„ÅÆ‰∏≠„ÅØÂçäËçòÊï∞„ÅÆÂ§ö„ÅÑÈÝÜ
    const ga=groups[a], gb=groups[b];
    if(ga.category!==gb.category) return ga.category==="free"?-1:1;
    const ha=ga.list.reduce((x,s)=>x+mjHanchan(s),0), hb=gb.list.reduce((x,s)=>x+mjHanchan(s),0);
    return hb-ha;
  });
  let h = "", any=false;
  keys.forEach(key=>{
    const G = groups[key], list = G.list;
    const H = list.reduce((a,s)=>a+mjHanchan(s),0);
    if(!H) return;
    any = true;
    /* „Åì„ÅÆÊã¨„Çä„ÅÆÊúÄÂ§ßÁùÄÈÝÜÊï∞(3È∫ª„Å®4È∫ª„ÅåÊ∑∑„Åò„Å£„Å¶„ÇÇÂ∫É„ÅÑÊñπ„Å´Âêà„Çè„Åõ„Çã) */
    const rc = Math.max(...list.map(s=>mjRankCount(s)));
    const rankSums = [0,0,0,0];
    list.forEach(s=>{ const r=mjRanks(s); for(let i=0;i<4;i++) rankSums[i]+=(r[i]||0); });
    let rankWeighted=0; for(let i=0;i<4;i++) rankWeighted += (i+1)*rankSums[i];
    const avgRank = rankWeighted/H;
    const _rankLine = (rc+1)/2;
    const _rankR2 = Number(avgRank.toFixed(2));
    const rankCol = _rankR2 < _rankLine ? "teal" : (_rankR2 > _rankLine ? "red" : "amber");
    const sumFinal = list.reduce((a,s)=>a+mjFinal(s),0);
    const sumRaw = list.reduce((a,s)=>a+mjRaw(s),0);
    const sumFee = list.reduce((a,s)=>a+mjGameFee(s),0);
    const sumScore = list.reduce((a,s)=>a+fnum(s.score),0);
    const sumChips = list.reduce((a,s)=>a+fnum(s.chips),0);
    const catC = G.category==="free"?"var(--red)":"var(--amber)";
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div class="row between" style="margin-bottom:8px;align-items:center;gap:8px">'+
      '<div class="row" style="align-items:center;gap:6px;min-width:0">'+
      '<span class="tag" style="border:1px solid '+catC+';color:'+catC+';flex-shrink:0">'+(G.category==="free"?"„Éï„É™„Éº":"„Çª„ÉÉ„Éà")+'</span>'+
      '<span class="ellip" style="font-weight:700;font-size:13px">'+esc(G.store)+'</span></div>'+
      '<span class="muted" style="font-size:11px;flex-shrink:0">'+H+'ÂçäËçò / '+list.length+'Êó•</span></div>'+
      '<div class="row between" style="align-items:baseline;margin-bottom:8px"><span class="muted" style="font-size:12px">Âπ≥ÂùáÁùÄÈÝÜ</span>'+
      '<span class="mono '+rankCol+'" style="font-size:18px;font-weight:700">'+avgRank.toFixed(2)+'</span></div>'+
      '<div style="margin-bottom:10px">'+
      Array.from({length:rc}).map((_,i)=>{
        const cnt = rankSums[i];
        const pct = H>0 ? Math.round(cnt/H*100) : 0;
        const cols = rc===3 ? ["var(--teal)","var(--amber)","var(--red)"] : ["var(--teal)","var(--blue)","var(--amber)","var(--red)"];
        return '<div style="'+(i<rc-1?'margin-bottom:8px':'')+'">'+
          '<div class="row between" style="font-size:11px;margin-bottom:4px;align-items:baseline">'+
          '<span class="muted">'+(i+1)+'ÁùÄ</span>'+
          '<span class="mono"><span style="font-weight:700">'+cnt+'</span><span class="muted" style="font-size:10px">Âõû „Éª '+pct+'%</span></span></div>'+
          '<div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">'+
          '<div style="height:100%;width:'+pct+'%;background:'+cols[i]+';border-radius:4px"></div></div></div>';
      }).join("")+'</div>'+
      '<div style="border-top:1px solid var(--line);padding-top:10px;margin-top:2px">'+
      mjStatRow("Âπ≥ÂùáÂèéÊîØ(„Ç≤„Éº„ÉÝ‰ª£Ëæº)", Math.round(sumFinal/H), true)+
      mjStatRow("Âπ≥ÂùáÂèéÊîØ(„Ç≤„Éº„ÉÝ‰ª£Êäú)", Math.round(sumRaw/H), true)+

  });

}
function mjStatRow(label, val, isYen, raw, unit){

}

/* ===== È∫ªÈõÄ„Çπ„Ç≥„Ç¢Ë°® ===== */
function mjtSeats(t){ return num(t.rule)||3; }
function mjtAbsent(t,ri,pi){ return t.rows[ri][pi]==="x"; }
function mjtRawScore(t,ri,pi){ const v=t.rows[ri][pi]; return (v===""||v==="x"||v==="-"||v==null)?null:num(v); }
function mjtPlaying(t,ri){ const a=[]; for(let p=0;p<t.players.length;p++) if(!mjtAbsent(t,ri,p)) a.push(p); return a; }
function mjtAutoIdx(t,ri){
  const playing=mjtPlaying(t,ri);
  const empties=playing.filter(p=>mjtRawScore(t,ri,p)===null);
  return empties.length===1 ? empties[0] : -1;
}
function mjtScore(t,ri,pi){
  if(mjtAbsent(t,ri,pi)) return null;
  const raw=mjtRawScore(t,ri,pi); if(raw!==null) return raw;
  if(mjtAutoIdx(t,ri)===pi){
    let s=0; mjtPlaying(t,ri).forEach(p=>{ if(p!==pi){ const r=mjtRawScore(t,ri,p); s+=(r||0); } });
    return -s;
  }
  return null;
}
function mjtChipStart(t,pi){ return num((t.chipStart||[])[pi])||0; }
function mjtChipEndRaw(t,pi){ const v=(t.chipEnd||[])[pi]; return (v===""||v==null)?null:num(v); }
function mjtChipAutoIdx(t){
  const empties=[]; for(let p=0;p<t.players.length;p++) if(mjtChipEndRaw(t,p)===null) empties.push(p);
  return empties.length===1 ? empties[0] : -1;
}
function mjtChipNet(t,pi){
  const auto=mjtChipAutoIdx(t);
  if(auto===pi){
    let s=0; for(let p=0;p<t.players.length;p++){ if(p!==pi){ const er=mjtChipEndRaw(t,p); const end=(er===null?mjtChipStart(t,p):er); s+=(end-mjtChipStart(t,p)); } }
    return -s;
  }
  const er=mjtChipEndRaw(t,pi);
  return er===null ? 0 : er-mjtChipStart(t,pi);
}
function mjtChipEndDisp(t,pi){
  const er=mjtChipEndRaw(t,pi);
  if(er!==null) return er;
  if(mjtChipAutoIdx(t)===pi) return mjtChipStart(t,pi)+mjtChipNet(t,pi);
  return null;
}
function mjtRanks(t,ri){
  const playing=mjtPlaying(t,ri);
  const scored=playing.map(p=>[p,mjtScore(t,ri,p)]).filter(x=>x[1]!==null);
  if(scored.length<mjtSeats(t)) return {};
  scored.sort((a,b)=>b[1]-a[1]);
  const m={}; scored.forEach(([p],i)=>m[p]=i+1); return m;
}
function mjtRankCounts(t,pi){
  const c=[0,0,0,0];
  (t.rows||[]).forEach((r,ri)=>{ const rk=mjtRanks(t,ri)[pi]; if(rk&&rk<=4) c[rk-1]++; });
  return c;
}
function mjtCalc(t,pi){
  let sum=0;
  (t.rows||[]).forEach((r,ri)=>{ const s=mjtScore(t,ri,pi); if(s!==null) sum+=s; });
  const chipNet=mjtChipNet(t,pi);
  const sr=num(t.scoreRate)||0, cr=num(t.chipRate)||0, fee=num((t.fees||[])[pi])||0;
  const scoreYen=Math.round(sum*sr);
  const chipYen=Math.round(chipNet*cr);
  const shushi=scoreYen+chipYen;      // „Çπ„Ç≥„Ç¢ÈáëÈ°ç+„ÉÅ„ÉÉ„ÉóÈáëÈ°ç(„Ç≤„Éº„ÉÝ‰ª£Âºï„ÅèÂâç)
  const net=shushi-fee;               // ÊîØÊâï(ÊúÄÁµÇ)
  return { sum, chipNet, scoreYen, chipYen, shushi, fee, net };
}
const fmtPt = v => Number.isInteger(v) ? String(v) : String(Math.round(v*10)/10);
function mjtInProgress(t){
  return !!(t && (t.playersLocked || (t.rows||[]).some((r,ri)=>(t.players||[]).some((p,ci)=>mjtScore(t,ri,ci)!==null))));
}
/* ---------- ÈÄî‰∏≠ÁµåÈÅé„ÅÆÁîªÂÉèÁîüÊàê(Canvas)„Å®ÂÖ±Êúâ ----------
   LINEÁ≠â„Å∏„ÅÆÂÖ±ÊúâÁî®„ÄÇHTML‚ÜíÁîªÂÉèÂ§âÊèõ(foreignObject)„ÅØiOS WebKit„Åß‰∏çÂÆâÂÆö„Å™„Åü„ÇÅ„ÄÅcanvas„Å∏Áõ¥Êé•ÊèèÁîª„Åô„Çã */

  const cv=document.createElement("canvas");

  /* Ë°®ÊèèÁîª„Éò„É´„Éë„Éº */
  function cell(x,yy,w,h,text,opt){

    ctx.fillStyle=opt.bg||"#fff"; ctx.fillRect(x,yy,w,h);

    ctx.font=(opt.bold?"bold ":"")+(opt.size||20)+"px "+F;
    ctx.textAlign="center";
    ctx.fillText(String(text), x+w/2, yy+h/2+1);
  }
  const hdrBg="#dfe9e7", lblBg="#eee", zebra="#F2F6F5", latestBg="#FBF3DC", red="#c00", gray="#999";
  function nameRow(yy,label){
    cell(PAD,yy,lblW,rowH,label||"",{bg:hdrBg,bold:true,size:22});
    P.forEach((p,ci)=>cell(PAD+lblW+colW*ci,yy,colW,rowH,p||("P"+(ci+1)),{bg:hdrBg,bold:true,size:22}));
  }
  /* ÈõÜË®à */
  nameRow(y,""); y+=rowH;
  cell(PAD,y,lblW,rowH,"Âπ≥ÂùáÁùÄÈÝÜ",{bg:lblBg,bold:true,size:20});
  P.forEach((p,ci)=>{ const av=mjtAvgRank(t,ci); cell(PAD+lblW+colW*ci,y,colW,rowH,av===null?"‚Äì":av.toFixed(2),{size:24}); }); y+=rowH;

/* ---------- Á´ØÊï∞Âá¶ÁêÜ„Å§„ÅçÁ≤æÁÆóË®àÁÆó ----------
   ÂàáÊç®ÂØæË±°„ÅØÊúÄÁµÇÊîØÊâïÈ°ç(ÂèéÊîØ‚àíÂÝ¥‰ª£)„ÅÆË≤Ý„ÅëÂÅ¥„ÅÆ„Åø„ÄÇÂçò‰Ωç=„Å™„Åó/100/500/1000ÂÜÜ(500=500ÂÜÜÂàª„ÅøÂàáÊç®)„ÄÇ
   ÂÖçÈô§ÂêàË®à„ÅØÂèóÂèñ„ÅÆÂ§ß„Åç„ÅÑÈÝÜ„Å´„Çº„É≠„ÇíÂâ≤„Çâ„Å™„ÅÑÁØÑÂõ≤„ÅßÊ≥¢ÂèäÊéßÈô§(Â∏≥Â∞ªŒ£ÊîØÊâï=‚àíÂÝ¥‰ª£ÂêàË®à„ÅØÂ∏∏„Å´‰∏ÄËá¥) */
function mjtSettle(t){
  const P=t.players, calcs=P.map((p,ci)=>mjtCalc(t,ci));
  const rawFees=calcs.map(c=>c.fee);
  const pexp=P.map((p,ci)=>num((t.pexp||[])[ci])||0);       /* ÂêÑ‰∫∫„ÅÆÁµåË≤ª(È£≤È£ü„Å™„Å©„ÉªÂ∫ó„Å∏) */
  const total=rawFees.reduce((a,b)=>a+b,0)+pexp.reduce((a,b)=>a+b,0);  /* Â∫ó„Å∏„ÅÆÁ∑èÈ°ç */
  const unit = t.roundPay===true ? 100 : (num(t.roundPay)||0);
  const fu = unit>0 ? unit : 100;
  /* ‚ëÝÂÝ¥‰ª£„ÅÆÁßªËª¢(ÂÖ®È°ç/ÈáëÈ°çÊåáÂÆö‚ÜíË≤ÝÊãÖËÄÖ„Å∏)„ÄÇÊóßfrac(Á´ØÊï∞)„ÅØ‰∫íÊèõÁ∂≠ÊåÅ */
  let fees=rawFees.slice(); const feeNotes=[];
  (t.feeRelief||[]).forEach((r,ci)=>{
    if(!r || !r.m || ci>=P.length) return;
    if(r.by==null || r.by===ci || r.by>=P.length){ if(rawFees[ci]>0) feeNotes.push((P[ci]||("P"+(ci+1)))+"„ÅÆÂÖçÈô§„ÅØË≤ÝÊãÖËÄÖÊú™ÈÅ∏Êäû„ÅÆ„Åü„ÇÅÊú™ÈÅ©Áî®"); return; }
    let relief=0, lbl="";
    if(r.m==="full"){ relief=rawFees[ci]; lbl="ÂÖ®È°ç"; }
    else if(r.m==="amt"){ relief=Math.min(num(r.v)||0, rawFees[ci]); }
    else if(r.m==="frac"){ relief=rawFees[ci]-Math.floor(rawFees[ci]/fu)*fu; lbl="Á´ØÊï∞"; }
    if(relief<=0) return;
    fees[ci]-=relief; fees[r.by]+=relief;
    feeNotes.push((P[ci]||("P"+(ci+1)))+"„ÅÆÂÝ¥‰ª£"+lbl+"¬•"+relief.toLocaleString("ja-JP")+"„Çí"+(P[r.by]||("P"+(r.by+1)))+"„ÅåË≤ÝÊãÖ");
  });
  /* ‚ë°ÊîØÊâïÁÆóÂá∫„ÄÇË™øÊï¥Ë°å„ÅÆÂü∫Ê∫ñ„ÅØ„ÄåÁîüÂÝ¥‰ª£„ÉªÁµåË≤ªËæº„Åø„Äç */
  const basePays=calcs.map((c,ci)=>c.shushi - rawFees[ci] - pexp[ci]);
  const raw=calcs.map((c,ci)=>c.shushi - fees[ci] - pexp[ci]);
  let pays=raw.slice(), payNote="";
  /* ‚ë¢Á≤æÁÆóÂçò‰Ωç: „Éà„ÉÉ„Éó‰ª•Â§ñ„ÅØÂàáÊç®„ÉªÁ´ØÊï∞„ÅØ„Éà„ÉÉ„Éó„ÅåÂºïÂèó */
  if(unit>0){
    let ti=-1,best=0; raw.forEach((p,ci)=>{ if(p>best){best=p;ti=ci;} });
    if(ti<0){ payNote="Á≤æÁÆóÂçò‰Ωç: ÂèóÂèñÂÅ¥„Åå„ÅÑ„Å™„ÅÑ„Åü„ÇÅÈÅ©Áî®„Å™„Åó"; }
    else{
      pays=raw.map((p,ci)=>{ if(ci===ti) return 0; return p<0 ? -Math.floor((-p)/unit)*unit : Math.floor(p/unit)*unit; });
      pays[ti] = -total - pays.reduce((a,b,ci)=>ci===ti?a:a+b,0);
      payNote="Á≤æÁÆóÂçò‰Ωç"+unit+"ÂÜÜ(„Éà„ÉÉ„Éó‰ª•Â§ñ„ÇíÂàáÊç®„ÉªÁ´ØÊï∞„ÅØ„Éà„ÉÉ„Éó„ÅåË™øÊï¥)";
    }
  }
  const adjs=pays.map((p,ci)=>p-basePays[ci]);   /* ÂÝ¥‰ª£ÁßªËª¢+‰∏∏„ÇÅ„ÅÆÂêàÁÆó(Œ£=0)„ÄÇÁµåË≤ª„ÅØÂÆüË≤ª„Å™„ÅÆ„ÅßÂê´„ÇÅ„Å™„ÅÑ */
  return {rawFees:rawFees, fees:fees, pexp:pexp, pays:pays, adjs:adjs, payNote:payNote, feeNotes:feeNotes};
}
const MJT_COLS=["#2E6DA4","#C0392B","#0E8C7A","#A9780E","#7B5EA7","#5D7472"];
function mjtChartData(t){
  const P=t.players, rows=(t.rows||[]);
  const idx=[]; rows.forEach((r,ri)=>{ if(P.some((p,ci)=>mjtScore(t,ri,ci)!==null)) idx.push(ri); });
  if(idx.length<2) return null;
  const series=P.map((p,ci)=>{ let cum=0; return idx.map(ri=>{ const sc=mjtScore(t,ri,ci); if(sc!==null && !mjtAbsent(t,ri,ci)) cum+=sc; return cum; }); });
  let mn=0,mx=0; series.forEach(a=>a.forEach(v=>{ if(v<mn)mn=v; if(v>mx)mx=v; }));
  if(mn===mx) mx=mn+1;
  return {idx:idx, series:series, mn:mn, mx:mx};
}
function mjtChartSvg(t){
  const P=t.players;
  const cd=mjtChartData(t);
  if(!cd) return "";
  const cols=MJT_COLS, idx=cd.idx, series=cd.series, mn=cd.mn, mx=cd.mx;
  const W=640,H=300,L=48,R=58,T=14,B=26;
  const px=i=> L+(W-L-R)*(i/(idx.length-1));
  const py=v=> T+(H-T-B)*(1-(v-mn)/(mx-mn));
  /* Âàá„Çä„ÅÆËâØ„ÅÑÁõÆÁõõ„Çä */
  const raw=(mx-mn)/4, pw=Math.pow(10,Math.floor(Math.log10(raw)));
  const step=[1,2,2.5,5,10].map(c=>c*pw).find(c=>c>=raw)||raw;
  const ticks=[]; for(let v=Math.ceil(mn/step)*step; v<=mx+1e-9; v+=step) ticks.push(Math.round(v*100)/100);
  if(ticks.indexOf(0)<0) ticks.push(0);
  let g='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
  ticks.forEach(v=>{ const y=py(v);
    g+='<line x1="'+L+'" y1="'+y.toFixed(1)+'" x2="'+(W-R)+'" y2="'+y.toFixed(1)+'" stroke="'+(v===0?"#888":"#ececec")+'" stroke-width="'+(v===0?1.6:1)+'"/>'+
       '<text x="'+(L-4)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end" font-size="10" fill="#666">'+v+'</text>'; });
  const stp=Math.max(1,Math.ceil(idx.length/10));
  idx.forEach((ri,i)=>{ if(i===idx.length-1 || (i%stp===0 && idx.length-1-i>1)) g+='<text x="'+px(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#666">'+(ri+1)+'</text>'; });
  series.forEach((a,ci)=>{ const c=cols[ci%cols.length];
    g+='<polyline fill="none" stroke="'+c+'" stroke-width="2" stroke-linejoin="round" points="'+a.map((v,i)=>px(i).toFixed(1)+","+py(v).toFixed(1)).join(" ")+'"/>'+
       '<circle cx="'+px(a.length-1).toFixed(1)+'" cy="'+py(a[a.length-1]).toFixed(1)+'" r="2.5" fill="'+c+'"/>'; });
  /* Âá°‰æã„ÅÆ‰ª£„Çè„Çä„Å´Á∑ö„ÅÆÂè≥Á´Ø„Å∏ÂêçÂâç„ÇíÁõ¥‰ªò„Åë(Èáç„Å™„Çä„ÅØÁ∏¶„Å´„Åö„Çâ„Åô) */
  const lbl=series.map((a,ci)=>({ci,y:py(a[a.length-1])})).sort((a,b)=>a.y-b.y);
  for(let i=1;i<lbl.length;i++){ if(lbl[i].y < lbl[i-1].y+11) lbl[i].y = lbl[i-1].y+11; }
  lbl.forEach(o=>{ const y=Math.min(Math.max(o.y,T+4),H-B-2);
    g+='<text x="'+(W-R+5)+'" y="'+(y+3.5).toFixed(1)+'" font-size="10" font-weight="700" fill="'+cols[o.ci%cols.length]+'">'+esc(P[o.ci]||("P"+(o.ci+1)))+'</text>'; });
  g+='</svg>';
  return '<div style="border:1px solid #999;border-radius:6px;padding:8px 8px 2px;margin:2px 0 16px;background:#fff">'+
    '<div style="font-weight:700;font-size:12px;margin:0 0 2px 2px">„Çπ„Ç≥„Ç¢Êé®Áßª(„ÉÅ„ÉÉ„ÉóÈô§„Åè)</div>'+g+'</div>';
}

function mjtAvgRank(t, pi){
  const rc = mjtRankCounts(t, pi);
  const g = rc.reduce((a,b)=>a+b,0);
  if(!g) return null;
  let w=0; rc.forEach((n,i)=> w += (i+1)*n);
  return w/g;
}

function mjtKeypadHtml(t){
  const P=t.players;
  let h="";
  if(UI.mjtCell){
    const cell=UI.mjtCell, isScore=cell.k==="s";
    let who=P[cell.c]||("P"+(cell.c+1)), ctx, curVal;
    if(isScore){ ctx=(cell.r+1)+"ÂõûÊà¶"; curVal=t.rows[cell.r][cell.c]; }
    else if(cell.k==="cs"){ ctx="„ÉÅ„ÉÉ„ÉóÈñãÂßã"; curVal=(t.chipStart||[])[cell.c]; }
    else if(cell.k==="ce"){ ctx="„ÉÅ„ÉÉ„ÉóÁµÇ‰∫Ü"; curVal=(t.chipEnd||[])[cell.c]; }
    else if(cell.k==="uma"){ who="„Ç¶„Éû"; ctx=({uma1:"1ÁùÄ",uma2:"2ÁùÄ",uma3:"3ÁùÄ",uma4:"4ÁùÄ"})[cell.key]; curVal=t[cell.key]; }
    let disp = curVal==="x" ? "ÊäúÁï™" : (curVal===""||curVal==null ? "0" : curVal);
    const dispCol = (curVal==="x") ? "var(--amber)" : (num(curVal)<0 ? "var(--red)" : num(curVal)>0 ? "var(--blue)" : "var(--text)");
    const showTobi = isScore && mjtHasTobi(t);
    /* „Çπ„Ç≥„Ç¢ÂÖ•ÂäõÊôÇ: „Éü„ÉãË°®Á§∫Ë°å„ÅØÊí§ÂéªÊ∏à„Åø(Áõ¥‰∏ä„ÅÆÂÆü„ÉÜ„Éº„Éñ„É´Ë°å„ÅåÈÅ∏Êäû„Éè„Ç§„É©„Ç§„Éà‰ªò„Åç„ÅßË¶ã„Åà„Çã„Åü„ÇÅÈáçË§á) */
    let headHtml = "";

        '<span class="mono" style="font-size:20px;font-weight:700;color:'+dispCol+'">'+esc(String(disp))+'</span></div>';
    }
    const KS='padding:12px 0;font-size:20px;';
    h += '<div class="mjt-pad-wrap">'+headHtml+
      '<div class="mjt-pad">'+
      ["1","2","3","4","5","6","7","8","9"].map(k=>'<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="'+k+'">'+k+'</button>').join("")+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="¬±">¬±</button>'+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="0">0</button>'+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="‚å´">‚å´</button>'+
      (isScore ? '' : '<button class="mjt-key done" data-mt="keydone" style="grid-column:span 3;'+KS+'">ÂÆå‰∫Ü</button>')+
      '</div>'+
      (isScore
        ? '<div style="display:grid;grid-template-columns:'+(showTobi?"1fr 1fr":"1fr")+';gap:5px;margin-top:5px">'+
            '<button class="mjt-key" data-mt="key" data-v="Êäú" style="padding:7px 0;font-size:13px;color:var(--muted)">ÊäúÁï™</button>'+
            (showTobi?'<button class="mjt-key" data-mt="key" data-v="È£õ" style="padding:7px 0;font-size:13px;color:var(--amber);border-color:var(--amber)">È£õ„Å≥</button>':'')+
          '</div>'+

            '<button class="mjt-key" data-mt="key" data-v="‚óÄ" style="padding:12px 0;color:var(--teal);font-size:22px">‚óÄ</button>'+
            '<button class="mjt-key" data-mt="key" data-v="‚ñ∂" style="padding:12px 0;color:var(--teal);font-size:22px">‚ñ∂</button>'+
          '</div>'+

            '<button class="mjt-key done" data-mt="lockrow" style="padding:12px 0;font-size:14px;font-weight:700">„Åì„ÅÆÂõûÊà¶„ÇíÁ¢∫ÂÆö ‚Üí Ê¨°„Å∏</button>'+

    }

function padInput(k){
  const t=UI.mjt, c=UI.mjtCell; if(!c) return;
  const get=()=>{ if(c.k==="s") return String(t.rows[c.r][c.c]||""); if(c.k==="cs") return String((t.chipStart[c.c]||"")); if(c.k==="ce") return String((t.chipEnd[c.c]||"")); if(c.k==="uma") return String(t[c.key]||""); return ""; };
  const set=(v)=>{ if(c.k==="s") t.rows[c.r][c.c]=v; else if(c.k==="cs") t.chipStart[c.c]=v; else if(c.k==="ce") t.chipEnd[c.c]=v; else if(c.k==="uma") t[c.key]=v; };
  if(k==="‚óÄ"||k==="‚ñ∂"){ if(c.k==="s"){ const np=t.players.length; let nc=c.c+(k==="‚ñ∂"?1:-1); nc=(nc+np)%np; UI.mjtCell={k:"s",r:c.r,c:nc}; renderKeepScroll(); } return; }
  if(k==="Êäú"){ if(c.k==="s"){ set(t.rows[c.r][c.c]==="x"?"":"x"); saveMjt(false); renderKeepScroll(); } return; }
  if(k==="È£õ"){ if(c.k==="s"){ set(String(mjtTobiScore(t))); saveMjt(false); renderKeepScroll(); } return; }
  let cur=get(); if(cur==="x") cur="";
  if(k==="‚å´") cur=cur.slice(0,-1);
  else if(k==="¬±"){ cur = cur.startsWith("-") ? cur.slice(1) : ("-"+cur); }
  else cur = (cur==="0"?k : cur+k);
  if(cur==="-0") cur="-";
  set(cur);
  saveMjt(false); renderKeepScroll();
}

function wishDaysLeft(w){
  if(!w.cooldownStart || !num(w.cooldownDays)) return 0;
  const start=new Date(w.cooldownStart+"T00:00:00").getTime();
  const end=start + num(w.cooldownDays)*86400000;
  return Math.ceil((end - Date.now())/86400000);
}
function wishEff(w){
  if((w.status||"consult")==="cooldown" && wishDaysLeft(w)<=0) return "ready";

}

function bindFixed(){

  document.querySelectorAll("[data-fa]").forEach(el=>{

      if(a==="fback"){ UI.screen="main"; UI.tab="ledger"; UI.fixForm=null; render(); }
      else if(a==="fdiag"){
        const lines=[];
        const tplIds = new Set((S.fixed||[]).map(t=>String(t.id)));

          const es=(S.entries||[]).filter(e=>String(e.fixedId)===String(t.id));
          if(!es.length){ lines.push("‚ñÝ"+t.name+" (tpl:"+String(t.id).slice(-6)+") „Ç®„É≥„Éà„É™0‰ª∂"); return; }
          lines.push("‚ñÝ"+t.name+" (tpl:"+String(t.id).slice(-6)+" ¬•"+num(t.amount)+")");
          es.sort((a2,b2)=>a2.date<b2.date?-1:1).forEach(e=>{
            lines.push(" "+e.date+" ¬•"+e.amount+" Âá∫Áîü:"+fixedOccKey(e)+(e.fixedDate?"(fD)":"(Êé®ÂÆö)")+" ‚Ä¶"+String(e.id).slice(-10));
          });
        });
        /* Ëø∑Â≠ê: fixedId„ÅØ„ÅÇ„Çã„ÅåÂèÇÁÖßÂÖà„ÉÜ„É≥„Éó„É¨„ÅåÂ≠òÂú®„Åó„Å™„ÅÑ */
        const ghosts=(S.entries||[]).filter(e=>e.fixedId!=null && !tplIds.has(String(e.fixedId)));
        if(ghosts.length){
          lines.push("‚ñÝËø∑Â≠ê(ÂèÇÁÖßÂÖà„ÉÜ„É≥„Éó„É¨‰∏çÂú®)");
          ghosts.forEach(e=>lines.push(" "+e.date+" ¬•"+e.amount+" "+(e.store||"")+" ‰∫°tpl:"+String(e.fixedId).slice(-6)+" ‚Ä¶"+String(e.id).slice(-10)));
        }

        if(orphans.length){
          lines.push("‚ñÝÊà∏Á±çÂñ™Â§±(ÂÖÉÂÆöÊúü„ÅßfixedIdÁÑ°„Åó)");
          orphans.forEach(e=>lines.push(" "+e.date+" ¬•"+e.amount+" "+(e.store||"")+" ‚Ä¶"+String(e.id).slice(-10)));
        }
        const full = lines.length?lines.join("\n"):"ÂÆöÊúü„Ç®„É≥„Éà„É™„Å™„Åó";
        const done = ()=>alert(full.slice(0,700)+(full.length>700?"\n‚Ä¶\n(ÂÖ®Êñá„ÅØ„Ç≥„Éî„ÉºÊ∏à„Åø‚Äî‚Äî„É°„É¢Â∏≥Á≠â„Å´Ë≤º„Çä‰ªò„Åë„Å¶ÂÖ±Êúâ„Åß„Åç„Åæ„Åô)":""));
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(full).then(done, ()=>alert(full));
        } else alert(full);
      }
      else if(a==="new"){ UI.fixForm={type:"expense",name:"",store:"",item:"",category:"Ê∂àË≤ª",freq:"monthly",day:"",start:todayStr(),amount:""}; render(); }
      else if(a==="fcancel"){ UI.fixForm=null; render(); }
      else if(a==="ftype"){ f.type=v; f.category=v==="expense"?"Ê∂àË≤ª":"Áµ¶‰∏é"; render(); }
      else if(a==="fcat"){ f.category=v; render(); }
      else if(a==="ffreq"){ f.freq=v; if((v==="weekly"||v==="biweekly")&&!f.start) f.start=todayStr(); render(); }
      else if(a==="fshift"){ f.holidayShift=v; render(); }
      else if(a==="edit"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t){ UI.fixForm={editId:t.id, type:t.type, name:t.name, store:t.store||"", item:(t.item!=null?t.item:(t.name||"")), category:t.category, freq:t.freq||"monthly", day:t.day?String(t.day):"", start:t.start||todayStr(), amount:String(t.amount), holidayShift:t.holidayShift||"none", days:(t.days||[]).slice(), end:t.end||""}; render(); }
      }
      else if(a==="stop"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("„Äå"+t.name+"„Äç„ÅÆÂÆöÊúü„ÇíÂÅúÊ≠¢„Åó„Åæ„Åô„Åã?\nÊú™Êù•„ÅÆ‰∫àÂÆöÂàÜ„ÅØÂâäÈô§„Åï„Çå„ÄÅÈÅéÂéª„ÅÆË®òÈå≤„ÅØÊÆã„Çä„Åæ„Åô„ÄÇ")){
          stopFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdelete"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("„Äå"+t.name+"„Äç„ÇíÂÆåÂÖ®„Å´ÂâäÈô§„Åó„Åæ„Åô„Åã?\nÈÅéÂéª„ÅÆÂÆüÁ∏æ„ÇÇÂê´„ÇÅ„Å¶„ÄÅ„Åì„ÅÆÂõ∫ÂÆöË≤ª„ÅÆË®òÈå≤„ÅåÂÖ®„Å¶Ê∂à„Åà„Åæ„Åô„ÄÇ")){
          deleteFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdow"){ const d=num(v); f.days=Array.isArray(f.days)?f.days:[];
        f.days = f.days.includes(d) ? f.days.filter(x=>x!==d) : f.days.concat([d]); render(); }
      else if(a==="fsave"){
        const store=(f.store||"").trim(), item=(f.item||"").trim();
        const name=[store,item].filter(Boolean).join(" ");
        if(!name){ alert("Â∫óÂêç„Åæ„Åü„ÅØÂìÅÁõÆ„ÇíÂÖ•Âäõ„Åó„Å¶„Åè„ÅÝ„Åï„ÅÑ„ÄÇ"); return; }
        if(num(f.amount)<=0){ alert("ÈáëÈ°ç„ÇíÂÖ•Âäõ„Åó„Å¶„Åè„ÅÝ„Åï„ÅÑ„ÄÇ"); return; }
        const freq = f.freq || "monthly";
        const isW = (freq==="weekly"||freq==="biweekly");
        const isD = (freq==="days");
        if(isW && !f.start){ alert("Ëµ∑ÁÇπÊó•„ÇíÈÅ∏„Çì„Åß„Åè„ÅÝ„Åï„ÅÑ„ÄÇ"); return; }
        if(isD && !(Array.isArray(f.days)&&f.days.length)){ alert("Áô∫Áîü„Åô„ÇãÊõúÊó•„ÇíÈÅ∏„Çì„Åß„Åè„ÅÝ„Åï„ÅÑ„ÄÇ"); return; }
        if(isD && !f.start) f.start = todayStr();
        const endEl = document.getElementById("fx-end");
        const endV = endEl ? endEl.value : (f.end||"");
        let day = num(f.day); if(day<1) day=1; if(day>31) day=31;
        const base={name, store, item, type:f.type, category:f.category, freq,
          day:(isW||isD)?"":String(day), start:(isW||isD)?f.start:"", amount:String(num(f.amount)),
          holidayShift: (isW||isD) ? "none" : (f.holidayShift||"none"),
          days: isD ? f.days.slice().sort() : undefined, end: endV||""};
        if(f.editId){
          updateFixed(Object.assign({id:f.editId}, base));
        }else{
          const tpl=Object.assign({id:uid()}, base);
          (S.fixed=S.fixed||[]).push(tpl);
          genFixedEntries(tpl);
          save();
        }
        UI.fixForm=null; render();
      }
    };
  });
}

    ';background:'+(neg?"rgba(229,115,115,.1)":"rgba(45,212,191,.1)")+'" data-a="mjsign" data-v="'+field+'">'+(neg?"‚àí":"Ôºã")+'</button>'+

}
function mjFeeFormula(m){
  if(m.category!=="free" || !mjHanchan(m)) return "";
  const h=mjHanchan(m), t=num((m.ranks||[])[0]);
  const parts=[];
  if(num(m.baseFee)) parts.push("Âü∫Êú¨"+num(m.baseFee)+"√ó"+h);
  if(num(m.topBonus)&&t) parts.push("„Éà„ÉÉ„ÉóË≥û"+num(m.topBonus)+"√ó"+t);
  if(num(m.drinkFee)) parts.push("„Éâ„É™„É≥„ÇØ"+num(m.drinkFee));
  return parts.length ? parts.join(" + ")+" = ¬•"+mjGameFee(m).toLocaleString("ja-JP") : "";
}
function mjSummary(m){
  const srow=(l,v,big)=>'<div class="row between" style="'+(big?"align-items:baseline":"font-size:13px;margin:4px 0")+'">'+
    '<span '+(big?'style="font-size:12px;font-weight:700"':'class="muted"')+'>'+l+'</span>'+
    '<span class="mono '+clsPM(v)+'" style="'+(big?"font-size:20px;font-weight:700":"")+'">'+signYen(v)+'</span></div>';
  let h = srow("„Çπ„Ç≥„Ç¢ÂèéÊîØ", mjScoreYen(m));
  if(num(m.chips)||fnum(m.chipRate)) h += srow("„ÉÅ„ÉÉ„ÉóÂèéÊîØ", mjChipYen(m));
  h += '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">È∫ªÈõÄ„ÅÆ„ÅøÂèéÊîØ(„Ç≤„Éº„ÉÝ‰ª£Êäú)</span>'+
    '<span class="mono '+clsPM(mjRaw(m))+'" style="font-weight:700">'+signYen(mjRaw(m))+'</span></div>';
  h += srow("„Ç≤„Éº„ÉÝ‰ª£", -mjGameFee(m));
  if(mjExpTotal(m)) h += srow("ÁµåË≤ª(È£≤È£ü„Å™„Å©)", -mjExpTotal(m));
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>';
  h += srow("ÊúÄÁµÇÂèéÊîØ(ÂÆ∂Ë®àÁ∞ø„Å∏ÈÄ£Êê∫)", mjFinal(m), true);
  return h;
}

function bindMj(){
  const m = UI.mjDraft;
  document.getElementById("mj-date").oninput = e=>m.date=e.target.value;
  document.getElementById("mj-store").oninput = e=>m.store=e.target.value;
  const mts=document.getElementById("mj-tstart"); if(mts) mts.oninput = e=>m.startAt=e.target.value;
  const mte=document.getElementById("mj-tend"); if(mte) mte.oninput = e=>m.endAt=e.target.value;
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind=el.dataset.in, v=el.dataset.v;
    el.oninput = ()=>{
      if(kind==="mjf"){ m[v]=el.value; refreshMj(); }
      else if(kind==="mjxstore"||kind==="mjxitem"||kind==="mjxamount"){
        const x = (m.expenses||[]).find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="mjxstore") x.store=el.value;
        else if(kind==="mjxitem"){ x.item=el.value; delete x.label; }
        else x.amount=el.value;
        refreshMj();
      }
      else if(kind==="mjabs"){
        const neg = String(m[v]||"").startsWith("-");
        m[v] = (neg?"-":"") + el.value.replace(/-/g,"");
        refreshMj();
      }
      else if(kind==="mjrank"){ (m.ranks=m.ranks||["","","",""])[num(v)]=el.value; refreshMj(); }
      else if(kind==="mjp"){ (m.players=m.players||[])[num(v)]=el.value; }
    };
  });
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mjDraft=null; render(); }
      else if(a==="mjcat"){ m.category=v; render(); }
      else if(a==="mjrule"){ m.rule=v; render(); }
      else if(a==="mjsign"){
        const cur=String(m[v]||"");
        m[v] = cur.startsWith("-") ? cur.slice(1) : "-"+cur;
        render();
      }
      else if(a==="rankup"||a==="rankdn"){
        const i=num(v); m.ranks=m.ranks||["","","",""];
        let cur=num(m.ranks[i]); cur += (a==="rankup"?1:-1); if(cur<0) cur=0;
        m.ranks[i]=String(cur); render();
      }
      else if(a==="mjpadd"){ (m.players=m.players||[]).push(""); render(); }
      else if(a==="mjpdel"){ (m.players=m.players||[]).splice(num(v),1); render(); }
      else if(a==="mjdel"){
        if(!confirm("„Åì„ÅÆÈ∫ªÈõÄË®òÈå≤„ÇíÂâäÈô§„Åó„Åæ„Åô„Åã?")) return;
        S.entries = S.entries.filter(e=>e.id!=="mj-"+m.id);
        S.mjSessions = (S.mjSessions||[]).filter(x=>x.id!==m.id);
        save(); UI.screen="main"; UI.mjDraft=null; render();
      }
      else if(a==="mjxadd"){ (m.expenses=m.expenses||[]).push({id:uid(),store:"",item:"",amount:""}); render(); }
      else if(a==="mjxdel"){
        const x = (m.expenses||[]).find(e=>String(e.id)===String(v));
        if(x && x.fromData){
          if(!confirm("„Åì„ÅÆÁµåË≤ª„ÅØÂÆ∂Ë®àÁ∞ø„Åã„Çâ„ÅÆÊåØÊõø„Åß„Åô„ÄÇÁµåË≤ª„Åã„ÇâÂ§ñ„Åó„ÄÅ‰øùÂ≠ò„Åó„ÅüÊôÇÁÇπ„ÅßÂÆ∂Ë®àÁ∞ø„Å´Ë®òÈå≤„ÇíÊàª„Åó„Åæ„Åô„ÄÇ„Çà„Çç„Åó„ÅÑ„Åß„Åô„Åã?")) return;
          (m._restore=m._restore||[]).push(x.fromData);
        }
        m.expenses=(m.expenses||[]).filter(e=>String(e.id)!==String(v)); render();
      }
      else if(a==="mjxfopen"){ UI.xferOpen=!UI.xferOpen; render(); }
      else if(a==="mjxfpick"){
        const e=(S.entries||[]).find(x=>String(x.id)===String(v));
        if(e){ (m.expenses=m.expenses||[]).push({id:uid(), store:e.store||"", item:(e.item||e.memo||e.category||"ÊîØÂá∫"), amount:String(num(e.amount)), fromEntry:e.id, fromData:Object.assign({},e)}); UI.xferOpen=false; render(); }
      }
      else if(a==="mjsave") saveMj();
    };
  });
}

function refreshMj(){

function saveMj(){

  cleaned.ranks = (cleaned.ranks||["","","",""]).slice(0,4).map((x,i)=> i<rc ? x : "");
  cleaned.players = (cleaned.players||[]).map(p=>(p||"").trim()).filter(Boolean).slice(0,5);
  if(UI.mjIsNew) S.mjSessions.push(cleaned);
  else S.mjSessions = S.mjSessions.map(x=>x.id===m.id?cleaned:x);
  if(fnum(cleaned.scoreRate)) S.rates.mjScore = cleaned.scoreRate;
  if(fnum(cleaned.chipRate)) S.rates.mjChip = cleaned.chipRate;
  if(num(cleaned.baseFee)) S.rates.mjBase = cleaned.baseFee;
  if(num(cleaned.topBonus)) S.rates.mjTop = cleaned.topBonus;
  if(num(cleaned.drinkFee)) S.rates.mjDrink = cleaned.drinkFee;
  const linkId = "mj-"+m.id;

  S.entries = S.entries.filter(e=>e.id!==linkId);

  }

  const _xf = new Set((cleaned.expenses||[]).map(x=>String(x.fromEntry)).filter(x=>x!=="undefined"&&x!=="null"));
  if(_xf.size) S.entries = S.entries.filter(e=>!_xf.has(String(e.id)));

}

function dl(content, name, type){
  const blob = new Blob([content],{type});

  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

function entryStoreHints(){

  (S.entries||[]).forEach(e=>{ const s=(e.store||"").trim(); if(s) m[s]=(m[s]||0)+1; });

function entryItemHints(){

  (S.entries||[]).forEach(e=>{ const v=(e.item!=null?String(e.item):String(e.memo||"")).trim(); if(v) m[v]=(m[v]||0)+1; });

}
/* Â∫óÊñáËÑà„Å§„ÅçÂìÅÁõÆ„Éí„É≥„Éà: Â∫óÂêç„Åå„ÅÇ„Çå„Å∞„Äå„Åù„ÅÆÂ∫ó(„ÉÅ„Çß„Éº„É≥Âçò‰Ωç)„ÅßÈÅéÂéª„Å´Ë≤∑„Å£„ÅüÂìÅÁõÆ„Äç„ÅÝ„Åë„ÇíÈÝªÂ∫¶ÈÝÜ„Åß„ÄÇ
   Êú™Áü•„ÅÆÂ∫ó„Å™„ÇâÁ©∫(ÁöÑÂ§ñ„Çå„Å™ÂÖ®‰Ωì‰∫∫Ê∞ó„ÇíÂá∫„Åï„Å™„ÅÑ)„ÄÇÂ∫óÂêç„ÅåÁ©∫„Å™„ÇâÂæìÊù•„ÅÆÂÖ®‰Ωì‰∫∫Ê∞óÈÝÜ„ÄÇ */
function chainKeyOf(n){ const t=String(n||"").trim(); const m=t.split(/[\s\u3000]+/).filter(Boolean); return m.length>1 ? m[0] : t; }
function entryItemHintsFor(store){
  const st=String(store||"").trim();
  if(!st) return entryItemHints();
  const target=chainKeyOf(st);
  const m={};
  (S.entries||[]).forEach(e=>{
    const es=(e.store||"").trim(); if(!es) return;
    if(chainKeyOf(es)!==target) return;
    const v=(e.item!=null?String(e.item):String(e.memo||"")).trim(); if(v) m[v]=(m[v]||0)+1;
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function entryUsualChips(type){
  const map={};
  (S.entries||[]).filter(e=>e.type===type && e.src!=="slot" && e.src!=="mahjong" && e.src!=="fixed").forEach(e=>{
    const store=(e.store||"").trim();
    const item=(e.item!=null?String(e.item):String(e.memo||"")).trim();
    const label=[store,item].filter(Boolean).join(" "); if(!label) return;
    const k=store+"\u0001"+item;
    if(!map[k]) map[k]={store,item,label,count:0,cats:{}};
    map[k].count++; map[k].cats[e.category]=(map[k].cats[e.category]||0)+1;
  });
  return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,6).map(o=>({
    store:o.store,item:o.item,label:o.label,
    cat:Object.entries(o.cats).sort((a,b)=>b[1]-a[1])[0][0]
  }));
}

function borderPanel(m, s){
  const t = machineTotals(m, s);
  if(t.rate250===null) return "";
  const master = findMaster(m);
  const denom = master ? fnum(master.denom) : 0;
  const kez = Math.max(0, Math.min(50, fnum(m.kezuri)));   // Ââä„ÇäÁéá %
  const kezF = 1 - kez/100;
  // ÁêÜË´ñ„Éú„Éº„ÉÄ„Éº(Âõû/250Áô∫Áõ∏ÂΩì): ÁôªÈå≤Ê©üÁ®Æ„ÅØ ÂàÜÊØç√ó250/ÁêÜË´ñTY„ÄÅÊú™ÁôªÈå≤„ÅØÊâãÂÖ•Âäõ„Éú„Éº„ÉÄ„Éº(Âõû/ÂçÉÂÜÜ=Á≠â‰æ°„ÅßÂêåÂÄ§)
  const bTheory = denom>0
    ? (master && fnum(master.ty)>0 ? denom*250/fnum(master.ty) : null)
    : (fnum(m.border)>0 ? fnum(m.border) : null);
  // Ââä„ÇäÂæå„Éú„Éº„ÉÄ„Éº = ÁêÜË´ñB √∑ (1‚àíÂâä„ÇäÁéá/100)„ÄÇÂá∫Áéâ„ÅåÊ∏õ„Çã‚Üí„Éú„Éº„ÉÄ„Éº„ÅØ‰∏ä„Åå„Çã(Âé≥„Åó„Åè„Å™„Çã)
  const bKezuri = (bTheory!==null && kez>0 && kezF>0) ? bTheory/kezF : null;
  // ÂÆüÂäπ„Éú„Éº„ÉÄ„Éº(ÂÆüÊ∏¨avgTY): ÂèÇËÄÉ„ÉªÂâä„ÇäÁéá„ÅÆËºÉÊ≠£Áî®„ÄÇÁü≠Êúü„Çµ„É≥„Éó„É´„ÅØËçí„Çå„Çã„ÅÆ„ÅßÂà§ÂÆöÂü∫Ê∫ñ„Å´„ÅØ„Åó„Å™„ÅÑ
  const bEff = denom>0 && t.avgTY>0 ? denom*250/t.avgTY : null;
  // Âà§ÂÆöÂü∫Ê∫ñ(active border): Ââä„ÇäÂæå ‚Üí ÁêÜË´ñ ‚Üí ÂÆüÂäπ(ÁêÜË´ñ„ÅåÁÑ°„ÅÑÊôÇ„ÅÆ„Åø)
  const ab = bKezuri!==null ? bKezuri : (bTheory!==null ? bTheory : bEff);
  const dev = ab && t.costRate250!==null ? (t.costRate250/ab-1)*100 : null;

  let h = '<div class="amberpanel"><div class="row between" style="align-items:baseline;margin-bottom:6px">'+
    '<span class="mono muted" style="font-size:11px">Á¥ØË®à '+t.balls+'Áô∫ / '+t.spins+'ÂõûËª¢</span>'+
    '<span class="mono amber" style="font-size:15px;font-weight:700">‚âí '+t.rate250.toFixed(2)+' Âõû/250Áô∫</span></div>';
  if(t.costRate250!==null && Math.abs(t.costRate250-t.rate250)>0.005)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">„Ç≥„Çπ„ÉàË£úÊ≠£(Ë≤ØÁéâÊâãÊï∞ÊñôËæº)</span>'+
      '<span class="mono">'+t.costRate250.toFixed(2)+' Âõû/250Áô∫</span></div>';
  // --- ÁêÜË´ñ„Éú„Éº„ÉÄ„Éº ---
  if(denom>0){
    h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">Ê©üÁ®Æ„Éá„Éº„Çø: 1/'+fnum(master.denom)+
      (fnum(master.ty)>0?' / ÁêÜË´ñTY '+fnum(master.ty)+'Áô∫':'')+'</span>'+
      (bTheory!==null?'<span class="mono">ÁêÜË´ñB '+bTheory.toFixed(2)+'</span>':'')+'</div>';
  } else {
    h += '<div style="margin:4px 0 6px"><div class="muted" style="font-size:9px;margin-bottom:2px">ÁêÜË´ñ„Éú„Éº„ÉÄ„Éº(Âõû/ÂçÉÂÜÜ)</div>'+
      '<input class="input sm mono r" type="number" inputmode="decimal" step="0.1" value="'+esc(m.border||"")+'" data-in="mborder" data-v="'+m.id+'"></div>';
  }
  // --- Ââä„ÇäÂæå„Éú„Éº„ÉÄ„Éº(Âà§ÂÆöÂü∫Ê∫ñ) ---
  if(bKezuri!==null)
    h += '<div class="row between" style="font-size:12px;margin-bottom:4px"><span style="font-weight:700">Ââä„ÇäÂæåB(Ââä„Çä'+kez+'%)</span>'+
      '<span class="mono amber" style="font-weight:700">'+bKezuri.toFixed(2)+' Âõû/250Áô∫</span></div>';
  // --- ÂÆüÊ∏¨(ÂèÇËÄÉ„ÉªËºÉÊ≠£Áî®) ---
  if(t.avgTY!==null)
    h += '<div style="font-size:10px;margin-bottom:4px" class="muted">ÂèÇËÄÉ: ÂÆüÊ∏¨Âπ≥ÂùáÂá∫Áéâ '+t.payouts.length+'Âõû '+Math.round(t.avgTY)+'Áô∫'+
      (bEff!==null?' ‚Üí ÂÆüÂäπB '+bEff.toFixed(2):'')+'</div>';
  if(dev!==null && ab)
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:2px">'+
      '<span style="font-size:11px;font-weight:700">„Éú„Éº„ÉÄ„Éº‰πñÈõ¢</span>'+
      '<span class="mono '+clsPM(dev)+'" style="font-size:15px;font-weight:700">'+(dev>=0?"+":"‚àí")+Math.abs(dev).toFixed(1)+'%'+
      '<span class="muted" style="font-size:10px;font-weight:400"> ('+(t.costRate250>=ab?"+":"‚àí")+Math.abs(t.costRate250-ab).toFixed(2)+'Âõû)</span></span></div>';
  // --- ÊôÇÁµ¶(ÈÅäÊäÄ„É¢„Éº„ÉâÂà• what-if„ÄÇÁèæÂú®„ÅÆÂá∫ÁéâÂäπÁéá rate250 „ÇíÂêÑ„É¢„Éº„Éâ„ÅÆÂçò‰æ°„ÅßË©ï‰æ°„ÅóÁõ¥„Åô) ---
  const bJudge = bKezuri!==null ? bKezuri : bTheory;
  const kachi = fnum(m.kachi);
  // ÂõûËª¢Êï∞/ÊôÇ: ÈñãÂßãÊôÇÂàª„Åå„ÅÇ„ÇäÁµåÈÅé5ÂàÜ„Äú18h„Å™„ÇâÂÆüÊ∏¨„ÄÅ„Åù„Çå‰ª•Â§ñ„ÅØ‰ªÆÂÆöÂÄ§
  let rphUsed = fnum(m.rph), rphMeasured = null, elapsedH = null;
  if(m.startedAt){
    elapsedH = (Date.now()-m.startedAt)/3600000 - fnum(m.breakMin)/60;
    if(elapsedH >= 5/60 && elapsedH <= 18 && t.spins>0){ rphMeasured = t.spins/elapsedH; rphUsed = rphMeasured; }
  }
  if(bJudge!==null && rphUsed>0 && kachi>0 && t.rate250>0){
    const uK = 1000/kachi;   // ÊèõÈáëÂçò‰æ°(ÂÜÜ/Áéâ)
    const uC = fnum(m.genkin)>0 ? 1000/fnum(m.genkin) : uK;   // ÁèæÈáëË≤∏Âá∫Âçò‰æ°(ÂÜÜ/Áéâ„ÄÅË≤∏Âá∫Ââä„ÇäËæº„Åø)
    const hedari = (fnum(m.pushDraw)>0 && fnum(m.pushPayout)>0) ? fnum(m.pushDraw)/fnum(m.pushPayout) : 245/230;  // Ë≤ØÁéâ„Éó„ÉÉ„Ç∑„É•ÊâãÊï∞ÊñôÊØî
    const wMochi   = rphUsed*250*uK*(1/bJudge - 1/t.rate250);            // ÊåÅÁéâ:ÊèõÈáëÂçò‰æ°„ÉªÊâãÊï∞Êñô„Å™„Åó
    const wChodama = rphUsed*250*uK*(1/bJudge - hedari/t.rate250);       // Ë≤ØÁéâ:ÊèõÈáëÂçò‰æ°„ÉªÂºïËêΩ/ÊâïÂá∫„ÅÆÊâãÊï∞Êñô
    const wCash    = rphUsed*250*(uK/bJudge - uC/t.rate250);             // ÁèæÈáë:Âá∫Áéâ=ÊèõÈáëÂçò‰æ°/ÊäïË≥á=Ë≤∏Âá∫Âçò‰æ°
    const hasCash  = (m.segments||[]).some(g=>num(g.cash)>0);
    let rphLine;
    if(rphMeasured!==null) rphLine = 'ÂÆüÊ∏¨ '+Math.round(rphMeasured).toLocaleString()+'ÂõûËª¢/ÊôÇ (ÁµåÈÅé'+elapsedH.toFixed(1)+'h'+(fnum(m.breakMin)>0?'„Éª‰ºëÊÜ©'+fnum(m.breakMin)+'ÂàÜ':'')+'„Éª'+t.spins.toLocaleString()+'ÂõûËª¢) ‚Üí ÂèçÊòÝ‰∏≠';
    else if(m.startedAt) rphLine = 'Ë®àÊ∏¨‰∏≠ ÁµåÈÅé'+Math.round(Math.max(0,elapsedH)*60)+'ÂàÜ ‚Äî ‰ªÆÂÆöÂÄ§ '+fnum(m.rph)+'ÂõûËª¢/ÊôÇ„Çí‰ΩøÁî®';
    else rphLine = '‰ªÆÂÆöÂÄ§ '+fnum(m.rph)+'ÂõûËª¢/ÊôÇ(Âå∫ÈñìÂÖ•Âäõ„ÅßÈñãÂßãÊôÇÂàª„ÇíËá™ÂãïË®òÈå≤‚ÜíÂÆüÊ∏¨„Å´ÂàáÊõø)';
    const wl = (label,val,strong)=> '<div class="row between" style="font-size:'+(strong?12:11)+'px;margin-bottom:3px">'+
      '<span'+(strong?' style="font-weight:700"':' class="muted"')+'>'+label+'</span>'+
      '<span class="mono '+clsPM(val)+'"'+(strong?' style="font-weight:700"':'')+'>'+(val>=0?"+":"‚àí")+Math.round(Math.abs(val)).toLocaleString()+'ÂÜÜ/ÊôÇ</span></div>';
    h += '<div style="border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:6px">'+
      '<div class="muted" style="font-size:9px;margin-bottom:3px">ÊôÇÁµ¶ ‚Äî Ââä„ÇäÂæåBÂü∫Ê∫ñ / '+esc(rphLine)+'</div>'+
      wl("ÊåÅÁéâÈÅäÊäÄ", wMochi, true)+
      wl("Ë≤ØÁéâÈÅäÊäÄ", wChodama, false)+
      (hasCash ? wl("ÁèæÈáëÈÅäÊäÄ", wCash, false) : '')+'</div>';
  }
  return h+'</div>';
}

          save(); render();
        }

<script>
/* ---------- „Çª„ÉÉ„Ç∑„Éß„É≥ÁîªÈù¢„ÅÆ„Éê„Ç§„É≥„Éâ ---------- */
function bindSession(){
  const s = UI.draft;
  const fm = (id)=>s.machines.find(x=>String(x.id)===String(id));

  /* ÂÖ•Âäõ(ÂÜçÊèèÁîª„Å™„Åó„ÉªË®àÁÆóË°®Á§∫„ÅÆ„ÅøÊõ¥Êñ∞) */
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind = el.dataset.in, v = el.dataset.v;
    el.oninput = ()=>{
      if(kind==="fee"){ s.fee=el.value; refreshSummary(); }
      else if(kind==="smemo"){ s.memo=el.value; }
      else if(kind==="exchange"){ s.exchange=el.value; refreshSlot(); }
      else if(kind==="pexchange"){ s.pExchange=el.value; refreshSlot(); }

      else if(kind==="myshare"){ s.myShare=el.value; refreshSlot(); }
      else if(kind==="xstore"||kind==="xitem"||kind==="xamount"){
        const x = s.expenses.find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="xstore") x.store=el.value;
        else if(kind==="xitem"){ x.item=el.value; delete x.label; }
        else x.amount=el.value;
        refreshSummary();
      }
      else if(kind==="mname"){
        const m=fm(v); if(!m) return;
        m.name=el.value;
        const sug=document.getElementById("msug-"+m.id);
        if(sug){
          const q=(m.name||"").trim();
          const hits=S.mdb.filter(x=>x.kind===m.kind&&(x.name||"").trim()&&x.name.includes(q)&&x.name.trim()!==q).slice(0,4);
          sug.innerHTML = hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
            hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'';
          bindSessionActions();
        }
        if(m.kind==="pachi") refreshPanel(m);
      }
      else if(kind==="mmemo"){ const m=fm(v); if(m) m.memo=el.value; }
      else if(kind==="mstock"){
        const [mid,k]=v.split("|");
        const m=fm(mid); if(m){ m[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mcash"){
        const [mid,cid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const c=(m.cash||[]).find(x=>String(x.id)===String(cid)); if(c){ c[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mborder"||kind==="mty"){
        const m=fm(v); if(!m) return;
        if(kind==="mborder") m.border=el.value; else m.ty=el.value;
        refreshPanel(m, true);
      }
      else if(kind==="gseg"){
        const [mid,gid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const g=(m.segments||[]).find(x=>String(x.id)===String(gid)); if(!g) return;
        g[k]=el.value;
        const st=document.getElementById("gstat-"+g.id); if(st) st.textContent=segStat(g);
        const fo=document.getElementById("gform-"+g.id); if(fo) fo.textContent=segFormula(g);
        refreshPanel(m);
      }
    };
  });
  document.getElementById("s-date").oninput = e=>s.date=e.target.value;
  document.getElementById("s-store").oninput = e=>s.store=e.target.value;
  const ts0=document.getElementById("s-tstart"); if(ts0) ts0.oninput = e=>s.startAt=e.target.value;
  const te0=document.getElementById("s-tend"); if(te0) te0.oninput = e=>s.endAt=e.target.value;
  const pn = document.getElementById("s-pname");
  if(pn) pn.oninput = e=>s.partnerName=e.target.value;

  bindSessionActions();
}

function refreshSlot(){
  /* Ë≤ØÁéâÊñπÂºè„ÅØÂè∞ÂèéÊîØ„Éª‰∫∫ÂêàË®à„Éª„Çµ„Éû„É™„ÉºÂÖ®„Å¶„ÅåÈÄ£Âãï„Åô„Çã„Åü„ÇÅ„ÄÅ„Éï„Ç©„Éº„Ç´„Çπ‰øùÊåÅ„ÅßÂÖ®ÂÜçÊèèÁîª */
  const f = document.activeElement;
  const fv = f && f.dataset && f.dataset.in
    ? {in:f.dataset.in, v:(f.dataset.v!==undefined?f.dataset.v:null)} : null;
  render();
  if(fv){
    const sel = fv.v!==null
      ? '[data-in="'+fv.in+'"][data-v="'+fv.v+'"]'
      : '[data-in="'+fv.in+'"]:not([data-v])';
    const nel = document.querySelector(sel);
    if(nel){ nel.focus(); /* numberÂÖ•Âäõ„ÅØ„Ç´„Éº„ÇΩ„É´Êú´Â∞æ„ÅßÂïèÈ°å„Å™„ÅÑ„Åü„ÇÅ‰ΩçÁΩÆÂæ©ÂÖÉ„Åó„Å™„ÅÑ */ }
  }
}
function refreshSummary(){

}
function refreshPanel(m, keepInputs){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  if(keepInputs){
    /* ÊâãÂÖ•ÂäõÊ¨Ñ„Éï„Ç©„Éº„Ç´„Çπ‰øùÊåÅ„ÅÆ„Åü„ÇÅ„ÄÅ‰πñÈõ¢ÈÉ®ÂàÜ„ÅÝ„Åë‰Ωú„ÇäÁõ¥„Åô„ÅÆ„ÅØÁÖ©Èõë„Å™„ÅÆ„ÅßÂÖ®‰ΩìÊõ¥Êñ∞+ÂÄ§Âæ©ÂÖÉ */
    const focused = document.activeElement;
    const fv = focused && focused.dataset ? {in:focused.dataset.in, v:focused.dataset.v, val:focused.value, ss:focused.selectionStart} : null;
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);

      const nel = el.querySelector('[data-in="'+fv.in+'"][data-v="'+fv.v+'"]');
      if(nel){ nel.value=fv.val; nel.focus(); try{nel.selectionStart=nel.selectionEnd=fv.ss;}catch(e){} }
    }
  } else {
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);
  }
}
function rebindPanelInputs(m){
  const el = document.getElementById("mpanel-"+m.id);

  el.querySelectorAll("[data-in]").forEach(inp=>{

      }
      else if(a==="xfopen"){ UI.xferOpen=!UI.xferOpen; render(); }
      else if(a==="xfpick"){
        const e=(S.entries||[]).find(x=>String(x.id)===String(v));
        if(e){ s.expenses.push({id:uid(), store:e.store||"", item:(e.item||e.memo||e.category||"ÊîØÂá∫"), amount:String(num(e.amount)), fromEntry:e.id, fromData:Object.assign({},e)}); UI.xferOpen=false; render(); }
      }
      else if(a==="sdel"){
        if(!confirm("„Åì„ÅÆÁ®ºÂÉçË®òÈå≤„ÇíÂâäÈô§„Åó„Åæ„Åô„Åã?(ÂÆ∂Ë®àÁ∞ø„ÅÆÈÄ£Êê∫ÂàÜ„ÇÇÊ∂à„Åà„Åæ„Åô)")) return;
        S.entries = S.entries.filter(e=>e.id!=="slot-"+s.id);
        S.sessions = S.sessions.filter(x=>x.id!==s.id);
        save(); UI.screen="main"; UI.draft=null; render();
      }
      else if(a==="ssave") saveSession();
    };
  });
}

function saveSession(){
  const s = UI.draft;
  if(!s.date) return;
  const cleaned = Object.assign({}, s, {
    fee: String(num(s.fee))
  });
  const _rs = cleaned._restore||[]; delete cleaned._restore;
  delete cleaned.own; delete cleaned.partner; delete cleaned.results;
  if(UI.isNewSess) S.sessions.push(cleaned);
  else S.sessions = S.sessions.map(x=>x.id===s.id?cleaned:x);
  /* „É¨„Éº„ÉàË®òÊÜ∂ */
  if(num(cleaned.exchange)>0) S.rates.exchange = cleaned.exchange;
  if(num(cleaned.pExchange)>0) S.rates.pExchange = cleaned.pExchange;
  if(num(cleaned.pushPayout)>0) S.rates.pushPayout = cleaned.pushPayout;
  if(num(cleaned.pushDraw)>0) S.rates.pushDraw = cleaned.pushDraw;
  /* ÂÆ∂Ë®àÁ∞øÈÄ£Êê∫ */
  const linkId = "slot-"+s.id;
  const fin = finalOwn(cleaned);
  const isDai = cleaned.mode==="dai";
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date,
      src: isDai ? "daida" : "slot",
      type: fin>0?"income":"expense",
      category: isDai ? "ÂâØÊ•≠" : "ÈÅäÊäÄ",
      amount: Math.abs(fin),
      memo: modeLabel(cleaned.mode)+(cleaned.store?" @"+cleaned.store:"")});
  }
  /* ÂÆ∂Ë®àÁ∞ø„Åã„Çâ„ÅÆÊåØÊõø: ÈÅ∏ÊäûÂÖÉ„ÅÆË®òÈå≤„Çí„Åì„Åì„ÅßÂâäÈô§(‰øùÂ≠ò„Å®„ÉØ„É≥„Çª„ÉÉ„Éà) */
  const _xf = new Set((cleaned.expenses||[]).map(x=>String(x.fromEntry)).filter(x=>x!=="undefined"&&x!=="null"));
  if(_xf.size) S.entries = S.entries.filter(e=>!_xf.has(String(e.id)));
  _rs.forEach(d=>{ if(d && !S.entries.some(e=>String(e.id)===String(d.id))) S.entries.push(d); });
  save(); UI.screen="main"; UI.draft=null; render();
  const _msgs=[]; if(_xf.size) _msgs.push("ÊåØÊõø"+_xf.size+"‰ª∂"); if(_rs.length) _msgs.push("ÂÆ∂Ë®àÁ∞ø„Å∏"+_rs.length+"‰ª∂Êàª„Åó");
  if(_msgs.length) toast("‰øùÂ≠ò„Åó„Åæ„Åó„Åü("+_msgs.join(" / ")+")");
}

function bindSyncBox(){

      else if(a==="login" || a==="signup"){

        const pw = document.getElementById("sync-pw").value||"";
        if(!email || pw.length<6){ UI.syncErr=true; UI.syncMsg="„É°„Éº„É´„Ç¢„Éâ„É¨„Çπ„Å®6ÊñáÂ≠ó‰ª•‰∏ä„ÅÆ„Éë„Çπ„ÉØ„Éº„Éâ„ÇíÂÖ•Âäõ„Åó„Å¶„Åè„ÅÝ„Åï„ÅÑ„ÄÇ"; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg = (a==="login"?"„É≠„Ç∞„Ç§„É≥‰∏≠‚Ä¶":"ÁôªÈå≤‰∏≠‚Ä¶"); updateSyncUi();
        const r = a==="login" ? await authSignIn(email, pw) : await authSignUp(email, pw);
        if(r.error){ UI.syncErr=true; UI.syncMsg = r.error; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg=""; 
        await cloudSync();

    };
  });
}

/* ---------- „Ç¢„Éó„É™Êõ¥Êñ∞„ÉÅ„Çß„ÉÉ„ÇØ ---------- */
let updateChecking = false, lastUpdateCheck = 0;
async function checkForUpdate(manual){
  const now = Date.now();
  if(!manual && now - lastUpdateCheck < 60000) return;   /* Ëá™Âãï„ÅØ60Áßíthrottle„ÄÇÊâãÂãï„ÅØÂ∏∏„Å´ÂÆüË°å */
  if(updateChecking) return;
  updateChecking = true; lastUpdateCheck = now;
  try{
    if("serviceWorker" in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg){ try{ await reg.update(); }catch(e){} }
    }
    const res = await fetch("./index.html?_=" + now, { cache:"no-store" });
    if(!res.ok) throw new Error("fetch " + res.status);
    const txt = await res.text();
    const mt = txt.match(/APP_VERSION\s*=\s*"([\d.]+)"/);
    const latest = mt ? mt[1] : null;
    if(latest && latest !== APP_VERSION) showUpdateBar(latest, manual);
    else if(manual) toast("ÊúÄÊñ∞„Åß„Åô(" + APP_VERSION + ")");
  }catch(e){
    if(manual) toast("Á¢∫Ë™ç„Åß„Åç„Åæ„Åõ„Çì„Åß„Åó„Åü(„Ç™„Éï„É©„Ç§„É≥?)");
  }finally{
    updateChecking = false;
  }
}
function showUpdateBar(latest, manual){
  /* ÊâãÂãï„ÅØÂç≥Á¢∫Ë™ç„ÉÄ„Ç§„Ç¢„É≠„Ç∞„ÄÇËá™Âãï„ÅØ„Éê„ÉºÈÄöÁü•„ÅÆ„Åø(ÂÖ•Âäõ‰∏≠„Å´ÂãùÊâã„Å´„É™„É≠„Éº„Éâ„Åó„Å™„ÅÑ) */
  if(manual){
    if(confirm("Êñ∞„Åó„ÅÑ„Éê„Éº„Ç∏„Éß„É≥ " + latest + " „Åå„ÅÇ„Çä„Åæ„Åô„ÄÇ\n‰ªä„Åô„ÅêÂÜçË™≠„ÅøËæº„Åø„Åó„Åæ„Åô„Åã?(ÁèæÂú® " + APP_VERSION + ")")) reloadForUpdate();
    return;
  }
  if(document.getElementById("updatebar")) return;
  const bar = document.createElement("div");
  bar.id = "updatebar";
  bar.innerHTML = '<span>Êñ∞„Éê„Éº„Ç∏„Éß„É≥ ' + esc(latest) + ' „ÅåÂà©Áî®„Åß„Åç„Åæ„Åô</span>'+
    '<button id="updatebar-btn">ÂÜçË™≠„ÅøËæº„Åø</button>'+
    '<button id="updatebar-x" aria-label="Èñâ„Åò„Çã">√ó</button>';
  document.body.appendChild(bar);
  document.getElementById("updatebar-btn").onclick = reloadForUpdate;
  document.getElementById("updatebar-x").onclick = ()=>bar.remove();
}
async function reloadForUpdate(){
  try{
    if("serviceWorker" in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg){ try{ await reg.update(); }catch(e){} }
    }
  }catch(e){}
  location.reload();
}
/* Ëµ∑ÂãïÊôÇ„ÉªÂæ©Â∏∞ÊôÇ„ÅÆËá™Âãï„ÉÅ„Çß„ÉÉ„ÇØ */
