<body>
<div id="app"></div>
<div id="navbar"></div>
<div id="print-area"></div>
<div id="toast" class="toast">保存しました</div>
<script>
"use strict";
/* ============================================================
   Tally 2.27 (localStorage保存・完全オフライン)
   ============================================================ */
const KEY = "kakeibo:v1";
const EXPENSE_CATS = ["消費","娯楽"];
const INCOME_CATS = ["給与","賞与","副業","臨時"];
const UNIT_LABEL = {medal:"枚", ball:"玉", yen:"円"};
const WD = ["日","月","火","水","木","金","土"];

/* ---------- helpers ---------- */
const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
const fnum = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const yen = n => "¥" + Math.abs(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"−") + yen(n);
const clsPM = n => n>=0 ? "teal" : "red";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const uid = () => Date.now() + Math.floor(Math.random()*1000);

/* ---------- 固定費(定期)テンプレート ----------
   テンプレートが実エントリを生成する方式。日付が過去なら実績、未来なら予定。
   当年12月まで生成。停止すると未来分だけ削除し過去は残す。 */
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();  // m:1-12
/* 日本の祝日判定(オフライン・計算式。春分/秋分は天文近似、ハッピーマンデー・振替休日・国民の休日に対応) */
function jpEquinox(y, spring){
  const base = spring ? 20.8431 : 23.2488;
  return Math.floor(base + 0.242194*(y-1980) - Math.floor((y-1980)/4));
}
function isJpHolidayYMD(y, m, d){
  const FIX = {1:[1], 2:[11,23], 4:[29], 5:[3,4,5], 8:[11], 11:[3,23]};
  if(FIX[m] && FIX[m].indexOf(d)>=0) return true;
  if(m===3 && d===jpEquinox(y,true)) return true;
  if(m===9 && d===jpEquinox(y,false)) return true;
  const dow = new Date(y, m-1, d).getDay();
  if(dow===1){
    const week = Math.floor((d-1)/7)+1;
    if(m===1 && week===2) return true;   // 成人の日
    if(m===7 && week===3) return true;   // 海の日
    if(m===9 && week===3) return true;   // 敬老の日
    if(m===10 && week===2) return true;  // スポーツの日
  }
  return false;
}
function isJpHoliday(dt){
  const DAY=86400000;
  const y=dt.getFullYear(), m=dt.getMonth()+1, d=dt.getDate();
  if(isJpHolidayYMD(y,m,d)) return true;
  let p=new Date(dt.getTime()-DAY);   // 振替休日: 直前の連続祝日が日曜まで遡れる
  while(isJpHolidayYMD(p.getFullYear(),p.getMonth()+1,p.getDate())){
    if(p.getDay()===0) return true;
    p=new Date(p.getTime()-DAY);
  }
  if(dt.getDay()!==0 && dt.getDay()!==6){   // 国民の休日: 前後が祝日の平日
    const pv=new Date(dt.getTime()-DAY), nx=new Date(dt.getTime()+DAY);
    if(isJpHolidayYMD(pv.getFullYear(),pv.getMonth()+1,pv.getDate()) && isJpHolidayYMD(nx.getFullYear(),nx.getMonth()+1,nx.getDate())) return true;
  }
  return false;
}
function isNonBusinessDay(dt){ const g=dt.getDay(); return g===0 || g===6 || isJpHoliday(dt); }
function shiftForHoliday(dt, mode){
  const DAY=86400000; let d=new Date(dt.getTime());
  if(mode==="before"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()-DAY); }
  else if(mode==="after"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()+DAY); }
  return d;
}
function fixedDateFor(tpl, y, m){
  const d = Math.min(num(tpl.day)||1, daysInMonth(y,m));
  return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}
const fmtDate = dt => dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
/* 頻度に応じた発生日リストを返す(今月〜当年12月) */
function fixedOccurrences(tpl){
  const now = new Date();
  const y = now.getFullYear();
  const yEnd = new Date(y, 11, 31);
  const floor = new Date(y, now.getMonth(), 1);   // 今月1日(過去への遡り防止)
  const freq = tpl.freq || "monthly";
  const out = [];
  if(freq==="weekly" || freq==="biweekly"){
    const step = (freq==="weekly"?7:14) * 86400000;
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(y, now.getMonth(), now.getDate());
    while(d < floor) d = new Date(d.getTime()+step);   // 起点を今月まで進める
    while(d <= yEnd){ out.push(new Date(d)); d = new Date(d.getTime()+step); }
  } else {
    const day = num(tpl.day)||1;
    const stepM = (freq==="bimonthly"?2:1);
    for(let m=now.getMonth(); m<=11; m+=stepM){
      out.push(new Date(y, m, Math.min(day, daysInMonth(y, m+1))));
    }
  }
  const hs = tpl.holidayShift || "none";
  return (hs==="none") ? out : out.map(dt => shiftForHoliday(dt, hs));
}
function genFixedEntries(tpl){
  const skips = tpl.skips || [];
  fixedOccurrences(tpl).forEach(dt=>{
    const date = fmtDate(dt);
    if(skips.includes(date)) return;
    const exists = S.entries.some(e=>String(e.fixedId)===String(tpl.id) && e.date===date);
    if(!exists){
      S.entries.push({
        id: uid()+"-f"+date, date,
        type: tpl.type, category: tpl.category,
        amount: num(tpl.amount), memo: tpl.name, store: tpl.store||"", item: tpl.item||"",
        src: "fixed", fixedId: tpl.id
      });
    }
  });
}
function ensureFixedEntries(){
  (S.fixed||[]).forEach(genFixedEntries);
}
function fixedSchedLabel(t){
  const freq = t.freq || "monthly";
  if(freq==="weekly")   return "毎週("+(t.start||"").slice(5).replace("-","/")+"〜)";
  if(freq==="biweekly") return "2週ごと("+(t.start||"").slice(5).replace("-","/")+"〜)";
  if(freq==="bimonthly")return "2ヶ月ごと "+num(t.day)+"日";
  return "毎月"+num(t.day)+"日";
}
function stopFixed(id){
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(id) && e.date > today));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}
function updateFixed(tpl){
  /* 編集: 未来の予定分だけ新しい内容に。過去の実績は事実なので変えない */
  const old = (S.fixed||[]).find(t=>String(t.id)===String(tpl.id));
  if(old && old.skips && tpl.skips===undefined) tpl.skips = old.skips;
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(tpl.id) && e.date > today));
  S.fixed = (S.fixed||[]).map(t=> String(t.id)===String(tpl.id) ? tpl : t);
  genFixedEntries(tpl);
  save();
}
function deleteFixed(id){
  /* 完全削除: 過去含めてこの固定費の記録を全部消す */
  S.entries = S.entries.filter(e=> String(e.fixedId)!==String(id));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}

/* ---------- state ---------- */
let S = { entries:[], sessions:[], rates:{medal:"20", ball:"4", push:"245", exchange:"50", pExchange:"250", pushPayout:"230", pushDraw:"245", mjScore:"", mjChip:"", mjBase:"", mjTop:"", mjDrink:""}, mdb:[], stores:[], mjSessions:[], fixed:[], mjTables:[], mjPresets:[], wishlist:[], bank:{switch:"",ceiling:"300000",seed:"",txns:[]}, savings:{goals:[],txns:[]}, budgets:{}, borderTool:{id:"bt",kind:"pachi",name:"",segments:[],border:"",ty:"",pushPayout:"",pushDraw:"",kezuri:"5",kachi:"250",genkin:"250",rph:"750",startedAt:0,breakMin:""}, schemaV:3, updatedAt:0 };
let UI = {
  tab:"games", gameSub:"slot", screen:"main",           // main | session | mdb | backup | entry
  y:new Date().getFullYear(), m:new Date().getMonth()+1,
  draft:null, isNewSess:false,         // セッションドラフト
  entryForm:null, editEntryId:null,    // 家計簿ドラフト
  mdbForm:null,                        // 機種マスタドラフト
  msg:""                               // backup画面メッセージ
};

function migrateEntry(e){
  let ne = e;
  if((e.src==="slot"||e.src==="mahjong") && e.category==="遊技収支")
    ne = Object.assign({}, ne, {category:"遊技"});
  if(e.src==="slot" && typeof e.memo==="string" && (e.memo.includes("乗り打ち")||e.memo.includes("代打ち")))
    ne = Object.assign({}, ne, {memo: e.memo.replace("乗り打ち","乗打").replace("代打ち","代打")});
  if(e.src==="daida" || ne.category==="代打ち")
    ne = Object.assign({}, ne, {category:"副業"});
  if(e.type==="income" && ne.category==="その他収入")
    ne = Object.assign({}, ne, {category:"臨時"});
  return ne;
}
function applyData(d){
  const _sv = Number(d && d.schemaV) || 0;
  let _migRate = false;
  S.entries = (d.entries||[]).map(migrateEntry);
  S.sessions = (d.sessions||[]).map(migrateSession);
  S.rates = Object.assign({medal:"20",ball:"4",push:"245",exchange:"5",pExchange:"25",pushPayout:"230",pushDraw:"245",mjScore:"",mjChip:"",mjBase:"",mjTop:"",mjDrink:""}, d.rates||{});
  S.mdb = Array.isArray(d.mdb)?d.mdb:[];

    if(n.meIdx===undefined) n.meIdx = null;
    ["mochi","kaeshi","uma1","uma2","uma3","uma4"].forEach(k=>{ if(n[k]==null) n[k]=""; });
    if(n.feeTotal==null) n.feeTotal="";
    if(n.hakoshita==null) n.hakoshita=false;
    const np = (n.players||["A","B","C"]).length;
    if(!Array.isArray(n.chipStart)) n.chipStart = new Array(np).fill("");
    if(!Array.isArray(n.chipEnd)){ n.chipEnd = (Array.isArray(n.chips)? n.chips.map(c=>c) : new Array(np).fill("")); }
    if(!Array.isArray(n.fees)) n.fees = new Array(np).fill(n.fee||"");
    delete n.chips; delete n.fee;
    return n;
  });
  S.mjPresets = Array.isArray(d.mjPresets)?d.mjPresets:[];
  S.borderTool = Object.assign({id:"bt",kind:"pachi",name:"",segments:[],border:"",ty:"",pushPayout:"",pushDraw:"",kezuri:"5",kachi:"25",genkin:"250",rph:"750",startedAt:0,breakMin:""}, d.borderTool||{});
  (S.borderTool.segments||[]).forEach(g=>{ delete g.kind; }); /* 貯玉プッシュ一本化: 旧区間の kind は不要 */
  if(_sv < 3){
    /* 換金率を全て1000円基準に統一。v2.17で100円にした分(schemaV=2)は×10で戻す。ボーダーの換金率(kachi)は元々100円基準なので全ケースで×10。1回のみ実行し保存 */
    const _x10 = x => (x==="" || x==null) ? x : String(num(x)*10);
    if(_sv >= 2){
      S.rates.exchange = _x10(S.rates.exchange); S.rates.pExchange = _x10(S.rates.pExchange);
      (S.sessions||[]).forEach(se=>{ if(se){ if(se.exchange!==undefined) se.exchange=_x10(se.exchange); if(se.pExchange!==undefined) se.pExchange=_x10(se.pExchange); } });
      (S.stores||[]).forEach(st=>{ if(st){ st.slotEx=_x10(st.slotEx); st.pachiEx=_x10(st.pachiEx); } });
    }
    if(S.borderTool){ S.borderTool.kachi = _x10(S.borderTool.kachi); }
    S.schemaV = 3;
    _migRate = true;
  } else { S.schemaV = _sv; }
  S.updatedAt = d.updatedAt || 0;
  if(_migRate){ try{ saveLocal(); }catch(e){} }
}

/* ---------- 計算(セッション) ---------- */
const migrateSession = s => {
  /* 旧構造からの移行: 全台に貯玉方式フィールドを補完 */
  const machines = (s.machines||[]).map(m => {
    const nm = Object.assign({who:"me"}, m);
    if(nm.startStock===undefined) nm.startStock="";
    if(nm.endStock===undefined) nm.endStock="";
    if(nm.holdBalls===undefined) nm.holdBalls="";
    if(!nm.cash) nm.cash=[];
    if(nm.kind==="slot"){ delete nm.rsegs; delete nm.hits; } /* 旧判別ログ破棄 */
    return nm;
  });
  const out = Object.assign({}, s, {machines});
  if(out.exchange===undefined) out.exchange="";
  if(out.pExchange===undefined) out.pExchange="";
  if(out.pushPayout===undefined) out.pushPayout="";
  if(out.pushDraw===undefined) out.pushDraw="";
  /* 旧区間の pushes/pp フィールドは残っていても新計算では無視される */
  delete out.results; delete out.own; delete out.partner;
  return out;
};
/* ---------- 計算(貯玉方式・台ごと) ----------
   差枚 = 終了貯玉 − 開始貯玉 + 持ち玉
   収支(円) = 差枚 ÷ 交換枚数 × 1000 − 現金投資合計 */
const machCash = m => (m.cash||[]).reduce((a,c)=>a+num(c.amount),0);
const machSabai = m => num(m.endStock) - num(m.startStock) + num(m.holdBalls);
const machYen = (m, exch) => {
  const ex = num(exch);
  const gross = ex>0 ? Math.round(machSabai(m)/ex*1000) : 0;
  return gross - machCash(m);
};
const machHasData = m => m.startStock!=="" || m.endStock!=="" || m.holdBalls!=="" || machCash(m)>0;
/* 台の換算レート: スロット=交換枚数, パチンコ=換金玉数 */
const machExch = (m, s) => m.kind==="pachi" ? s.pExchange : s.exchange;
const machYenS = (m, s) => machYen(m, machExch(m, s));
/* 収支対象台(スロット+貯玉入力のあるパチンコ) */
const incomeMachines = (s, who) => (s.machines||[]).filter(m =>
  (m.kind==="slot" || (m.kind==="pachi" && machHasData(m))) && (!who || (m.who||"me")===who));
const slotMachines = (s, who) => (s.machines||[]).filter(m => m.kind==="slot" && (!who || (m.who||"me")===who));
const personSlotYen = (s, who) => incomeMachines(s, who).reduce((a,m)=>a+machYenS(m, s), 0);
const poolTotal = s => personSlotYen(s,"me") + personSlotYen(s,"partner");
const expTotal = s => (s.expenses||[]).reduce((a,e)=>a+num(e.amount),0);
/* 乗り打ちの折半調整: myShareが入力されていればそれを自分の取り分に使う(なければ折半) */
const halfSplit = s => Math.round(poolTotal(s)/2);
const myShare = s => (s.myShare!==undefined && s.myShare!=="") ? num(s.myShare) : halfSplit(s);
const partnerShare = s => poolTotal(s) - myShare(s);
/* 家計簿へ流れる自分の生収支(経費前) */
const grossOwn = s => s.mode==="dai" ? num(s.fee)
                    : s.mode==="nori" ? myShare(s)
                    : personSlotYen(s,"me");
const finalOwn = s => grossOwn(s) - expTotal(s);
/* 代打ちの台勝敗(報告用・家計簿非反映) */
const daiResult = s => incomeMachines(s).reduce((a,m)=>a+machYenS(m, s), 0);

/* ---------- 計算(麻雀) ---------- */
const mjRankCount = m => m.rule==="3" ? 3 : 4;
const mjRanks = m => { const rc=mjRankCount(m); return (m.ranks||[]).map(x=>num(x)).map((v,i)=> i<rc?v:0); };
const mjHanchan = m => mjRanks(m).reduce((a,b)=>a+b,0);
const mjGameFee = m => m.category==="free"
  ? num(m.baseFee)*mjHanchan(m) + num(m.topBonus)*num((m.ranks||[])[0]) + num(m.drinkFee)
  : num(m.setFee);
const mjScoreYen = m => Math.round(fnum(m.score)*fnum(m.scoreRate));
const mjChipYen = m => Math.round(fnum(m.chips)*fnum(m.chipRate));
const mjRaw = m => mjScoreYen(m) + mjChipYen(m);          // ゲーム代抜き(麻雀のみの収支)
const mjFinal = m => mjRaw(m) - mjGameFee(m);             // ゲーム代込み(家計簿へ)
const mjAvgRank = m => {
  const h = mjHanchan(m); if(!h) return null;
  const r = mjRanks(m);
  let s=0; for(let i=0;i<r.length;i++) s += (i+1)*r[i];
  return s/h;
};
const modeLabel = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";
const modeShort = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";

/* ---------- 計算(パチンコ区間) ----------
   貯玉プッシュ: プッシュ数 = 開始残プッシュ − 終了残プッシュ
   台に入った玉(回転率用) = プッシュ数×払出玉 + 開始残玉 − 当たり時残玉
   引き落とし玉(コスト用) = プッシュ数×引き落とし玉 + 開始残玉 − 当たり時残玉 */
const segPushes = g => Math.max(0, num(g.rpStart) - num(g.rpEnd));
const cashBalls = (g, s) => num(g.cash)>0 ? num(g.cash)*fnum((s&&s.genkin)||250)/1000 : 0;   // 現金投資額→玉(貸出レート、削り対応)
const segUsed = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushPayout)||230) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segCost = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushDraw)||245) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segSpins = g => Math.max(0, num(g.es) - num(g.ss));
/* 貯玉プッシュ一本化 + 現金: 残プッシュ空・現金なしなら持ち玉(残玉差)。現金投資があれば現金区間として成立 */
const segDone = g => g.ss!=="" && g.es!=="" &&
  ((g.rpStart!=="" && g.rpEnd!=="") || (g.sb!=="" && g.eb!=="") || num(g.cash)>0);
function machineTotals(m, s){
  s = s||UI.draft;
  const segs = (m.segments||[]).filter(segDone);
  const balls = segs.reduce((a,g)=>a+segUsed(g, s),0);
  const spins = segs.reduce((a,g)=>a+segSpins(g),0);
  const costBalls = segs.reduce((a,g)=>a+segCost(g, s),0);
  const payouts = [];
  for(let i=0;i<segs.length-1;i++){
    if(segs[i].eb!=="" && segs[i+1].sb!==""){
      const p = num(segs[i+1].sb) - num(segs[i].eb);
      if(p>0) payouts.push(p);
    }
  }
  const avgTY = payouts.length ? payouts.reduce((a,b)=>a+b,0)/payouts.length : null;
  return { balls, spins, payouts, avgTY,
    rate250: balls>0 ? spins/(balls/250) : null,
    costRate250: costBalls>0 ? spins/(costBalls/250) : null };
}
const findMaster = m => S.mdb.find(x => x.kind==="pachi" && (x.name||"").trim()
  && (x.name||"").trim() === (m.name||"").trim());

const monthKey = () => UI.y + "-" + String(UI.m).padStart(2,"0");
function moveMonth(d){ UI.m += d;
  if(UI.m<1){UI.m=12;UI.y--;} if(UI.m>12){UI.m=1;UI.y++;}
  render(); }
</script>

  const normIncome = me.filter(e=>e.type==="income" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  const normExpense = me.filter(e=>e.type==="expense" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  /* 実績/予定(案ア): 日付が今日以前=実績、未来=予定。大きい数字は予定込みの見込み */
  const todayS = todayStr();

function viewMjStats(){
  /* ルール名 × カテゴリ(フリー/セット)別に集計。同レートで括るのが目的 */
  const groups = {}; // key: category|store
  (S.mjSessions||[]).forEach(s=>{
    const store = (s.store||"").trim() || "(ルール名なし)";
    const key = s.category + "|" + store;
    (groups[key] = groups[key] || {category:s.category, store, list:[]}).list.push(s);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    // フリー→セットの順、その中は半荘数の多い順
    const ga=groups[a], gb=groups[b];
    if(ga.category!==gb.category) return ga.category==="free"?-1:1;
    const ha=ga.list.reduce((x,s)=>x+mjHanchan(s),0), hb=gb.list.reduce((x,s)=>x+mjHanchan(s),0);
    return hb-ha;
  });
  let h = "", any=false;
  keys.forEach(key=>{
    const G = groups[key], list = G.list;
    const H = list.reduce((a,s)=>a+mjHanchan(s),0);
    if(!H) return;
    any = true;
    /* この括りの最大着順数(3麻と4麻が混じっても広い方に合わせる) */
    const rc = Math.max(...list.map(s=>mjRankCount(s)));
    const rankSums = [0,0,0,0];
    list.forEach(s=>{ const r=mjRanks(s); for(let i=0;i<4;i++) rankSums[i]+=(r[i]||0); });
    let rankWeighted=0; for(let i=0;i<4;i++) rankWeighted += (i+1)*rankSums[i];
    const avgRank = rankWeighted/H;
    const sumFinal = list.reduce((a,s)=>a+mjFinal(s),0);
    const sumRaw = list.reduce((a,s)=>a+mjRaw(s),0);
    const sumFee = list.reduce((a,s)=>a+mjGameFee(s),0);
    const sumScore = list.reduce((a,s)=>a+fnum(s.score),0);
    const sumChips = list.reduce((a,s)=>a+fnum(s.chips),0);
    const catC = G.category==="free"?"var(--teal)":"var(--amber)";
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div class="row between" style="margin-bottom:8px;align-items:center;gap:8px">'+
      '<div class="row" style="align-items:center;gap:6px;min-width:0">'+
      '<span class="tag" style="border:1px solid '+catC+';color:'+catC+';flex-shrink:0">'+(G.category==="free"?"フリー":"セット")+'</span>'+
      '<span class="ellip" style="font-weight:700;font-size:13px">'+esc(G.store)+'</span></div>'+
      '<span class="muted" style="font-size:11px;flex-shrink:0">'+H+'半荘 / '+list.length+'日</span></div>'+
      '<div class="row between" style="align-items:baseline;margin-bottom:8px"><span class="muted" style="font-size:12px">平均着順</span>'+
      '<span class="mono amber" style="font-size:18px;font-weight:700">'+avgRank.toFixed(2)+'</span></div>'+
      '<div style="margin-bottom:10px">'+
      Array.from({length:rc}).map((_,i)=>{
        const cnt = rankSums[i];
        const pct = H>0 ? Math.round(cnt/H*100) : 0;
        const cols = rc===3 ? ["var(--teal)","var(--amber)","var(--red)"] : ["var(--teal)","var(--blue)","var(--amber)","var(--red)"];
        return '<div style="'+(i<rc-1?'margin-bottom:8px':'')+'">'+
          '<div class="row between" style="font-size:11px;margin-bottom:4px;align-items:baseline">'+
          '<span class="muted">'+(i+1)+'着</span>'+
          '<span class="mono"><span style="font-weight:700">'+cnt+'</span><span class="muted" style="font-size:10px">回 ・ '+pct+'%</span></span></div>'+
          '<div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">'+
          '<div style="height:100%;width:'+pct+'%;background:'+cols[i]+';border-radius:4px"></div></div></div>';
      }).join("")+'</div>'+
      '<div style="border-top:1px solid var(--line);padding-top:8px">'+
      mjStatRow("平均収支(ゲーム代込)", Math.round(sumFinal/H), true)+
      mjStatRow("平均収支(ゲーム代抜)", Math.round(sumRaw/H), true)+
      mjStatRow("平均ゲーム代", -Math.round(sumFee/H), true)+
      mjStatRow("平均スコア", (sumScore/H), false, true, "pt")+
      mjStatRow("平均チップ", (sumChips/H), false, true, "枚")+
      '</div></div>';
  });
  if(!any) h = '<div style="text-align:center;padding:16px 0;font-size:12px;line-height:1.7" class="muted">まだ記録がありません。記録が貯まるとルール名別の平均着順や収支が出ます。</div>';
  return h;
}
function mjStatRow(label, val, isYen, raw, unit){
  let disp;
  if(raw) disp = (val>=0?"+":"")+val.toFixed(1)+(unit||"");
  else if(isYen) disp = signYen(val);
  else disp = "¥"+Math.abs(val).toLocaleString("ja-JP");
  const col = isYen ? clsPM(val) : (raw ? (val>=0?"blue":"red") : "");
  return '<div class="row between" style="font-size:12px;margin:3px 0"><span class="muted">'+label+'</span>'+
    '<span class="mono '+col+'">'+disp+'</span></div>';
}

/* ===== 麻雀スコア表 ===== */
function mjtSeats(t){ return num(t.rule)||3; }
function mjtAbsent(t,ri,pi){ return t.rows[ri][pi]==="x"; }
function mjtRawScore(t,ri,pi){ const v=t.rows[ri][pi]; return (v===""||v==="x"||v==="-"||v==null)?null:num(v); }
function mjtPlaying(t,ri){ const a=[]; for(let p=0;p<t.players.length;p++) if(!mjtAbsent(t,ri,p)) a.push(p); return a; }
function mjtAutoIdx(t,ri){
  const playing=mjtPlaying(t,ri);
  const empties=playing.filter(p=>mjtRawScore(t,ri,p)===null);
  return empties.length===1 ? empties[0] : -1;
}
function mjtScore(t,ri,pi){
  if(mjtAbsent(t,ri,pi)) return null;
  const raw=mjtRawScore(t,ri,pi); if(raw!==null) return raw;
  if(mjtAutoIdx(t,ri)===pi){
    let s=0; mjtPlaying(t,ri).forEach(p=>{ if(p!==pi){ const r=mjtRawScore(t,ri,p); s+=(r||0); } });
    return -s;
  }
  return null;
}
function mjtChipStart(t,pi){ return num((t.chipStart||[])[pi])||0; }
function mjtChipEndRaw(t,pi){ const v=(t.chipEnd||[])[pi]; return (v===""||v==null)?null:num(v); }
function mjtChipAutoIdx(t){
  const empties=[]; for(let p=0;p<t.players.length;p++) if(mjtChipEndRaw(t,p)===null) empties.push(p);
  return empties.length===1 ? empties[0] : -1;
}
function mjtChipNet(t,pi){
  const auto=mjtChipAutoIdx(t);
  if(auto===pi){
    let s=0; for(let p=0;p<t.players.length;p++){ if(p!==pi){ const er=mjtChipEndRaw(t,p); const end=(er===null?mjtChipStart(t,p):er); s+=(end-mjtChipStart(t,p)); } }
    return -s;
  }
  const er=mjtChipEndRaw(t,pi);
  return er===null ? 0 : er-mjtChipStart(t,pi);
}
function mjtChipEndDisp(t,pi){
  const er=mjtChipEndRaw(t,pi);
  if(er!==null) return er;
  if(mjtChipAutoIdx(t)===pi) return mjtChipStart(t,pi)+mjtChipNet(t,pi);
  return null;
}
function mjtRanks(t,ri){
  const playing=mjtPlaying(t,ri);
  const scored=playing.map(p=>[p,mjtScore(t,ri,p)]).filter(x=>x[1]!==null);
  if(scored.length<mjtSeats(t)) return {};
  scored.sort((a,b)=>b[1]-a[1]);
  const m={}; scored.forEach(([p],i)=>m[p]=i+1); return m;
}
function mjtRankCounts(t,pi){
  const c=[0,0,0,0];
  (t.rows||[]).forEach((r,ri)=>{ const rk=mjtRanks(t,ri)[pi]; if(rk&&rk<=4) c[rk-1]++; });
  return c;
}
function mjtCalc(t,pi){
  let sum=0;
  (t.rows||[]).forEach((r,ri)=>{ const s=mjtScore(t,ri,pi); if(s!==null) sum+=s; });
  const chipNet=mjtChipNet(t,pi);
  const sr=num(t.scoreRate)||0, cr=num(t.chipRate)||0, fee=num((t.fees||[])[pi])||0;
  const scoreYen=Math.round(sum*sr);
  const chipYen=Math.round(chipNet*cr);
  const shushi=scoreYen+chipYen;      // スコア金額+チップ金額(ゲーム代引く前)
  const net=shushi-fee;               // 支払(最終)
  return { sum, chipNet, scoreYen, chipYen, shushi, fee, net };
}
function mjtPrintHtml(t){
  const P=t.players, seats=mjtSeats(t), rows=(t.rows||[]);
  const calcs=P.map((p,ci)=>mjtCalc(t,ci));
  const money=n=>(n<0?"−":"")+"¥"+Math.abs(n).toLocaleString("ja-JP");
  let h='<div class="pr-wrap">';
  h+='<div class="pr-title">麻雀スコア表</div>';
  h+='<div class="pr-sub">'+esc(t.date||"")+(t.ruleName?" ・ "+esc(t.ruleName):"")+" ・ "+seats+"人打ち</div>";
  /* 半荘ごとスコア */
  h+='<table class="pr-tbl"><thead><tr><th>No</th>'+P.map((p,i)=>'<th>'+esc(p||("P"+(i+1)))+'</th>').join("")+'</tr></thead><tbody>';
  rows.forEach((r,ri)=>{
    h+='<tr><td class="pr-no">'+(ri+1)+'</td>'+P.map((p,ci)=>{
      if(mjtAbsent(t,ri,ci)) return '<td class="pr-abs">抜</td>';
      const s=mjtScore(t,ri,ci);
      if(s===null) return '<td></td>';
      return '<td class="'+(s<0?"pr-neg":"")+'">'+s.toFixed(1)+'</td>';
    }).join("")+'</tr>';
  });
  h+='</tbody></table>';
  /* 集計(アプリの成績表と同じ値) */
  h+='<table class="pr-tbl pr-sum"><tbody>';
  h+='<tr><td class="pr-lbl">平均着順</td>'+P.map((p,ci)=>{const av=mjtAvgRank(t,ci);return '<td>'+(av===null?"–":av.toFixed(2))+'</td>';}).join("")+'</tr>';
  h+='<tr><td class="pr-lbl">合計</td>'+calcs.map(c=>'<td class="'+(c.sum<0?"pr-neg":"")+'">'+c.sum.toFixed(1)+'</td>').join("")+'</tr>';
  h+='<tr><td class="pr-lbl">チップ</td>'+calcs.map(c=>'<td class="'+(c.chipNet<0?"pr-neg":"")+'">'+(c.chipNet>0?"+":"")+c.chipNet+'</td>').join("")+'</tr>';
  h+='<tr><td class="pr-lbl">収支</td>'+calcs.map(c=>'<td class="'+(c.shushi<0?"pr-neg":"")+'">'+money(c.shushi)+'</td>').join("")+'</tr>';
  const anyFee=calcs.some(c=>c.fee>0);
  if(anyFee){
    h+='<tr><td class="pr-lbl">場代</td>'+calcs.map(c=>'<td class="pr-neg">'+(c.fee>0?money(-c.fee):"–")+'</td>').join("")+'</tr>';
    h+='<tr class="pr-final"><td class="pr-lbl">支払</td>'+calcs.map(c=>'<td class="'+(c.net<0?"pr-neg":"")+'">'+money(c.net)+'</td>').join("")+'</tr>';
  }
  h+='</tbody></table>';
  h+='<div class="pr-foot">スコア1点=¥'+(num(t.scoreRate)||0)+(num(t.chipRate)>0?" / チップ1枚=¥"+num(t.chipRate):"")+" ・ Tally</div>";
  h+='</div>';
  return h;
}
function mjtPrint(){
  const pa=document.getElementById("print-area");
  if(pa) pa.innerHTML=mjtPrintHtml(UI.mjt);
  setTimeout(()=>{ window.print(); }, 60);
}
function newMjTable(){
  return { id:uid(), date:todayStr(), rule:"3", ruleName:"", meIdx:null, players:["A","B","C"],
    rows:[["","",""]], chipStart:["","",""], chipEnd:["","",""],
    scoreRate:"100", chipRate:"0", fees:["","",""], feeTotal:"",
    mochi:"", kaeshi:"", uma1:"", uma2:"", uma3:"", uma4:"", hakoshita:false };
}
function mjtUma(t, idx){ return [num(t.uma1)||0,num(t.uma2)||0,num(t.uma3)||0,num(t.uma4)||0][idx]||0; }
function mjtTobiScore(t){ return Math.round(-(num(t.kaeshi)||0)/1000) + mjtUma(t, mjtSeats(t)-1); }
function mjtHasTobi(t){ return !t.hakoshita && (num(t.kaeshi)||0)>0; }
function mjtAvgRank(t, pi){
  const rc = mjtRankCounts(t, pi);
  const g = rc.reduce((a,b)=>a+b,0);
  if(!g) return null;
  let w=0; rc.forEach((n,i)=> w += (i+1)*n);
  return w/g;
}

          if(raw!==null){ inner=esc(String(t.rows[ri][ci])); cls=(raw<0?"red":raw>0?"blue":""); }
          else if(autoIdx===ci){ const s=mjtScore(t,ri,ci); inner='<span style="font-style:italic">'+s+'</span>'; cls=(s<0?"red":s>0?"blue":""); }
          else inner='<span class="mjt-ph">·</span>';
        }
        return '<td class="mjt-cell '+(sel?"sel ":"")+cls+'" data-mt="cell" data-r="'+ri+'" data-c="'+ci+'">'+inner+'</td>';
      }).join("")+
      (P.length<6?'<td></td>':'')+
      '<td class="mjt-x" data-mt="rowdel" data-v="'+ri+'">×</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<button class="btn dash full" style="padding:10px 0;margin-bottom:14px" data-mt="addrow">＋ 半荘を追加</button>';

  /* チップ(スコアの下) */
  h += band("チップ(開始→終了 枚数)");
  h += '<div style="overflow-x:auto;margin-bottom:14px"><table class="mjt"><thead><tr><th style="width:38px"></th>'+
    P.map((p,i)=>'<th '+colW+'>'+esc(p||("P"+(i+1)))+'</th>').join("")+'</tr></thead><tbody>'+
    '<tr><td class="mjt-no">開始</td>'+
    P.map((p,ci)=>{ const sel=UI.mjtCell&&UI.mjtCell.k==="cs"&&UI.mjtCell.c===ci; const x=(t.chipStart||[])[ci]||""; const neg=(num(x)||0)<0;
      return '<td class="mjt-cell '+(sel?"sel ":"")+(neg?"red":"")+'" data-mt="cs" data-c="'+ci+'">'+(x===""?'<span class="mjt-ph">·</span>':esc(String(x)))+'</td>'; }).join("")+'</tr>'+
    '<tr><td class="mjt-no">終了</td>'+
    P.map((p,ci)=>{ const sel=UI.mjtCell&&UI.mjtCell.k==="ce"&&UI.mjtCell.c===ci; const er=mjtChipEndRaw(t,ci); const auto=mjtChipAutoIdx(t)===ci;
      let inner="",cls=""; if(er!==null){ inner=esc(String((t.chipEnd||[])[ci])); } else if(auto){ inner='<span class="mjt-auto">'+mjtChipEndDisp(t,ci)+'</span>'; } else inner='<span class="mjt-ph">·</span>';
      return '<td class="mjt-cell '+(sel?"sel ":"")+cls+'" data-mt="ce" data-c="'+ci+'">'+inner+'</td>'; }).join("")+'</tr>'+
    '<tr><td class="mjt-no">増減</td>'+
    P.map((p,ci)=>{ const net=mjtChipNet(t,ci); return '<td class="mjt-cell" style="color:'+(net<0?"var(--red)":net>0?"var(--blue)":"var(--muted)")+'">'+(net>0?"+":"")+net+'</td>'; }).join("")+'</tr>'+
    '</tbody></table></div>';

  /* ゲーム代(会計フロー) */
  h += band("ゲーム代(精算)");
  const np=P.length;
  const feeTotal=num(t.feeTotal)||0;
  const feeSum=P.reduce((a,p,ci)=>a+(num((t.fees||[])[ci])||0),0);
  const diff=feeSum-feeTotal;
  h += '<div class="card" style="margin-bottom:8px"><div class="row" style="gap:8px;align-items:flex-end">'+
    '<div style="flex:1"><div class="muted" style="font-size:9px;margin-bottom:2px">店からの総額</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="例:11400" value="'+esc(t.feeTotal||"")+'" data-mt="ftotal"></div>'+
    '<div style="flex:1;text-align:center"><div class="muted" style="font-size:9px">1人あたり目安</div>'+
    '<div class="mono" style="font-size:16px;font-weight:700">'+(feeTotal>0?"¥"+Math.ceil(feeTotal/np).toLocaleString("ja-JP"):"–")+'</div></div></div></div>';
  h += '<div style="overflow-x:auto;margin-bottom:6px"><table class="mjt"><thead><tr>'+
    P.map((p,i)=>'<th '+colW+'>'+esc(p||("P"+(i+1)))+'</th>').join("")+'</tr></thead><tbody><tr>'+
    P.map((p,ci)=>'<td style="padding:4px"><input class="input sm mono r" type="number" inputmode="numeric" placeholder="円" value="'+esc((t.fees||[])[ci]||"")+'" data-mt="fee" data-c="'+ci+'" style="min-width:48px"></td>').join("")+
    '</tr></tbody></table></div>';
  if(feeTotal>0 || feeSum>0){
    const okc = diff===0 ? "var(--teal)" : "var(--red)";
    h += '<div class="card" style="margin-bottom:12px"><div class="row between" style="font-size:12px"><span class="muted">入力合計</span><span class="mono">¥'+feeSum.toLocaleString("ja-JP")+'</span></div>'+
      '<div class="row between" style="font-size:12px;margin-top:3px"><span class="muted">総額</span><span class="mono">¥'+feeTotal.toLocaleString("ja-JP")+'</span></div>'+
      '<div class="row between" style="font-size:13px;margin-top:5px;border-top:1px solid var(--line);padding-top:5px"><span style="font-weight:700">過不足</span><span class="mono" style="font-weight:700;color:'+okc+'">'+(diff===0?"±0 (一致)":(diff>0?"+":"")+"¥"+diff.toLocaleString("ja-JP"))+'</span></div></div>';
  }

  /* ===== 操作(最下部に集約) ===== */
  h += band("家計簿・共有");
  h += '<div class="muted" style="font-size:11px;margin:0 2px 6px">「自分」を選ぶと成績を家計簿に反映できます</div>';
  h += '<div style="overflow-x:auto;margin-bottom:10px"><div class="row" style="gap:6px">'+
    P.map((p,i)=>'<button class="btn '+(t.meIdx===i?"sel":"")+'" style="white-space:nowrap;font-size:12px;padding:6px 12px" data-mt="setme" data-v="'+i+'">'+(t.meIdx===i?"★ ":"")+esc(p||("P"+(i+1)))+'</button>').join("")+'</div></div>';
  if(t.meIdx!=null){
    const curKey = t.meIdx+":"+mjtCalc(t,t.meIdx).net;
    const reflected = t.reflectedKey && t.reflectedKey===curKey;
    h += reflected
      ? '<button class="btn full" style="margin-bottom:10px;padding:11px 0;font-weight:700;border-color:var(--teal);color:var(--teal)" data-mt="tokakei">✓ 家計簿に反映済み(タップで再反映)</button>'
      : '<button class="btn primary full" style="margin-bottom:10px;padding:11px 0;font-weight:700" data-mt="tokakei">★ '+esc(t.players[t.meIdx]||"自分")+'の成績を家計簿に反映</button>';
  }
  h += '<button class="btn tealb full" style="margin-bottom:14px;padding:11px 0;font-weight:700" data-mt="pdf">PDFで共有 / 印刷</button>';

  /* キーパッド */
  if(UI.mjtCell){
    const cell=UI.mjtCell, isScore=cell.k==="s";
    let who=P[cell.c]||("P"+(cell.c+1)), ctx, curVal;
    if(isScore){ ctx="半荘"+(cell.r+1); curVal=t.rows[cell.r][cell.c]; }
    else if(cell.k==="cs"){ ctx="チップ開始"; curVal=(t.chipStart||[])[cell.c]; }
    else if(cell.k==="ce"){ ctx="チップ終了"; curVal=(t.chipEnd||[])[cell.c]; }
    else if(cell.k==="uma"){ who="ウマ"; ctx=({uma1:"1着",uma2:"2着",uma3:"3着",uma4:"4着"})[cell.key]; curVal=t[cell.key]; }
    let disp = curVal==="x" ? "抜番" : (curVal===""||curVal==null ? "0" : curVal);
    const dispCol = (curVal==="x") ? "var(--amber)" : (num(curVal)<0 ? "var(--red)" : num(curVal)>0 ? "var(--blue)" : "var(--text)");
    const showTobi = isScore && mjtHasTobi(t);
    let headHtml;
    if(isScore){
      headHtml = '<div style="padding:2px 2px 7px"><div class="muted" style="font-size:10px;margin-bottom:4px">半荘'+(cell.r+1)+' <span style="color:var(--amber)">← 入力中の行</span></div>'+
        '<div class="row" style="gap:4px">'+
        P.map((p,ci)=>{
          const selp = ci===cell.c;
          let d, col;
          if(mjtAbsent(t,cell.r,ci)){ d="抜"; col="var(--muted)"; }
          else { const raw=mjtRawScore(t,cell.r,ci);
            if(raw!==null){ d=String(t.rows[cell.r][ci]); col=raw<0?"var(--red)":raw>0?"var(--blue)":"var(--text)"; }
            else if(mjtAutoIdx(t,cell.r)===ci){ const s=mjtScore(t,cell.r,ci); d=String(s); col="var(--amber)"; }
            else { d="·"; col="var(--line)"; }
          }
          return '<div style="flex:1;min-width:0;text-align:center;padding:3px 2px;border-radius:6px;'+(selp?"background:rgba(242,179,61,.18);outline:1.5px solid var(--amber)":"background:var(--surface2)")+'">'+
            '<div class="ellip" style="font-size:9px;color:'+(selp?"var(--amber)":"var(--muted)")+'">'+esc(p||("P"+(ci+1)))+'</div>'+
            '<div class="mono" style="font-size:16px;font-weight:700;color:'+col+'">'+esc(d)+'</div></div>';
        }).join("")+'</div></div>';
    } else {
      headHtml = '<div class="mjt-pad-head"><span class="muted" style="font-size:12px">入力中: <b style="color:var(--text)">'+esc(who)+'</b> · '+ctx+'</span>'+
        '<span class="mono" style="font-size:20px;font-weight:700;color:'+dispCol+'">'+esc(String(disp))+'</span></div>';
    }
    h += '<div class="mjt-pad-wrap">'+headHtml+
      '<div class="mjt-pad">'+
      ["1","2","3","4","5","6","7","8","9"].map(k=>'<button class="mjt-key" data-mt="key" data-v="'+k+'">'+k+'</button>').join("")+
      '<button class="mjt-key" data-mt="key" data-v="±">±</button>'+
      '<button class="mjt-key" data-mt="key" data-v="0">0</button>'+
      '<button class="mjt-key" data-mt="key" data-v="⌫">⌫</button>'+
      (isScore
        ? '<button class="mjt-key" data-mt="key" data-v="抜" style="color:var(--muted)">抜番</button>'+
          (showTobi?'<button class="mjt-key" data-mt="key" data-v="飛" style="color:var(--amber);border-color:var(--amber)">飛び</button>':'<div></div>')+
          '<button class="mjt-key done" data-mt="keydone">完了</button>'+
          '<button class="mjt-key" data-mt="key" data-v="◀" style="color:var(--teal);font-size:20px">◀</button>'+
          '<div style="display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)">半荘内で移動</div>'+
          '<button class="mjt-key" data-mt="key" data-v="▶" style="color:var(--teal);font-size:20px">▶</button>'
        : '<button class="mjt-key done" data-mt="keydone" style="grid-column:span 3">完了</button>')+
      '</div></div>';
  }
  h += '<div style="height:40px"></div>';
  return h;
}

function bindMjTable(){
  const t = UI.mjt;
  document.querySelectorAll("[data-mt='pname']").forEach(el=>{ el.oninput=e=>{ t.players[num(el.dataset.v)]=e.target.value; saveMjt(false); }; });
  const rn=document.querySelector("[data-mt='rname']"); if(rn) rn.oninput=e=>{ t.ruleName=e.target.value; saveMjt(false); };
  const dt=document.querySelector("[data-mt='date']"); if(dt) dt.onchange=e=>{ if(e.target.value){ t.date=e.target.value; saveMjt(false); render(); } };
  document.querySelectorAll("[data-mt='rd']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); }; el.onchange=()=>{ render(); }; });
  document.querySelectorAll("[data-mt='umaabs']").forEach(el=>{ el.oninput=e=>{ const f=el.dataset.v; const neg=String(t[f]||"").startsWith("-"); t[f]=(neg?"-":"")+e.target.value.replace(/-/g,""); saveMjt(false); }; el.onchange=()=>render(); });
  const ft=document.querySelector("[data-mt='ftotal']"); if(ft) ft.oninput=e=>{ t.feeTotal=e.target.value; saveMjt(false); };
  document.querySelectorAll("[data-mt='rate']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  document.querySelectorAll("[data-mt='fee']").forEach(el=>{ el.oninput=e=>{ (t.fees=t.fees||[])[num(el.dataset.c)]=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  const ftt=document.querySelector("[data-mt='ftotal']"); if(ftt) ftt.onchange=()=>render();

  document.querySelectorAll("[data-mt]").forEach(el=>{
    const a=el.dataset.mt;
    if(["pname","rate","fee","rname","rd","ftotal","umaabs"].includes(a)) return;
    if(a==="hako"){ el.onchange=()=>{ t.hakoshita=el.checked; saveMjt(false); render(); }; return; }
    el.onclick=()=>{
      if(a==="umasign"){ const f=el.dataset.v; const cur=String(t[f]||""); t[f]=cur.startsWith("-")?cur.slice(1):"-"+cur; saveMjt(false); render(); return; }
      if(a==="savepreset"){ mjtSavePreset(); return; }
      if(a==="editpresets"){ UI.mjtEditPresets = !UI.mjtEditPresets; render(); return; }
      if(a==="applypreset"){ mjtApplyPreset(el.dataset.v); return; }
      if(a==="delpreset"){ mjtDelPreset(el.dataset.v); return; }
      if(a==="back"){ saveMjt(true); UI.screen="mjtlist"; UI.mjt=null; UI.mjtCell=null; render(); }
      else if(a==="pdf"){ mjtPrint(); }
      else if(a==="del"){ if(confirm("このスコア表を削除しますか?")){ S.mjTables=(S.mjTables||[]).filter(x=>String(x.id)!==String(t.id)); save(); UI.screen="mjtlist"; UI.mjt=null; UI.mjtCell=null; render(); } }
      else if(a==="rule"){ const nv=el.dataset.v; if(nv!==t.rule && confirm((nv==="3"?"3麻":"4麻")+"に変更しますか?\nウマ・着順計算が"+(nv==="3"?"3人":"4人")+"用に変わります(スコアのデータは消えません)。")){ t.rule=nv; const seats=num(t.rule)||3; while(t.players.length<seats){ t.players.push(String.fromCharCode(65+t.players.length)); t.rows.forEach(r=>r.push("")); t.chipStart.push(""); t.chipEnd.push(""); (t.fees=t.fees||[]).push(""); } UI.mjtCell=null; saveMjt(false); render(); } }
      else if(a==="setme"){ const i=num(el.dataset.v); t.meIdx = (t.meIdx===i?null:i); saveMjt(false); render(); }
      else if(a==="addp"){ if(t.players.length<6){ t.players.push(String.fromCharCode(65+t.players.length)); t.rows.forEach(r=>r.push("")); t.chipStart.push(""); t.chipEnd.push(""); (t.fees=t.fees||[]).push(""); UI.mjtCell=null; saveMjt(false); render(); } }
      else if(a==="pdel"){
        const i=num(el.dataset.v);
        if(t.players.length<=mjtSeats(t)){ alert(mjtSeats(t)+"人より減らせません。"); return; }
        if(confirm("「"+(t.players[i]||"")+"」を削除しますか?この列の記録も消えます。")){
          t.players.splice(i,1); t.rows.forEach(r=>r.splice(i,1)); t.chipStart.splice(i,1); t.chipEnd.splice(i,1); (t.fees||[]).splice(i,1);
          if(t.meIdx===i) t.meIdx=null; else if(t.meIdx>i) t.meIdx--;
          UI.mjtCell=null; saveMjt(false); render();
        }
      }
      else if(a==="tokakei"){ mjtToKakei(); }
      else if(a==="addrow"){ t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="rowdel"){ t.rows.splice(num(el.dataset.v),1); if(!t.rows.length) t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="cell"){ UI.mjtCell={k:"s",r:num(el.dataset.r),c:num(el.dataset.c)}; renderKeepScroll(); }
      else if(a==="cs"){ UI.mjtCell={k:"cs",c:num(el.dataset.c)}; renderKeepScroll(); }
      else if(a==="ce"){ UI.mjtCell={k:"ce",c:num(el.dataset.c)}; renderKeepScroll(); }
      else if(a==="key"){ padInput(el.dataset.v); }
      else if(a==="keydone"){ UI.mjtCell=null; saveMjt(false); renderKeepScroll(); }
    };
  });
}

  });

/* スコア表の「自分」の成績を麻雀の収支記録(→家計簿)に反映 */
function mjtToKakei(){
  const t=UI.mjt; if(t.meIdx==null){ alert("先に「自分」を選んでください。"); return; }
  const pi=t.meIdx;
  const played=(t.rows||[]).some((r,ri)=>mjtScore(t,ri,pi)!==null);
  if(!played){ alert("スコアが入力されていません。"); return; }
  const c=mjtCalc(t,pi);
  const rc=mjtRankCounts(t,pi);
  /* 同じスコア表からの過去の反映を差し替え(二重計上を防ぐ) */
  const prev=S.mjSessions.filter(s=>s.fromTable===t.id);
  prev.forEach(ps=>{ S.entries=S.entries.filter(e=>e.id!=="mj-"+ps.id); });
  const wasReflected=prev.length>0;
  S.mjSessions=S.mjSessions.filter(s=>s.fromTable!==t.id);
  const sess={ id:uid(), date:t.date, category:"set", rule:t.rule,
    store:(t.ruleName||"").trim(),
    score:String(c.sum), scoreRate:String(num(t.scoreRate)||0),
    chips:String(c.chipNet), chipRate:String(num(t.chipRate)||0),
    setFee:String(num((t.fees||[])[pi])||0),
    ranks:[String(rc[0]),String(rc[1]),String(rc[2]),String(rc[3])].slice(0,mjtSeats(t)),
    players:(t.players||[]).map((p,i)=> i===pi ? "" : (p||"").trim()).filter(Boolean).slice(0,5),
    fromTable:t.id };
  S.mjSessions.push(sess);
  const fin=mjFinal(sess);
  const linkId="mj-"+sess.id;
  if(fin!==0){
    S.entries.push({id:linkId, date:sess.date, src:"mahjong",
      type: fin>0?"income":"expense", category:"遊技", amount:Math.abs(fin),
      memo:"麻雀(セット・"+sess.rule+"麻)"+(sess.store?" @"+sess.store:"")});
  }
  t.reflectedKey = pi+":"+c.net;   /* 反映済みキー: スコア/チップ/レート編集で自動的に未反映へ戻る */
  save();
  render();
  alert((wasReflected?"家計簿の記録を更新しました: ":"家計簿に反映しました: ")+signYen(fin)+"\n(麻雀タブ・家計簿に記録されました)");
}
function padInput(k){
  const t=UI.mjt, c=UI.mjtCell; if(!c) return;
  const get=()=>{ if(c.k==="s") return String(t.rows[c.r][c.c]||""); if(c.k==="cs") return String((t.chipStart[c.c]||"")); if(c.k==="ce") return String((t.chipEnd[c.c]||"")); if(c.k==="uma") return String(t[c.key]||""); return ""; };
  const set=(v)=>{ if(c.k==="s") t.rows[c.r][c.c]=v; else if(c.k==="cs") t.chipStart[c.c]=v; else if(c.k==="ce") t.chipEnd[c.c]=v; else if(c.k==="uma") t[c.key]=v; };
  if(k==="◀"||k==="▶"){ if(c.k==="s"){ const np=t.players.length; let nc=c.c+(k==="▶"?1:-1); nc=(nc+np)%np; UI.mjtCell={k:"s",r:c.r,c:nc}; renderKeepScroll(); } return; }
  if(k==="抜"){ if(c.k==="s"){ set(t.rows[c.r][c.c]==="x"?"":"x"); saveMjt(false); renderKeepScroll(); } return; }
  if(k==="飛"){ if(c.k==="s"){ set(String(mjtTobiScore(t))); saveMjt(false); renderKeepScroll(); } return; }
  let cur=get(); if(cur==="x") cur="";
  if(k==="⌫") cur=cur.slice(0,-1);
  else if(k==="±"){ cur = cur.startsWith("-") ? cur.slice(1) : ("-"+cur); }
  else cur = (cur==="0"?k : cur+k);
  if(cur==="-0") cur="-";
  set(cur);
  saveMjt(false); renderKeepScroll();
}
function mjtSavePreset(){
  const t=UI.mjt; const nm=(t.ruleName||"").trim();
  if(!nm){ alert("先にルール名を入力してください。"); return; }
  const p={ id:uid(), name:nm, rule:t.rule, mochi:t.mochi, kaeshi:t.kaeshi, uma1:t.uma1, uma2:t.uma2, uma3:t.uma3, uma4:t.uma4, hakoshita:t.hakoshita, scoreRate:t.scoreRate, chipRate:t.chipRate };
  const i=(S.mjPresets||[]).findIndex(x=>x.name===nm);
  if(i>=0){ p.id=S.mjPresets[i].id; S.mjPresets[i]=p; alert("「"+nm+"」を上書き保存しました。"); }
  else { (S.mjPresets=S.mjPresets||[]).push(p); alert("「"+nm+"」を保存しました。"); }
  save(); render();
}
function mjtApplyPreset(id){
  const p=(S.mjPresets||[]).find(x=>String(x.id)===String(id)); if(!p) return;
  const t=UI.mjt;
  t.ruleName=p.name; t.rule=p.rule||"3"; t.mochi=p.mochi||""; t.kaeshi=p.kaeshi||"";
  t.uma1=p.uma1||""; t.uma2=p.uma2||""; t.uma3=p.uma3||""; t.uma4=p.uma4||"";

/* ---------- 軍資金(バンクロール口座) ---------- */
function bankGameNet(){
  const sw=(S.bank&&S.bank.switch)||"9999-99-99";
  return (S.entries||[]).filter(e=>(e.src==="slot"||e.src==="mahjong") && e.date>=sw)
    .reduce((a,e)=> a + (e.type==="income"?e.amount:-e.amount), 0);
}
function bankSaved(){ return ((S.bank&&S.bank.txns)||[]).filter(t=>t.type==="sweep").reduce((a,t)=>a+num(t.amount),0); }
function bankBalance(){
  const b=S.bank||{}, tx=b.txns||[];
  const topup=tx.filter(t=>t.type==="topup").reduce((a,t)=>a+num(t.amount),0);
  const sweep=tx.filter(t=>t.type==="sweep").reduce((a,t)=>a+num(t.amount),0);
  const adj=tx.filter(t=>t.type==="adjust").reduce((a,t)=>a+num(t.amount),0);
  return num(b.seed)+bankGameNet()+topup-sweep+adj;
}

function savingsBalance(){
  const tx=(S.savings&&S.savings.txns)||[];
  const dep=tx.filter(t=>t.type==="deposit").reduce((a,t)=>a+num(t.amount),0);
  const wd=tx.filter(t=>t.type==="withdraw").reduce((a,t)=>a+num(t.amount),0);
  const adj=tx.filter(t=>t.type==="adjust").reduce((a,t)=>a+num(t.amount),0);
  return bankSaved()+dep-wd+adj;
}

/* ---------- ほしい物リスト(承認フロー) ---------- */
function wishDaysLeft(w){
  if(!w.cooldownStart || !num(w.cooldownDays)) return 0;
  const start=new Date(w.cooldownStart+"T00:00:00").getTime();
  const end=start + num(w.cooldownDays)*86400000;
  return Math.ceil((end - Date.now())/86400000);
}
function wishEff(w){
  if((w.status||"consult")==="cooldown" && wishDaysLeft(w)<=0) return "ready";
  return w.status||"consult";
}

function bindWishlist(){
  document.querySelectorAll("[data-wn]").forEach(el=>{ el.oninput=e=>{ (UI.wishNew=UI.wishNew||{})[el.dataset.wn]=e.target.value; }; });
  document.querySelectorAll("[data-wd]").forEach(el=>{ el.onchange=e=>{ const w=(S.wishlist||[]).find(x=>String(x.id)===String(el.dataset.wd)); if(w){ w.cooldownDays=e.target.value; saveLocal(); } }; });
  document.querySelectorAll("[data-wa]").forEach(el=>{

      if(a==="back"){ UI.screen="main"; render(); return; }
      if(a==="pdf"){ wishPrint(); return; }

        const nw=UI.wishNew||{};

      else if(a==="approve"){ w.status="approved"; save(); render(); }
      else if(a==="reject"){ const r=prompt("却下理由(任意):",""); if(r===null) return; w.status="rejected"; w.rejectReason=(r||"").trim(); save(); render(); }

function bindFixed(){
  const f = UI.fixForm;
  if(f){
    const fs=document.getElementById("fx-store"); if(fs) fs.oninput=e=>f.store=e.target.value;
    const fi=document.getElementById("fx-item"); if(fi) fi.oninput=e=>f.item=e.target.value;
    const d=document.getElementById("fx-day"); if(d) d.oninput=e=>f.day=e.target.value;
    const st=document.getElementById("fx-start"); if(st) st.onchange=e=>f.start=e.target.value;
    const a=document.getElementById("fx-amount"); if(a) a.oninput=e=>f.amount=e.target.value;
  }
  document.querySelectorAll("[data-fa]").forEach(el=>{
    el.onclick=()=>{
      const a=el.dataset.fa, v=el.dataset.v;
      if(a==="fback"){ UI.screen="main"; UI.tab="ledger"; UI.fixForm=null; render(); }
      else if(a==="new"){ UI.fixForm={type:"expense",name:"",store:"",item:"",category:"消費",freq:"monthly",day:"",start:todayStr(),amount:""}; render(); }
      else if(a==="fcancel"){ UI.fixForm=null; render(); }
      else if(a==="ftype"){ f.type=v; f.category=v==="expense"?"消費":"給与"; render(); }
      else if(a==="fcat"){ f.category=v; render(); }
      else if(a==="ffreq"){ f.freq=v; if((v==="weekly"||v==="biweekly")&&!f.start) f.start=todayStr(); render(); }
      else if(a==="fshift"){ f.holidayShift=v; render(); }
      else if(a==="edit"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t){ UI.fixForm={editId:t.id, type:t.type, name:t.name, store:t.store||"", item:(t.item!=null?t.item:(t.name||"")), category:t.category, freq:t.freq||"monthly", day:t.day?String(t.day):"", start:t.start||todayStr(), amount:String(t.amount), holidayShift:t.holidayShift||"none"}; render(); }
      }
      else if(a==="stop"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("「"+t.name+"」の定期を停止しますか?\n未来の予定分は削除され、過去の記録は残ります。")){
          stopFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdelete"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("「"+t.name+"」を完全に削除しますか?\n過去の実績も含めて、この固定費の記録が全て消えます。")){
          deleteFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fsave"){
        const store=(f.store||"").trim(), item=(f.item||"").trim();
        const name=[store,item].filter(Boolean).join(" ");
        if(!name){ alert("店名または品目を入力してください。"); return; }
        if(num(f.amount)<=0){ alert("金額を入力してください。"); return; }
        const freq = f.freq || "monthly";
        const isW = (freq==="weekly"||freq==="biweekly");
        if(isW && !f.start){ alert("起点日を選んでください。"); return; }
        let day = num(f.day); if(day<1) day=1; if(day>31) day=31;
        const base={name, store, item, type:f.type, category:f.category, freq,
          day:isW?"":String(day), start:isW?f.start:"", amount:String(num(f.amount)),
          holidayShift: isW ? "none" : (f.holidayShift||"none")};
        if(f.editId){
          updateFixed(Object.assign({id:f.editId}, base));
        }else{
          const tpl=Object.assign({id:uid()}, base);
          (S.fixed=S.fixed||[]).push(tpl);
          genFixedEntries(tpl);
          save();
        }
        UI.fixForm=null; render();
      }
    };
  });
}

    '<input class="input" id="mj-store" placeholder="ルール名(例:4麻赤有)" value="'+esc(m.store)+'" style="flex:1.4"></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    [["free","フリー"],["set","セット"]].map(([v,l])=>
      '<button class="btn '+(m.category===v?"sel":"")+'" style="flex:1" data-a="mjcat" data-v="'+v+'">'+l+'</button>').join("")+'</div>';
  h += '<div class="row" style="gap:8px;margin-bottom:12px">'+
    [["4","4麻"],["3","3麻"]].map(([v,l])=>
      '<button class="btn '+(m.rule===v?"sel":"")+'" style="flex:1" data-a="mjrule" data-v="'+v+'">'+l+'</button>').join("")+'</div>';

  h += band("スコア・チップ");
  h += mjSignedRow("トータルスコア", m.score, "score", "1スコア単価(円)", m.scoreRate, "scoreRate", true);
  h += mjSignedRow("トータルチップ"+(isFree?"(任意)":""), m.chips, "chips", "チップ1枚単価(円)", m.chipRate, "chipRate", false);

  h += band("着順(回数)");
  h += '<div class="row" style="gap:6px;margin-bottom:6px">';
  for(let i=0;i<rc;i++){
    h += '<div style="flex:1;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center">'+
      '<div class="muted" style="font-size:10px;font-weight:700;margin-bottom:4px">'+(i+1)+'着</div>'+
      '<input class="input sm mono" type="number" inputmode="numeric" value="'+esc((m.ranks||[])[i]||"")+'" style="text-align:center;padding:6px 2px" data-in="mjrank" data-v="'+i+'">'+
      '<div class="row" style="gap:4px;margin-top:5px">'+
      '<button class="btn" style="flex:1;padding:4px 0;font-size:14px" data-a="rankdn" data-v="'+i+'">−</button>'+
      '<button class="btn" style="flex:1;padding:4px 0;font-size:14px" data-a="rankup" data-v="'+i+'">＋</button></div></div>';
  }
  h += '</div>';
  h += '<div class="muted mono" style="font-size:11px;text-align:right" id="mj-hanchan">半荘数 '+mjHanchan(m)+(mjAvgRank(m)!==null?' / 平均着順 '+mjAvgRank(m).toFixed(2):'')+'</div>';

  h += band("同卓者(自分以外・任意)");
  h += '<div class="muted" style="font-size:10px;margin:0 2px 8px;line-height:1.6">最大5名。スコア表から反映した記録は自動で入ります。カードに表示されます。</div>';
  (m.players||[]).forEach((p,i)=>{
    h += '<div class="row" style="gap:8px;margin-bottom:6px;align-items:center">'+
      '<input class="input" placeholder="プレイヤー名" value="'+esc(p||"")+'" data-in="mjp" data-v="'+i+'" style="flex:1">'+
      '<button class="btn" style="padding:9px 13px;color:var(--red);border-color:var(--red);flex-shrink:0" data-a="mjpdel" data-v="'+i+'">×</button></div>';
  });
  if((m.players||[]).length<5) h += '<button class="btn dash full" style="padding:10px 0;margin-bottom:6px" data-a="mjpadd">＋ 同卓者を追加</button>';

  if(isFree){
    h += band("ゲーム代(フリー・自動計算)");
    h += '<div class="grid2" style="margin-bottom:6px">'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">基本ゲーム代(1半荘)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.baseFee)+'" data-in="mjf" data-v="baseFee"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">トップ賞(1着毎)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.topBonus)+'" data-in="mjf" data-v="topBonus"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ドリンク/入場(1回)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.drinkFee)+'" data-in="mjf" data-v="drinkFee"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ゲーム代(自動)</div>'+
      '<div class="input sm mono r" id="mj-feeauto" style="border-style:dashed">'+"¥"+mjGameFee(m).toLocaleString("ja-JP")+'</div></div></div>';
    h += '<div class="muted mono" style="font-size:10px" id="mj-feeformula">'+mjFeeFormula(m)+'</div>';
  } else {
    h += band("ゲーム代(セット・手入力)");
    h += '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ゲーム代 合計(場代・トップ賞・奢り込み)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="まとめて入力" value="'+esc(m.setFee)+'" data-in="mjf" data-v="setFee"></div>';
  }

  h += band("この日の結果");
  h += '<div class="card" id="mj-summary">'+mjSummary(m)+'</div>';
  h += '<input class="input" placeholder="メモ(任意)" value="'+esc(m.memo||"")+'" style="margin:14px 0" data-in="mjf" data-v="memo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.mjIsNew?'<button class="btn danger" data-a="mjdel">削除</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="mjsave">保存する</button></div>';
  return h;
}

function mjSignedRow(label, val, field, rateLabel, rateVal, rateField, rateDecimal){
  const neg = String(val||"").startsWith("-");
  return '<div style="margin-bottom:8px">'+
    '<div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+
    '<div class="row" style="gap:6px;align-items:center">'+
    '<button class="signbtn" style="width:34px;height:34px;border:1.5px solid '+(neg?"var(--red)":"var(--teal)")+';color:'+(neg?"var(--red)":"var(--teal)")+
    ';background:'+(neg?"rgba(229,115,115,.1)":"rgba(45,212,191,.1)")+'" data-a="mjsign" data-v="'+field+'">'+(neg?"−":"＋")+'</button>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="0" value="'+esc(String(val||"").replace("-",""))+'" style="flex:1.3;min-width:0" data-in="mjabs" data-v="'+field+'">'+
    '<span class="muted" style="font-size:10px;flex-shrink:0">'+rateLabel+'</span>'+
    '<input class="input sm mono r" type="number" inputmode="'+(rateDecimal?"decimal":"numeric")+'"'+(rateDecimal?' step="0.1"':'')+' value="'+esc(rateVal)+'" style="flex:1;min-width:0" data-in="mjf" data-v="'+rateField+'"></div></div>';
}
function mjFeeFormula(m){
  if(m.category!=="free" || !mjHanchan(m)) return "";
  const h=mjHanchan(m), t=num((m.ranks||[])[0]);
  const parts=[];
  if(num(m.baseFee)) parts.push("基本"+num(m.baseFee)+"×"+h);
  if(num(m.topBonus)&&t) parts.push("トップ賞"+num(m.topBonus)+"×"+t);
  if(num(m.drinkFee)) parts.push("ドリンク"+num(m.drinkFee));
  return parts.length ? parts.join(" + ")+" = ¥"+mjGameFee(m).toLocaleString("ja-JP") : "";
}
function mjSummary(m){
  const srow=(l,v,big)=>'<div class="row between" style="'+(big?"align-items:baseline":"font-size:13px;margin:4px 0")+'">'+
    '<span '+(big?'style="font-size:12px;font-weight:700"':'class="muted"')+'>'+l+'</span>'+
    '<span class="mono '+clsPM(v)+'" style="'+(big?"font-size:20px;font-weight:700":"")+'">'+signYen(v)+'</span></div>';
  let h = srow("スコア収支", mjScoreYen(m));
  if(num(m.chips)||fnum(m.chipRate)) h += srow("チップ収支", mjChipYen(m));
  h += '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">麻雀のみ収支(ゲーム代抜)</span>'+
    '<span class="mono '+clsPM(mjRaw(m))+'" style="font-weight:700">'+signYen(mjRaw(m))+'</span></div>';
  h += srow("ゲーム代", -mjGameFee(m));
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>';
  h += srow("最終収支(家計簿へ連携)", mjFinal(m), true);
  return h;
}

function bindMj(){
  const m = UI.mjDraft;
  document.getElementById("mj-date").oninput = e=>m.date=e.target.value;
  document.getElementById("mj-store").oninput = e=>m.store=e.target.value;
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind=el.dataset.in, v=el.dataset.v;
    el.oninput = ()=>{
      if(kind==="mjf"){ m[v]=el.value; refreshMj(); }
      else if(kind==="mjabs"){
        const neg = String(m[v]||"").startsWith("-");
        m[v] = (neg?"-":"") + el.value.replace(/-/g,"");
        refreshMj();
      }
      else if(kind==="mjrank"){ (m.ranks=m.ranks||["","","",""])[num(v)]=el.value; refreshMj(); }
      else if(kind==="mjp"){ (m.players=m.players||[])[num(v)]=el.value; }
    };
  });
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mjDraft=null; render(); }
      else if(a==="mjcat"){ m.category=v; render(); }
      else if(a==="mjrule"){ m.rule=v; render(); }
      else if(a==="mjsign"){
        const cur=String(m[v]||"");
        m[v] = cur.startsWith("-") ? cur.slice(1) : "-"+cur;
        render();
      }
      else if(a==="rankup"||a==="rankdn"){
        const i=num(v); m.ranks=m.ranks||["","","",""];
        let cur=num(m.ranks[i]); cur += (a==="rankup"?1:-1); if(cur<0) cur=0;
        m.ranks[i]=String(cur); render();
      }
      else if(a==="mjpadd"){ (m.players=m.players||[]).push(""); render(); }
      else if(a==="mjpdel"){ (m.players=m.players||[]).splice(num(v),1); render(); }
      else if(a==="mjdel"){
        if(!confirm("この麻雀記録を削除しますか?")) return;
        S.entries = S.entries.filter(e=>e.id!=="mj-"+m.id);
        S.mjSessions = (S.mjSessions||[]).filter(x=>x.id!==m.id);
        save(); UI.screen="main"; UI.mjDraft=null; render();
      }
      else if(a==="mjsave") saveMj();
    };
  });
}

function refreshMj(){
  const m = UI.mjDraft;
  const su=document.getElementById("mj-summary"); if(su) su.innerHTML=mjSummary(m);
  const hn=document.getElementById("mj-hanchan"); if(hn) hn.textContent="半荘数 "+mjHanchan(m)+(mjAvgRank(m)!==null?" / 平均着順 "+mjAvgRank(m).toFixed(2):"");
  const ff=document.getElementById("mj-feeformula"); if(ff) ff.textContent=mjFeeFormula(m);
  const fa=document.getElementById("mj-feeauto"); if(fa) fa.textContent="¥"+mjGameFee(m).toLocaleString("ja-JP");
}

function saveMj(){
  const m = UI.mjDraft;
  if(!m.date) return;
  const cleaned = Object.assign({}, m);
  const rc = mjRankCount(cleaned);
  cleaned.ranks = (cleaned.ranks||["","","",""]).slice(0,4).map((x,i)=> i<rc ? x : "");
  cleaned.players = (cleaned.players||[]).map(p=>(p||"").trim()).filter(Boolean).slice(0,5);
  if(UI.mjIsNew) S.mjSessions.push(cleaned);
  else S.mjSessions = S.mjSessions.map(x=>x.id===m.id?cleaned:x);
  if(fnum(cleaned.scoreRate)) S.rates.mjScore = cleaned.scoreRate;
  if(fnum(cleaned.chipRate)) S.rates.mjChip = cleaned.chipRate;
  if(num(cleaned.baseFee)) S.rates.mjBase = cleaned.baseFee;
  if(num(cleaned.topBonus)) S.rates.mjTop = cleaned.topBonus;
  if(num(cleaned.drinkFee)) S.rates.mjDrink = cleaned.drinkFee;
  const linkId = "mj-"+m.id;
  const fin = mjFinal(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"mahjong",
      type: fin>0?"income":"expense",
      category: "遊技",
      amount: Math.abs(fin),
      memo: "麻雀"+(cleaned.category==="free"?"(フリー":"(セット")+"・"+cleaned.rule+"麻)"+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.mjDraft=null; render();
}

function bindMain(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a = el.dataset.a, v = el.dataset.v;
      if(a==="tab"){ UI.tab=v; render(); }
      else if(a==="gamesub"){ UI.gameSub=v; render(); }
      else if(a==="mprev") moveMonth(-1);
      else if(a==="mnext") moveMonth(1);
      else if(a==="csv") exportCsv();
      else if(a==="fixed"){ UI.screen="fixed"; UI.fixForm=null; render(); }
      else if(a==="wishlist"){ UI.screen="wishlist"; render(); }
      else if(a==="bank"){ UI.screen="bank"; render(); }
      else if(a==="savings"){ UI.screen="savings"; render(); }
      else if(a==="setbudget"){ const cat=v; const p=prompt(cat+"の月間予算(上限・円):", ((S.budgets||{})[cat])||""); if(p===null)return; (S.budgets=S.budgets||{})[cat]=String(num(p)); save(); render(); }
      else if(a==="mjtnew"){ UI.mjt=newMjTable(); UI.mjtCell=null; saveMjt(false); UI.screen="mjtable"; render(); }
      else if(a==="opentool"){ if(el.dataset.v==="bordertool"){ UI.screen="bordertool"; render(); } }
      else if(a==="mjtopen"){ const t=(S.mjTables||[]).find(x=>String(x.id)===String(v)); if(t){ UI.mjt=t; UI.mjtCell=null; UI.screen="mjtable"; render(); } }
      else if(a==="mdb"){ UI.screen="mdb"; UI.mdbForm=null; render(); }
      else if(a==="stores"){ UI.screen="stores"; UI.storeForm=null; render(); }
      else if(a==="mjtlist"){ UI.screen="mjtlist"; render(); }
      else if(a==="syncnow"){ checkForUpdate(true); if(sb && sbSession) cloudSync(); }
      else if(a==="backup"){ UI.screen="backup"; UI.msg=""; render(); }
      else if(a==="add"){
        if(UI.tab==="ledger"){ UI.editEntryId=null;
          UI.entryForm={date:todayStr(),type:"expense",category:"消費",amount:"",store:"",item:"",memo:""};
          UI.screen="entry"; render();
        } else if(UI.tab==="games" && (UI.gameSub||"slot")==="mahjong"){
          UI.mjDraft={id:uid(),date:todayStr(),store:"",category:"free",rule:"4",
            score:S.rates.mjScore!==undefined?"":"", chips:"",
            scoreRate:S.rates.mjScore||"", chipRate:S.rates.mjChip||"",
            ranks:["","","",""], players:[], baseFee:S.rates.mjBase||"", topBonus:S.rates.mjTop||"", drinkFee:S.rates.mjDrink||"",
            setFee:"", memo:""};
          UI.mjIsNew=true; UI.screen="mahjong-edit"; render();
        } else {
          UI.draft={id:uid(),date:todayStr(),store:"",mode:"nori",partnerName:"",fee:"",
            exchange:S.rates.exchange||"",pExchange:S.rates.pExchange||"",pushPayout:S.rates.pushPayout||"",pushDraw:S.rates.pushDraw||"",machines:[],expenses:[],memo:""};
          UI.whoTab="me";
          UI.isNewSess=true; UI.screen="session"; render();
        }
      }
      else if(a==="mjedit"){
        const s = (S.mjSessions||[]).find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.screen="mahjong-edit"; render();
      }
      else if(a==="eedit"){
        const e = S.entries.find(x=>String(x.id)===String(v));
        if(!e) return;
        if(e.src==="slot"){
          const s = S.sessions.find(x=>"slot-"+x.id===e.id);
          if(s){ UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.tab="games"; UI.gameSub="slot"; UI.screen="session"; render(); return; }
        }
        if(e.src==="mahjong"){
          const s = (S.mjSessions||[]).find(x=>"mj-"+x.id===e.id);
          if(s){ UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.tab="games"; UI.gameSub="mahjong"; UI.screen="mahjong-edit"; render(); return; }
        }
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),store:e.store||"",item:(e.item!=null?e.item:(e.memo||"")),memo:e.memo||""};
        UI.screen="entry"; render();
      }
      else if(a==="sedit"){
        const s = S.sessions.find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.screen="session"; render();
      }
    };
  });
}

function exportCsv(){
  const NET_SRCS = ["slot","mahjong"];
  const divLabel = e => NET_SRCS.includes(e.src) ? "遊技" : (e.type==="income"?"収入":"支出");
  const rows = [["日付","区分","カテゴリ","金額","メモ"]];
  S.entries.slice().sort((a,b)=>a.date>b.date?1:-1).forEach(e=>{
    const signed = e.type==="income" ? e.amount : -e.amount;
    rows.push([e.date, divLabel(e), e.category, signed, (e.memo||"").replace(/,/g,"、")]);
  });
  dl("\uFEFF"+rows.map(r=>r.join(",")).join("\n"), "kakeibo.csv", "text/csv");
}
function dl(content, name, type){
  const blob = new Blob([content],{type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
</script>
<script>
/* ============================================================
   家計簿 入力画面
   ============================================================ */
function entryStoreHints(){
  const m={};
  (S.entries||[]).forEach(e=>{ const s=(e.store||"").trim(); if(s) m[s]=(m[s]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function entryItemHints(){
  const m={};
  (S.entries||[]).forEach(e=>{ const v=(e.item!=null?String(e.item):String(e.memo||"")).trim(); if(v) m[v]=(m[v]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function entryUsualChips(type){
  const map={};
  (S.entries||[]).filter(e=>e.type===type && e.src!=="slot" && e.src!=="mahjong" && e.src!=="fixed").forEach(e=>{
    const store=(e.store||"").trim();
    const item=(e.item!=null?String(e.item):String(e.memo||"")).trim();
    const label=[store,item].filter(Boolean).join(" "); if(!label) return;
    const k=store+"\u0001"+item;
    if(!map[k]) map[k]={store,item,label,count:0,cats:{}};
    map[k].count++; map[k].cats[e.category]=(map[k].cats[e.category]||0)+1;
  });
  return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,6).map(o=>({
    store:o.store,item:o.item,label:o.label,
    cat:Object.entries(o.cats).sort((a,b)=>b[1]-a[1])[0][0]
  }));
}
function entryDetailHtml(e){
  const st=(e.store!=null?String(e.store):"").trim();
  const it=(e.item!=null?String(e.item):"").trim();
  if(st && it)
    return '<div class="muted ellip" style="font-size:11px">'+esc(it)+'</div>'+
           '<div class="ellip" style="font-size:11px;color:var(--muted);opacity:.7;margin-top:1px">'+esc(st)+'</div>';
  if(it) return '<div class="muted ellip" style="font-size:11px">'+esc(it)+'</div>';
  if(st) return '<div class="muted ellip" style="font-size:11px">'+esc(st)+'</div>';
  if(e.memo) return '<div class="muted ellip" style="font-size:11px">'+esc(e.memo)+'</div>';
  return '';
}
function viewEntry(){
  const f = UI.entryForm;
  const chips = entryUsualChips(f.type); UI._usualChips = chips;
  const sh = entryStoreHints(), ih = entryItemHints();
  const chipsHtml = chips.length
    ? '<div class="muted" style="font-size:11px;margin:0 2px 6px">よく使う</div>'+
      '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
      chips.map((c,i)=>'<button class="chip" data-a="usual" data-i="'+i+'">'+esc(c.label)+'</button>').join("")+'</div>'
    : '';
  const fieldsHtml = '<input class="input" id="e-store" list="e-storelist" placeholder="店名(任意)" value="'+esc(f.store||"")+'" autocomplete="off" style="margin-bottom:8px">'+
    '<datalist id="e-storelist">'+sh.map(v=>'<option value="'+esc(v)+'"></option>').join("")+'</datalist>'+
    '<input class="input" id="e-item" list="e-itemlist" placeholder="品目(任意)" value="'+esc(f.item||"")+'" autocomplete="off" style="margin-bottom:14px">'+
    '<datalist id="e-itemlist">'+ih.map(v=>'<option value="'+esc(v)+'"></option>').join("")+'</datalist>';
  return '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">'+(UI.editEntryId!==null?"記録を編集":"記録を追加")+'</div><div style="width:44px"></div></div>'+
    '<div class="row" style="gap:8px;margin-bottom:12px">'+
    [["expense","支出"],["income","収入"]].map(([v,l])=>
      '<button class="btn '+(f.type===v?"sel":"")+'" style="flex:1" data-a="etype" data-v="'+v+'">'+l+'</button>').join("")+'</div>'+
    '<div class="row" style="gap:8px;margin-bottom:12px">'+
    '<input class="input" type="date" id="e-date" value="'+esc(f.date)+'" style="flex:1">'+
    '<input class="input mono r" type="number" inputmode="numeric" id="e-amount" placeholder="金額" value="'+esc(f.amount)+'" style="flex:1"></div>'+
    (f.type==="expense"
      ? '<div class="muted" style="font-size:11px;margin:0 2px 6px">支出の分類</div>'+
        '<div class="row" style="gap:8px;margin-bottom:12px">'+
        EXPENSE_CATS.map(c=>'<button class="btn '+(f.category===c?"sel":"")+'" style="flex:1;padding:12px 2px;font-size:13px" data-a="ecat" data-v="'+esc(c)+'">'+esc(c)+'</button>').join("")+'</div>'
      : '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
        INCOME_CATS.map(c=>'<button class="chip '+(f.category===c?"sel":"")+'" data-a="ecat" data-v="'+esc(c)+'">'+esc(c)+'</button>').join("")+'</div>')+
    chipsHtml + fieldsHtml +
    '<div class="row" style="gap:8px">'+
    (UI.editEntryId!==null?'<button class="btn danger" data-a="edel">削除</button>':'')+
    '<button class="btn primary" style="flex:1" data-a="esave">'+(UI.editEntryId!==null?"更新する":"追加する")+'</button></div>';
}
function bindEntry(){
  const f = UI.entryForm;
  document.getElementById("e-date").oninput = e=>f.date=e.target.value;
  document.getElementById("e-amount").oninput = e=>f.amount=e.target.value;
  const es=document.getElementById("e-store"); if(es) es.oninput = e=>f.store=e.target.value;
  const ei=document.getElementById("e-item"); if(ei) ei.oninput = e=>f.item=e.target.value;
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; render(); }
      else if(a==="etype"){ f.type=v; f.category = v==="expense"?"消費":"給与"; render(); }
      else if(a==="ecat"){ f.category=v; render(); }
      else if(a==="usual"){ const c=(UI._usualChips||[])[num(el.dataset.i)]; if(c){ f.store=c.store; f.item=c.item; f.category=c.cat; render(); const amt=document.getElementById("e-amount"); if(amt) amt.focus(); } }
      else if(a==="edel"){
        const ent = S.entries.find(x=>x.id===UI.editEntryId);
        const isFixed = ent && ent.fixedId;
        if(!confirm(isFixed ? "この定期記録の今回分をスキップします。\n(定期設定は残り、来月以降は自動で計上されます)\nよろしいですか?" : "この記録を削除しますか?")) return;
        if(isFixed){
          const tpl = (S.fixed||[]).find(t=>String(t.id)===String(ent.fixedId));
          if(tpl){ tpl.skips = tpl.skips || []; if(!tpl.skips.includes(ent.date)) tpl.skips.push(ent.date); }
        }
        S.entries = S.entries.filter(x=>x.id!==UI.editEntryId);
        save(); UI.screen="main"; render();
      }
      else if(a==="esave"){
        const amt = num(f.amount);
        if(!f.date || amt<=0) return;
        const store=(f.store||"").trim(), item=(f.item||"").trim();
        const memo=[store,item].filter(Boolean).join(" ");
        if(UI.editEntryId!==null){
          S.entries = S.entries.map(x=>x.id===UI.editEntryId ?
            Object.assign({},x,{date:f.date,type:f.type,category:f.category,amount:amt,store,item,memo}) : x);
        } else {
          S.entries.push({id:uid(),date:f.date,type:f.type,category:f.category,amount:amt,store,item,memo});
        }
        save(); UI.screen="main"; render();
      }
    };
  });
}
</script>
<script>
/* ============================================================
   セッション編集画面
   ============================================================ */
function nameHints(){
  const seen=[];
  S.sessions.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(s=>{
    const n=(s.partnerName||"").trim();
    if(n && !seen.includes(n)) seen.push(n);
  });
  return seen.slice(0,5);
}

function viewSession(){
  const s = UI.draft;
  let h = '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">'+(UI.isNewSess?"稼働を記録":"稼働を編集")+'</div><div style="width:44px"></div></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    '<input class="input" type="date" id="s-date" value="'+esc(s.date)+'" style="flex:1">'+
    '<input class="input" id="s-store" placeholder="店名" value="'+esc(s.store)+'" style="flex:1.4"></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    [["nori","乗打"],["dai","代打"],["solo","単独"]].map(([v,l])=>
      '<button class="btn '+(s.mode===v?"sel":"")+'" style="flex:1" data-a="mode" data-v="'+v+'">'+l+'</button>').join("")+'</div>';

  if(s.mode!=="solo"){
    const hints = nameHints().filter(n=>n!==(s.partnerName||"").trim());
    h += '<div style="margin-bottom:12px"><input class="input" id="s-pname" placeholder="'+
      (s.mode==="nori"?"相方の名前":"依頼主の名前")+'" value="'+esc(s.partnerName||"")+'">'+
      (hints.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-top:6px">'+
        hints.map(n=>'<button class="chip" data-a="pname" data-v="'+esc(n)+'">'+esc(n)+'</button>').join("")+'</div>':'')+'</div>';
  }

  /* ----- 交換設定(セッション共通) ----- */
  h += band("交換設定");
  if((S.stores||[]).length) h += '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
    (S.stores||[]).map(st=>'<button class="chip" data-a="applystore" data-v="'+st.id+'">'+esc(st.name)+'</button>').join("")+'</div>';
  h += '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">スロット</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 50" value="'+esc(s.exchange||"")+'" style="flex:1" data-in="exchange">'+
    '<span class="muted" style="font-size:12px">枚=1000円</span></div>'+
    '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">パチンコ</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 250" value="'+esc(s.pExchange||"")+'" style="flex:1" data-in="pexchange">'+
    '<span class="muted" style="font-size:12px">玉=1000円</span></div>'+
    '<div class="muted" style="font-size:10px">使う方だけ入力。前回値を記憶します。貯玉プッシュのレートは「ツール」タブのボーダー試算で設定します。</div>';

  /* ----- 代打ち: 報酬 ----- */
  if(s.mode==="dai"){
    h += band("報酬(家計簿に反映)");
    h += '<div><div class="muted" style="font-size:11px;margin:0 2px 4px">受取報酬(円)</div>'+
      '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 15000" value="'+esc(s.fee)+'" data-in="fee"></div>';
  }

  /* ----- 台データ(貯玉方式) ----- */
  if(s.mode==="nori"){
    /* 乗り打ち: 自分/相方タブ */
    const who = UI.whoTab || "me";
    const pn = (s.partnerName||"").trim()||"相方";
    h += band("打った台");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      [["me","自分"],["partner",pn]].map(([v,l])=>
        '<button class="btn '+(who===v?"sel":"")+'" style="flex:1" data-a="whotab" data-v="'+v+'">'+esc(l)+
        ' <span class="mono" style="font-size:11px">'+signYen(personSlotYen(s,v))+'</span></button>').join("")+'</div>';
    slotMachines(s, who).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi" && (m.who||"me")===who).forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="slot|'+who+'">＋ スロット台</button>'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="pachi|'+who+'">＋ パチンコ台</button></div>';
  } else {
    h += band(s.mode==="dai" ? "打った台(客の玉・報告用)" : "打った台");
    slotMachines(s).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi").forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="slot">＋ スロット台</button>'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="pachi">＋ パチンコ台</button></div>';
  }

  /* ----- 経費 ----- */
  h += band("経費(飲食など)");
  (s.expenses||[]).forEach(x=>{
    h += '<div class="row" style="gap:6px;margin-bottom:6px">'+
      '<input class="input sm" placeholder="内容" value="'+esc(x.label)+'" style="flex:1.5" data-in="xlabel" data-v="'+x.id+'">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="金額" value="'+esc(x.amount)+'" style="flex:1" data-in="xamount" data-v="'+x.id+'">'+
      '<button class="xbtn" data-a="xdel" data-v="'+x.id+'">×</button></div>';
  });
  h += '<button class="btn dash full" data-a="xadd">＋ 経費を追加</button>';

  /* ----- サマリー ----- */
  h += band("このセッションの結果");
  h += '<div class="card" id="ssummary">'+sessionSummary(s)+'</div>';
  h += '<input class="input" placeholder="セッションメモ(任意)" value="'+esc(s.memo||"")+'" style="margin:14px 0" data-in="smemo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.isNewSess?'<button class="btn danger" data-a="sdel">削除</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="ssave">保存する</button></div>';
  return h;
}

function sessionSummary(s){
  const srow = (l,v) => '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">'+l+'</span><span class="mono '+clsPM(v)+'">'+signYen(v)+'</span></div>';
  let h = "";
  if(s.mode==="dai"){
    /* 代打ち: 報酬が家計簿へ。台勝敗は報告用 */
    const dai = daiResult(s);
    if(slotMachines(s).some(machHasData)){
      h += '<div class="card2" style="margin-bottom:10px"><div class="row between" style="align-items:baseline">'+
        '<span style="font-size:11px;font-weight:700">客の玉での勝敗(報告用)</span>'+
        '<span class="mono '+clsPM(dai)+'" style="font-size:16px;font-weight:700">'+signYen(dai)+'</span></div>'+
        '<div class="muted" style="font-size:10px;margin-top:4px">この金額は家計簿には反映されません</div></div>';
    }
    h += srow("報酬", num(s.fee));
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">代打ち報酬(家計簿の収入へ)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>'+
      '<div class="muted" style="font-size:10px;margin-top:4px">労働収入なので家計簿の収入に計上(軍資金には入りません)</div>';
    return h;
  }
  if(s.mode==="nori"){
    const me = personSlotYen(s,"me"), pt = personSlotYen(s,"partner"), pn = esc((s.partnerName||"").trim()||"相方");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted" style="font-size:10px">自分</div>'+
      '<div class="mono '+clsPM(me)+'" style="font-size:15px;font-weight:700">'+signYen(me)+'</div></div>'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted ellip" style="font-size:10px">'+pn+'</div>'+
      '<div class="mono '+clsPM(pt)+'" style="font-size:15px;font-weight:700">'+signYen(pt)+'</div></div></div>';
    h += srow("2人合計", poolTotal(s));
    /* 折半調整: 自分の取り分を編集可、相方は残りを自動 */
    const half = halfSplit(s), mine = myShare(s), theirs = partnerShare(s);
    const adjusted = (s.myShare!==undefined && s.myShare!=="" && num(s.myShare)!==half);
    h += '<div class="row between" style="align-items:center;font-size:13px;margin:8px 0 4px">'+
      '<span class="muted">自分の取り分</span>'+
      '<div class="row" style="align-items:center;gap:6px">'+
      '<span class="mono muted" style="font-size:12px">¥</span>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="'+half+'" value="'+esc(s.myShare!==undefined?s.myShare:"")+'" style="width:100px" data-in="myshare">'+
      '</div></div>';
    h += '<div class="row between" style="font-size:12px;margin:2px 0 4px"><span class="muted">'+esc((s.partnerName||"").trim()||"相方")+'の取り分(自動)</span>'+
      '<span class="mono '+clsPM(theirs)+'">'+signYen(theirs)+'</span></div>';
    if(adjusted) h += '<div class="muted" style="font-size:10px;margin-bottom:2px">折半'+signYen(half)+'から調整済み(差'+signYen(mine-half)+')</div>';
  }
  if(s.mode==="nori"){
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
    return h;
  }
  h += srow("自分の収支", grossOwn(s));
  h += srow("経費(自分負担分)", -expTotal(s));
  const fin = finalOwn(s);
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
    '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
    '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
  return h;
}
