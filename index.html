<html lang="ja">
<head>

<style>
  :root{
    --bg:#0B1F1E; --surface:#12302E; --surface2:#1A3E3B; --line:#24504C;
    --amber:#F2B33D; --teal:#2DD4BF; --red:#E57373; --text:#E8F0EF; --muted:#8FAAA7; --blue:#5FA8E8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif; font-size:14px;}
  #app{max-width:560px; margin:0 auto; padding:16px 16px 96px;}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);}
  .teal{color:var(--teal);} .red{color:var(--red);} .amber{color:var(--amber);} .blue{color:var(--blue);}
  .band{display:flex; align-items:center; gap:8px; margin:20px 0 10px;}
  .band .tick{width:4px; height:14px; background:var(--amber); border-radius:2px;}
  .band .label{font-size:12px; letter-spacing:.12em; color:var(--muted); font-weight:600;}
  .band .rule{flex:1; height:1px; background:var(--line);}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .card2{background:var(--surface2); border-radius:8px; padding:8px 10px;}
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .input, select.input, textarea.input{background:var(--surface2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:10px 12px; font-size:14px; outline:none; width:100%;}
  .input.sm{padding:6px 8px; font-size:13px;}
  .input.r{text-align:right;}
  .btn{border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted);
    font-size:13px; padding:9px 12px; cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--amber); color:#1a1508; border:none; font-weight:700;}
  .btn.danger{border-color:var(--red); color:var(--red);}
  .btn.tealb{border-color:var(--teal); color:var(--teal);}
  .btn.sel{border-color:var(--amber); color:var(--amber); background:rgba(242,179,61,.12); font-weight:600;}
  .btn.dash{border-style:dashed; font-size:12px;}
  .btn.full{width:100%;}
  .chip{padding:4px 10px; border-radius:12px; font-size:11px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-family:inherit;}
  .chip.sel{border-color:var(--teal); color:var(--teal); background:rgba(45,212,191,.12);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .tag{font-size:10px; padding:1px 6px; border-radius:4px; white-space:nowrap;}
  .syncbadge{font-size:10px; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap; border:1px solid var(--line); color:var(--muted);}
  .syncbadge.ready{border-color:var(--teal); color:var(--teal);}
  .syncbadge.syncing{border-color:var(--amber); color:var(--amber);}
  .syncbadge.error{border-color:var(--red); color:var(--red);}
  .syncbadge.offline,.syncbadge.off,.syncbadge.nokey{border-color:var(--line); color:var(--muted);}
  table.mjt{border-collapse:collapse;width:100%;min-width:280px;}
  table.mjt th,table.mjt td{border:1px solid var(--line);text-align:center;padding:0;}
  table.mjt th{background:var(--surface2);font-size:12px;font-weight:700;padding:6px 2px;}
  .mjt-name{width:100%;background:transparent;border:none;color:var(--text);text-align:center;font-size:13px;font-weight:700;padding:6px 2px;}
  .mjt-no{background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);padding:8px 2px;}
  .mjt-cell{font-size:15px;font-family:ui-monospace,monospace;padding:12px 4px;cursor:pointer;min-width:52px;}
  .mjt-cell.sel{background:rgba(242,179,61,.22);outline:2px solid var(--amber);}
  .mjt-cell.red{color:var(--red);}
  .mjt-ph{color:var(--line);}
  .mjt-x{color:var(--red);font-size:14px;padding:8px 6px;cursor:pointer;width:22px;}
  .mjt-pad{position:sticky;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--bg);padding:10px 0;border-top:1px solid var(--line);}
  .mjt-key{padding:16px 0;font-size:18px;font-weight:700;background:var(--surface2);border:1px solid var(--line);border-radius:10px;color:var(--text);}
  .mjt-key.done{background:var(--amber);color:#000;border-color:var(--amber);}
  .mjt-sticky{position:sticky;top:0;z-index:5;background:var(--bg);padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--line);}
  table.mjt.sum td,table.mjt.sum th{border-color:var(--line);}
  .mjt-mini{font-size:10px;font-family:ui-monospace,monospace;color:var(--muted);padding:4px 3px;white-space:nowrap;}
  .mjt-abs{color:var(--muted);font-size:12px;}
  .mjt-cell.abs{background:rgba(143,170,167,.10);}
  .mjt-auto{color:var(--amber);font-style:italic;}
  .mjt-add{color:var(--teal);cursor:pointer;font-weight:700;}
  .mjt-pdel{font-size:9px;color:var(--red);cursor:pointer;margin-top:2px;font-weight:400;}
  .mjt-cell.blue{color:var(--blue);}
  .mjt-pad-wrap{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding-top:8px;}
  .mjt-pad-head{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px;}
  .mjt-pad-wrap .mjt-pad{position:static;border-top:none;padding:0 0 10px;}
  .fab{position:fixed; right:20px; bottom:76px; width:54px; height:54px; border-radius:27px;
    background:var(--amber); color:#1a1508; font-size:28px; border:none; cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.4); line-height:0; z-index:5;}
  .tabs{position:fixed; bottom:0; left:0; right:0; background:var(--surface);
    border-top:1px solid var(--line); display:flex; z-index:10;}
  .tabs button{flex:1; padding:13px 0 calc(13px + env(safe-area-inset-bottom)); background:none; border:none;
    cursor:pointer; font-size:13px; color:var(--muted); border-top:2px solid transparent; font-family:inherit;}
  .tabs button.on{color:var(--amber); font-weight:700; border-top-color:var(--amber);}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--surface2);
    border:1px solid var(--teal); color:var(--teal); font-size:12px; padding:6px 16px; border-radius:16px;
    z-index:60; opacity:0; transition:opacity .25s; pointer-events:none;}
  .toast.show{opacity:1;}
  .hdr{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .navbtn{background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; font-family:inherit;}
  h1{font-size:15px; font-weight:700; letter-spacing:.06em; margin:0 0 4px;}
  h1 small{color:var(--muted); font-weight:400; font-size:11px;}
  .listitem{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; cursor:pointer;}
  .ellip{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar{height:5px; background:var(--surface2); border-radius:3px;}
  .bar>div{height:5px; border-radius:3px; opacity:.85;}
  .xbtn{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 2px;}
  .signbtn{width:38px; height:38px; border-radius:6px; font-size:18px; font-weight:700; cursor:pointer;
    flex-shrink:0; line-height:1; background:transparent; font-family:inherit;}
  .amberpanel{background:rgba(242,179,61,.08); border:1px solid rgba(242,179,61,.35); border-radius:8px; padding:9px 10px;}
  textarea.input{height:120px; resize:vertical; font-size:11px;}
</style>

<body>
<div id="app"></div>
<div id="toast" class="toast">дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ</div>
<script>
"use strict";
/* ============================================================
   еҸҺж”ҜеҸ°еёі v27 (localStorageдҝқеӯҳгғ»е®Ңе…ЁгӮӘгғ•гғ©гӮӨгғі)
   ============================================================ */
const KEY = "kakeibo:v1";
const EXPENSE_CATS = ["ж¶ҲиІ»","еЁҜжҘҪ","иҮӘе·ұжҠ•иіҮ"];
const INCOME_CATS = ["зөҰдёҺ","иіһдёҺ","гҒқгҒ®д»–еҸҺе…Ҙ"];
const UNIT_LABEL = {medal:"жһҡ", ball:"зҺү", yen:"еҶҶ"};
const WD = ["ж—Ҙ","жңҲ","зҒ«","ж°ҙ","жңЁ","йҮ‘","еңҹ"];

/* ---------- helpers ---------- */
const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
const fnum = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const yen = n => "ВҘ" + Math.abs(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"вҲ’") + yen(n);
const clsPM = n => n>=0 ? "teal" : "red";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const uid = () => Date.now() + Math.floor(Math.random()*1000);

/* ---------- еӣәе®ҡиІ»(е®ҡжңҹ)гғҶгғігғ—гғ¬гғјгғҲ ----------
   гғҶгғігғ—гғ¬гғјгғҲгҒҢе®ҹгӮЁгғігғҲгғӘгӮ’з”ҹжҲҗгҒҷгӮӢж–№ејҸгҖӮж—Ҙд»ҳгҒҢйҒҺеҺ»гҒӘгӮүе®ҹзёҫгҖҒжңӘжқҘгҒӘгӮүдәҲе®ҡгҖӮ
   еҪ“е№ҙ12жңҲгҒҫгҒ§з”ҹжҲҗгҖӮеҒңжӯўгҒҷгӮӢгҒЁжңӘжқҘеҲҶгҒ гҒ‘еүҠйҷӨгҒ—йҒҺеҺ»гҒҜж®ӢгҒҷгҖӮ */
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();  // m:1-12
function fixedDateFor(tpl, y, m){
  const d = Math.min(num(tpl.day)||1, daysInMonth(y,m));
  return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}
const fmtDate = dt => dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
/* й »еәҰгҒ«еҝңгҒҳгҒҹзҷәз”ҹж—ҘгғӘгӮ№гғҲгӮ’иҝ”гҒҷ(д»ҠжңҲгҖңеҪ“е№ҙ12жңҲ) */
function fixedOccurrences(tpl){
  const now = new Date();
  const y = now.getFullYear();
  const yEnd = new Date(y, 11, 31);
  const floor = new Date(y, now.getMonth(), 1);   // д»ҠжңҲ1ж—Ҙ(йҒҺеҺ»гҒёгҒ®йҒЎгӮҠйҳІжӯў)
  const freq = tpl.freq || "monthly";
  const out = [];
  if(freq==="weekly" || freq==="biweekly"){
    const step = (freq==="weekly"?7:14) * 86400000;
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(y, now.getMonth(), now.getDate());
    while(d < floor) d = new Date(d.getTime()+step);   // иө·зӮ№гӮ’д»ҠжңҲгҒҫгҒ§йҖІгӮҒгӮӢ
    while(d <= yEnd){ out.push(new Date(d)); d = new Date(d.getTime()+step); }
  } else {
    const day = num(tpl.day)||1;
    const stepM = (freq==="bimonthly"?2:1);
    for(let m=now.getMonth(); m<=11; m+=stepM){
      out.push(new Date(y, m, Math.min(day, daysInMonth(y, m+1))));
    }
  }
  return out;
}
function genFixedEntries(tpl){
  fixedOccurrences(tpl).forEach(dt=>{
    const date = fmtDate(dt);
    const exists = S.entries.some(e=>String(e.fixedId)===String(tpl.id) && e.date===date);
    if(!exists){
      S.entries.push({
        id: uid()+"-f"+date, date,
        type: tpl.type, category: tpl.category,
        amount: num(tpl.amount), memo: tpl.name,
        src: "fixed", fixedId: tpl.id
      });
    }
  });
}
function ensureFixedEntries(){
  (S.fixed||[]).forEach(genFixedEntries);
}
function fixedSchedLabel(t){
  const freq = t.freq || "monthly";
  if(freq==="weekly")   return "жҜҺйҖұ("+(t.start||"").slice(5).replace("-","/")+"гҖң)";
  if(freq==="biweekly") return "2йҖұгҒ”гҒЁ("+(t.start||"").slice(5).replace("-","/")+"гҖң)";
  if(freq==="bimonthly")return "2гғ¶жңҲгҒ”гҒЁ "+num(t.day)+"ж—Ҙ";
  return "жҜҺжңҲ"+num(t.day)+"ж—Ҙ";
}
function stopFixed(id){
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(id) && e.date > today));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}
function updateFixed(tpl){
  /* з·ЁйӣҶ: жңӘжқҘгҒ®дәҲе®ҡеҲҶгҒ гҒ‘ж–°гҒ—гҒ„еҶ…е®№гҒ«гҖӮйҒҺеҺ»гҒ®е®ҹзёҫгҒҜдәӢе®ҹгҒӘгҒ®гҒ§еӨүгҒҲгҒӘгҒ„ */
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(tpl.id) && e.date > today));
  S.fixed = (S.fixed||[]).map(t=> String(t.id)===String(tpl.id) ? tpl : t);
  genFixedEntries(tpl);
  save();
}
function deleteFixed(id){
  /* е®Ңе…ЁеүҠйҷӨ: йҒҺеҺ»еҗ«гӮҒгҒҰгҒ“гҒ®еӣәе®ҡиІ»гҒ®иЁҳйҢІгӮ’е…ЁйғЁж¶ҲгҒҷ */
  S.entries = S.entries.filter(e=> String(e.fixedId)!==String(id));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}

/* ---------- state ---------- */
let S = { entries:[], sessions:[], rates:{medal:"20", ball:"4", push:"245", exchange:"50", pExchange:"250", pushPayout:"230", pushDraw:"245", mjScore:"", mjChip:"", mjBase:"", mjTop:"", mjDrink:""}, mdb:[], mjSessions:[], fixed:[], mjTables:[], updatedAt:0 };
let UI = {
  tab:"slot", screen:"main",           // main | session | mdb | backup | entry
  y:new Date().getFullYear(), m:new Date().getMonth()+1,
  draft:null, isNewSess:false,         // гӮ»гғғгӮ·гғ§гғігғүгғ©гғ•гғҲ
  entryForm:null, editEntryId:null,    // е®¶иЁҲз°ҝгғүгғ©гғ•гғҲ
  mdbForm:null,                        // ж©ҹзЁ®гғһгӮ№гӮҝгғүгғ©гғ•гғҲ
  msg:""                               // backupз”»йқўгғЎгғғгӮ»гғјгӮё
};

function migrateEntry(e){
  let ne = e;
  if((e.src==="slot"||e.src==="mahjong") && e.category==="йҒҠжҠҖеҸҺж”Ҝ")
    ne = Object.assign({}, ne, {category:"йҒҠжҠҖ"});
  if(e.src==="slot" && typeof e.memo==="string" && (e.memo.includes("д№—гӮҠжү“гҒЎ")||e.memo.includes("д»Јжү“гҒЎ")))
    ne = Object.assign({}, ne, {memo: e.memo.replace("д№—гӮҠжү“гҒЎ","д№—жү“").replace("д»Јжү“гҒЎ","д»Јжү“")});
  return ne;
}
function applyData(d){
  S.entries = (d.entries||[]).map(migrateEntry);
  S.sessions = (d.sessions||[]).map(migrateSession);
  S.rates = Object.assign({medal:"20",ball:"4",push:"245",exchange:"50",pExchange:"250",pushPayout:"230",pushDraw:"245",mjScore:"",mjChip:"",mjBase:"",mjTop:"",mjDrink:""}, d.rates||{});
  S.mdb = Array.isArray(d.mdb)?d.mdb:[];
  S.mjSessions = Array.isArray(d.mjSessions)?d.mjSessions:[];
  S.fixed = Array.isArray(d.fixed)?d.fixed:[];
  S.mjTables = (Array.isArray(d.mjTables)?d.mjTables:[]).map(t=>{
    const n = Object.assign({}, t);
    if(!n.rule) n.rule = "3";
    if(n.ruleName==null) n.ruleName = "";
    if(n.meIdx===undefined) n.meIdx = null;
    ["mochi","kaeshi","uma1","uma2","uma3","uma4"].forEach(k=>{ if(n[k]==null) n[k]=""; });
    if(n.feeTotal==null) n.feeTotal="";
    if(n.hakoshita==null) n.hakoshita=false;
    const np = (n.players||["A","B","C"]).length;
    if(!Array.isArray(n.chipStart)) n.chipStart = new Array(np).fill("");
    if(!Array.isArray(n.chipEnd)){ n.chipEnd = (Array.isArray(n.chips)? n.chips.map(c=>c) : new Array(np).fill("")); }
    if(!Array.isArray(n.fees)) n.fees = new Array(np).fill(n.fee||"");
    delete n.chips; delete n.fee;
    return n;
  });
  S.updatedAt = d.updatedAt || 0;
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) applyData(JSON.parse(raw));
  }catch(e){ /* еЈҠгӮҢгҒҰгҒ„гҒҹгӮүеҲқжңҹзҠ¶ж…Ӣ */ }
}
function saveLocal(){
  localStorage.setItem(KEY, JSON.stringify(S));
}
function save(){
  try{
    S.updatedAt = Date.now();
    saveLocal();
    toast("дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ");
    schedulePush();
  }catch(e){
    alert("дҝқеӯҳгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: " + e.message + "\nгғҗгғғгӮҜгӮўгғғгғ—гҒӢгӮүгӮЁгӮҜгӮ№гғқгғјгғҲгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ");
  }
}
let toastTimer = null;
function toast(t){
  const el = document.getElementById("toast");
  el.textContent = t; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1200);
}

/* ---------- иЁҲз®—(гӮ»гғғгӮ·гғ§гғі) ---------- */
const migrateSession = s => {
  /* ж—§ж§ӢйҖ гҒӢгӮүгҒ®з§»иЎҢ: е…ЁеҸ°гҒ«иІҜзҺүж–№ејҸгғ•гӮЈгғјгғ«гғүгӮ’иЈңе®Ң */
  const machines = (s.machines||[]).map(m => {
    const nm = Object.assign({who:"me"}, m);
    if(nm.startStock===undefined) nm.startStock="";
    if(nm.endStock===undefined) nm.endStock="";
    if(nm.holdBalls===undefined) nm.holdBalls="";
    if(!nm.cash) nm.cash=[];
    if(nm.kind==="slot"){ delete nm.rsegs; delete nm.hits; } /* ж—§еҲӨеҲҘгғӯгӮ°з ҙжЈ„ */
    return nm;
  });
  const out = Object.assign({}, s, {machines});
  if(out.exchange===undefined) out.exchange="";
  if(out.pExchange===undefined) out.pExchange="";
  if(out.pushPayout===undefined) out.pushPayout="";
  if(out.pushDraw===undefined) out.pushDraw="";
  /* ж—§еҢәй–“гҒ® pushes/pp гғ•гӮЈгғјгғ«гғүгҒҜж®ӢгҒЈгҒҰгҒ„гҒҰгӮӮж–°иЁҲз®—гҒ§гҒҜз„ЎиҰ–гҒ•гӮҢгӮӢ */
  delete out.results; delete out.own; delete out.partner;
  return out;
};
/* ---------- иЁҲз®—(иІҜзҺүж–№ејҸгғ»еҸ°гҒ”гҒЁ) ----------
   е·®жһҡ = зөӮдәҶиІҜзҺү вҲ’ й–Ӣе§ӢиІҜзҺү + жҢҒгҒЎзҺү
   еҸҺж”Ҝ(еҶҶ) = е·®жһҡ Г· дәӨжҸӣжһҡж•° Г— 1000 вҲ’ зҸҫйҮ‘жҠ•иіҮеҗҲиЁҲ */
const machCash = m => (m.cash||[]).reduce((a,c)=>a+num(c.amount),0);
const machSabai = m => num(m.endStock) - num(m.startStock) + num(m.holdBalls);
const machYen = (m, exch) => {
  const ex = num(exch);
  const gross = ex>0 ? Math.round(machSabai(m)/ex*1000) : 0;
  return gross - machCash(m);
};
const machHasData = m => m.startStock!=="" || m.endStock!=="" || m.holdBalls!=="" || machCash(m)>0;
/* еҸ°гҒ®жҸӣз®—гғ¬гғјгғҲ: гӮ№гғӯгғғгғҲ=дәӨжҸӣжһҡж•°, гғ‘гғҒгғігӮі=жҸӣйҮ‘зҺүж•° */
const machExch = (m, s) => m.kind==="pachi" ? s.pExchange : s.exchange;
const machYenS = (m, s) => machYen(m, machExch(m, s));
/* еҸҺж”ҜеҜҫиұЎеҸ°(гӮ№гғӯгғғгғҲ+иІҜзҺүе…ҘеҠӣгҒ®гҒӮгӮӢгғ‘гғҒгғігӮі) */
const incomeMachines = (s, who) => (s.machines||[]).filter(m =>
  (m.kind==="slot" || (m.kind==="pachi" && machHasData(m))) && (!who || (m.who||"me")===who));
const slotMachines = (s, who) => (s.machines||[]).filter(m => m.kind==="slot" && (!who || (m.who||"me")===who));
const personSlotYen = (s, who) => incomeMachines(s, who).reduce((a,m)=>a+machYenS(m, s), 0);
const poolTotal = s => personSlotYen(s,"me") + personSlotYen(s,"partner");
const expTotal = s => (s.expenses||[]).reduce((a,e)=>a+num(e.amount),0);
/* д№—гӮҠжү“гҒЎгҒ®жҠҳеҚҠиӘҝж•ҙ: myShareгҒҢе…ҘеҠӣгҒ•гӮҢгҒҰгҒ„гӮҢгҒ°гҒқгӮҢгӮ’иҮӘеҲҶгҒ®еҸ–гӮҠеҲҶгҒ«дҪҝгҒҶ(гҒӘгҒ‘гӮҢгҒ°жҠҳеҚҠ) */
const halfSplit = s => Math.round(poolTotal(s)/2);
const myShare = s => (s.myShare!==undefined && s.myShare!=="") ? num(s.myShare) : halfSplit(s);
const partnerShare = s => poolTotal(s) - myShare(s);
/* е®¶иЁҲз°ҝгҒёжөҒгӮҢгӮӢиҮӘеҲҶгҒ®з”ҹеҸҺж”Ҝ(зөҢиІ»еүҚ) */
const grossOwn = s => s.mode==="dai" ? num(s.fee)
                    : s.mode==="nori" ? myShare(s)
                    : personSlotYen(s,"me");
const finalOwn = s => grossOwn(s) - expTotal(s);
/* д»Јжү“гҒЎгҒ®еҸ°еӢқж•—(е ұе‘Ҡз”Ёгғ»е®¶иЁҲз°ҝйқһеҸҚжҳ ) */
const daiResult = s => incomeMachines(s).reduce((a,m)=>a+machYenS(m, s), 0);

/* ---------- иЁҲз®—(йә»йӣҖ) ---------- */
const mjRankCount = m => m.rule==="3" ? 3 : 4;
const mjRanks = m => { const rc=mjRankCount(m); return (m.ranks||[]).map(x=>num(x)).map((v,i)=> i<rc?v:0); };
const mjHanchan = m => mjRanks(m).reduce((a,b)=>a+b,0);
const mjGameFee = m => m.category==="free"
  ? num(m.baseFee)*mjHanchan(m) + num(m.topBonus)*num((m.ranks||[])[0]) + num(m.drinkFee)
  : num(m.setFee);
const mjScoreYen = m => Math.round(fnum(m.score)*fnum(m.scoreRate));
const mjChipYen = m => Math.round(fnum(m.chips)*fnum(m.chipRate));
const mjRaw = m => mjScoreYen(m) + mjChipYen(m);          // гӮІгғјгғ д»ЈжҠңгҒҚ(йә»йӣҖгҒ®гҒҝгҒ®еҸҺж”Ҝ)
const mjFinal = m => mjRaw(m) - mjGameFee(m);             // гӮІгғјгғ д»ЈиҫјгҒҝ(е®¶иЁҲз°ҝгҒё)
const mjAvgRank = m => {
  const h = mjHanchan(m); if(!h) return null;
  const r = mjRanks(m);
  let s=0; for(let i=0;i<r.length;i++) s += (i+1)*r[i];
  return s/h;
};
const modeLabel = m => m==="nori" ? "д№—жү“" : m==="dai" ? "д»Јжү“" : "еҚҳзӢ¬";
const modeShort = m => m==="nori" ? "д№—жү“" : m==="dai" ? "д»Јжү“" : "еҚҳзӢ¬";

/* ---------- иЁҲз®—(гғ‘гғҒгғігӮіеҢәй–“) ----------
   иІҜзҺүгғ—гғғгӮ·гғҘ: гғ—гғғгӮ·гғҘж•° = й–Ӣе§Ӣж®Ӣгғ—гғғгӮ·гғҘ вҲ’ зөӮдәҶж®Ӣгғ—гғғгӮ·гғҘ
   еҸ°гҒ«е…ҘгҒЈгҒҹзҺү(еӣһи»ўзҺҮз”Ё) = гғ—гғғгӮ·гғҘж•°Г—жү•еҮәзҺү + й–Ӣе§Ӣж®ӢзҺү вҲ’ еҪ“гҒҹгӮҠжҷӮж®ӢзҺү
   еј•гҒҚиҗҪгҒЁгҒ—зҺү(гӮігӮ№гғҲз”Ё) = гғ—гғғгӮ·гғҘж•°Г—еј•гҒҚиҗҪгҒЁгҒ—зҺү + й–Ӣе§Ӣж®ӢзҺү вҲ’ еҪ“гҒҹгӮҠжҷӮж®ӢзҺү */
const segPushes = g => Math.max(0, num(g.rpStart) - num(g.rpEnd));
const segUsed = (g, s) => { s=s||UI.draft; return g.kind==="push"
  ? Math.max(0, segPushes(g)*num((s&&s.pushPayout)||230) + num(g.sb) - num(g.eb))
  : Math.max(0, num(g.sb) - num(g.eb)); };
const segCost = (g, s) => { s=s||UI.draft; return g.kind==="push"
  ? Math.max(0, segPushes(g)*num((s&&s.pushDraw)||245) + num(g.sb) - num(g.eb))
  : segUsed(g, s); };
const segSpins = g => Math.max(0, num(g.es) - num(g.ss));
const segDone = g => g.kind==="push"
  ? (g.rpStart!=="" && g.rpEnd!=="" && g.ss!=="" && g.es!=="")
  : (g.sb!=="" && g.eb!=="" && g.ss!=="" && g.es!=="");
function machineTotals(m, s){
  s = s||UI.draft;
  const segs = (m.segments||[]).filter(segDone);
  const balls = segs.reduce((a,g)=>a+segUsed(g, s),0);
  const spins = segs.reduce((a,g)=>a+segSpins(g),0);
  const costBalls = segs.reduce((a,g)=>a+segCost(g, s),0);
  const payouts = [];
  for(let i=0;i<segs.length-1;i++){
    if(segs[i].eb!=="" && segs[i+1].sb!==""){
      const p = num(segs[i+1].sb) - num(segs[i].eb);
      if(p>0) payouts.push(p);
    }
  }
  const avgTY = payouts.length ? payouts.reduce((a,b)=>a+b,0)/payouts.length : null;
  return { balls, spins, payouts, avgTY,
    rate250: balls>0 ? spins/(balls/250) : null,
    costRate250: costBalls>0 ? spins/(costBalls/250) : null };
}
const findMaster = m => S.mdb.find(x => x.kind==="pachi" && (x.name||"").trim()
  && (x.name||"").trim() === (m.name||"").trim());

/* ---------- жңҲгғҮгғјгӮҝ ---------- */
const monthKey = () => UI.y + "-" + String(UI.m).padStart(2,"0");
function moveMonth(d){ UI.m += d;
  if(UI.m<1){UI.m=12;UI.y--;} if(UI.m>12){UI.m=1;UI.y++;}
  render(); }
</script>
<script>
/* ============================================================
   гғ¬гғігғҖгғӘгғігӮ°
   ============================================================ */
function render(){
  const app = document.getElementById("app");
  if(UI.screen==="session"){ app.innerHTML = viewSession(); bindSession(); return; }
  if(UI.screen==="mahjong-edit"){ app.innerHTML = viewMj(); bindMj(); return; }
  if(UI.screen==="fixed"){ app.innerHTML = viewFixed(); bindFixed(); return; }
  if(UI.screen==="mjtable"){ app.innerHTML = viewMjTable(); bindMjTable(); return; }
  if(UI.screen==="mdb"){ app.innerHTML = viewMdb(); bindMdb(); return; }
  if(UI.screen==="backup"){ app.innerHTML = viewBackup(); bindBackup(); return; }
  if(UI.screen==="entry"){ app.innerHTML = viewEntry(); bindEntry(); return; }
  app.innerHTML = viewMain(); bindMain();
}

/* ---------- е…ұйҖҡйғЁе“Ғ ---------- */
const band = t => '<div class="band"><div class="tick"></div><div class="label">'+esc(t)+'</div><div class="rule"></div></div>';
const monthNav = () =>
  '<div class="row" style="justify-content:center;margin-top:8px">'+
  '<button class="navbtn" style="font-size:22px;padding:0 12px" data-a="mprev">вҖ№</button>'+
  '<div style="font-size:14px;font-weight:600;letter-spacing:.08em;width:120px;text-align:center">'+UI.y+'е№ҙ '+UI.m+'жңҲ</div>'+
  '<button class="navbtn" style="font-size:22px;padding:0 12px" data-a="mnext">вҖә</button></div>';

/* ---------- гғЎгӮӨгғіз”»йқў ---------- */
function viewMain(){
  let h = '<div class="row between" style="align-items:baseline">'+
    '<h1>еҸҺж”ҜеҸ°еёі <small>LEDGER</small></h1><div class="row" style="gap:6px">';
  if(UI.tab==="ledger") h += '<button class="btn" style="font-size:11px;padding:4px 10px;white-space:nowrap" data-a="fixed">еӣәе®ҡиІ»</button>';
  if(UI.tab==="slot") h += '<button class="btn" style="font-size:11px;padding:4px 10px" data-a="mdb">ж©ҹзЁ®гғҮгғјгӮҝ</button>';
  h += '<span class="syncbadge '+syncState+'" id="syncbadge">'+syncLabel()+'</span>';
  h += '<button class="btn" style="font-size:11px;padding:4px 10px;white-space:nowrap" data-a="backup">backup</button></div></div>';

  if(UI.tab==="tool"){
    h += viewTool();
    h += '<div class="tabs">'+
      [["ledger","е®¶иЁҲз°ҝ"],["mahjong","йә»йӣҖ"],["slot","гғ‘гғҒгӮ№гғӯ"],["tool","гғ„гғјгғ«"]].map(([v,l])=>
        '<button class="'+(UI.tab===v?"on":"")+'" data-a="tab" data-v="'+v+'">'+l+'</button>').join("")+
      '</div>';
    return h;
  }

  h += monthNav();
  if(UI.tab==="ledger") h += viewLedger();
  if(UI.tab==="slot") h += viewSlot();
  if(UI.tab==="mahjong") h += viewMahjong();

  h += '<button class="fab" data-a="add">пјӢ</button>';
  h += '<div class="tabs">'+
    [["ledger","е®¶иЁҲз°ҝ"],["mahjong","йә»йӣҖ"],["slot","гғ‘гғҒгӮ№гғӯ"],["tool","гғ„гғјгғ«"]].map(([v,l])=>
      '<button class="'+(UI.tab===v?"on":"")+'" data-a="tab" data-v="'+v+'">'+l+'</button>').join("")+
    '</div>';
  return h;
}

function viewLedger(){
  const mk = monthKey();
  const me = S.entries.filter(e=>e.date.startsWith(mk))
    .sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : (String(b.id)>String(a.id)?1:-1));
  /* еҸҺж”ҜгӮ«гғҶгӮҙгғӘ(зҙ”йЎҚгҒ§иҰӢгӮӢзӢ¬з«ӢгӮ»гӮҜгӮ·гғ§гғі): еӢқгҒЎиІ гҒ‘гҒҷгӮӢжҙ»еӢ•гҖӮе°ҶжқҘгҒ®жҠ•иіҮгӮӮгҒ“гҒ“гҒ«иҝҪеҠ гҒ§гҒҚгӮӢ */
  const NET_SRCS = ["slot","mahjong"]; // еҸҺж”ҜгӮ«гғҶгӮҙгғӘгҒЁгҒ—гҒҰжүұгҒҶsrc
  const isNetEntry = e => NET_SRCS.includes(e.src);
  const income = me.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const expense = me.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  const bal = income-expense;
  /* еҶ…иЁіз”Ё: еҸҺж”ҜгӮ«гғҶгӮҙгғӘгӮ’йҷӨгҒ„гҒҹйҖҡеёёгҒ®еҸҺе…Ҙгғ»ж”ҜеҮә */
  const normIncome = me.filter(e=>e.type==="income" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  const normExpense = me.filter(e=>e.type==="expense" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  /* е®ҹзёҫ/дәҲе®ҡ(жЎҲгӮў): ж—Ҙд»ҳгҒҢд»Ҡж—Ҙд»ҘеүҚ=е®ҹзёҫгҖҒжңӘжқҘ=дәҲе®ҡгҖӮеӨ§гҒҚгҒ„ж•°еӯ—гҒҜдәҲе®ҡиҫјгҒҝгҒ®иҰӢиҫјгҒҝ */
  const todayS = todayStr();
  const hasFuture = me.some(e=>e.date>todayS);
  const actualBal = me.filter(e=>e.date<=todayS).reduce((s,e)=> s + (e.type==="income"?e.amount:-e.amount), 0);
  let h = '<div class="card" style="margin-top:10px"><div style="text-align:center;margin:4px 0 6px">'+
    '<div style="font-size:11px;letter-spacing:.15em" class="muted">еҪ“жңҲеҸҺж”Ҝ'+(hasFuture?'(дәҲе®ҡиҫј)':'')+'</div>'+
    '<div class="mono '+clsPM(bal)+'" style="font-size:36px;font-weight:700;line-height:1.2">'+signYen(bal)+'</div>'+
    (hasFuture?'<div class="muted" style="font-size:11px;margin-top:3px">е®ҹзёҫ <span class="mono '+clsPM(actualBal)+'">'+signYen(actualBal)+'</span>гҖҖдәҲе®ҡ <span class="mono '+clsPM(bal-actualBal)+'">'+signYen(bal-actualBal)+'</span></div>':'')+'</div>'+
    '<div class="row" style="border-top:1px solid var(--line);padding-top:10px;margin-top:8px">'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">еҸҺе…Ҙ</div><div class="mono teal" style="font-size:16px">'+yen(normIncome)+'</div></div>'+
    '<div style="width:1px;background:var(--line)"></div>'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">ж”ҜеҮә</div><div class="mono red" style="font-size:16px">'+yen(normExpense)+'</div></div></div></div>';

  /* йҒҠжҠҖгӮөгғһгғӘгғј(зӢ¬з«Ӣгғ»зЁ®зӣ®еҲҘ+гғҲгғјгӮҝгғ«) */
  const gameNet = (src) => me.filter(e=>e.src===src).reduce((a,e)=> a + (e.type==="income"?e.amount:-e.amount), 0);
  const gameGross = (src) => ({
    inc: me.filter(e=>e.src===src && e.type==="income").reduce((a,e)=>a+e.amount,0),
    exp: me.filter(e=>e.src===src && e.type==="expense").reduce((a,e)=>a+e.amount,0)
  });
  const hasGame = me.some(e=>e.src==="slot"||e.src==="mahjong");
  if(hasGame){
    const gTotal = gameNet("slot") + gameNet("mahjong");
    h += band("еҪ“жңҲгҒ®йҒҠжҠҖеҸҺж”Ҝ");
    /* гғҲгғјгӮҝгғ« */
    h += '<div class="card" style="margin-bottom:8px"><div class="row between" style="align-items:baseline">'+
      '<span style="font-size:12px;font-weight:700">йҒҠжҠҖгғҲгғјгӮҝгғ«</span>'+
      '<span class="mono '+clsPM(gTotal)+'" style="font-size:26px;font-weight:700">'+signYen(gTotal)+'</span></div></div>';
    /* зЁ®зӣ®еҲҘ */
    h += '<div class="row" style="gap:8px">';
    [["slot","гғ‘гғҒгӮ№гғӯ"],["mahjong","йә»йӣҖ"]].forEach(([src,label])=>{
      const net = gameNet(src), g = gameGross(src);
      if(g.inc===0 && g.exp===0) return;
      h += '<div class="card" style="flex:1;padding:12px 12px">'+
        '<div class="muted" style="font-size:11px;text-align:center;margin-bottom:4px">'+label+'</div>'+
        '<div class="mono '+clsPM(net)+'" style="font-size:22px;font-weight:700;text-align:center;line-height:1.2">'+signYen(net)+'</div>'+
        '<div class="row between" style="font-size:10px;margin-top:8px;border-top:1px solid var(--line);padding-top:6px">'+
        '<span class="muted">еҸҺе…Ҙ</span><span class="mono teal">'+yen(g.inc)+'</span></div>'+
        '<div class="row between" style="font-size:10px;margin-top:2px">'+
        '<span class="muted">ж”ҜеҮә</span><span class="mono red">'+yen(g.exp)+'</span></div></div>';
    });
    h += '</div>';
  }

  /* еҸҺе…ҘеҶ…иЁі(еҸҺж”ҜгӮ«гғҶгӮҙгғӘгӮ’йҷӨгҒҸ) */
  const incCats = {};
  me.filter(e=>e.type==="income" && !isNetEntry(e)).forEach(e=>incCats[e.category]=(incCats[e.category]||0)+e.amount);
  const ict = Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
  if(ict.length){
    h += band("еҸҺе…ҘеҶ…иЁі") + '<div class="card">' + ict.map(([c,a])=>
      '<div style="margin:8px 0"><div class="row between" style="font-size:12px;margin-bottom:3px">'+
      '<span>'+esc(c)+'</span><span class="mono muted">'+yen(a)+' <span style="font-size:10px">('+Math.round(a/normIncome*100)+'%)</span></span></div>'+
      '<div class="bar"><div style="width:'+(a/normIncome*100)+'%;background:var(--teal)"></div></div></div>'
    ).join("") + '</div>';
  }

  const cats = {};
  me.filter(e=>e.type==="expense" && !isNetEntry(e)).forEach(e=>cats[e.category]=(cats[e.category]||0)+e.amount);
  const ct = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const QCOL = {"ж¶ҲиІ»":"var(--teal)","еЁҜжҘҪ":"var(--amber)","иҮӘе·ұжҠ•иіҮ":"var(--blue)"};
  if(ct.length){
    h += band("ж”ҜеҮәеҶ…иЁі") + '<div class="card">' + ct.map(([c,a])=>{
      const col = QCOL[c] || "var(--teal)";
      return '<div style="margin:8px 0"><div class="row between" style="font-size:12px;margin-bottom:3px">'+
      '<span>'+esc(c)+'</span><span class="mono muted">'+yen(a)+' <span style="font-size:10px">('+Math.round(a/normExpense*100)+'%)</span></span></div>'+
      '<div class="bar"><div style="width:'+(a/normExpense*100)+'%;background:'+col+'"></div></div></div>';
    }).join("") + '</div>';
  }

  h += band("жҳҺзҙ°");
  if(!me.length) h += '<div style="text-align:center;padding:28px 0;font-size:13px" class="muted">гҒ“гҒ®жңҲгҒ®иЁҳйҢІгҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“гҖӮеҸідёӢгҒ®гҖҢпјӢгҖҚгҒӢгӮүиҝҪеҠ гҒ§гҒҚгҒҫгҒҷгҖӮ</div>';
  const byDate = {};
  me.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  Object.entries(byDate).sort((a,b)=>a[0]<b[0]?1:-1).forEach(([d,list])=>{
    h += '<div style="margin-bottom:12px"><div class="mono muted" style="font-size:11px;margin:0 4px 4px">'+
      d.slice(5).replace("-","/")+' ('+WD[new Date(d+"T00:00:00").getDay()]+')</div>'+
      '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden">'+
      list.map((e,i)=>{
        const signedAmt = e.type==="income" ? e.amount : -e.amount;
        const isFuture = e.date > todayS;
        return '<div class="row" style="padding:10px 14px;cursor:pointer;'+(i?'border-top:1px solid var(--line);':'')+(isFuture?'opacity:.62;':'')+'" data-a="eedit" data-v="'+e.id+'">'+
        '<div style="flex:1;min-width:0"><div style="font-size:13px">'+esc(e.category)+

function viewMjStats(){
  /* гғ«гғјгғ«еҗҚ Г— гӮ«гғҶгӮҙгғӘ(гғ•гғӘгғј/гӮ»гғғгғҲ)еҲҘгҒ«йӣҶиЁҲгҖӮеҗҢгғ¬гғјгғҲгҒ§жӢ¬гӮӢгҒ®гҒҢзӣ®зҡ„ */
  const groups = {}; // key: category|store
  (S.mjSessions||[]).forEach(s=>{
    const store = (s.store||"").trim() || "(гғ«гғјгғ«еҗҚгҒӘгҒ—)";
    const key = s.category + "|" + store;
    (groups[key] = groups[key] || {category:s.category, store, list:[]}).list.push(s);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    // гғ•гғӘгғјвҶ’гӮ»гғғгғҲгҒ®й ҶгҖҒгҒқгҒ®дёӯгҒҜеҚҠиҚҳж•°гҒ®еӨҡгҒ„й Ҷ
    const ga=groups[a], gb=groups[b];
    if(ga.category!==gb.category) return ga.category==="free"?-1:1;
    const ha=ga.list.reduce((x,s)=>x+mjHanchan(s),0), hb=gb.list.reduce((x,s)=>x+mjHanchan(s),0);
    return hb-ha;
  });
  let h = "", any=false;
  keys.forEach(key=>{
    const G = groups[key], list = G.list;
    const H = list.reduce((a,s)=>a+mjHanchan(s),0);
    if(!H) return;
    any = true;
    /* гҒ“гҒ®жӢ¬гӮҠгҒ®жңҖеӨ§зқҖй Ҷж•°(3йә»гҒЁ4йә»гҒҢж··гҒҳгҒЈгҒҰгӮӮеәғгҒ„ж–№гҒ«еҗҲгӮҸгҒӣгӮӢ) */
    const rc = Math.max(...list.map(s=>mjRankCount(s)));
    const rankSums = [0,0,0,0];
    list.forEach(s=>{ const r=mjRanks(s); for(let i=0;i<4;i++) rankSums[i]+=(r[i]||0); });
    let rankWeighted=0; for(let i=0;i<4;i++) rankWeighted += (i+1)*rankSums[i];
    const avgRank = rankWeighted/H;
    const sumFinal = list.reduce((a,s)=>a+mjFinal(s),0);
    const sumRaw = list.reduce((a,s)=>a+mjRaw(s),0);
    const sumFee = list.reduce((a,s)=>a+mjGameFee(s),0);
    const sumScore = list.reduce((a,s)=>a+fnum(s.score),0);
    const sumChips = list.reduce((a,s)=>a+fnum(s.chips),0);
    const catC = G.category==="free"?"var(--teal)":"var(--amber)";
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div class="row between" style="margin-bottom:8px;align-items:center"><span style="font-weight:700;font-size:13px" class="ellip">'+
      '<span class="tag" style="border:1px solid '+catC+';color:'+catC+';margin-right:6px">'+(G.category==="free"?"гғ•гғӘгғј":"гӮ»гғғгғҲ")+'</span>'+esc(G.store)+'</span>'+
      '<span class="muted" style="font-size:11px;flex-shrink:0">'+H+'еҚҠиҚҳ / '+list.length+'ж—Ҙ</span></div>'+
      '<div class="row between" style="align-items:baseline;margin-bottom:8px"><span class="muted" style="font-size:12px">е№іеқҮзқҖй Ҷ</span>'+
      '<span class="mono amber" style="font-size:18px;font-weight:700">'+avgRank.toFixed(3)+'</span></div>'+
      '<div class="row" style="gap:4px;margin-bottom:10px">'+
      Array.from({length:rc}).map((_,i)=>{
        const pct = H>0 ? Math.round(rankSums[i]/H*100) : 0;
        return '<div style="flex:1;text-align:center;background:var(--surface2);border-radius:6px;padding:5px 0">'+
          '<div class="muted" style="font-size:9px">'+(i+1)+'зқҖ</div>'+
          '<div class="mono" style="font-size:13px;font-weight:700">'+rankSums[i]+'</div>'+
          '<div class="muted mono" style="font-size:9px">'+pct+'%</div></div>';
      }).join("")+'</div>'+
      '<div style="border-top:1px solid var(--line);padding-top:8px">'+
      mjStatRow("е№іеқҮеҸҺж”Ҝ(гӮІгғјгғ д»Јиҫј)", Math.round(sumFinal/H), true)+
      mjStatRow("е№іеқҮеҸҺж”Ҝ(гӮІгғјгғ д»ЈжҠң)", Math.round(sumRaw/H), true)+
      mjStatRow("е№іеқҮгӮІгғјгғ д»Ј", -Math.round(sumFee/H), true)+
      mjStatRow("е№іеқҮгӮ№гӮігӮў", (sumScore/H), false, true)+
      mjStatRow("е№іеқҮгғҒгғғгғ—", (sumChips/H), false, true)+
      '</div></div>';
  });
  if(!any) h = '<div style="text-align:center;padding:16px 0;font-size:12px;line-height:1.7" class="muted">гҒҫгҒ иЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮиЁҳйҢІгҒҢиІҜгҒҫгӮӢгҒЁгғ«гғјгғ«еҗҚеҲҘгҒ®е№іеқҮзқҖй ҶгӮ„еҸҺж”ҜгҒҢеҮәгҒҫгҒҷгҖӮ</div>';
  return h;
}
function mjStatRow(label, val, isYen, raw){
  let disp;
  if(raw) disp = (val>=0?"+":"")+val.toFixed(1);
  else if(isYen) disp = signYen(val);
  else disp = "ВҘ"+Math.abs(val).toLocaleString("ja-JP");
  const col = isYen ? clsPM(val) : (raw ? (val>=0?"blue":"red") : "");
  return '<div class="row between" style="font-size:12px;margin:3px 0"><span class="muted">'+label+'</span>'+
    '<span class="mono '+col+'">'+disp+'</span></div>';
}

/* ===== йә»йӣҖгӮ№гӮігӮўиЎЁ ===== */
function mjtSeats(t){ return num(t.rule)||3; }
function mjtAbsent(t,ri,pi){ return t.rows[ri][pi]==="x"; }
function mjtRawScore(t,ri,pi){ const v=t.rows[ri][pi]; return (v===""||v==="x"||v==="-"||v==null)?null:num(v); }
function mjtPlaying(t,ri){ const a=[]; for(let p=0;p<t.players.length;p++) if(!mjtAbsent(t,ri,p)) a.push(p); return a; }
function mjtAutoIdx(t,ri){
  const playing=mjtPlaying(t,ri);
  const empties=playing.filter(p=>mjtRawScore(t,ri,p)===null);
  return empties.length===1 ? empties[0] : -1;
}
function mjtScore(t,ri,pi){
  if(mjtAbsent(t,ri,pi)) return null;
  const raw=mjtRawScore(t,ri,pi); if(raw!==null) return raw;
  if(mjtAutoIdx(t,ri)===pi){
    let s=0; mjtPlaying(t,ri).forEach(p=>{ if(p!==pi){ const r=mjtRawScore(t,ri,p); s+=(r||0); } });
    return -s;
  }
  return null;
}
function mjtChipStart(t,pi){ return num((t.chipStart||[])[pi])||0; }
function mjtChipEndRaw(t,pi){ const v=(t.chipEnd||[])[pi]; return (v===""||v==null)?null:num(v); }
function mjtChipAutoIdx(t){
  const empties=[]; for(let p=0;p<t.players.length;p++) if(mjtChipEndRaw(t,p)===null) empties.push(p);
  return empties.length===1 ? empties[0] : -1;
}
function mjtChipNet(t,pi){
  const auto=mjtChipAutoIdx(t);
  if(auto===pi){
    let s=0; for(let p=0;p<t.players.length;p++){ if(p!==pi){ const er=mjtChipEndRaw(t,p); const end=(er===null?mjtChipStart(t,p):er); s+=(end-mjtChipStart(t,p)); } }
    return -s;
  }
  const er=mjtChipEndRaw(t,pi);
  return er===null ? 0 : er-mjtChipStart(t,pi);
}
function mjtChipEndDisp(t,pi){
  const er=mjtChipEndRaw(t,pi);
  if(er!==null) return er;
  if(mjtChipAutoIdx(t)===pi) return mjtChipStart(t,pi)+mjtChipNet(t,pi);
  return null;
}
function mjtRanks(t,ri){
  const playing=mjtPlaying(t,ri);
  const scored=playing.map(p=>[p,mjtScore(t,ri,p)]).filter(x=>x[1]!==null);
  if(scored.length<mjtSeats(t)) return {};
  scored.sort((a,b)=>b[1]-a[1]);
  const m={}; scored.forEach(([p],i)=>m[p]=i+1); return m;
}
function mjtRankCounts(t,pi){
  const c=[0,0,0,0];
  (t.rows||[]).forEach((r,ri)=>{ const rk=mjtRanks(t,ri)[pi]; if(rk&&rk<=4) c[rk-1]++; });
  return c;
}
function mjtCalc(t,pi){
  let sum=0;
  (t.rows||[]).forEach((r,ri)=>{ const s=mjtScore(t,ri,pi); if(s!==null) sum+=s; });
  const chipNet=mjtChipNet(t,pi);
  const sr=num(t.scoreRate)||0, cr=num(t.chipRate)||0, fee=num((t.fees||[])[pi])||0;
  return { sum, chipNet, net: Math.round(sum*sr+chipNet*cr-fee) };
}
function newMjTable(){
  return { id:uid(), date:todayStr(), rule:"3", ruleName:"", meIdx:null, players:["A","B","C"],
    rows:[["","",""]], chipStart:["","",""], chipEnd:["","",""],
    scoreRate:"100", chipRate:"0", fees:["","",""], feeTotal:"",
    mochi:"", kaeshi:"", uma1:"", uma2:"", uma3:"", uma4:"", hakoshita:false };
}
function mjtUma(t, idx){ return [num(t.uma1)||0,num(t.uma2)||0,num(t.uma3)||0,num(t.uma4)||0][idx]||0; }
function mjtTobiScore(t){ return Math.round(-(num(t.kaeshi)||0)/1000) + mjtUma(t, mjtSeats(t)-1); }
function mjtHasTobi(t){ return !t.hakoshita && (num(t.kaeshi)||0)>0; }
function mjtAvgRank(t, pi){
  const rc = mjtRankCounts(t, pi);
  const g = rc.reduce((a,b)=>a+b,0);
  if(!g) return null;
  let w=0; rc.forEach((n,i)=> w += (i+1)*n);
  return w/g;
}

function viewMjTable(){
  const t = UI.mjt;

  /* иҮӘеҲҶгҒ®жҢҮе®ҡ */
  h += '<div class="muted" style="font-size:11px;margin:0 2px 5px">гҖҢиҮӘеҲҶгҖҚгӮ’йҒёгҒ¶гҒЁжҲҗзёҫгӮ’е®¶иЁҲз°ҝгҒ«еҸҚжҳ гҒ§гҒҚгҒҫгҒҷ</div>';
  h += '<div style="overflow-x:auto;margin-bottom:10px"><div class="row" style="gap:6px">'+

  h += '<div class="mjt-sticky"><div style="overflow-x:auto"><table class="mjt sum"><thead><tr><th style="width:40px">жҲҗзёҫ</th>'+

    '<tr><td class="mjt-no" style="font-size:10px">е№іеқҮзқҖй Ҷ</td>'+

    P.map((p,ci)=>{ const rc=mjtRankCounts(t,ci); return '<td class="mjt-mini">'+rc.slice(0,mjtSeats(t)).map((n,k)=>'<div>'+(k+1)+'зқҖ '+n+'</div>').join("")+'</td>'; }).join("")+'</tr>'+
    '<tr><td class="mjt-no">еҗҲиЁҲ</td>'+
    P.map((p,ci)=>{ const c=mjtCalc(t,ci); return '<td class="mjt-cell" id="mjt-sum-'+ci+'" style="font-size:13px;color:'+(c.sum<0?"var(--red)":c.sum>0?"var(--blue)":"inherit")+'">'+c.sum.toFixed(1)+'</td>'; }).join("")+'</tr>'+

    P.map((p,ci)=>{ const c=mjtCalc(t,ci); return '<td class="mjt-cell" id="mjt-net-'+ci+'" style="font-weight:700;font-size:13px;color:'+(c.net>=0?"var(--blue)":"var(--red)")+'">'+signYen(c.net)+'</td>'; }).join("")+'</tr>'+

    P.map((p,ci)=>{ const sel=UI.mjtCell&&UI.mjtCell.k==="cs"&&UI.mjtCell.c===ci; const x=(t.chipStart||[])[ci]||""; const neg=(num(x)||0)<0;
      return '<td class="mjt-cell '+(sel?"sel ":"")+(neg?"red":"")+'" data-mt="cs" data-c="'+ci+'">'+(x===""?'<span class="mjt-ph">В·</span>':esc(String(x)))+'</td>'; }).join("")+'</tr>'+
    '<tr><td class="mjt-no">зөӮдәҶ</td>'+
    P.map((p,ci)=>{ const sel=UI.mjtCell&&UI.mjtCell.k==="ce"&&UI.mjtCell.c===ci; const er=mjtChipEndRaw(t,ci); const auto=mjtChipAutoIdx(t)===ci;
      let inner="",cls=""; if(er!==null){ inner=esc(String((t.chipEnd||[])[ci])); } else if(auto){ inner='<span class="mjt-auto">'+mjtChipEndDisp(t,ci)+'</span>'; } else inner='<span class="mjt-ph">В·</span>';
      return '<td class="mjt-cell '+(sel?"sel ":"")+cls+'" data-mt="ce" data-c="'+ci+'">'+inner+'</td>'; }).join("")+'</tr>'+
    '<tr><td class="mjt-no">еў—жёӣ</td>'+
    P.map((p,ci)=>{ const net=mjtChipNet(t,ci); return '<td class="mjt-cell" style="color:'+(net<0?"var(--red)":net>0?"var(--blue)":"var(--muted)")+'">'+(net>0?"+":"")+net+'</td>'; }).join("")+'</tr>'+
    '</tbody></table></div>';

  /* гӮ№гӮігӮўиЎЁ */
  h += band("гӮ№гӮігӮў(еҚҠиҚҳгҒ”гҒЁ)");
  h += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px"><table class="mjt"><thead><tr><th style="width:38px">еҚҠиҚҳ</th>'+
    P.map((p,i)=>'<th '+colW+'><input class="mjt-name" value="'+esc(p)+'" data-mt="pname" data-v="'+i+'" placeholder="еҗҚеүҚ">'+
      (P.length>mjtSeats(t)?'<div class="mjt-pdel" data-mt="pdel" data-v="'+i+'">Г—еүҠйҷӨ</div>':'')+'</th>').join("")+
    (P.length<6?'<th style="width:30px" class="mjt-add" data-mt="addp">пјӢ</th>':'')+'</tr></thead><tbody>';
  (t.rows||[]).forEach((r,ri)=>{
    const autoIdx=mjtAutoIdx(t,ri);
    h += '<tr><td class="mjt-no">'+(ri+1)+'</td>'+
      P.map((p,ci)=>{
        const sel = UI.mjtCell && UI.mjtCell.k==="s" && UI.mjtCell.r===ri && UI.mjtCell.c===ci;
        let inner, cls="";
        if(mjtAbsent(t,ri,ci)){ inner='<span class="mjt-abs">жҠң</span>'; cls="abs"; }
        else { const raw=mjtRawScore(t,ri,ci);
          if(raw!==null){ inner=esc(String(t.rows[ri][ci])); cls=(raw<0?"red":raw>0?"blue":""); }
          else if(autoIdx===ci){ const s=mjtScore(t,ri,ci); inner='<span class="mjt-auto">'+s+'</span>'; cls=(s<0?"red":""); }
          else inner='<span class="mjt-ph">В·</span>';
        }
        return '<td class="mjt-cell '+(sel?"sel ":"")+cls+'" data-mt="cell" data-r="'+ri+'" data-c="'+ci+'">'+inner+'</td>';
      }).join("")+
      (P.length<6?'<td></td>':'')+
      '<td class="mjt-x" data-mt="rowdel" data-v="'+ri+'">Г—</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<button class="btn dash full" style="padding:10px 0;margin-bottom:14px" data-mt="addrow">пјӢ еҚҠиҚҳгӮ’иҝҪеҠ </button>';

  /* гӮІгғјгғ д»Ј(дјҡиЁҲгғ•гғӯгғј) */
  h += band("гӮІгғјгғ д»Ј(зІҫз®—)");
  const np=P.length;
  const feeTotal=num(t.feeTotal)||0;
  const feeSum=P.reduce((a,p,ci)=>a+(num((t.fees||[])[ci])||0),0);
  const diff=feeSum-feeTotal;
  h += '<div class="card" style="margin-bottom:8px"><div class="row" style="gap:8px;align-items:flex-end">'+
    '<div style="flex:1"><div class="muted" style="font-size:9px;margin-bottom:2px">еә—гҒӢгӮүгҒ®з·ҸйЎҚ</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="дҫӢ:11400" value="'+esc(t.feeTotal||"")+'" data-mt="ftotal"></div>'+
    '<div style="flex:1;text-align:center"><div class="muted" style="font-size:9px">1дәәгҒӮгҒҹгӮҠзӣ®е®ү</div>'+
    '<div class="mono" style="font-size:16px;font-weight:700">'+(feeTotal>0?"ВҘ"+Math.ceil(feeTotal/np).toLocaleString("ja-JP"):"вҖ“")+'</div></div></div></div>';
  h += '<div style="overflow-x:auto;margin-bottom:6px"><table class="mjt"><thead><tr>'+
    P.map((p,i)=>'<th '+colW+'>'+esc(p||("P"+(i+1)))+'</th>').join("")+'</tr></thead><tbody><tr>'+
    P.map((p,ci)=>'<td style="padding:4px"><input class="input sm mono r" type="number" inputmode="numeric" placeholder="еҶҶ" value="'+esc((t.fees||[])[ci]||"")+'" data-mt="fee" data-c="'+ci+'" style="min-width:48px"></td>').join("")+
    '</tr></tbody></table></div>';
  if(feeTotal>0 || feeSum>0){
    const okc = diff===0 ? "var(--teal)" : "var(--red)";
    h += '<div class="card" style="margin-bottom:12px"><div class="row between" style="font-size:12px"><span class="muted">е…ҘеҠӣеҗҲиЁҲ</span><span class="mono">ВҘ'+feeSum.toLocaleString("ja-JP")+'</span></div>'+
      '<div class="row between" style="font-size:12px;margin-top:3px"><span class="muted">з·ҸйЎҚ</span><span class="mono">ВҘ'+feeTotal.toLocaleString("ja-JP")+'</span></div>'+
      '<div class="row between" style="font-size:13px;margin-top:5px;border-top:1px solid var(--line);padding-top:5px"><span style="font-weight:700">йҒҺдёҚи¶і</span><span class="mono" style="font-weight:700;color:'+okc+'">'+(diff===0?"Вұ0 (дёҖиҮҙ)":(diff>0?"+":"")+"ВҘ"+diff.toLocaleString("ja-JP"))+'</span></div></div>';
  }

  /* гӮӯгғјгғ‘гғғгғү */
  if(UI.mjtCell){
    const cell=UI.mjtCell, isScore=cell.k==="s";
    let who=P[cell.c]||("P"+(cell.c+1)), ctx, curVal;
    if(isScore){ ctx="еҚҠиҚҳ"+(cell.r+1); curVal=t.rows[cell.r][cell.c]; }
    else if(cell.k==="cs"){ ctx="гғҒгғғгғ—й–Ӣе§Ӣ"; curVal=(t.chipStart||[])[cell.c]; }
    else { ctx="гғҒгғғгғ—зөӮдәҶ"; curVal=(t.chipEnd||[])[cell.c]; }
    let disp = curVal==="x" ? "жҠңз•Ә" : (curVal===""||curVal==null ? "0" : curVal);
    const dispCol = (curVal==="x") ? "var(--amber)" : (num(curVal)<0 ? "var(--red)" : num(curVal)>0 ? "var(--blue)" : "var(--text)");
    const showTobi = isScore && mjtHasTobi(t);
    h += '<div class="mjt-pad-wrap"><div class="mjt-pad-head"><span class="muted" style="font-size:12px">е…ҘеҠӣдёӯ: <b style="color:var(--text)">'+esc(who)+'</b> В· '+ctx+'</span>'+
      '<span class="mono" style="font-size:20px;font-weight:700;color:'+dispCol+'">'+esc(String(disp))+'</span></div>'+
      '<div class="mjt-pad">'+
      ["1","2","3","4","5","6","7","8","9"].map(k=>'<button class="mjt-key" data-mt="key" data-v="'+k+'">'+k+'</button>').join("")+
      '<button class="mjt-key" data-mt="key" data-v="Вұ">Вұ</button>'+
      '<button class="mjt-key" data-mt="key" data-v="0">0</button>'+
      '<button class="mjt-key" data-mt="key" data-v="вҢ«">вҢ«</button>'+
      (isScore?'<button class="mjt-key" data-mt="key" data-v="жҠң" style="color:var(--muted)">жҠңз•Ә</button>':'')+
      (showTobi?'<button class="mjt-key" data-mt="key" data-v="йЈӣ" style="color:var(--amber);border-color:var(--amber)">йЈӣгҒі</button>':'')+

  }
  h += '<div style="height:40px"></div>';
  return h;

function bindMjTable(){
  const t = UI.mjt;
  document.querySelectorAll("[data-mt='pname']").forEach(el=>{ el.oninput=e=>{ t.players[num(el.dataset.v)]=e.target.value; saveMjt(false); }; });
  const rn=document.querySelector("[data-mt='rname']"); if(rn) rn.oninput=e=>{ t.ruleName=e.target.value; saveMjt(false); };
  document.querySelectorAll("[data-mt='rd']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); }; });
  const ft=document.querySelector("[data-mt='ftotal']"); if(ft) ft.oninput=e=>{ t.feeTotal=e.target.value; saveMjt(false); };
  document.querySelectorAll("[data-mt='rate']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); updateMjtSummary(); }; });
  document.querySelectorAll("[data-mt='fee']").forEach(el=>{ el.oninput=e=>{ (t.fees=t.fees||[])[num(el.dataset.c)]=e.target.value; saveMjt(false); updateMjtSummary(); updateMjtFeeSum(); }; });

  document.querySelectorAll("[data-mt]").forEach(el=>{
    const a=el.dataset.mt;
    if(["pname","rate","fee","rname","rd","ftotal"].includes(a)) return;
    if(a==="hako"){ el.onchange=()=>{ t.hakoshita=el.checked; saveMjt(false); render(); }; return; }
    el.onclick=()=>{
      if(a==="back"){ saveMjt(true); UI.screen="main"; UI.tab="tool"; UI.mjt=null; UI.mjtCell=null; render(); }
      else if(a==="del"){ if(confirm("гҒ“гҒ®гӮ№гӮігӮўиЎЁгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?")){ S.mjTables=(S.mjTables||[]).filter(x=>String(x.id)!==String(t.id)); save(); UI.screen="main"; UI.tab="tool"; UI.mjt=null; UI.mjtCell=null; render(); } }
      else if(a==="rule"){ t.rule=el.dataset.v; UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="setme"){ const i=num(el.dataset.v); t.meIdx = (t.meIdx===i?null:i); saveMjt(false); render(); }
      else if(a==="addp"){ if(t.players.length<6){ t.players.push(String.fromCharCode(65+t.players.length)); t.rows.forEach(r=>r.push("")); t.chipStart.push(""); t.chipEnd.push(""); (t.fees=t.fees||[]).push(""); UI.mjtCell=null; saveMjt(false); render(); } }
      else if(a==="pdel"){
        const i=num(el.dataset.v);
        if(t.players.length<=mjtSeats(t)){ alert(mjtSeats(t)+"дәәгӮҲгӮҠжёӣгӮүгҒӣгҒҫгҒӣгӮ“гҖӮ"); return; }
        if(confirm("гҖҢ"+(t.players[i]||"")+"гҖҚгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?гҒ“гҒ®еҲ—гҒ®иЁҳйҢІгӮӮж¶ҲгҒҲгҒҫгҒҷгҖӮ")){
          t.players.splice(i,1); t.rows.forEach(r=>r.splice(i,1)); t.chipStart.splice(i,1); t.chipEnd.splice(i,1); (t.fees||[]).splice(i,1);
          if(t.meIdx===i) t.meIdx=null; else if(t.meIdx>i) t.meIdx--;
          UI.mjtCell=null; saveMjt(false); render();
        }
      }
      else if(a==="tokakei"){ mjtToKakei(); }
      else if(a==="addrow"){ t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="rowdel"){ t.rows.splice(num(el.dataset.v),1); if(!t.rows.length) t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="cell"){ UI.mjtCell={k:"s",r:num(el.dataset.r),c:num(el.dataset.c)}; render(); }
      else if(a==="cs"){ UI.mjtCell={k:"cs",c:num(el.dataset.c)}; render(); }
      else if(a==="ce"){ UI.mjtCell={k:"ce",c:num(el.dataset.c)}; render(); }
      else if(a==="key"){ padInput(el.dataset.v); }
      else if(a==="keydone"){ UI.mjtCell=null; saveMjt(false); render(); }
    };
  });
}
function updateMjtFeeSum(){ /* йҒҺдёҚи¶ігӮ«гғјгғүгҒҜгғ•гғ«еҶҚжҸҸз”»гҒ§еҸҚжҳ (е…ҘеҠӣз¶ҷз¶ҡдёӯгҒҜз°Ўжҳ“) */ }
function updateMjtSummary(){
  const t=UI.mjt; if(!t) return;
  t.players.forEach((p,ci)=>{
    const c=mjtCalc(t,ci);
    const se=document.getElementById("mjt-sum-"+ci); if(se) se.textContent=c.sum.toFixed(1);
    const ne=document.getElementById("mjt-net-"+ci); if(ne){ ne.textContent=signYen(c.net); ne.style.color=(c.net>=0?"var(--blue)":"var(--red)"); }
  });
}
/* гӮ№гӮігӮўиЎЁгҒ®гҖҢиҮӘеҲҶгҖҚгҒ®жҲҗзёҫгӮ’йә»йӣҖгҒ®еҸҺж”ҜиЁҳйҢІ(вҶ’е®¶иЁҲз°ҝ)гҒ«еҸҚжҳ  */
function mjtToKakei(){
  const t=UI.mjt; if(t.meIdx==null){ alert("е…ҲгҒ«гҖҢиҮӘеҲҶгҖҚгӮ’йҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„гҖӮ"); return; }
  const pi=t.meIdx;
  const played=(t.rows||[]).some((r,ri)=>mjtScore(t,ri,pi)!==null);
  if(!played){ alert("гӮ№гӮігӮўгҒҢе…ҘеҠӣгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“гҖӮ"); return; }
  const c=mjtCalc(t,pi);
  const rc=mjtRankCounts(t,pi);
  const sess={ id:uid(), date:t.date, category:"set", rule:t.rule,
    store:(t.ruleName||"").trim(),
    score:String(c.sum), scoreRate:String(num(t.scoreRate)||0),
    chips:String(c.chipNet), chipRate:String(num(t.chipRate)||0),
    setFee:String(num((t.fees||[])[pi])||0),
    ranks:[String(rc[0]),String(rc[1]),String(rc[2]),String(rc[3])].slice(0,mjtSeats(t)),
    fromTable:t.id };
  S.mjSessions.push(sess);
  const fin=mjFinal(sess);
  const linkId="mj-"+sess.id;
  if(fin!==0){
    S.entries.push({id:linkId, date:sess.date, src:"mahjong",
      type: fin>0?"income":"expense", category:"йҒҠжҠҖ", amount:Math.abs(fin),
      memo:"йә»йӣҖ(гӮ»гғғгғҲгғ»"+sess.rule+"йә»)"+(sess.store?" @"+sess.store:"")});
  }
  save();
  alert("е®¶иЁҲз°ҝгҒ«еҸҚжҳ гҒ—гҒҫгҒ—гҒҹ: "+signYen(fin)+"\n(йә»йӣҖгӮҝгғ–гғ»е®¶иЁҲз°ҝгҒ«иЁҳйҢІгҒ•гӮҢгҒҫгҒ—гҒҹ)");
}
function padInput(k){
  const t=UI.mjt, c=UI.mjtCell; if(!c) return;
  const get=()=>{ if(c.k==="s") return String(t.rows[c.r][c.c]||""); if(c.k==="cs") return String((t.chipStart[c.c]||"")); return String((t.chipEnd[c.c]||"")); };
  const set=(v)=>{ if(c.k==="s") t.rows[c.r][c.c]=v; else if(c.k==="cs") t.chipStart[c.c]=v; else t.chipEnd[c.c]=v; };
  if(k==="жҠң"){ if(c.k==="s"){ set(t.rows[c.r][c.c]==="x"?"":"x"); saveMjt(false); render(); } return; }
  if(k==="йЈӣ"){ if(c.k==="s"){ set(String(mjtTobiScore(t))); saveMjt(false); render(); } return; }
  let cur=get(); if(cur==="x") cur="";
  if(k==="вҢ«") cur=cur.slice(0,-1);
  else if(k==="Вұ"){ cur = cur.startsWith("-") ? cur.slice(1) : ("-"+cur); }
  else cur = (cur==="0"?k : cur+k);
  if(cur==="-0") cur="-";
  set(cur);
  saveMjt(false); render();
}
function saveMjt(persist){
  const t=UI.mjt; if(!t) return;
  const i=(S.mjTables||[]).findIndex(x=>String(x.id)===String(t.id));
  if(i>=0) S.mjTables[i]=t; else (S.mjTables=S.mjTables||[]).push(t);
  if(persist) save(); else saveLocal();
}

function bindFixed(){
  const f = UI.fixForm;
  if(f){
    const n=document.getElementById("fx-name"); if(n) n.oninput=e=>f.name=e.target.value;
    const d=document.getElementById("fx-day"); if(d) d.oninput=e=>f.day=e.target.value;
    const st=document.getElementById("fx-start"); if(st) st.onchange=e=>f.start=e.target.value;
    const a=document.getElementById("fx-amount"); if(a) a.oninput=e=>f.amount=e.target.value;
  }
  document.querySelectorAll("[data-fa]").forEach(el=>{
    el.onclick=()=>{
      const a=el.dataset.fa, v=el.dataset.v;
      if(a==="fback"){ UI.screen="main"; UI.tab="ledger"; UI.fixForm=null; render(); }
      else if(a==="new"){ UI.fixForm={type:"expense",name:"",category:"ж¶ҲиІ»",freq:"monthly",day:"",start:todayStr(),amount:""}; render(); }
      else if(a==="fcancel"){ UI.fixForm=null; render(); }
      else if(a==="ftype"){ f.type=v; f.category=v==="expense"?"ж¶ҲиІ»":"зөҰдёҺ"; render(); }
      else if(a==="fcat"){ f.category=v; render(); }
      else if(a==="ffreq"){ f.freq=v; if((v==="weekly"||v==="biweekly")&&!f.start) f.start=todayStr(); render(); }
      else if(a==="edit"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t){ UI.fixForm={editId:t.id, type:t.type, name:t.name, category:t.category, freq:t.freq||"monthly", day:t.day?String(t.day):"", start:t.start||todayStr(), amount:String(t.amount)}; render(); }
      }
      else if(a==="stop"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("гҖҢ"+t.name+"гҖҚгҒ®е®ҡжңҹгӮ’еҒңжӯўгҒ—гҒҫгҒҷгҒӢ?\nжңӘжқҘгҒ®дәҲе®ҡеҲҶгҒҜеүҠйҷӨгҒ•гӮҢгҖҒйҒҺеҺ»гҒ®иЁҳйҢІгҒҜж®ӢгӮҠгҒҫгҒҷгҖӮ")){
          stopFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdelete"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("гҖҢ"+t.name+"гҖҚгӮ’е®Ңе…ЁгҒ«еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?\nйҒҺеҺ»гҒ®е®ҹзёҫгӮӮеҗ«гӮҒгҒҰгҖҒгҒ“гҒ®еӣәе®ҡиІ»гҒ®иЁҳйҢІгҒҢе…ЁгҒҰж¶ҲгҒҲгҒҫгҒҷгҖӮ")){
          deleteFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fsave"){
        if(!f.name.trim()){ alert("й …зӣ®еҗҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ"); return; }
        if(num(f.amount)<=0){ alert("йҮ‘йЎҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ"); return; }
        const freq = f.freq || "monthly";
        const isW = (freq==="weekly"||freq==="biweekly");
        if(isW && !f.start){ alert("иө·зӮ№ж—ҘгӮ’йҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„гҖӮ"); return; }
        let day = num(f.day); if(day<1) day=1; if(day>31) day=31;
        const base={name:f.name.trim(), type:f.type, category:f.category, freq,
          day:isW?"":String(day), start:isW?f.start:"", amount:String(num(f.amount))};
        if(f.editId){
          updateFixed(Object.assign({id:f.editId}, base));
        }else{
          const tpl=Object.assign({id:uid()}, base);
          (S.fixed=S.fixed||[]).push(tpl);
          genFixedEntries(tpl);
          save();
        }
        UI.fixForm=null; render();
      }
    };
  });
}

    h += '<div><div class="muted" style="font-size:9px;margin-bottom:2px">гӮІгғјгғ д»Ј еҗҲиЁҲ(е ҙд»Јгғ»гғҲгғғгғ—иіһгғ»еҘўгӮҠиҫјгҒҝ)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="гҒҫгҒЁгӮҒгҒҰе…ҘеҠӣ" value="'+esc(m.setFee)+'" data-in="mjf" data-v="setFee"></div>';
  }

  h += band("гҒ“гҒ®ж—ҘгҒ®зөҗжһң");
  h += '<div class="card" id="mj-summary">'+mjSummary(m)+'</div>';
  h += '<input class="input" placeholder="гғЎгғў(д»»ж„Ҹ)" value="'+esc(m.memo||"")+'" style="margin:14px 0" data-in="mjf" data-v="memo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.mjIsNew?'<button class="btn danger" data-a="mjdel">еүҠйҷӨ</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="mjsave">дҝқеӯҳгҒҷгӮӢ</button></div>';
  return h;
}

function mjSignedRow(label, val, field, rateLabel, rateVal, rateField, rateDecimal){
  const neg = String(val||"").startsWith("-");
  return '<div style="margin-bottom:8px">'+
    '<div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+
    '<div class="row" style="gap:6px;align-items:center">'+
    '<button class="signbtn" style="width:34px;height:34px;border:1.5px solid '+(neg?"var(--red)":"var(--teal)")+';color:'+(neg?"var(--red)":"var(--teal)")+
    ';background:'+(neg?"rgba(229,115,115,.1)":"rgba(45,212,191,.1)")+'" data-a="mjsign" data-v="'+field+'">'+(neg?"вҲ’":"пјӢ")+'</button>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="0" value="'+esc(String(val||"").replace("-",""))+'" style="flex:1.3;min-width:0" data-in="mjabs" data-v="'+field+'">'+
    '<span class="muted" style="font-size:10px;flex-shrink:0">'+rateLabel+'</span>'+
    '<input class="input sm mono r" type="number" inputmode="'+(rateDecimal?"decimal":"numeric")+'"'+(rateDecimal?' step="0.1"':'')+' value="'+esc(rateVal)+'" style="flex:1;min-width:0" data-in="mjf" data-v="'+rateField+'"></div></div>';
}
function mjFeeFormula(m){
  if(m.category!=="free" || !mjHanchan(m)) return "";
  const h=mjHanchan(m), t=num((m.ranks||[])[0]);
  const parts=[];
  if(num(m.baseFee)) parts.push("еҹәжң¬"+num(m.baseFee)+"Г—"+h);
  if(num(m.topBonus)&&t) parts.push("гғҲгғғгғ—иіһ"+num(m.topBonus)+"Г—"+t);
  if(num(m.drinkFee)) parts.push("гғүгғӘгғігӮҜ"+num(m.drinkFee));
  return parts.length ? parts.join(" + ")+" = ВҘ"+mjGameFee(m).toLocaleString("ja-JP") : "";
}
function mjSummary(m){
  const srow=(l,v,big)=>'<div class="row between" style="'+(big?"align-items:baseline":"font-size:13px;margin:4px 0")+'">'+
    '<span '+(big?'style="font-size:12px;font-weight:700"':'class="muted"')+'>'+l+'</span>'+
    '<span class="mono '+clsPM(v)+'" style="'+(big?"font-size:20px;font-weight:700":"")+'">'+signYen(v)+'</span></div>';
  let h = srow("гӮ№гӮігӮўеҸҺж”Ҝ", mjScoreYen(m));
  if(num(m.chips)||fnum(m.chipRate)) h += srow("гғҒгғғгғ—еҸҺж”Ҝ", mjChipYen(m));
  h += '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">йә»йӣҖгҒ®гҒҝеҸҺж”Ҝ(гӮІгғјгғ д»ЈжҠң)</span>'+
    '<span class="mono '+clsPM(mjRaw(m))+'" style="font-weight:700">'+signYen(mjRaw(m))+'</span></div>';
  h += srow("гӮІгғјгғ д»Ј", -mjGameFee(m));
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>';
  h += srow("жңҖзөӮеҸҺж”Ҝ(е®¶иЁҲз°ҝгҒёйҖЈжҗә)", mjFinal(m), true);
  return h;
}

function bindMj(){
  const m = UI.mjDraft;
  document.getElementById("mj-date").oninput = e=>m.date=e.target.value;
  document.getElementById("mj-store").oninput = e=>m.store=e.target.value;
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind=el.dataset.in, v=el.dataset.v;
    el.oninput = ()=>{
      if(kind==="mjf"){ m[v]=el.value; refreshMj(); }
      else if(kind==="mjabs"){
        const neg = String(m[v]||"").startsWith("-");
        m[v] = (neg?"-":"") + el.value.replace(/-/g,"");
        refreshMj();
      }
      else if(kind==="mjrank"){ (m.ranks=m.ranks||["","","",""])[num(v)]=el.value; refreshMj(); }
    };
  });
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mjDraft=null; render(); }
      else if(a==="mjcat"){ m.category=v; render(); }
      else if(a==="mjrule"){ m.rule=v; render(); }
      else if(a==="mjsign"){
        const cur=String(m[v]||"");
        m[v] = cur.startsWith("-") ? cur.slice(1) : "-"+cur;
        render();
      }
      else if(a==="rankup"||a==="rankdn"){
        const i=num(v); m.ranks=m.ranks||["","","",""];
        let cur=num(m.ranks[i]); cur += (a==="rankup"?1:-1); if(cur<0) cur=0;
        m.ranks[i]=String(cur); render();
      }
      else if(a==="mjdel"){
        if(!confirm("гҒ“гҒ®йә»йӣҖиЁҳйҢІгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?")) return;
        S.entries = S.entries.filter(e=>e.id!=="mj-"+m.id);
        S.mjSessions = (S.mjSessions||[]).filter(x=>x.id!==m.id);
        save(); UI.screen="main"; UI.mjDraft=null; render();
      }
      else if(a==="mjsave") saveMj();
    };
  });
}

function refreshMj(){
  const m = UI.mjDraft;
  const su=document.getElementById("mj-summary"); if(su) su.innerHTML=mjSummary(m);
  const hn=document.getElementById("mj-hanchan"); if(hn) hn.textContent="еҚҠиҚҳж•° "+mjHanchan(m)+(mjAvgRank(m)!==null?" / е№іеқҮзқҖй Ҷ "+mjAvgRank(m).toFixed(2):"");
  const ff=document.getElementById("mj-feeformula"); if(ff) ff.textContent=mjFeeFormula(m);
  const fa=document.getElementById("mj-feeauto"); if(fa) fa.textContent="ВҘ"+mjGameFee(m).toLocaleString("ja-JP");
}

function saveMj(){
  const m = UI.mjDraft;
  if(!m.date) return;
  const cleaned = Object.assign({}, m);
  const rc = mjRankCount(cleaned);
  cleaned.ranks = (cleaned.ranks||["","","",""]).slice(0,4).map((x,i)=> i<rc ? x : "");
  if(UI.mjIsNew) S.mjSessions.push(cleaned);
  else S.mjSessions = S.mjSessions.map(x=>x.id===m.id?cleaned:x);
  if(fnum(cleaned.scoreRate)) S.rates.mjScore = cleaned.scoreRate;
  if(fnum(cleaned.chipRate)) S.rates.mjChip = cleaned.chipRate;
  if(num(cleaned.baseFee)) S.rates.mjBase = cleaned.baseFee;
  if(num(cleaned.topBonus)) S.rates.mjTop = cleaned.topBonus;
  if(num(cleaned.drinkFee)) S.rates.mjDrink = cleaned.drinkFee;
  const linkId = "mj-"+m.id;
  const fin = mjFinal(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"mahjong",
      type: fin>0?"income":"expense",
      category: "йҒҠжҠҖ",
      amount: Math.abs(fin),
      memo: "йә»йӣҖ"+(cleaned.category==="free"?"(гғ•гғӘгғј":"(гӮ»гғғгғҲ")+"гғ»"+cleaned.rule+"йә»)"+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.mjDraft=null; render();
}

function bindMain(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a = el.dataset.a, v = el.dataset.v;
      if(a==="tab"){ UI.tab=v; render(); }
      else if(a==="mprev") moveMonth(-1);
      else if(a==="mnext") moveMonth(1);
      else if(a==="csv") exportCsv();
      else if(a==="fixed"){ UI.screen="fixed"; UI.fixForm=null; render(); }
      else if(a==="mjtnew"){ UI.mjt=newMjTable(); UI.mjtCell=null; saveMjt(false); UI.screen="mjtable"; render(); }
      else if(a==="mjtopen"){ const t=(S.mjTables||[]).find(x=>String(x.id)===String(v)); if(t){ UI.mjt=t; UI.mjtCell=null; UI.screen="mjtable"; render(); } }
      else if(a==="mdb"){ UI.screen="mdb"; UI.mdbForm=null; render(); }
      else if(a==="backup"){ UI.screen="backup"; UI.msg=""; render(); }
      else if(a==="add"){
        if(UI.tab==="ledger"){ UI.editEntryId=null;
          UI.entryForm={date:todayStr(),type:"expense",category:"ж¶ҲиІ»",amount:"",memo:""};
          UI.screen="entry"; render();
        } else if(UI.tab==="mahjong"){
          UI.mjDraft={id:uid(),date:todayStr(),store:"",category:"free",rule:"4",
            score:S.rates.mjScore!==undefined?"":"", chips:"",
            scoreRate:S.rates.mjScore||"", chipRate:S.rates.mjChip||"",
            ranks:["","","",""], baseFee:S.rates.mjBase||"", topBonus:S.rates.mjTop||"", drinkFee:S.rates.mjDrink||"",
            setFee:"", memo:""};
          UI.mjIsNew=true; UI.screen="mahjong-edit"; render();
        } else {
          UI.draft={id:uid(),date:todayStr(),store:"",mode:"nori",partnerName:"",fee:"",
            exchange:S.rates.exchange||"",pExchange:S.rates.pExchange||"",pushPayout:S.rates.pushPayout||"",pushDraw:S.rates.pushDraw||"",machines:[],expenses:[],memo:""};
          UI.whoTab="me";
          UI.isNewSess=true; UI.screen="session"; render();
        }
      }
      else if(a==="mjedit"){
        const s = (S.mjSessions||[]).find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.screen="mahjong-edit"; render();
      }
      else if(a==="eedit"){
        const e = S.entries.find(x=>String(x.id)===String(v));
        if(!e) return;
        if(e.src==="slot"){
          const s = S.sessions.find(x=>"slot-"+x.id===e.id);
          if(s){ UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.tab="slot"; UI.screen="session"; render(); return; }
        }
        if(e.src==="mahjong"){
          const s = (S.mjSessions||[]).find(x=>"mj-"+x.id===e.id);
          if(s){ UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.tab="mahjong"; UI.screen="mahjong-edit"; render(); return; }
        }
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),memo:e.memo||""};
        UI.screen="entry"; render();
      }
      else if(a==="sedit"){
        const s = S.sessions.find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.screen="session"; render();
      }
    };
  });
}

function exportCsv(){
  const NET_SRCS = ["slot","mahjong"];
  const divLabel = e => NET_SRCS.includes(e.src) ? "йҒҠжҠҖ" : (e.type==="income"?"еҸҺе…Ҙ":"ж”ҜеҮә");
  const rows = [["ж—Ҙд»ҳ","еҢәеҲҶ","гӮ«гғҶгӮҙгғӘ","йҮ‘йЎҚ","гғЎгғў"]];
  S.entries.slice().sort((a,b)=>a.date>b.date?1:-1).forEach(e=>{
    const signed = e.type==="income" ? e.amount : -e.amount;
    rows.push([e.date, divLabel(e), e.category, signed, (e.memo||"").replace(/,/g,"гҖҒ")]);
  });
  dl("\uFEFF"+rows.map(r=>r.join(",")).join("\n"), "kakeibo.csv", "text/csv");
}
function dl(content, name, type){
  const blob = new Blob([content],{type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

function nameHints(){
  const seen=[];
  S.sessions.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(s=>{
    const n=(s.partnerName||"").trim();
    if(n && !seen.includes(n)) seen.push(n);

}

    '<input class="input mono r" type="number" inputmode="numeric" placeholder="дҫӢ: 250" value="'+esc(s.pExchange||"")+'" style="flex:1" data-in="pexchange">'+
    '<span class="muted" style="font-size:12px">зҺү=1000еҶҶ</span></div>'+

    h += band("е ұй…¬(е®¶иЁҲз°ҝгҒ«еҸҚжҳ )");

      '<input class="input mono r" type="number" inputmode="numeric" placeholder="дҫӢ: 15000" value="'+esc(s.fee)+'" data-in="fee"></div>';
  }

  /* ----- еҸ°гғҮгғјгӮҝ(иІҜзҺүж–№ејҸ) ----- */
  if(s.mode==="nori"){
    /* д№—гӮҠжү“гҒЎ: иҮӘеҲҶ/зӣёж–№гӮҝгғ– */
    const who = UI.whoTab || "me";
    const pn = (s.partnerName||"").trim()||"зӣёж–№";
    h += band("жү“гҒЈгҒҹеҸ°");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      [["me","иҮӘеҲҶ"],["partner",pn]].map(([v,l])=>
        '<button class="btn '+(who===v?"sel":"")+'" style="flex:1" data-a="whotab" data-v="'+v+'">'+esc(l)+
        ' <span class="mono" style="font-size:11px">'+signYen(personSlotYen(s,v))+'</span></button>').join("")+'</div>';
    slotMachines(s, who).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi" && (m.who||"me")===who).forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="slot|'+who+'">пјӢ гӮ№гғӯгғғгғҲеҸ°</button>'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="pachi|'+who+'">пјӢ гғ‘гғҒгғігӮіеҸ°</button></div>';
  } else {
    h += band(s.mode==="dai" ? "жү“гҒЈгҒҹеҸ°(е®ўгҒ®зҺүгғ»е ұе‘Ҡз”Ё)" : "жү“гҒЈгҒҹеҸ°");
    slotMachines(s).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi").forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="slot">пјӢ гӮ№гғӯгғғгғҲеҸ°</button>'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="pachi">пјӢ гғ‘гғҒгғігӮіеҸ°</button></div>';
  }

  /* ----- зөҢиІ» ----- */
  h += band("зөҢиІ»(йЈІйЈҹгҒӘгҒ©)");
  (s.expenses||[]).forEach(x=>{
    h += '<div class="row" style="gap:6px;margin-bottom:6px">'+
      '<input class="input sm" placeholder="еҶ…е®№" value="'+esc(x.label)+'" style="flex:1.5" data-in="xlabel" data-v="'+x.id+'">'+

      '<button class="xbtn" data-a="xdel" data-v="'+x.id+'">Г—</button></div>';
  });
  h += '<button class="btn dash full" data-a="xadd">пјӢ зөҢиІ»гӮ’иҝҪеҠ </button>';

  /* ----- гӮөгғһгғӘгғј ----- */
  h += band("гҒ“гҒ®гӮ»гғғгӮ·гғ§гғігҒ®зөҗжһң");
  h += '<div class="card" id="ssummary">'+sessionSummary(s)+'</div>';
  h += '<input class="input" placeholder="гӮ»гғғгӮ·гғ§гғігғЎгғў(д»»ж„Ҹ)" value="'+esc(s.memo||"")+'" style="margin:14px 0" data-in="smemo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.isNewSess?'<button class="btn danger" data-a="sdel">еүҠйҷӨ</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="ssave">дҝқеӯҳгҒҷгӮӢ</button></div>';
  return h;
}

function sessionSummary(s){
  const srow = (l,v) => '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">'+l+'</span><span class="mono '+clsPM(v)+'">'+signYen(v)+'</span></div>';
  let h = "";
  if(s.mode==="dai"){
    /* д»Јжү“гҒЎ: е ұй…¬гҒҢе®¶иЁҲз°ҝгҒёгҖӮеҸ°еӢқж•—гҒҜе ұе‘Ҡз”Ё */
    const dai = daiResult(s);
    if(slotMachines(s).some(machHasData)){
      h += '<div class="card2" style="margin-bottom:10px"><div class="row between" style="align-items:baseline">'+
        '<span style="font-size:11px;font-weight:700">е®ўгҒ®зҺүгҒ§гҒ®еӢқж•—(е ұе‘Ҡз”Ё)</span>'+
        '<span class="mono '+clsPM(dai)+'" style="font-size:16px;font-weight:700">'+signYen(dai)+'</span></div>'+
        '<div class="muted" style="font-size:10px;margin-top:4px">гҒ“гҒ®йҮ‘йЎҚгҒҜе®¶иЁҲз°ҝгҒ«гҒҜеҸҚжҳ гҒ•гӮҢгҒҫгҒӣгӮ“</div></div>';
    }
    h += srow("е ұй…¬", num(s.fee));
    h += srow("зөҢиІ»(иҮӘеҲҶиІ жӢ…еҲҶ)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">жңҖзөӮеҸҺж”Ҝ(е®¶иЁҲз°ҝгҒёйҖЈжҗә)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
    return h;
  }
  if(s.mode==="nori"){
    const me = personSlotYen(s,"me"), pt = personSlotYen(s,"partner"), pn = esc((s.partnerName||"").trim()||"зӣёж–№");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted" style="font-size:10px">иҮӘеҲҶ</div>'+
      '<div class="mono '+clsPM(me)+'" style="font-size:15px;font-weight:700">'+signYen(me)+'</div></div>'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted ellip" style="font-size:10px">'+pn+'</div>'+
      '<div class="mono '+clsPM(pt)+'" style="font-size:15px;font-weight:700">'+signYen(pt)+'</div></div></div>';
    h += srow("2дәәеҗҲиЁҲ", poolTotal(s));
    /* жҠҳеҚҠиӘҝж•ҙ: иҮӘеҲҶгҒ®еҸ–гӮҠеҲҶгӮ’з·ЁйӣҶеҸҜгҖҒзӣёж–№гҒҜж®ӢгӮҠгӮ’иҮӘеӢ• */
    const half = halfSplit(s), mine = myShare(s), theirs = partnerShare(s);
    const adjusted = (s.myShare!==undefined && s.myShare!=="" && num(s.myShare)!==half);
    h += '<div class="row between" style="align-items:center;font-size:13px;margin:8px 0 4px">'+
      '<span class="muted">иҮӘеҲҶгҒ®еҸ–гӮҠеҲҶ</span>'+
      '<div class="row" style="align-items:center;gap:6px">'+
      '<span class="mono muted" style="font-size:12px">ВҘ</span>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="'+half+'" value="'+esc(s.myShare!==undefined?s.myShare:"")+'" style="width:100px" data-in="myshare">'+
      '</div></div>';
    h += '<div class="row between" style="font-size:12px;margin:2px 0 4px"><span class="muted">'+esc((s.partnerName||"").trim()||"зӣёж–№")+'гҒ®еҸ–гӮҠеҲҶ(иҮӘеӢ•)</span>'+
      '<span class="mono '+clsPM(theirs)+'">'+signYen(theirs)+'</span></div>';
    if(adjusted) h += '<div class="muted" style="font-size:10px;margin-bottom:2px">жҠҳеҚҠ'+signYen(half)+'гҒӢгӮүиӘҝж•ҙжёҲгҒҝ(е·®'+signYen(mine-half)+')</div>';
  }
  if(s.mode==="nori"){
    h += srow("зөҢиІ»(иҮӘеҲҶиІ жӢ…еҲҶ)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">жңҖзөӮеҸҺж”Ҝ(е®¶иЁҲз°ҝгҒёйҖЈжҗә)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
    return h;
  }
  h += srow("иҮӘеҲҶгҒ®еҸҺж”Ҝ", grossOwn(s));
  h += srow("зөҢиІ»(иҮӘеҲҶиІ жӢ…еҲҶ)", -expTotal(s));
  const fin = finalOwn(s);
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
    '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">жңҖзөӮеҸҺж”Ҝ(е®¶иЁҲз°ҝгҒёйҖЈжҗә)</span>'+
    '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>';
  return h;
}
</script>
<script>
/* ---------- еҸ°гӮ«гғјгғү ---------- */
function viewSlotMachine(m, s){
  const q = (m.name||"").trim();

  const sabai = machSabai(m);

  /* иІҜзҺүж–№ејҸгҒ®4й …зӣ® */
  h += '<div class="grid2" style="margin-bottom:8px">'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">й–Ӣе§ӢиІҜзҺү(жһҡ)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.startStock||"")+'" data-in="mstock" data-v="'+m.id+'|startStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">зөӮдәҶиІҜзҺү(жһҡ)</div>'+

    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">зөӮдәҶжҷӮгҒ®жҢҒгҒЎзҺү(жһҡ)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.holdBalls||"")+'" data-in="mstock" data-v="'+m.id+'|holdBalls"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">е·®жһҡ(иҮӘеӢ•)</div>'+
    '<div id="sabai-'+m.id+'" class="input sm mono r '+clsPM(sabai)+'" style="border-style:dashed">'+(sabai>=0?"+":"")+sabai+'</div></div></div>';

  /* зҸҫйҮ‘жҠ•иіҮ(иӨҮж•°иЎҢ) */
  h += '<div class="muted" style="font-size:9px;margin-bottom:3px">зҸҫйҮ‘жҠ•иіҮ(еҶҶ)</div>';
  (m.cash||[]).forEach(c=>{
    h += '<div class="row" style="gap:6px;margin-bottom:5px">'+
      '<input class="input sm" placeholder="гғЎгғў(д»»ж„Ҹ)" value="'+esc(c.label||"")+'" style="flex:1.3" data-in="mcash" data-v="'+m.id+'|'+c.id+'|label">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="йҮ‘йЎҚ" value="'+esc(c.amount||"")+'" style="flex:1" data-in="mcash" data-v="'+m.id+'|'+c.id+'|amount">'+
      '<button class="xbtn" data-a="mcashdel" data-v="'+m.id+'|'+c.id+'">Г—</button></div>';
  });
  h += '<button class="btn dash full" style="font-size:11px;margin-bottom:8px" data-a="mcashadd" data-v="'+m.id+'">пјӢ зҸҫйҮ‘жҠ•иіҮ</button>';

  /* еҸ°еҸҺж”Ҝ */
  if(machHasData(m)){
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid var(--line);padding-top:8px">'+
      '<span style="font-size:11px;font-weight:700">еҸ°еҸҺж”Ҝ</span>'+
      '<span class="mono '+clsPM(yenv)+'" style="font-size:16px;font-weight:700">'+signYen(yenv)+'</span></div>'+
      (num(s.exchange)<=0?'<div class="red" style="font-size:10px;margin-top:4px">дәӨжҸӣжһҡж•°гӮ’е…ҘеҠӣгҒҷгӮӢгҒЁеҶҶжҸӣз®—гҒ•гӮҢгҒҫгҒҷ</div>':'');
  }
  h += '<input class="input sm" placeholder="гғЎгғў(д»»ж„Ҹ)" value="'+esc(m.memo||"")+'" data-in="mmemo" data-v="'+m.id+'" style="margin-top:8px"></div>';

function viewMachine(m, s){
  const q = (m.name||"").trim();
  const hits = S.mdb.filter(x=>x.kind===m.kind && (x.name||"").trim() && x.name.includes(q) && x.name.trim()!==q).slice(0,4);

    (m.kind==="slot"?"гӮ№гғӯгғғгғҲ":"гғ‘гғҒгғігӮі")+'</span>'+
    '<input class="input sm" placeholder="ж©ҹзЁ®еҗҚ" value="'+esc(m.name)+'" style="flex:1" data-in="mname" data-v="'+m.id+'">'+
    '<button class="xbtn" data-a="mdel" data-v="'+m.id+'">Г—</button></div>'+
    '<div id="msug-'+m.id+'">'+(hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
