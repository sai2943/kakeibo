  const t = UI.mjt, mid = UI.sheetMode==="mid";
  let h = '<div class="row" style="align-items:center;padding:calc(max(env(safe-area-inset-top,0px), 54px) + 6px) 0 6px">'+
    '<button class="navbtn" data-mt="sheetback" style="font-size:14px">‹ 戻る</button>'+
    '<div style="flex:1;text-align:center;font-weight:700;font-size:14px">'+(mid?"途中経過":"精算シート")+'</div>'+
    '<button class="navbtn" data-mt="'+(mid?"midshare":"fullshare")+'" style="font-size:13px;color:var(--teal)">画像で共有</button></div>'+
    '';
  h += mjtPrintHtml(t, mid?"mid":"screen");
  h += '<div style="height:30px"></div>';
  return h;
}

function viewMjPlay(){
  const t = UI.mjt, P = t.players, rows = (t.rows||[]);
  /* stickyは親のpadding領域へ入れないため、この画面は#appの上padding無し(CSS)。
     キャップ行がsafe-area分を不透明に塞ぎ、行がヘッダーの上へ透けるのを防ぐ */
  const stTh='position:sticky;top:env(safe-area-inset-top,0px);background:var(--bg);z-index:5;';
  let h = '<table class="mono" style="width:100%;border-collapse:collapse;table-layout:fixed">'+
    '<thead>'+
    '<tr><th colspan="'+(P.length+1)+'" style="position:sticky;top:0;z-index:6;background:var(--bg);height:env(safe-area-inset-top,0px);padding:0;border:0"></th></tr>'+
    '<tr><th style="width:34px;'+stTh+'padding:0;vertical-align:middle"><button class="navbtn" data-mt="toTable" aria-label="設定・精算へ" style="font-size:19px;padding:6px 10px">‹</button></th>'+P.map((p,ci)=>{
      const c=mjtCalc(t,ci);
      const rc=mjtRankCounts(t,ci).slice(0,mjtSeats(t));
      return '<th style="padding:4px 2px 7px;border-bottom:2px solid var(--line);'+stTh+'">'+
        '<div class="ellip" style="font-size:13px;font-weight:700">'+(t.meIdx===ci?'<span style="color:var(--amber)">★</span>':'')+esc(p||("P"+(ci+1)))+'</div>'+
        '<div style="font-size:18px;font-weight:800;color:'+(c.sum<0?"var(--red)":c.sum>0?"var(--teal)":"var(--text)")+'">'+fmtPt(c.sum)+'</div>'+
        '<div class="muted" style="font-size:10px;margin-top:1px">'+rc.join("·")+'</div></th>';
    }).join("")+'</tr></thead><tbody>';
  /* ロック済みの連続区間は折りたたむ(スクロール削減)。UI.lockedOpenで全展開 */
  const lkOpen = !!UI.lockedOpen;
  let skipUntil=-1;
  rows.forEach((r,ri)=>{
    const lk = !!((t.locked||[])[ri]);
    if(!lkOpen && lk){
      if(ri<=skipUntil) return;
      let e2=ri; while(e2+1<rows.length && (t.locked||[])[e2+1]) e2++;
      if(e2>ri){
        h += '<tr><td colspan="'+(P.length+1)+'" data-mt="lkopen" style="text-align:center;padding:11px 2px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px">🔒 '+(ri+1)+'〜'+(e2+1)+'回戦 確定済み(タップで開く)</td></tr>';
        skipUntil=e2; return;
      }
    }
    h += '<tr>'+
      (lk
        ? '<td data-mt="unlock" data-r="'+ri+'" style="text-align:center;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line)">🔒<div style="font-size:9px;line-height:1.1;margin-top:1px">'+(ri+1)+'</div></td>'
        : '<td style="text-align:center;color:var(--muted);font-size:12px;border-bottom:1px solid var(--line)">'+(ri+1)+'</td>')+
      P.map((p,ci)=>{
        const sel = !lk && UI.mjtCell && UI.mjtCell.k==="s" && UI.mjtCell.r===ri && UI.mjtCell.c===ci;
        let d, col;
        if(mjtAbsent(t,ri,ci)){ d="抜"; col="var(--muted)"; }
        else { const raw=mjtRawScore(t,ri,ci);
          if(raw!==null){ d=String(t.rows[ri][ci]); col=raw<0?"var(--red)":raw>0?"var(--teal)":"var(--text)"; }
          else if(mjtAutoIdx(t,ri)===ci){ const sc=mjtScore(t,ri,ci); d=(sc===null?"·":String(sc)); col=(sc!==null&&sc<0)?"var(--red)":(sc!==null&&sc>0)?"var(--teal)":"var(--text)"; }
          else { d="·"; col="var(--line)"; }
        }
        return '<td '+(lk?'':'data-mt="cell" data-r="'+ri+'" data-c="'+ci+'" ')+'style="text-align:center;padding:14px 2px;border-bottom:1px solid var(--line);font-size:19px;font-weight:700;'+(lk?'opacity:.8;':'')+'color:'+col+';'+(sel?"background:rgba(242,179,61,.16);outline:2px solid var(--amber);border-radius:8px":"")+'">'+esc(d)+'</td>';
      }).join("")+'</tr>';
    /* 選択中の半荘の直下にキーパッドを展開 */
    if(UI.mjtCell && UI.mjtCell.k==="s" && UI.mjtCell.r===ri){
      h += '<tr><td colspan="'+(P.length+1)+'" style="padding:4px 0 2px;border-bottom:1px solid var(--line)">'+mjtKeypadHtml(t)+'</td></tr>';
    }
  });
  h += '</tbody></table>';
  if(lkOpen && (t.locked||[]).some(Boolean)) h += '<button class="btn full" data-mt="lkclose" style="margin-top:8px;padding:8px 0;font-size:12px;color:var(--muted)">🔒 確定済みをたたむ</button>';
  h += '<button class="btn dash full" data-mt="addrow" style="margin-top:12px;padding:13px 0;font-size:15px;font-weight:700">＋ 回戦を追加</button>';
  h += '<div class="row" style="gap:6px;margin-top:8px">'+
    '<button class="btn" data-mt="tomid" style="flex:1;padding:11px 0;font-size:14px;font-weight:700;color:var(--teal);border-color:var(--teal)">途中経過を表示</button>'+
    '<button class="btn" data-mt="midshare" style="flex:1;padding:11px 0;font-size:14px;font-weight:700;color:var(--teal);border-color:var(--teal)">画像で共有</button></div>';
  h += saveIndicatorHtml();
  h += '<div class="muted" style="font-size:10px;text-align:right;margin-top:6px">ヘッダー: 上段=合計 / 下段=1着·2着·3着'+(mjtSeats(t)>3?"·4着":"")+'の回数</div>';
  h += '<div style="height:40px"></div>';
  return h;
}

function bindMjTable(){
  const t = UI.mjt;
  document.querySelectorAll("[data-mt='pname']").forEach(el=>{ el.oninput=e=>{
    t.players[num(el.dataset.v)]=e.target.value;
    /* 全席の名前が既定文字(A/B/C/D)以外で埋まった瞬間=対局開始とみなし1回だけ記録 */
    if(!t.startAt){
      const seats=mjtSeats(t);
      const done=(t.players||[]).slice(0,seats).every((p,i)=>{ const q=(p||"").trim(); return q && q!==String.fromCharCode(65+i); });
      if(done) t.startAt=nowHM();
    }
    saveMjt(false);
  }; });
  const rn=document.querySelector("[data-mt='rname']"); if(rn) rn.oninput=e=>{ t.ruleName=e.target.value; saveMjt(false); };
  const dt=document.querySelector("[data-mt='date']"); if(dt) dt.onchange=e=>{ if(e.target.value){ t.date=e.target.value; saveMjt(false); render(); } };
  const mts=document.querySelector("[data-mt='tstart']"); if(mts) mts.oninput=e=>{ t.startAt=e.target.value; saveMjt(false); };
  const mte=document.querySelector("[data-mt='tend']"); if(mte) mte.oninput=e=>{ t.endAt=e.target.value; saveMjt(false); };
  document.querySelectorAll("[data-mt='rd']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); }; el.onchange=()=>{ render(); }; });
  document.querySelectorAll("[data-mt='umaabs']").forEach(el=>{ el.oninput=e=>{ const f=el.dataset.v; const neg=String(t[f]||"").startsWith("-"); t[f]=(neg?"-":"")+e.target.value.replace(/-/g,""); saveMjt(false); }; el.onchange=()=>render(); });
  const ft=document.querySelector("[data-mt='ftotal']"); if(ft) ft.oninput=e=>{ t.feeTotal=e.target.value; saveMjt(false); };
  document.querySelectorAll("[data-mt='rate']").forEach(el=>{ el.oninput=e=>{ t[el.dataset.v]=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  document.querySelectorAll("[data-mt='fee']").forEach(el=>{ el.oninput=e=>{ (t.fees=t.fees||[])[num(el.dataset.c)]=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  document.querySelectorAll("[data-mt='pexp']").forEach(el=>{ el.oninput=e=>{ (t.pexp=t.pexp||[])[num(el.dataset.c)]=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  document.querySelectorAll("[data-mt='framt']").forEach(el=>{ el.oninput=e=>{ const r=(t.feeRelief=t.feeRelief||[])[num(el.dataset.c)]; if(r) r.v=e.target.value; saveMjt(false); }; el.onchange=()=>render(); });
  const ftt=document.querySelector("[data-mt='ftotal']"); if(ftt) ftt.onchange=()=>render();

  document.querySelectorAll("[data-mt]").forEach(el=>{
    const a=el.dataset.mt;
    if(["pname","rate","fee","rname","rd","ftotal","umaabs","pexp","framt"].includes(a)) return;
    if(a==="hako"){ el.onchange=()=>{ t.hakoshita=el.checked; saveMjt(false); render(); }; return; }
    el.onclick=()=>{
      if(a==="umasign"){ const f=el.dataset.v; const cur=String(t[f]||""); t[f]=cur.startsWith("-")?cur.slice(1):"-"+cur; saveMjt(false); render(); return; }
      if(a==="savepreset"){ mjtSavePreset(); return; }
      if(a==="editpresets"){ UI.mjtEditPresets = !UI.mjtEditPresets; render(); return; }
      if(a==="applypreset"){ mjtApplyPreset(el.dataset.v); return; }
      if(a==="delpreset"){ mjtDelPreset(el.dataset.v); return; }
      if(a==="back"){ saveMjt(true); UI.screen="mjtlist"; UI.mjt=null; UI.mjtCell=null; UI.rulesOpen=UI.chipsOpen=UI.feesOpen=null; render(); }
      else if(a==="pdf"){ mjtPrint(); }
      else if(a==="del"){ if(confirm("このスコア表を削除しますか?")){ S.mjTables=(S.mjTables||[]).filter(x=>String(x.id)!==String(t.id)); save(); UI.screen="mjtlist"; UI.mjt=null; UI.mjtCell=null; render(); } }
      else if(a==="rule"){ const nv=el.dataset.v; if(nv!==t.rule && confirm((nv==="3"?"3麻":"4麻")+"に変更しますか?\nウマ・着順計算が"+(nv==="3"?"3人":"4人")+"用に変わります(スコアのデータは消えません)。")){ t.rule=nv; const seats=num(t.rule)||3; while(t.players.length<seats){ t.players.push(String.fromCharCode(65+t.players.length)); t.rows.forEach(r=>r.push("")); t.chipStart.push(""); t.chipEnd.push(""); (t.fees=t.fees||[]).push(""); } UI.mjtCell=null; saveMjt(false); render(); } }
      else if(a==="setme"){ const i=num(el.dataset.v); t.meIdx = (t.meIdx===i?null:i); saveMjt(false); render(); }
      else if(a==="addp"){ if(t.players.length<6){ t.players.push(String.fromCharCode(65+t.players.length)); t.rows.forEach(r=>r.push("")); t.chipStart.push(""); t.chipEnd.push(""); (t.fees=t.fees||[]).push(""); UI.mjtCell=null; saveMjt(false); render(); } }
      else if(a==="pdel"){
        const i=num(el.dataset.v);
        if(t.players.length<=mjtSeats(t)){ alert(mjtSeats(t)+"人より減らせません。"); return; }
        if(confirm("「"+(t.players[i]||"")+"」を削除しますか?この列の記録も消えます。")){
          t.players.splice(i,1); t.rows.forEach(r=>r.splice(i,1)); t.chipStart.splice(i,1); t.chipEnd.splice(i,1); (t.fees||[]).splice(i,1);
          (t.pexp||[]).splice(i,1); (t.chipLocked||[]).splice(i,1); (t.feeRelief||[]).splice(i,1);
          /* 免除の負担者indexを詰める(削除者を指していたら未選択に) */
          (t.feeRelief||[]).forEach(r=>{ if(r&&r.by!=null){ if(r.by===i) r.by=null; else if(r.by>i) r.by--; } });
          UI.pdelMode=false;
          if(t.meIdx===i) t.meIdx=null; else if(t.meIdx>i) t.meIdx--;
          UI.mjtCell=null; saveMjt(false); render();
        }
      }
      else if(a==="tokakei"){ mjtToKakei(); }
      else if(a==="addrow"){ t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="rowdel"){ t.rows.splice(num(el.dataset.v),1); if(!t.rows.length) t.rows.push(new Array(t.players.length).fill("")); UI.mjtCell=null; saveMjt(false); render(); }
      else if(a==="rowdelcur"){ const c=UI.mjtCell; if(c&&c.k==="s"&&confirm((c.r+1)+"回戦を削除しますか?(この行の全員のスコアが消えます)")){ t.rows.splice(c.r,1); if(t.locked) t.locked.splice(c.r,1); if(!t.rows.length){ t.rows.push(new Array(t.players.length).fill("")); if(t.locked) t.locked.push(false); } UI.mjtCell=null; saveMjt(false); renderKeepScroll(); } }
      else if(a==="cell"){
        const r=num(el.dataset.r), c=num(el.dataset.c), cur=UI.mjtCell;
        if(cur && cur.k==="s" && cur.r===r && cur.c===c){ UI.mjtCell=null; renderKeepScroll(); return; }  /* 同じセル再タップで閉じる */
        UI.mjtCell={k:"s",r:r,c:c}; renderKeepScroll();
        const pw=document.querySelector(".mjt-pad-wrap"); if(pw) pw.scrollIntoView({block:"nearest",behavior:"smooth"});
      }
      else if(a==="toPlay"){ UI.mjtCell=null; UI.lockedOpen=false; UI.screen="mjplay"; render(); }
      else if(a==="lkopen"){ UI.lockedOpen=true; renderKeepScroll(); }
      else if(a==="lkclose"){ UI.lockedOpen=false; UI.mjtCell=null; render(); }
      else if(a==="toTable"){ UI.mjtCell=null; saveMjt(false); UI.screen="mjtable"; render(); }
      else if(a==="tosheet"){ UI.sheetMode="full"; UI.sheetFrom=UI.screen; UI.mjtCell=null; UI.screen="mjsheet"; render(); }
      else if(a==="tomid"){ UI.sheetMode="mid"; UI.sheetFrom=UI.screen; UI.mjtCell=null; UI.screen="mjsheet"; render(); }
      else if(a==="rpay"){ const cur=(t.roundPay===true?100:(num(t.roundPay)||0)); const v=num(el.dataset.v)||0; t.roundPay=(cur===v?0:v); saveMjt(false); renderKeepScroll(); }
      else if(a==="feesplit"){
        const P=t.players;                      /* 同上 */
        const totalIn=num(t.feeTotal)||0;
        const psum=P.reduce((s2,p,ci)=>s2+(num((t.pexp||[])[ci])||0),0);
        const rem=totalIn-psum;
        if(totalIn<=0){ alert("先に「店からの総額」を入力してください。"); return; }
        if(rem<0){ alert("経費の合計が総額を超えています。"); return; }
        const n=P.length, base=Math.floor(rem/n), extra=rem-base*n;
        const star=(t.meIdx!=null&&t.meIdx<n)?t.meIdx:0;
        if(!confirm("場代を均等割で上書きします\n(総額¥"+totalIn.toLocaleString("ja-JP")+" − 経費¥"+psum.toLocaleString("ja-JP")+") ÷ "+n+"人 = ¥"+base.toLocaleString("ja-JP")+(extra?"\n端数¥"+extra+"は"+(P[star]||("P"+(star+1)))+"に加算":"")+"\nよろしいですか?")) return;
        t.fees=P.map((p,ci)=>String(base+(ci===star?extra:0)));
        saveMjt(false); render();
      }
      else if(a==="frelief"){
        const ci=num(el.dataset.c); t.feeRelief=t.feeRelief||[];
        const cur=t.feeRelief[ci];
        if(!cur||!cur.m) t.feeRelief[ci]={m:"amt",v:"",by:null};
        else if(cur.m==="amt"||cur.m==="frac") t.feeRelief[ci]={m:"full",by:cur.by};
        else t.feeRelief[ci]=null;
        saveMjt(false); renderKeepScroll();
      }
      else if(a==="pdelmode"){ UI.pdelMode=!UI.pdelMode; renderKeepScroll(); }
      else if(a==="sect"){ const k=el.dataset.v; if(k==="rules")UI.rulesOpen=!UI.rulesOpen; else if(k==="chips")UI.chipsOpen=!UI.chipsOpen; else if(k==="fees")UI.feesOpen=!UI.feesOpen; renderKeepScroll(); }
      else if(a==="plock"){
        if(!t.playersLocked){ if(confirm("メンバーを確定しますか?(確定後はプレイヤーを削除できません。追加は可能)")){ t.playersLocked=true; saveMjt(false); renderKeepScroll(); } }
        else if(confirm("メンバー確定を解除しますか?")){ t.playersLocked=false; saveMjt(false); renderKeepScroll(); }
      }
      else if(a==="clock"){
        const ci=num(el.dataset.c); t.chipLocked=t.chipLocked||[];
        if(!t.chipLocked[ci]){
          if(confirm("「"+(t.players[ci]||"")+"」のチップ枚数を確定しますか?(以後この行は編集不可)")){
            /* オートフィル表示中なら実数として書き込む */
            if(mjtChipEndRaw(t,ci)===null && mjtChipAutoIdx(t)===ci){ const v=mjtChipEndDisp(t,ci); if(v!=="" && v!=null) (t.chipEnd=t.chipEnd||[])[ci]=String(v); }
            t.chipLocked[ci]=true; if(UI.mjtCell&&(UI.mjtCell.k==="cs"||UI.mjtCell.k==="ce")&&UI.mjtCell.c===ci) UI.mjtCell=null;
            saveMjt(false); renderKeepScroll();
          }
        } else if(confirm("「"+(t.players[ci]||"")+"」のチップ確定を解除しますか?")){ t.chipLocked[ci]=false; saveMjt(false); renderKeepScroll(); }
      }
      else if(a==="fby"){
        const ci=num(el.dataset.c); t.feeRelief=t.feeRelief||[];
        const cur=t.feeRelief[ci]; if(!cur||!cur.m) return;
        let nx = cur.by==null ? 0 : cur.by+1;
        while(nx<t.players.length && nx===ci) nx++;
        cur.by = nx>=t.players.length ? null : nx;
        saveMjt(false); renderKeepScroll();
      }
      else if(a==="midshare"){ mjtShareMid(false); }
      else if(a==="fullshare"){ mjtShareMid(true); }
      else if(a==="lockrow"||a==="lockrowlast"){
        const P=t.players;                      /* bindMjTableのスコープにPは無い(v2.82で修正) */
        const isLast = a==="lockrowlast";
        const cell=UI.mjtCell; if(!cell||cell.k!=="s") return;
        const ri=cell.r;
        let ok=true;
        for(let ci=0;ci<P.length;ci++){ if(!mjtAbsent(t,ri,ci) && mjtScore(t,ri,ci)===null){ ok=false; break; } }
        if(!ok){ toast("未入力のセルがあります"); return; }
        const summary=P.map((p,ci)=>(p||("P"+(ci+1)))+" "+(mjtAbsent(t,ri,ci)?"抜":fmtPt(mjtScore(t,ri,ci)))).join(" / ");
        if(!confirm((ri+1)+"回戦を確定します\n"+summary+"\nよろしいですか?"+(isLast?"\n(ラス半: 次の回戦は作りません)":""))) return;
        t.locked=t.locked||[]; t.locked[ri]=true;
        /* これより前の未確定行の救済: 完全入力済みならまとめて確定を提案
           (ロック機能導入前の行・確定し忘れて進んだ時の一括回収。逐次確定の通常プレイでは出ない) */
        const pend=[]; let pendIncomplete=0;
        for(let r2=0;r2<ri;r2++){
          if(t.locked[r2]) continue;
          let ok2=true;
          for(let ci=0;ci<P.length;ci++){ if(!mjtAbsent(t,r2,ci) && mjtScore(t,r2,ci)===null){ ok2=false; break; } }
          if(ok2) pend.push(r2); else pendIncomplete++;
        }
        if(pend.length && confirm("これより前に未確定の回戦が"+pend.length+"件あります。\nまとめて確定しますか?(スコアは変更されません)")){
          pend.forEach(r2=>{ t.locked[r2]=true; });
          if(pendIncomplete>0) toast(pendIncomplete+"件は未入力のため未確定のままです");
        }
        UI.mjtCell=null;
        if(!isLast && ri===t.rows.length-1){ t.rows.push(new Array(t.players.length).fill("")); t.locked.push(false); }
        saveMjt(false);
        /* 確定→全員で途中経過を確認→戻って次戦、が卓の基本動線 */
        UI.sheetMode="mid"; UI.sheetFrom="mjplay"; UI.lockedOpen=false; UI.screen="mjsheet"; render();
        if(isLast) toast("ラス半を確定しました。精算は対局モードに戻り「‹ 設定・精算」から");
      }
      else if(a==="unlock"){
        const ri=num(el.dataset.r);
        if(confirm((ri+1)+"回戦のロックを解除して修正しますか?(修正後はもう一度確定してください)")){
          t.locked=t.locked||[]; t.locked[ri]=false; saveMjt(false); renderKeepScroll();
        }
      }
      else if(a==="sheetback"){ UI.screen=UI.sheetFrom||"mjtable"; render(); }
      else if(a==="cs"){ UI.mjtCell={k:"cs",c:num(el.dataset.c)}; renderKeepScroll(); }
      else if(a==="ce"){ UI.mjtCell={k:"ce",c:num(el.dataset.c)}; renderKeepScroll(); }
      else if(a==="key"){ padInput(el.dataset.v); }
      else if(a==="keydone"){ UI.mjtCell=null; saveMjt(false); renderKeepScroll(); }
    };
  });
}
function updateMjtFeeSum(){ /* 過不足カードはフル再描画で反映(入力継続中は簡易) */ }
function updateMjtSummary(){
  const t=UI.mjt; if(!t) return;
  t.players.forEach((p,ci)=>{
    const c=mjtCalc(t,ci);
    const se=document.getElementById("mjt-sum-"+ci); if(se) se.textContent=fmtPt(c.sum);
    const ne=document.getElementById("mjt-net-"+ci); if(ne){ ne.textContent=signYen(c.net); ne.style.color=(c.net>=0?"var(--blue)":"var(--red)"); }

/* スコア表の「自分」の成績を麻雀の収支記録(→家計簿)に反映 */
function mjtToKakei(){
  const t=UI.mjt; if(t.meIdx==null){ alert("先に「自分」を選んでください。"); return; }
  const pi=t.meIdx;
  const played=(t.rows||[]).some((r,ri)=>mjtScore(t,ri,pi)!==null);
  if(!played){ alert("スコアが入力されていません。"); return; }
  const c=mjtCalc(t,pi);
  const rc=mjtRankCounts(t,pi);
  /* 同じスコア表からの過去の反映を差し替え(二重計上を防ぐ) */
  const prev=S.mjSessions.filter(s=>s.fromTable===t.id);
  prev.forEach(ps=>{ S.entries=S.entries.filter(e=>e.id!=="mj-"+ps.id); });
  const wasReflected=prev.length>0;
  if(!t.endAt) t.endAt = nowHM();   /* 終了時刻: 初回反映の時刻を表に記録(以後は表の値を尊重) */
  S.mjSessions=S.mjSessions.filter(s=>s.fromTable!==t.id);
  const sess={ id:uid(), date:t.date, category:"set", rule:t.rule,
    store:(t.ruleName||"").trim(),
    score:String(c.sum), scoreRate:String(num(t.scoreRate)||0),
    chips:String(c.chipNet), chipRate:String(num(t.chipRate)||0),
    setFee:String(c.shushi - mjtSettle(t).pays[pi]),  /* 収支−精算後支払の逆算(端数処理を家計簿実額へ反映。端数OFF時は生の場代に一致) */
    ranks:[String(rc[0]),String(rc[1]),String(rc[2]),String(rc[3])].slice(0,mjtSeats(t)),
    players:(t.players||[]).map((p,i)=> i===pi ? "" : (p||"").trim()).filter(Boolean).slice(0,5),
    /* 私的フィールド(経費・メモ)は再反映で消さない。
       時刻は表が所有: 反映のたび表の値をコピー(表で直せば記録に伝播)。終了は初回反映時に表へ自動記録済み */
    expenses:(prev[0]&&prev[0].expenses)||[],
    startAt:t.startAt||"",
    endAt:t.endAt||"",
    memo:(prev[0]&&prev[0].memo)||"",
    fromTable:t.id };
  S.mjSessions.push(sess);
  const fin=mjFinal(sess);
  const linkId="mj-"+sess.id;
  if(fin!==0){
    S.entries.push({id:linkId, date:sess.date, src:"mahjong",
      type: fin>0?"income":"expense", category:"遊技", amount:Math.abs(fin),
      memo:"麻雀(セット・"+sess.rule+"麻)"+(sess.store?" @"+sess.store:"")});
  }
  t.reflectedKey = pi+":"+c.net;   /* 反映済みキー: スコア/チップ/レート編集で自動的に未反映へ戻る */
  save();
  render();
  alert((wasReflected?"家計簿の記録を更新しました: ":"家計簿に反映しました: ")+signYen(fin)+"\n(麻雀タブ・家計簿に記録されました)");
}
function padInput(k){
  const t=UI.mjt, c=UI.mjtCell; if(!c) return;
  const get=()=>{ if(c.k==="s") return String(t.rows[c.r][c.c]||""); if(c.k==="cs") return String((t.chipStart[c.c]||"")); if(c.k==="ce") return String((t.chipEnd[c.c]||"")); if(c.k==="uma") return String(t[c.key]||""); return ""; };
  const set=(v)=>{ if(c.k==="s") t.rows[c.r][c.c]=v; else if(c.k==="cs") t.chipStart[c.c]=v; else if(c.k==="ce") t.chipEnd[c.c]=v; else if(c.k==="uma") t[c.key]=v; };
  if(k==="◀"||k==="▶"){ if(c.k==="s"){ const np=t.players.length; let nc=c.c+(k==="▶"?1:-1); nc=(nc+np)%np; UI.mjtCell={k:"s",r:c.r,c:nc}; renderKeepScroll(); } return; }
  if(k==="抜"){ if(c.k==="s"){ set(t.rows[c.r][c.c]==="x"?"":"x"); saveMjt(false); renderKeepScroll(); } return; }
  if(k==="飛"){ if(c.k==="s"){ set(String(mjtTobiScore(t))); saveMjt(false); renderKeepScroll(); } return; }
  let cur=get(); if(cur==="x") cur="";
  if(k==="⌫") cur=cur.slice(0,-1);
  else if(k==="±"){ cur = cur.startsWith("-") ? cur.slice(1) : ("-"+cur); }
  else cur = (cur==="0"?k : cur+k);
  if(cur==="-0") cur="-";
  set(cur);
  saveMjt(false); renderKeepScroll();
}

/* ---------- 漏れ係数(補償消費の計器) ---------- */
function leakMonths(){
  const set={};
  (S.entries||[]).forEach(e=>{ if(e.date&&e.date.length>=7) set[e.date.slice(0,7)]=1; });
  return Object.keys(set).sort().reverse().slice(0,12);
}
function leakAgg(mk){
  const me=(S.entries||[]).filter(e=>e.date&&e.date.startsWith(mk));
  const NET=["slot","mahjong"]; const isNet=e=>NET.includes(e.src);
  const salary=me.filter(e=>e.type==="income"&&!isNet(e)).reduce((a,e)=>a+e.amount,0);
  const spend=me.filter(e=>e.type==="expense"&&!isNet(e)).reduce((a,e)=>a+e.amount,0);
  const gnet=me.filter(isNet).reduce((a,e)=>a+(e.type==="income"?e.amount:-e.amount),0);
  let secured=0;
  ((S.invest||{}).holdings||[]).forEach(x=>(x.buys||[]).forEach(b=>{ if((b.date||"").startsWith(mk)) secured+=num(b.amount); }));
  (((S.invest||{}).bufferTxns)||[]).forEach(t=>{ if((t.date||"").startsWith(mk)&&num(t.amount)>0) secured+=num(t.amount); });
  (((S.savings||{}).txns)||[]).forEach(t=>{ if(t.type==="deposit"&&(t.date||"").startsWith(mk)) secured+=num(t.amount); });
  (((S.bank||{}).txns)||[]).forEach(t=>{ if(t.type==="sweep"&&(t.date||"").startsWith(mk)) secured+=num(t.amount); });
  return {mk:mk, salary:salary, spend:spend, gnet:gnet, secured:secured};
}

  recent.forEach(t=>L.push("- "+t.date+" "+(num(t.amount)>=0?"+":"")+"¥"+num(t.amount).toLocaleString("ja-JP")+(t.memo?" ("+t.memo+")":"")));
  L.push("");
  /* v3.29: 生活防衛資金・現金ポジション(貯金台帳から自動導出・画面のロードマップと同一計算)。
     防衛資金なき投資=強制売却リスクの購入(v3.24)——現金の守備線を見せずにリスク監査はさせられない */
  L.push("## 生活防衛資金・現金ポジション(貯金台帳から自動導出)");
  const sBal=savingsBalance();
  L.push("- 貯金残高: ¥"+sBal.toLocaleString("ja-JP"));
  const nowD=new Date(); const spends=[];
  for(let i=1;i<=3;i++){
    const d=new Date(nowD.getFullYear(), nowD.getMonth()-i, 1);
    const mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const sp=leakAgg(mk).spend; if(sp>0) spends.push(sp);
  }
  if(spends.length){
    const avgSp=Math.round(spends.reduce((a,b)=>a+b,0)/spends.length);
    L.push("- 月間支出(直近"+spends.length+"ヶ月平均・遊技収支除く): ¥"+avgSp.toLocaleString("ja-JP")+" → 残高は約"+(sBal/avgSp).toFixed(1)+"ヶ月分");
  } else {
    L.push("- 月間支出: 算出不能(支出記録のある完了月が直近3ヶ月にない)");
  }
  const svGoals=((S.savings||{}).goals||[]);
  if(svGoals.length){
    L.push("- 貯金目標の状況:");
    const svUndone=svGoals.filter(g=>!g.done); const svCur=svUndone[0]||null;
    svGoals.forEach(g=>{
      const tgt=num(g.target);
      const mark=g.done?"✓ 達成":(g===svCur?"▶ 現在":"○ 待機");
      let line="  - "+mark+" "+g.name+": "+(tgt>0?"¥"+tgt.toLocaleString("ja-JP"):"目標未設定");
      if(g===svCur && tgt>0) line+=" (進捗 "+Math.min(100,Math.round(sBal/tgt*100))+"%)";
      L.push(line);
    });
    if(svUndone.length){
      let remain=0, unknown=false;
      svUndone.forEach(g=>{ const t=num(g.target); if(t>0) remain+=t; else unknown=true; });
      L.push("- 投資スタートまで: "+(unknown?"目標額の設定待ち":"あと ¥"+Math.max(0,remain-sBal).toLocaleString("ja-JP")+"(未達成目標合計 − 残高)"));
    }
  }
  L.push("");
  L.push("## 監査依頼");
  L.push("以下の観点で忌憚なく評価してください:");
  L.push("1. 方針と保有の整合性(シナリオと実際の銘柄構成のズレ)");
  L.push("2. 集中リスク・相関(想定シナリオが外れた場合の同時毀損)");
  L.push("3. 各銘柄の売却条件の明確性・検証可能性");
  L.push("4. 実行規律(買付頻度・NISA枠の使い方・Bufferの運用)");
  L.push("5. 見落としているリスクや盲点");
  L.push("6. 生活防衛資金の十分性(月間支出との比・投資規模とのバランス・暴落時に売らずに耐える態勢か)");
  return L.join("\n");
}

function bindInvest(){
  const inv=S.invest = S.invest||{policy:"",holdings:[],bufferTxns:[]};
  document.querySelectorAll("[data-iv]").forEach(el=>{
    el.onclick=()=>{
      const a=el.dataset.iv, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; render(); }
      else if(a==="backlist"){ UI.screen="invest"; render(); }
      else if(a==="pedit"){ UI.invPolicyEdit=true; render(); }
      else if(a==="pcancel"){ UI.invPolicyEdit=false; render(); }
      else if(a==="psave"){ const t=document.getElementById("iv-policy"); inv.policy=(t?t.value:""); UI.invPolicyEdit=false; save(); render(); }
      else if(a==="audit"){
        const md=genInvestAudit();
        const done=()=>toast("監査資料をコピーしました("+md.length+"字) — Claudeに貼り付けてください");
        if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(done,()=>alert(md)); } else alert(md);
      }
      else if(a==="bufin"||a==="bufout"){
        const p=prompt(a==="bufin"?"積立額(円):":"出動額(円):"); if(p==null)return;
        const amt=num(p); if(!amt)return;
        const memo=prompt("メモ(任意):")||"";
        inv.bufferTxns=inv.bufferTxns||[];
        inv.bufferTxns.push({id:uid(),date:todayStr(),amount:(a==="bufin"?amt:-amt),memo:memo});
        save(); render();
      }
      else if(a==="new"){
        const nm=prompt("銘柄名(例: S&P500 / URA / 楽天G):"); if(nm==null||!nm.trim())return;
        const x={id:uid(),name:nm.trim(),frame:"seicho",qty:0,cost:0,unit:"株",thesis:"",exit:"",note:"",buys:[]};
        inv.holdings=inv.holdings||[]; inv.holdings.push(x);
        UI.invId=x.id; UI.screen="investdetail"; save(); render();
      }
      else if(a==="open"){ UI.invId=v; UI.screen="investdetail"; render(); }
      else if(a==="frame"){ const x=inv.holdings.find(z=>String(z.id)===String(UI.invId)); if(x){ x.frame=v; save(); render(); } }
      else if(a==="unit"){ const x=inv.holdings.find(z=>String(z.id)===String(UI.invId)); if(x){ x.unit=v; save(); render(); } }
      else if(a==="buy"){
        const x=inv.holdings.find(z=>String(z.id)===String(UI.invId)); if(!x)return;
        const d=document.getElementById("iv-bdate").value||todayStr();
        const q=num(document.getElementById("iv-bqty").value);
        const amt=num(document.getElementById("iv-bamt").value);
        if(!q&&!amt){ alert("数量か金額を入れてください。"); return; }
        x.buys=x.buys||[]; x.buys.push({id:uid(),date:d,qty:q,amount:amt});
        x.qty=num(x.qty)+q; x.cost=num(x.cost)+amt;
        save(); render(); toast("買付を記録しました");
      }
      else if(a==="scsave"){
        const x=inv.holdings.find(z=>String(z.id)===String(UI.invId)); if(!x)return;
        const nm=document.getElementById("iv-name");
        x.name=(nm&&nm.value.trim())||x.name;
        x.thesis=(document.getElementById("iv-thesis")||{}).value||"";
        x.exit=(document.getElementById("iv-exit")||{}).value||"";
        x.note=(document.getElementById("iv-note")||{}).value||"";
        save(); render(); toast("シナリオを保存しました");
      }
      else if(a==="del"){
        const x=inv.holdings.find(z=>String(z.id)===String(UI.invId)); if(!x)return;
        if(!confirm("「"+x.name+"」を台帳から削除しますか?\n(買付履歴も消えます)"))return;
        inv.holdings=inv.holdings.filter(z=>String(z.id)!==String(UI.invId));
        UI.screen="invest"; save(); render();
      }
    };
  });
}

/* ---------- 軍資金(バンクロール口座) ---------- */
function bankGameNet(){
  const sw=(S.bank&&S.bank.switch)||"9999-99-99";
  return (S.entries||[]).filter(e=>(e.src==="slot"||e.src==="mahjong") && e.date>=sw)
    .reduce((a,e)=> a + (e.type==="income"?e.amount:-e.amount), 0);
}
function bankSaved(){ return ((S.bank&&S.bank.txns)||[]).filter(t=>t.type==="sweep").reduce((a,t)=>a+num(t.amount),0); }
function bankBalance(){
  const b=S.bank||{}, tx=b.txns||[];
  const topup=tx.filter(t=>t.type==="topup").reduce((a,t)=>a+num(t.amount),0);
  const sweep=tx.filter(t=>t.type==="sweep").reduce((a,t)=>a+num(t.amount),0);
  const adj=tx.filter(t=>t.type==="adjust").reduce((a,t)=>a+num(t.amount),0);
  return num(b.seed)+bankGameNet()+topup-sweep+adj;
}

/* ---------- 貯金(目標ゲージ・口座) ---------- */
function savingsBalance(){
  const tx=(S.savings&&S.savings.txns)||[];
  const dep=tx.filter(t=>t.type==="deposit").reduce((a,t)=>a+num(t.amount),0);
  const wd=tx.filter(t=>t.type==="withdraw").reduce((a,t)=>a+num(t.amount),0);
  const adj=tx.filter(t=>t.type==="adjust").reduce((a,t)=>a+num(t.amount),0);
  return bankSaved()+dep-wd+adj;
}
function savingsDeposits(){ return ((S.savings&&S.savings.txns)||[]).filter(t=>t.type==="deposit").reduce((a,t)=>a+num(t.amount),0); }
function savingsCurGoal(){ return ((S.savings&&S.savings.goals)||[]).find(g=>!g.done)||null; }

/* ---------- ほしい物リスト(承認フロー) ---------- */
function wishDaysLeft(w){
  if(!w.cooldownStart || !num(w.cooldownDays)) return 0;
  const start=new Date(w.cooldownStart+"T00:00:00").getTime();
  const end=start + num(w.cooldownDays)*86400000;
  return Math.ceil((end - Date.now())/86400000);
}
function wishEff(w){
  if((w.status||"consult")==="cooldown" && wishDaysLeft(w)<=0) return "ready";
  return w.status||"consult";
}
const WISH_LABEL={consult:"相談待ち",cooldown:"寝かせ中",ready:"承認可能",approved:"承認済み",bought:"購入済み",rejected:"却下"};
const WISH_COLOR={consult:"var(--blue)",cooldown:"var(--amber)",ready:"var(--teal)",approved:"var(--teal)",bought:"var(--muted)",rejected:"var(--red)"};

  let h='<div class="pr-wrap"><div class="pr-title">ほしい物リスト(相談用)</div>'+

    active.forEach(w=>{

        '<td>'+money(w.est)+'</td><td>'+WISH_LABEL[wishEff(w)]+(wishEff(w)==="cooldown"?" 残"+wishDaysLeft(w)+"日":"")+'</td>'+
        '<td style="text-align:left">'+esc(w.reason||"")+'</td></tr>';
    });
    h+='</tbody></table>';
  } else h+='<div style="font-size:12px">検討中の品目はありません。</div>';
  const resisted=list.filter(w=>w.status==="rejected").reduce((a,w)=>a+num(w.est),0);
  h+='<div class="pr-foot">我慢した合計 '+money(resisted)+' ・ Tally</div></div>';
  return h;
}

        h+='<button class="btn full" style="margin-top:8px;font-size:12px;padding:9px 0;font-weight:700;border-color:var(--teal);color:var(--teal)" data-wa="buy" data-v="'+w.id+'">購入した(金額入力→家計簿へ)</button>';
      } else if(eff==="bought"){
        h+='<div class="mono teal" style="font-size:11px;margin-top:4px">✓ '+esc(w.boughtDate||"")+' 家計簿に計上済み</div>';

        h+='<div class="muted" style="font-size:11px;margin-top:4px">却下'+(w.rejectReason?": "+esc(w.rejectReason):"")+'</div>';

}
function bindWishlist(){

  document.querySelectorAll("[data-wa]").forEach(el=>{

        save(); render(); return;

      else if(a==="startcool"){ const inp=document.querySelector('[data-wd="'+w.id+'"]'); const days=inp?num(inp.value):num(w.cooldownDays); if(!days){ alert("寝かせ日数を入力してください。"); return; } w.cooldownDays=String(days); w.status="cooldown"; w.cooldownStart=todayStr(); save(); render(); }
      else if(a==="approve"){ w.status="approved"; save(); render(); }
      else if(a==="reject"){ const r=prompt("却下理由(任意):",""); if(r===null) return; w.status="rejected"; w.rejectReason=(r||"").trim(); save(); render(); }
      else if(a==="buy"){ const p=prompt("購入金額を入力(円):", w.est||""); if(p===null) return; const price=num(p); w.buy=String(price); w.status="bought"; w.boughtDate=todayStr(); if(price>0){ S.entries.push({id:"wish-"+w.id, date:w.boughtDate, type:"expense", category:"買い物", amount:price, memo:w.name, src:"wish", wishId:w.id}); } save(); render(); }
    };
  });
}

function bindFixed(){
  const f = UI.fixForm;
  if(f){
    const fs=document.getElementById("fx-store"); if(fs) fs.oninput=e=>{ f.store=e.target.value;
      const dl=document.getElementById("fx-itemlist");
      if(dl) dl.innerHTML = entryItemHintsFor(f.store).map(v=>'<option value="'+esc(v)+'"></option>').join(""); };
    const fi=document.getElementById("fx-item"); if(fi) fi.oninput=e=>f.item=e.target.value;
    const d=document.getElementById("fx-day"); if(d) d.oninput=e=>f.day=e.target.value;
    const st=document.getElementById("fx-start"); if(st) st.onchange=e=>f.start=e.target.value;
    const a=document.getElementById("fx-amount"); if(a) a.oninput=e=>f.amount=e.target.value;
  }
  document.querySelectorAll("[data-fa]").forEach(el=>{
    el.onclick=()=>{
      const a=el.dataset.fa, v=el.dataset.v;
      if(a==="fback"){ UI.screen="main"; UI.tab="ledger"; UI.fixForm=null; render(); }
      else if(a==="fdiag"){
        const lines=[];
        const tplIds = new Set((S.fixed||[]).map(t=>String(t.id)));
        (S.fixed||[]).forEach(t=>{
          const es=(S.entries||[]).filter(e=>String(e.fixedId)===String(t.id));
          if(!es.length){ lines.push("■"+t.name+" (tpl:"+String(t.id).slice(-6)+") エントリ0件"); return; }
          lines.push("■"+t.name+" (tpl:"+String(t.id).slice(-6)+" ¥"+num(t.amount)+")");
          es.sort((a2,b2)=>a2.date<b2.date?-1:1).forEach(e=>{
            lines.push(" "+e.date+" ¥"+e.amount+" 出生:"+fixedOccKey(e)+(e.fixedDate?"(fD)":"(推定)")+" …"+String(e.id).slice(-10));
          });
        });
        /* 迷子: fixedIdはあるが参照先テンプレが存在しない */
        const ghosts=(S.entries||[]).filter(e=>e.fixedId!=null && !tplIds.has(String(e.fixedId)));
        if(ghosts.length){
          lines.push("■迷子(参照先テンプレ不在)");
          ghosts.forEach(e=>lines.push(" "+e.date+" ¥"+e.amount+" "+(e.store||"")+" 亡tpl:"+String(e.fixedId).slice(-6)+" …"+String(e.id).slice(-10)));
        }
        const orphans=(S.entries||[]).filter(e=>e.fixedId==null && /-f\d{4}-\d{2}-\d{2}$/.test(String(e.id||"")));
        if(orphans.length){
          lines.push("■戸籍喪失(元定期でfixedId無し)");
          orphans.forEach(e=>lines.push(" "+e.date+" ¥"+e.amount+" "+(e.store||"")+" …"+String(e.id).slice(-10)));
        }
        const full = lines.length?lines.join("\n"):"定期エントリなし";
        const done = ()=>alert(full.slice(0,700)+(full.length>700?"\n…\n(全文はコピー済み——メモ帳等に貼り付けて共有できます)":""));
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(full).then(done, ()=>alert(full));
        } else alert(full);
      }
      else if(a==="new"){ UI.fixForm={type:"expense",name:"",store:"",item:"",category:"消費",freq:"monthly",day:"",start:todayStr(),amount:""}; render(); }
      else if(a==="fcancel"){ UI.fixForm=null; render(); }
      else if(a==="ftype"){ f.type=v; f.category=v==="expense"?"消費":"給与"; render(); }
      else if(a==="fcat"){ f.category=v; render(); }
      else if(a==="ffreq"){ f.freq=v; if((v==="weekly"||v==="biweekly")&&!f.start) f.start=todayStr(); render(); }
      else if(a==="fshift"){ f.holidayShift=v; render(); }
      else if(a==="edit"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t){ const lf=(t.freq==="bimonthly")?"monthly":(t.freq||"monthly");
          const lev=(t.freq==="bimonthly")?"2":(num(t.every)>1?String(num(t.every)):"");
          UI.fixForm={editId:t.id, type:t.type, name:t.name, store:t.store||"", item:(t.item!=null?t.item:(t.name||"")), category:t.category, freq:lf, day:t.day?String(t.day):"", start:t.start||todayStr(), amount:String(t.amount), holidayShift:t.holidayShift||"none", days:(t.days||[]).slice(), end:t.end||"", every:lev}; render(); }
      }
      else if(a==="stop"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("「"+t.name+"」の定期を停止しますか?\n未来の予定分は削除され、過去の記録は残ります。")){
          stopFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdelete"){
        const t=(S.fixed||[]).find(x=>String(x.id)===String(v));
        if(t && confirm("「"+t.name+"」を完全に削除しますか?\n過去の実績も含めて、この固定費の記録が全て消えます。")){
          deleteFixed(v); UI.fixForm=null; render();
        }
      }
      else if(a==="fdow"){ const d=num(v); f.days=Array.isArray(f.days)?f.days:[];
        f.days = f.days.includes(d) ? f.days.filter(x=>x!==d) : f.days.concat([d]); render(); }
      else if(a==="fsave"){
        const store=(f.store||"").trim(), item=(f.item||"").trim();
        const name=[store,item].filter(Boolean).join(" ");
        if(!name){ alert("店名または品目を入力してください。"); return; }
        if(num(f.amount)<=0){ alert("金額を入力してください。"); return; }
        const freq = f.freq || "monthly";
        const isW = (freq==="weekly"||freq==="biweekly");
        const isD = (freq==="days");
        if(isW && !f.start){ alert("起点日を選んでください。"); return; }
        if(isD && !(Array.isArray(f.days)&&f.days.length)){ alert("発生する曜日を選んでください。"); return; }
        if(isD && !f.start) f.start = todayStr();
        const endEl = document.getElementById("fx-end");
        const endV = endEl ? endEl.value : (f.end||"");
        const evEl = document.getElementById("fx-every");
        let every = num(evEl ? evEl.value : (f.every||"")); if(every<1) every=1; if(every>12) every=12;
        let day = num(f.day); if(day<1) day=1; if(day>31) day=31;
        const base={name, store, item, type:f.type, category:f.category, freq,
          day:(isW||isD)?"":String(day), start:(isW||isD)?f.start:"", amount:String(num(f.amount)),
          holidayShift: (isW||isD) ? "none" : (f.holidayShift||"none"),
          days: isD ? f.days.slice().sort() : undefined, end: endV||"",
          every: (freq==="monthly" && every>1) ? every : undefined};
        if(f.editId){
          updateFixed(Object.assign({id:f.editId}, base));
        }else{
          const tpl=Object.assign({id:uid()}, base);
          (S.fixed=S.fixed||[]).push(tpl);
          genFixedEntries(tpl);
          save();
        }
        UI.fixForm=null; render();
      }
    };
  });
}

      '<button class="btn" style="flex:1;padding:4px 0;font-size:14px" data-a="rankdn" data-v="'+i+'">−</button>'+
      '<button class="btn" style="flex:1;padding:4px 0;font-size:14px" data-a="rankup" data-v="'+i+'">＋</button></div></div>';
  }
  h += '</div>';
  h += '<div class="muted mono" style="font-size:11px;text-align:right" id="mj-hanchan">半荘数 '+mjHanchan(m)+(mjAvgRank(m)!==null?' / 平均着順 '+mjAvgRank(m).toFixed(2):'')+'</div>';

  h += band("同卓者(自分以外・任意)");
  h += '<div class="muted" style="font-size:10px;margin:0 2px 8px;line-height:1.6">最大5名。スコア表から反映した記録は自動で入ります。カードに表示されます。</div>';
  (m.players||[]).forEach((p,i)=>{
    h += '<div class="row" style="gap:8px;margin-bottom:6px;align-items:center">'+
      '<input class="input" placeholder="プレイヤー名" value="'+esc(p||"")+'" data-in="mjp" data-v="'+i+'" style="flex:1">'+
      '<button class="btn" style="padding:9px 13px;color:var(--red);border-color:var(--red);flex-shrink:0" data-a="mjpdel" data-v="'+i+'">×</button></div>';
  });
  if((m.players||[]).length<5) h += '<button class="btn dash full" style="padding:10px 0;margin-bottom:6px" data-a="mjpadd">＋ 同卓者を追加</button>';

  if(isFree){
    h += band("ゲーム代(フリー・自動計算)");
    h += '<div class="grid2" style="margin-bottom:6px">'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">基本ゲーム代(1半荘)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.baseFee)+'" data-in="mjf" data-v="baseFee"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">トップ賞(1着毎)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.topBonus)+'" data-in="mjf" data-v="topBonus"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ドリンク/入場(1回)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.drinkFee)+'" data-in="mjf" data-v="drinkFee"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ゲーム代(自動)</div>'+
      '<div class="input sm mono r" id="mj-feeauto" style="border-style:dashed">'+"¥"+mjGameFee(m).toLocaleString("ja-JP")+'</div></div></div>';
    h += '<div class="muted mono" style="font-size:10px" id="mj-feeformula">'+mjFeeFormula(m)+'</div>';
  } else {
    h += band("ゲーム代(セット・手入力)");
    h += '<div><div class="muted" style="font-size:9px;margin-bottom:2px">ゲーム代 合計(場代・トップ賞・奢り込み)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="まとめて入力" value="'+esc(m.setFee)+'" data-in="mjf" data-v="setFee"></div>';
  }

  /* ----- 経費(私的・スコア表には出さない) ----- */
  h += band("経費(飲食など)");
  (m.expenses||[]).forEach(x=>{
    h += '<div class="row" style="gap:6px;margin-bottom:6px">'+
      '<input class="input sm" placeholder="店名" value="'+esc(x.store||"")+'" style="flex:1" data-in="mjxstore" data-v="'+x.id+'">'+
      '<input class="input sm" placeholder="品目" value="'+esc(x.item!=null?x.item:(x.label||""))+'" style="flex:1.2" data-in="mjxitem" data-v="'+x.id+'">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="金額" value="'+esc(x.amount)+'" style="flex:0.9;min-width:72px" data-in="mjxamount" data-v="'+x.id+'">'+
      '<button class="xbtn" data-a="mjxdel" data-v="'+x.id+'">×</button></div>';
  });
  h += '<button class="btn dash full" data-a="mjxadd">＋ 経費を追加</button>';
  h += '<button class="btn dash full" style="margin-top:6px" data-a="mjxfopen">⇄ 家計簿から振替</button>';
  if(UI.xferOpen){ h += xferHint + xferRowsHtml(xferCandidates(m.date, m.expenses), "mjxfpick"); }

  h += band("この日の結果");
  h += '<div class="card" id="mj-summary">'+mjSummary(m)+'</div>';
  h += '<input class="input" placeholder="メモ(任意)" value="'+esc(m.memo||"")+'" style="margin:14px 0" data-in="mjf" data-v="memo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.mjIsNew?'<button class="btn danger" data-a="mjdel">削除</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="mjsave">保存する</button></div>';
  return h;
}

function mjSignedRow(label, val, field, rateLabel, rateVal, rateField, rateDecimal){
  const neg = String(val||"").startsWith("-");
  return '<div style="margin-bottom:8px">'+
    '<div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+
    '<div class="row" style="gap:6px;align-items:center">'+
    '<button class="signbtn" style="width:34px;height:34px;border:1.5px solid '+(neg?"var(--red)":"var(--teal)")+';color:'+(neg?"var(--red)":"var(--teal)")+
    ';background:'+(neg?"rgba(229,115,115,.1)":"rgba(45,212,191,.1)")+'" data-a="mjsign" data-v="'+field+'">'+(neg?"−":"＋")+'</button>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="0" value="'+esc(String(val||"").replace("-",""))+'" style="flex:1.3;min-width:0" data-in="mjabs" data-v="'+field+'">'+
    '<span class="muted" style="font-size:10px;flex-shrink:0">'+rateLabel+'</span>'+
    '<input class="input sm mono r" type="number" inputmode="'+(rateDecimal?"decimal":"numeric")+'"'+(rateDecimal?' step="0.1"':'')+' value="'+esc(rateVal)+'" style="flex:1;min-width:0" data-in="mjf" data-v="'+rateField+'"></div></div>';
}
function mjFeeFormula(m){
  if(m.category!=="free" || !mjHanchan(m)) return "";
  const h=mjHanchan(m), t=num((m.ranks||[])[0]);
  const parts=[];
  if(num(m.baseFee)) parts.push("基本"+num(m.baseFee)+"×"+h);
  if(num(m.topBonus)&&t) parts.push("トップ賞"+num(m.topBonus)+"×"+t);
  if(num(m.drinkFee)) parts.push("ドリンク"+num(m.drinkFee));
  return parts.length ? parts.join(" + ")+" = ¥"+mjGameFee(m).toLocaleString("ja-JP") : "";
}
function mjSummary(m){
  const srow=(l,v,big)=>'<div class="row between" style="'+(big?"align-items:baseline":"font-size:13px;margin:4px 0")+'">'+
    '<span '+(big?'style="font-size:12px;font-weight:700"':'class="muted"')+'>'+l+'</span>'+
    '<span class="mono '+clsPM(v)+'" style="'+(big?"font-size:20px;font-weight:700":"")+'">'+signYen(v)+'</span></div>';
  let h = srow("スコア収支", mjScoreYen(m));
  if(num(m.chips)||fnum(m.chipRate)) h += srow("チップ収支", mjChipYen(m));
  h += '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">麻雀のみ収支(ゲーム代抜)</span>'+
    '<span class="mono '+clsPM(mjRaw(m))+'" style="font-weight:700">'+signYen(mjRaw(m))+'</span></div>';
  h += srow("ゲーム代", -mjGameFee(m));
  if(mjExpTotal(m)) h += srow("経費(飲食など)", -mjExpTotal(m));
  h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>';
  h += srow("最終収支(家計簿へ連携)", mjFinal(m), true);
  return h;
}

function bindMj(){
  const m = UI.mjDraft;
  document.getElementById("mj-date").oninput = e=>m.date=e.target.value;
  document.getElementById("mj-store").oninput = e=>m.store=e.target.value;
  const mts=document.getElementById("mj-tstart"); if(mts) mts.oninput = e=>m.startAt=e.target.value;
  const mte=document.getElementById("mj-tend"); if(mte) mte.oninput = e=>m.endAt=e.target.value;
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind=el.dataset.in, v=el.dataset.v;
    el.oninput = ()=>{
      if(kind==="mjf"){ m[v]=el.value; refreshMj(); }
      else if(kind==="mjxstore"||kind==="mjxitem"||kind==="mjxamount"){
        const x = (m.expenses||[]).find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="mjxstore") x.store=el.value;
        else if(kind==="mjxitem"){ x.item=el.value; delete x.label; }
        else x.amount=el.value;
        refreshMj();
      }
      else if(kind==="mjabs"){
        const neg = String(m[v]||"").startsWith("-");
        m[v] = (neg?"-":"") + el.value.replace(/-/g,"");
        refreshMj();
      }
      else if(kind==="mjrank"){ (m.ranks=m.ranks||["","","",""])[num(v)]=el.value; refreshMj(); }
      else if(kind==="mjp"){ (m.players=m.players||[])[num(v)]=el.value; }
    };
  });
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mjDraft=null; render(); }
      else if(a==="mjcat"){ m.category=v; render(); }
      else if(a==="mjrule"){ m.rule=v; render(); }
      else if(a==="mjsign"){
        const cur=String(m[v]||"");
        m[v] = cur.startsWith("-") ? cur.slice(1) : "-"+cur;
        render();
      }
      else if(a==="rankup"||a==="rankdn"){
        const i=num(v); m.ranks=m.ranks||["","","",""];
        let cur=num(m.ranks[i]); cur += (a==="rankup"?1:-1); if(cur<0) cur=0;
        m.ranks[i]=String(cur); render();
      }
      else if(a==="mjpadd"){ (m.players=m.players||[]).push(""); render(); }
      else if(a==="mjpdel"){ (m.players=m.players||[]).splice(num(v),1); render(); }
      else if(a==="mjdel"){
        if(!confirm("この麻雀記録を削除しますか?")) return;
        S.entries = S.entries.filter(e=>e.id!=="mj-"+m.id);
        S.mjSessions = (S.mjSessions||[]).filter(x=>x.id!==m.id);
        save(); UI.screen="main"; UI.mjDraft=null; render();
      }
      else if(a==="mjxadd"){ (m.expenses=m.expenses||[]).push({id:uid(),store:"",item:"",amount:""}); render(); }
      else if(a==="mjxdel"){
        const x = (m.expenses||[]).find(e=>String(e.id)===String(v));
        if(x && x.fromData){
          if(!confirm("この経費は家計簿からの振替です。経費から外し、保存した時点で家計簿に記録を戻します。よろしいですか?")) return;
          (m._restore=m._restore||[]).push(x.fromData);
        }
        m.expenses=(m.expenses||[]).filter(e=>String(e.id)!==String(v)); render();
      }
      else if(a==="mjxfopen"){ UI.xferOpen=!UI.xferOpen; render(); }
      else if(a==="mjxfpick"){
        const e=(S.entries||[]).find(x=>String(x.id)===String(v));
        if(e){ (m.expenses=m.expenses||[]).push({id:uid(), store:e.store||"", item:(e.item||e.memo||e.category||"支出"), amount:String(num(e.amount)), fromEntry:e.id, fromData:Object.assign({},e)}); UI.xferOpen=false; render(); }
      }
      else if(a==="mjsave") saveMj();
    };
  });
}

function refreshMj(){
  const m = UI.mjDraft;
  const su=document.getElementById("mj-summary"); if(su) su.innerHTML=mjSummary(m);
  const hn=document.getElementById("mj-hanchan"); if(hn) hn.textContent="半荘数 "+mjHanchan(m)+(mjAvgRank(m)!==null?" / 平均着順 "+mjAvgRank(m).toFixed(2):"");
  const ff=document.getElementById("mj-feeformula"); if(ff) ff.textContent=mjFeeFormula(m);
  const fa=document.getElementById("mj-feeauto"); if(fa) fa.textContent="¥"+mjGameFee(m).toLocaleString("ja-JP");
}

function saveMj(){
  const m = UI.mjDraft;
  if(!m.date) return;
  const cleaned = Object.assign({}, m);
  const _rs = cleaned._restore||[]; delete cleaned._restore;
  const rc = mjRankCount(cleaned);
  cleaned.ranks = (cleaned.ranks||["","","",""]).slice(0,4).map((x,i)=> i<rc ? x : "");
  cleaned.players = (cleaned.players||[]).map(p=>(p||"").trim()).filter(Boolean).slice(0,5);
  if(UI.mjIsNew) S.mjSessions.push(cleaned);
  else S.mjSessions = S.mjSessions.map(x=>x.id===m.id?cleaned:x);
  if(fnum(cleaned.scoreRate)) S.rates.mjScore = cleaned.scoreRate;
  if(fnum(cleaned.chipRate)) S.rates.mjChip = cleaned.chipRate;
  if(num(cleaned.baseFee)) S.rates.mjBase = cleaned.baseFee;
  if(num(cleaned.topBonus)) S.rates.mjTop = cleaned.topBonus;
  if(num(cleaned.drinkFee)) S.rates.mjDrink = cleaned.drinkFee;
  const linkId = "mj-"+m.id;
  const fin = mjFinal(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"mahjong",
      type: fin>0?"income":"expense",
      category: "遊技",
      amount: Math.abs(fin),
      memo: "麻雀"+(cleaned.category==="free"?"(フリー":"(セット")+"・"+cleaned.rule+"麻)"+(cleaned.store?" @"+cleaned.store:"")});
  }
  /* 家計簿からの振替: 選択元の記録をここで削除(保存とワンセット) */
  const _xf = new Set((cleaned.expenses||[]).map(x=>String(x.fromEntry)).filter(x=>x!=="undefined"&&x!=="null"));
  if(_xf.size) S.entries = S.entries.filter(e=>!_xf.has(String(e.id)));
  _rs.forEach(d=>{ if(d && !S.entries.some(e=>String(e.id)===String(d.id))) S.entries.push(d); });
  save(); UI.screen="main"; UI.mjDraft=null; render();
  const _msgs=[]; if(_xf.size) _msgs.push("振替"+_xf.size+"件"); if(_rs.length) _msgs.push("家計簿へ"+_rs.length+"件戻し");
  if(_msgs.length) toast("保存しました("+_msgs.join(" / ")+")");
}

function bindMain(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a = el.dataset.a, v = el.dataset.v;
      if(a==="tab"){ UI.tab=v; render(); }
      else if(a==="gamesub"){ UI.gameSub=v; render(); }
      else if(a==="mprev") moveMonth(-1);
      else if(a==="mnext") moveMonth(1);
      else if(a==="csv") exportCsv();
      else if(a==="fixed"){ UI.screen="fixed"; UI.fixForm=null; render(); }
      else if(a==="wishlist"){ UI.screen="wishlist"; render(); }
      else if(a==="leak"){ UI.screen="leak"; render(); }
      else if(a==="invest"){ UI.screen="invest"; render(); }
      else if(a==="bank"){ UI.screen="bank"; render(); }
      else if(a==="savings"){ UI.screen="savings"; render(); }
      else if(a==="togglelaunchadd"){ S.openAddOnLaunch=!S.openAddOnLaunch; save(); render(); }
      else if(a==="wfapply"){
        let wf=S.waterfall||{};
        const cm=monthKey();
        const pmk=leakMonths().filter(k2=>k2<cm).sort().reverse()[0];
        if(!pmk){ alert("前月の給与データがまだありません。"); return; }
        const prevSal=leakAgg(pmk).salary;
        const me2=(S.entries||[]).filter(e=>e.date&&e.date.startsWith(cm));
        const fx2=me2.filter(e=>e.type==="expense"&&e.category==="消費"&&e.fixedId!=null&&e.src!=="slot"&&e.src!=="mahjong").reduce((a2,e)=>a2+e.amount,0);
        const calc=()=> prevSal - fx2 - num(wf.invest) - num((S.budgets||{})["娯楽"]) - num(wf.sink);
        const needSetup = !num(wf.invest) && !num(wf.sink);
        const applied = String(calc())===String(num((S.budgets||{})["消費"]));
        if(needSetup || applied){
          if(applied && !confirm("定数(投資・積立の月額)を設定し直しますか?")) return;
          const p1=prompt("投資の月額(円):", wf.invest||"110000"); if(p1==null)return;
          const p2=prompt("目的積立の月額(円・無ければ0):", wf.sink||"0"); if(p2==null)return;
          wf={invest:String(num(p1)), sink:String(num(p2))}; S.waterfall=wf;
        }
        const auto=calc();
        if(auto<=0){ alert("計算結果がマイナスです。\n定数(投資/積立)か娯楽枠を見直してください。"); save(); render(); return; }
        (S.budgets=S.budgets||{})["消費"]=String(auto);
        save(); render();
        setTimeout(()=>{ try{ toast("変動予算を ¥"+auto.toLocaleString("ja-JP")+" に設定しました"); }catch(e){} }, 200);
      }
      else if(a==="catdrill"){ UI.drillCat=v; UI.drillOpenStore=null; UI.drillMode="chain"; UI.drillAssign=null; UI.drillVarOnly=(v==="消費"); UI.screen="catdrill"; render(); }
      else if(a==="setbudget"){ const cat=v; const p=prompt(cat+"の月間予算(上限・円):", ((S.budgets||{})[cat])||""); if(p===null)return; (S.budgets=S.budgets||{})[cat]=String(num(p)); save(); render(); }
      else if(a==="mjtnew"){ UI.mjt=newMjTable(); UI.mjtCell=null; saveMjt(false); UI.screen="mjtable"; render(); }
      else if(a==="opentool"){ if(el.dataset.v==="bordertool"){ UI.screen="bordertool"; render(); } }
      else if(a==="mjtopen"){ const t=(S.mjTables||[]).find(x=>String(x.id)===String(v)); if(t){ UI.mjt=t; UI.mjtCell=null; UI.screen="mjtable"; render(); } }
      else if(a==="mdb"){ UI.screen="mdb"; UI.mdbForm=null; render(); }
      else if(a==="stores"){ UI.screen="stores"; UI.storeForm=null; render(); }
      else if(a==="mjtlist"){ UI.screen="mjtlist"; render(); }
      else if(a==="syncnow"){ checkForUpdate(true); if(sb && sbSession) cloudSync(); }
      else if(a==="backup"){ UI.screen="backup"; UI.msg=""; render(); }
      else if(a==="add"){
        if(UI.tab!=="games"){ UI.tab="ledger"; UI.editEntryId=null;
          UI.entryForm={date:todayStr(),type:"expense",category:"消費",amount:"",store:"",item:"",memo:""};
          UI.screen="entry"; render();
        } else if(UI.tab==="games" && (UI.gameSub||"slot")==="mahjong"){
          UI.mjDraft={id:uid(),date:todayStr(),store:"",category:"free",rule:"4",startAt:"",endAt:"",
            score:S.rates.mjScore!==undefined?"":"", chips:"",
            scoreRate:S.rates.mjScore||"", chipRate:S.rates.mjChip||"",
            ranks:["","","",""], players:[], baseFee:S.rates.mjBase||"", topBonus:S.rates.mjTop||"", drinkFee:S.rates.mjDrink||"",
            setFee:"", memo:"", expenses:[]};
          UI.mjIsNew=true; UI.screen="mahjong-edit"; render();
        } else {
          UI.draft={id:uid(),date:todayStr(),store:"",mode:"nori",partnerName:"",fee:"",startAt:"",endAt:"",
            exchange:S.rates.exchange||"",pExchange:S.rates.pExchange||"",pushPayout:S.rates.pushPayout||"",pushDraw:S.rates.pushDraw||"",machines:[],expenses:[],memo:""};
          UI.whoTab="me";
          UI.isNewSess=true; UI.screen="session"; render();
        }
      }
      else if(a==="mjedit"){
        const s = (S.mjSessions||[]).find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.screen="mahjong-edit"; render();
      }
      else if(a==="eedit"){
        const e = S.entries.find(x=>String(x.id)===String(v));
        if(!e) return;
        if(e.src==="slot"){
          const s = S.sessions.find(x=>"slot-"+x.id===e.id);
          if(s){ UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.tab="games"; UI.gameSub="slot"; UI.screen="session"; render(); return; }
        }
        if(e.src==="mahjong"){
          const s = (S.mjSessions||[]).find(x=>"mj-"+x.id===e.id);
          if(s){ UI.mjDraft=JSON.parse(JSON.stringify(s)); UI.mjIsNew=false; UI.tab="games"; UI.gameSub="mahjong"; UI.screen="mahjong-edit"; render(); return; }
        }
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),store:e.store||"",item:(e.item!=null?e.item:(e.memo||"")),memo:e.memo||""};
        UI.screen="entry"; render();
      }
      else if(a==="sedit"){
        const s = S.sessions.find(x=>String(x.id)===String(v));
        if(!s) return;
        UI.draft=JSON.parse(JSON.stringify(s)); UI.isNewSess=false; UI.screen="session"; render();
      }
    };
  });
}

function exportCsv(){
  const NET_SRCS = ["slot","mahjong"];
  const divLabel = e => NET_SRCS.includes(e.src) ? "遊技" : (e.type==="income"?"収入":"支出");
  const rows = [["日付","区分","カテゴリ","金額","メモ"]];
  S.entries.slice().sort((a,b)=>a.date>b.date?1:-1).forEach(e=>{
    const signed = e.type==="income" ? e.amount : -e.amount;
    rows.push([e.date, divLabel(e), e.category, signed, (e.memo||"").replace(/,/g,"、")]);
  });
  dl("\uFEFF"+rows.map(r=>r.join(",")).join("\n"), "kakeibo.csv", "text/csv");
}
function dl(content, name, type){
  const blob = new Blob([content],{type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
</script>
<script>
/* ============================================================
   家計簿 入力画面
   ============================================================ */
function entryStoreHints(){
  const m={};
  (S.entries||[]).forEach(e=>{ const s=(e.store||"").trim(); if(s) m[s]=(m[s]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function entryItemHints(){
  const m={};
  (S.entries||[]).forEach(e=>{ const v=(e.item!=null?String(e.item):String(e.memo||"")).trim(); if(v) m[v]=(m[v]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
/* 店文脈つき品目ヒント: 店名があれば「その店(チェーン単位)で過去に買った品目」だけを頻度順で。
   未知の店なら空(的外れな全体人気を出さない)。店名が空なら従来の全体人気順。 */
function chainKeyOf(n){ const t=String(n||"").trim(); const m=t.split(/[\s\u3000]+/).filter(Boolean); return m.length>1 ? m[0] : t; }
function entryItemHintsFor(store){
  const st=String(store||"").trim();
  if(!st) return entryItemHints();
  const target=chainKeyOf(st);
  const m={};
  (S.entries||[]).forEach(e=>{
    const es=(e.store||"").trim(); if(!es) return;
    if(chainKeyOf(es)!==target) return;
    const v=(e.item!=null?String(e.item):String(e.memo||"")).trim(); if(v) m[v]=(m[v]||0)+1;
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function entryUsualChips(type){
  const map={};
  (S.entries||[]).filter(e=>e.type===type && e.src!=="slot" && e.src!=="mahjong" && e.src!=="fixed").forEach(e=>{
    const store=(e.store||"").trim();
    const item=(e.item!=null?String(e.item):String(e.memo||"")).trim();
    const label=[store,item].filter(Boolean).join(" "); if(!label) return;
    const k=store+"\u0001"+item;
    if(!map[k]) map[k]={store,item,label,count:0,cats:{}};
    map[k].count++; map[k].cats[e.category]=(map[k].cats[e.category]||0)+1;
  });
  return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,6).map(o=>({
    store:o.store,item:o.item,label:o.label,
    cat:Object.entries(o.cats).sort((a,b)=>b[1]-a[1])[0][0]
  }));
}
function entryDetailHtml(e){
  const st=(e.store!=null?String(e.store):"").trim();
  const it=(e.item!=null?String(e.item):"").trim();
  if(st && it)
    return '<div class="muted ellip" style="font-size:11px">'+esc(it)+'</div>'+
           '<div class="ellip" style="font-size:11px;color:var(--muted);opacity:.7;margin-top:1px">'+esc(st)+'</div>';
  if(it) return '<div class="muted ellip" style="font-size:11px">'+esc(it)+'</div>';
  if(st) return '<div class="muted ellip" style="font-size:11px">'+esc(st)+'</div>';
  if(e.memo) return '<div class="muted ellip" style="font-size:11px">'+esc(e.memo)+'</div>';
  return '';
}
function viewEntry(){
  const f = UI.entryForm;
  const chips = entryUsualChips(f.type); UI._usualChips = chips;
  const sh = entryStoreHints(), ih = entryItemHints();
  const chipsHtml = chips.length
    ? '<div class="muted" style="font-size:11px;margin:0 2px 6px">よく使う</div>'+
      '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
      chips.map((c,i)=>'<button class="chip" data-a="usual" data-i="'+i+'">'+esc(c.label)+'</button>').join("")+'</div>'
    : '';
  const fieldsHtml = '<input class="input" id="e-store" list="e-storelist" placeholder="店名(任意)" value="'+esc(f.store||"")+'" autocomplete="off" style="margin-bottom:8px">'+
    '<datalist id="e-storelist">'+sh.map(v=>'<option value="'+esc(v)+'"></option>').join("")+'</datalist>'+
    '<input class="input" id="e-item" list="e-itemlist" placeholder="品目(任意)" value="'+esc(f.item||"")+'" autocomplete="off" style="margin-bottom:14px">'+
    '<datalist id="e-itemlist">'+entryItemHintsFor(f.store).map(v=>'<option value="'+esc(v)+'"></option>').join("")+'</datalist>';
  return '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">'+(UI.editEntryId!==null?"記録を編集":"記録を追加")+'</div><div style="width:44px"></div></div>'+
    '<div class="row" style="gap:8px;margin-bottom:12px">'+
    [["expense","支出"],["income","収入"]].map(([v,l])=>
      '<button class="btn '+(f.type===v?"sel":"")+'" style="flex:1" data-a="etype" data-v="'+v+'">'+l+'</button>').join("")+'</div>'+
    '<div class="row" style="gap:8px;margin-bottom:12px">'+
    '<input class="input" type="date" id="e-date" value="'+esc(f.date)+'" style="flex:1">'+
    '<input class="input mono r" type="number" inputmode="numeric" id="e-amount" placeholder="金額" value="'+esc(f.amount)+'" style="flex:1"></div>'+
    (f.type==="expense"
      ? '<div class="muted" style="font-size:11px;margin:0 2px 6px">支出の分類</div>'+
        '<div class="row" style="gap:8px;margin-bottom:12px">'+
        EXPENSE_CATS.map(c=>'<button class="btn '+(f.category===c?"sel":"")+'" style="flex:1;padding:12px 2px;font-size:13px" data-a="ecat" data-v="'+esc(c)+'">'+esc(c)+'</button>').join("")+'</div>'
      : '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
        INCOME_CATS.map(c=>'<button class="chip '+(f.category===c?"sel":"")+'" data-a="ecat" data-v="'+esc(c)+'">'+esc(c)+'</button>').join("")+'</div>')+
    chipsHtml + fieldsHtml +
    (UI.editEntryId!==null?'<button class="btn full" style="margin-bottom:8px;font-size:12px;padding:9px 0;color:var(--teal)" data-a="tofixed">この内容で固定費に登録</button>':'')+
    '<div class="row" style="gap:8px">'+
    (UI.editEntryId!==null?'<button class="btn danger" data-a="edel">削除</button>':'')+
    '<button class="btn primary" style="flex:1" data-a="esave">'+(UI.editEntryId!==null?"更新する":"追加する")+'</button></div>';
}
function bindEntry(){
  const f = UI.entryForm;
  document.getElementById("e-date").oninput = e=>f.date=e.target.value;
  document.getElementById("e-amount").oninput = e=>f.amount=e.target.value;
  const es=document.getElementById("e-store"); if(es) es.oninput = e=>{ f.store=e.target.value;
    const dl=document.getElementById("e-itemlist");
    if(dl) dl.innerHTML = entryItemHintsFor(f.store).map(v=>'<option value="'+esc(v)+'"></option>').join(""); };
  const ei=document.getElementById("e-item"); if(ei) ei.oninput = e=>f.item=e.target.value;
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen=(UI.entryReturn||"main"); UI.entryReturn=null; render(); }
      else if(a==="etype"){ f.type=v; f.category = v==="expense"?"消費":"給与"; render(); }
      else if(a==="ecat"){ f.category=v; render(); }
      else if(a==="usual"){ const c=(UI._usualChips||[])[num(el.dataset.i)]; if(c){ f.store=c.store; f.item=c.item; f.category=c.cat; render(); const amt=document.getElementById("e-amount"); if(amt) amt.focus(); } }
      else if(a==="tofixed"){
        const day = num((f.date||todayStr()).slice(8,10)) || 1;
        UI.fixForm = { type:f.type||"expense", name:(f.item||f.memo||"").trim(), store:(f.store||"").trim(),
          item:(f.item||"").trim(), category:f.category||"消費", freq:"monthly", day:String(day),
          start: todayStr(), amount:String(num(f.amount)||""), holidayShift:"none", days:[], end:"" };
        UI.entryReturn=null; UI.screen="fixed"; render();
        setTimeout(()=>{ try{ toast("内容を引き継ぎました — 頻度と発生日を確認して保存"); }catch(e){} }, 300);
      }
      else if(a==="edel"){
        const ent = S.entries.find(x=>x.id===UI.editEntryId);
        const isFixed = ent && ent.fixedId;
        let fmsg = "";
        if(isFixed){
          /* 次回発生日を実計算して提示(月次・週次・曜日指定すべてに正しい文言) */
          const tpl0 = (S.fixed||[]).find(t=>String(t.id)===String(ent.fixedId));
          let nextTxt = "";
          if(tpl0){
            const occ = fixedOccKey(ent);
            const sk = (tpl0.skips||[]).concat([occ]);
            const nx = fixedOccurrences(tpl0).map(fmtDate).find(d=> d>occ && !sk.includes(d));
            nextTxt = nx ? "次回は "+nx.slice(5).replace("-","/")+" に自動計上されます。" : "以降の予定はありません(最終分)。";
          }
          /* confirmの折返し幅(約18全角)に収まる意図した行割り */
          fmsg = "今回分("+ent.date.slice(5).replace("-","/")+")をスキップします。\n(定期設定は残ります)\n"+nextTxt+"\nよろしいですか?";
        }
        if(!confirm(isFixed ? fmsg : "この記録を削除しますか?")) return;
        if(isFixed){
          const tpl = (S.fixed||[]).find(t=>String(t.id)===String(ent.fixedId));
          if(tpl){ const occ=fixedOccKey(ent); tpl.skips = tpl.skips || []; if(!tpl.skips.includes(occ)) tpl.skips.push(occ); }
        }
        S.entries = S.entries.filter(x=>x.id!==UI.editEntryId);
        save(); UI.screen=(UI.entryReturn||"main"); UI.entryReturn=null; render();
      }
      else if(a==="esave"){
        const amt = num(f.amount);
        if(!f.date || amt<=0) return;
        const store=(f.store||"").trim(), item=(f.item||"").trim();
        const memo=[store,item].filter(Boolean).join(" ");
        if(UI.editEntryId!==null){
          S.entries = S.entries.map(x=>x.id===UI.editEntryId ?
            Object.assign({},x,{date:f.date,type:f.type,category:f.category,amount:amt,store,item,memo}) : x);
        } else {
          S.entries.push({id:uid(),date:f.date,type:f.type,category:f.category,amount:amt,store,item,memo});
        }
        save(); UI.screen=(UI.entryReturn||"main"); UI.entryReturn=null; render();
      }
    };
  });
}
</script>
<script>
/* ============================================================
   セッション編集画面
   ============================================================ */
function nameHints(){
  const seen=[];
  S.sessions.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(s=>{
    const n=(s.partnerName||"").trim();
    if(n && !seen.includes(n)) seen.push(n);
  });
  return seen.slice(0,5);
}

function viewSession(){
  const s = UI.draft;
  let h = '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">'+(UI.isNewSess?"稼働を記録":"稼働を編集")+'</div><div style="width:44px"></div></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    '<input class="input" type="date" id="s-date" value="'+esc(s.date)+'" style="flex:1">'+
    '<input class="input" id="s-store" placeholder="店名" value="'+esc(s.store)+'" style="flex:1.4"></div>';
  h += '<div class="row" style="gap:8px;align-items:center;margin-bottom:10px">'+
    '<span class="muted" style="font-size:12px;width:74px">実働</span>'+
    '<input class="input mono" type="time" id="s-tstart" value="'+esc(s.startAt||"")+'" style="flex:1">'+
    '<span class="muted" style="font-size:12px">〜</span>'+
    '<input class="input mono" type="time" id="s-tend" value="'+esc(s.endAt||"")+'" style="flex:1"></div>';
  h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
    [["nori","乗打"],["dai","代打"],["solo","単独"]].map(([v,l])=>
      '<button class="btn '+(s.mode===v?"sel":"")+'" style="flex:1" data-a="mode" data-v="'+v+'">'+l+'</button>').join("")+'</div>';

  if(s.mode!=="solo"){
    const hints = nameHints().filter(n=>n!==(s.partnerName||"").trim());
    h += '<div style="margin-bottom:12px"><input class="input" id="s-pname" placeholder="'+
      (s.mode==="nori"?"相方の名前":"依頼主の名前")+'" value="'+esc(s.partnerName||"")+'">'+
      (hints.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-top:6px">'+
        hints.map(n=>'<button class="chip" data-a="pname" data-v="'+esc(n)+'">'+esc(n)+'</button>').join("")+'</div>':'')+'</div>';
  }

  /* ----- 交換設定(セッション共通) ----- */
  h += band("交換設定");
  if((S.stores||[]).length) h += '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
    (S.stores||[]).map(st=>'<button class="chip" data-a="applystore" data-v="'+st.id+'">'+esc(st.name)+'</button>').join("")+'</div>';
  h += '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">スロット</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 50" value="'+esc(s.exchange||"")+'" style="flex:1" data-in="exchange">'+
    '<span class="muted" style="font-size:12px">枚=1000円</span></div>'+
    '<div class="row" style="gap:8px;align-items:center;margin-bottom:6px">'+
    '<span class="muted" style="font-size:12px;width:74px">パチンコ</span>'+
    '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 250" value="'+esc(s.pExchange||"")+'" style="flex:1" data-in="pexchange">'+
    '<span class="muted" style="font-size:12px">玉=1000円</span></div>'+
    '<div class="muted" style="font-size:10px">使う方だけ入力。前回値を記憶します。貯玉プッシュのレートは「ツール」タブのボーダー試算で設定します。</div>';

  /* ----- 代打ち: 報酬 ----- */
  if(s.mode==="dai"){
    h += band("報酬(家計簿に反映)");
    h += '<div><div class="muted" style="font-size:11px;margin:0 2px 4px">受取報酬(円)</div>'+
      '<input class="input mono r" type="number" inputmode="numeric" placeholder="例: 15000" value="'+esc(s.fee)+'" data-in="fee"></div>';
  }

  /* ----- 台データ(貯玉方式) ----- */
  if(s.mode==="nori"){
    /* 乗り打ち: 自分/相方タブ */
    const who = UI.whoTab || "me";
    const pn = (s.partnerName||"").trim()||"相方";
    h += band("打った台");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      [["me","自分"],["partner",pn]].map(([v,l])=>
        '<button class="btn '+(who===v?"sel":"")+'" style="flex:1" data-a="whotab" data-v="'+v+'">'+esc(l)+
        ' <span class="mono" style="font-size:11px">'+signYen(personSlotYen(s,v))+'</span></button>').join("")+'</div>';
    slotMachines(s, who).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi" && (m.who||"me")===who).forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="slot|'+who+'">＋ スロット台</button>'+
      '<button class="btn dash" style="flex:1" data-a="maddw" data-v="pachi|'+who+'">＋ パチンコ台</button></div>';
  } else {
    h += band(s.mode==="dai" ? "打った台(客の玉・報告用)" : "打った台");
    slotMachines(s).forEach(m=>{ h += viewSlotMachine(m, s); });
    (s.machines||[]).filter(m=>m.kind==="pachi").forEach(m=>{ h += viewMachine(m, s); });
    h += '<div class="row" style="gap:8px">'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="slot">＋ スロット台</button>'+
      '<button class="btn dash" style="flex:1" data-a="madd" data-v="pachi">＋ パチンコ台</button></div>';
  }

  /* ----- 経費 ----- */
  h += band("経費(飲食など)");
  (s.expenses||[]).forEach(x=>{
    h += '<div class="row" style="gap:6px;margin-bottom:6px">'+
      '<input class="input sm" placeholder="店名" value="'+esc(x.store||"")+'" style="flex:1" data-in="xstore" data-v="'+x.id+'">'+
      '<input class="input sm" placeholder="品目" value="'+esc(x.item!=null?x.item:(x.label||""))+'" style="flex:1.2" data-in="xitem" data-v="'+x.id+'">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="金額" value="'+esc(x.amount)+'" style="flex:0.9;min-width:72px" data-in="xamount" data-v="'+x.id+'">'+
      '<button class="xbtn" data-a="xdel" data-v="'+x.id+'">×</button></div>';
  });
  h += '<button class="btn dash full" data-a="xadd">＋ 経費を追加</button>';
  h += '<button class="btn dash full" style="margin-top:6px" data-a="xfopen">⇄ 家計簿から振替</button>';
  if(UI.xferOpen){ h += xferHint + xferRowsHtml(xferCandidates(s.date, s.expenses), "xfpick"); }

  /* ----- サマリー ----- */
  h += band("このセッションの結果");
  h += '<div class="card" id="ssummary">'+sessionSummary(s)+'</div>';
  h += '<input class="input" placeholder="セッションメモ(任意)" value="'+esc(s.memo||"")+'" style="margin:14px 0" data-in="smemo">';
  h += '<div class="row" style="gap:8px">'+
    (!UI.isNewSess?'<button class="btn danger" data-a="sdel">削除</button>':'')+
    '<button class="btn primary" style="flex:1;padding:12px 0" data-a="ssave">保存する</button></div>';
  return h;
}

function sessionSummary(s){
  const srow = (l,v) => '<div class="row between" style="font-size:13px;margin:4px 0"><span class="muted">'+l+'</span><span class="mono '+clsPM(v)+'">'+signYen(v)+'</span></div>';
  let h = "";
  if(s.mode==="dai"){
    /* 代打ち: 報酬が家計簿へ。台勝敗は報告用 */
    const dai = daiResult(s);
    if(slotMachines(s).some(machHasData)){
      h += '<div class="card2" style="margin-bottom:10px"><div class="row between" style="align-items:baseline">'+
        '<span style="font-size:11px;font-weight:700">客の玉での勝敗(報告用)</span>'+
        '<span class="mono '+clsPM(dai)+'" style="font-size:16px;font-weight:700">'+signYen(dai)+'</span></div>'+
        '<div class="muted" style="font-size:10px;margin-top:4px">この金額は家計簿には反映されません</div></div>';
    }
    h += srow("報酬", num(s.fee));
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">代打ち報酬(家計簿の収入へ)</span>'+
      '<span class="mono '+clsPM(fin)+'" style="font-size:20px;font-weight:700">'+signYen(fin)+'</span></div>'+
      '<div class="muted" style="font-size:10px;margin-top:4px">労働収入なので家計簿の収入に計上(軍資金には入りません)</div>';
    return h;
  }
  if(s.mode==="nori"){
    const me = personSlotYen(s,"me"), pt = personSlotYen(s,"partner"), pn = esc((s.partnerName||"").trim()||"相方");
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted" style="font-size:10px">自分</div>'+
      '<div class="mono '+clsPM(me)+'" style="font-size:15px;font-weight:700">'+signYen(me)+'</div></div>'+
      '<div class="card2" style="flex:1;text-align:center"><div class="muted ellip" style="font-size:10px">'+pn+'</div>'+
      '<div class="mono '+clsPM(pt)+'" style="font-size:15px;font-weight:700">'+signYen(pt)+'</div></div></div>';
    h += srow("2人合計", poolTotal(s));
    /* 折半調整: 自分の取り分を編集可、相方は残りを自動 */
    const half = halfSplit(s), mine = myShare(s), theirs = partnerShare(s);
    const adjusted = (s.myShare!==undefined && s.myShare!=="" && num(s.myShare)!==half);
    h += '<div class="row between" style="align-items:center;font-size:13px;margin:8px 0 4px">'+
      '<span class="muted">自分の取り分</span>'+
      '<div class="row" style="align-items:center;gap:6px">'+
      '<span class="mono muted" style="font-size:12px">¥</span>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="'+half+'" value="'+esc(s.myShare!==undefined?s.myShare:"")+'" style="width:100px" data-in="myshare">'+
      '</div></div>';
    h += '<div class="row between" style="font-size:12px;margin:2px 0 4px"><span class="muted">'+esc((s.partnerName||"").trim()||"相方")+'の取り分(自動)</span>'+
      '<span class="mono '+clsPM(theirs)+'">'+signYen(theirs)+'</span></div>';
    if(adjusted) h += '<div class="muted" style="font-size:10px;margin-bottom:2px">折半'+signYen(half)+'から調整済み(差'+signYen(mine-half)+')</div>';
  }
  if(s.mode==="nori"){
    h += srow("経費(自分負担分)", -expTotal(s));
    const fin = finalOwn(s);
    h += '<div style="height:1px;background:var(--line);margin:8px 0"></div>'+
      '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">最終収支(家計簿へ連携)</span>'+
