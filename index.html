const segStat = (g, s) => segDone(g) ? segUsed(g,s)+"発 / "+segSpins(g)+"回転" : "";
const segFormula = (g, s) => {
  if(!segDone(g)) return "";
  const pp = num((s&&s.pushPayout)||(UI.draft&&UI.draft.pushPayout)||230);
  const p = segPushes(g);
  return p>0
    ? "台入球 = "+p+"プッシュ×"+pp+(num(g.sb)?" + 残"+num(g.sb):"")+" − "+num(g.eb)+" = "+segUsed(g,s)+"発"
    : "台入球 = 残"+num(g.sb)+" − "+num(g.eb)+" = "+segUsed(g,s)+"発";
};

function borderPanel(m, s){
  const t = machineTotals(m, s);
  if(t.rate250===null) return "";
  const master = findMaster(m);
  const denom = master ? fnum(master.denom) : 0;
  const kez = Math.max(0, Math.min(50, fnum(m.kezuri)));   // 削り率 %
  const kezF = 1 - kez/100;
  // 理論ボーダー(回/250発相当): 登録機種は 分母×250/理論TY、未登録は手入力ボーダー(回/千円=等価で同値)
  const bTheory = denom>0
    ? (master && fnum(master.ty)>0 ? denom*250/fnum(master.ty) : null)
    : (fnum(m.border)>0 ? fnum(m.border) : null);
  // 削り後ボーダー = 理論B ÷ (1−削り率/100)。出玉が減る→ボーダーは上がる(厳しくなる)
  const bKezuri = (bTheory!==null && kez>0 && kezF>0) ? bTheory/kezF : null;
  // 実効ボーダー(実測avgTY): 参考・削り率の較正用。短期サンプルは荒れるので判定基準にはしない
  const bEff = denom>0 && t.avgTY>0 ? denom*250/t.avgTY : null;
  // 判定基準(active border): 削り後 → 理論 → 実効(理論が無い時のみ)
  const ab = bKezuri!==null ? bKezuri : (bTheory!==null ? bTheory : bEff);
  const dev = ab && t.costRate250!==null ? (t.costRate250/ab-1)*100 : null;

  let h = '<div class="amberpanel"><div class="row between" style="align-items:baseline;margin-bottom:6px">'+
    '<span class="mono muted" style="font-size:11px">累計 '+t.balls+'発 / '+t.spins+'回転</span>'+
    '<span class="mono amber" style="font-size:15px;font-weight:700">≒ '+t.rate250.toFixed(2)+' 回/250発</span></div>';
  if(t.costRate250!==null && Math.abs(t.costRate250-t.rate250)>0.005)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">コスト補正(貯玉手数料込)</span>'+
      '<span class="mono">'+t.costRate250.toFixed(2)+' 回/250発</span></div>';
  // --- 理論ボーダー ---
  if(denom>0){
    h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">機種データ: 1/'+fnum(master.denom)+
      (fnum(master.ty)>0?' / 理論TY '+fnum(master.ty)+'発':'')+'</span>'+
      (bTheory!==null?'<span class="mono">理論B '+bTheory.toFixed(2)+'</span>':'')+'</div>';
  } else {
    h += '<div style="margin:4px 0 6px"><div class="muted" style="font-size:9px;margin-bottom:2px">理論ボーダー(回/千円)</div>'+
      '<input class="input sm mono r" type="number" inputmode="decimal" step="0.1" value="'+esc(m.border||"")+'" data-in="mborder" data-v="'+m.id+'"></div>';
  }
  // --- 削り後ボーダー(判定基準) ---
  if(bKezuri!==null)
    h += '<div class="row between" style="font-size:12px;margin-bottom:4px"><span style="font-weight:700">削り後B(削り'+kez+'%)</span>'+
      '<span class="mono amber" style="font-weight:700">'+bKezuri.toFixed(2)+' 回/250発</span></div>';
  // --- 実測(参考・較正用) ---
  if(t.avgTY!==null)
    h += '<div style="font-size:10px;margin-bottom:4px" class="muted">参考: 実測平均出玉 '+t.payouts.length+'回 '+Math.round(t.avgTY)+'発'+
      (bEff!==null?' → 実効B '+bEff.toFixed(2):'')+'</div>';
  if(dev!==null && ab)
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:2px">'+
      '<span style="font-size:11px;font-weight:700">ボーダー乖離</span>'+
      '<span class="mono '+clsPM(dev)+'" style="font-size:15px;font-weight:700">'+(dev>=0?"+":"−")+Math.abs(dev).toFixed(1)+'%'+
      '<span class="muted" style="font-size:10px;font-weight:400"> ('+(t.costRate250>=ab?"+":"−")+Math.abs(t.costRate250-ab).toFixed(2)+'回)</span></span></div>';
  // --- 時給(遊技モード別 what-if。現在の出玉効率 rate250 を各モードの単価で評価し直す) ---
  const bJudge = bKezuri!==null ? bKezuri : bTheory;
  const kachi = fnum(m.kachi);
  // 回転数/時: 開始時刻があり経過5分〜18hなら実測、それ以外は仮定値
  let rphUsed = fnum(m.rph), rphMeasured = null, elapsedH = null;
  if(m.startedAt){
    elapsedH = (Date.now()-m.startedAt)/3600000 - fnum(m.breakMin)/60;
    if(elapsedH >= 5/60 && elapsedH <= 18 && t.spins>0){ rphMeasured = t.spins/elapsedH; rphUsed = rphMeasured; }
  }
  if(bJudge!==null && rphUsed>0 && kachi>0 && t.rate250>0){
    const uK = 1000/kachi;   // 換金単価(円/玉)
    const uC = fnum(m.genkin)>0 ? 1000/fnum(m.genkin) : uK;   // 現金貸出単価(円/玉、貸出削り込み)
    const hedari = (fnum(m.pushDraw)>0 && fnum(m.pushPayout)>0) ? fnum(m.pushDraw)/fnum(m.pushPayout) : 245/230;  // 貯玉プッシュ手数料比
    const wMochi   = rphUsed*250*uK*(1/bJudge - 1/t.rate250);            // 持玉:換金単価・手数料なし
    const wChodama = rphUsed*250*uK*(1/bJudge - hedari/t.rate250);       // 貯玉:換金単価・引落/払出の手数料
    const wCash    = rphUsed*250*(uK/bJudge - uC/t.rate250);             // 現金:出玉=換金単価/投資=貸出単価
    const hasCash  = (m.segments||[]).some(g=>num(g.cash)>0);
    let rphLine;
    if(rphMeasured!==null) rphLine = '実測 '+Math.round(rphMeasured).toLocaleString()+'回転/時 (経過'+elapsedH.toFixed(1)+'h'+(fnum(m.breakMin)>0?'・休憩'+fnum(m.breakMin)+'分':'')+'・'+t.spins.toLocaleString()+'回転) → 反映中';
    else if(m.startedAt) rphLine = '計測中 経過'+Math.round(Math.max(0,elapsedH)*60)+'分 — 仮定値 '+fnum(m.rph)+'回転/時を使用';
    else rphLine = '仮定値 '+fnum(m.rph)+'回転/時(区間入力で開始時刻を自動記録→実測に切替)';
    const wl = (label,val,strong)=> '<div class="row between" style="font-size:'+(strong?12:11)+'px;margin-bottom:3px">'+
      '<span'+(strong?' style="font-weight:700"':' class="muted"')+'>'+label+'</span>'+
      '<span class="mono '+clsPM(val)+'"'+(strong?' style="font-weight:700"':'')+'>'+(val>=0?"+":"−")+Math.round(Math.abs(val)).toLocaleString()+'円/時</span></div>';
    h += '<div style="border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:6px">'+
      '<div class="muted" style="font-size:9px;margin-bottom:3px">時給 — 削り後B基準 / '+esc(rphLine)+'</div>'+
      wl("持玉遊技", wMochi, true)+
      wl("貯玉遊技", wChodama, false)+
      (hasCash ? wl("現金遊技", wCash, false) : '')+'</div>';
  }
  return h+'</div>';
}

function updateBtPanel(){

  if(el){
    el.innerHTML = borderPanel(m, rates);

    el.querySelectorAll("[data-in='mborder']").forEach(x=>{ x.oninput=()=>{ m.border=x.value; saveLocal(); }; x.onchange=()=>{ save(); render(); }; });
    el.querySelectorAll("[data-in='mty']").forEach(x=>{ x.oninput=()=>{ m.ty=x.value; saveLocal(); }; x.onchange=()=>{ save(); render(); }; });
  }
  (m.segments||[]).forEach(g=>{
    const sf=document.getElementById("segf-"+g.id); if(sf) sf.textContent = segFormula(g, rates);
    const ss=document.getElementById("segs-"+g.id); if(ss) ss.textContent = segStat(g, rates);
  });
  const st=document.getElementById("bt-started");
  if(st) st.textContent = m.startedAt ? (String(new Date(m.startedAt).getHours()).padStart(2,"0")+":"+String(new Date(m.startedAt).getMinutes()).padStart(2,"0")) : "—";
}

          if((x.pachiDraw||"").trim()!==""){ m.pushDraw=x.pachiDraw; }
          save(); render();

<script>
/* ---------- セッション画面のバインド ---------- */
function bindSession(){
  const s = UI.draft;
  const fm = (id)=>s.machines.find(x=>String(x.id)===String(id));

  /* 入力(再描画なし・計算表示のみ更新) */
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind = el.dataset.in, v = el.dataset.v;
    el.oninput = ()=>{
      if(kind==="fee"){ s.fee=el.value; refreshSummary(); }
      else if(kind==="smemo"){ s.memo=el.value; }
      else if(kind==="exchange"){ s.exchange=el.value; refreshSlot(); }
      else if(kind==="pexchange"){ s.pExchange=el.value; refreshSlot(); }

      else if(kind==="myshare"){ s.myShare=el.value; refreshSlot(); }
      else if(kind==="xlabel"||kind==="xamount"){
        const x = s.expenses.find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="xlabel") x.label=el.value; else x.amount=el.value;
        refreshSummary();
      }
      else if(kind==="mname"){
        const m=fm(v); if(!m) return;
        m.name=el.value;
        const sug=document.getElementById("msug-"+m.id);
        if(sug){
          const q=(m.name||"").trim();
          const hits=S.mdb.filter(x=>x.kind===m.kind&&(x.name||"").trim()&&x.name.includes(q)&&x.name.trim()!==q).slice(0,4);
          sug.innerHTML = hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
            hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'';
          bindSessionActions();
        }
        if(m.kind==="pachi") refreshPanel(m);
      }
      else if(kind==="mmemo"){ const m=fm(v); if(m) m.memo=el.value; }
      else if(kind==="mstock"){
        const [mid,k]=v.split("|");
        const m=fm(mid); if(m){ m[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mcash"){
        const [mid,cid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const c=(m.cash||[]).find(x=>String(x.id)===String(cid)); if(c){ c[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mborder"||kind==="mty"){
        const m=fm(v); if(!m) return;
        if(kind==="mborder") m.border=el.value; else m.ty=el.value;
        refreshPanel(m, true);
      }
      else if(kind==="gseg"){
        const [mid,gid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const g=(m.segments||[]).find(x=>String(x.id)===String(gid)); if(!g) return;
        g[k]=el.value;
        const st=document.getElementById("gstat-"+g.id); if(st) st.textContent=segStat(g);
        const fo=document.getElementById("gform-"+g.id); if(fo) fo.textContent=segFormula(g);
        refreshPanel(m);
      }
    };
  });
  document.getElementById("s-date").oninput = e=>s.date=e.target.value;
  document.getElementById("s-store").oninput = e=>s.store=e.target.value;
  const pn = document.getElementById("s-pname");
  if(pn) pn.oninput = e=>s.partnerName=e.target.value;

  bindSessionActions();
}

function refreshSlot(){
  /* 貯玉方式は台収支・人合計・サマリー全てが連動するため、フォーカス保持で全再描画 */
  const f = document.activeElement;
  const fv = f && f.dataset && f.dataset.in
    ? {in:f.dataset.in, v:(f.dataset.v!==undefined?f.dataset.v:null)} : null;
  render();
  if(fv){
    const sel = fv.v!==null
      ? '[data-in="'+fv.in+'"][data-v="'+fv.v+'"]'
      : '[data-in="'+fv.in+'"]:not([data-v])';
    const nel = document.querySelector(sel);
    if(nel){ nel.focus(); /* number入力はカーソル末尾で問題ないため位置復元しない */ }
  }
}
function refreshSummary(){
  const el = document.getElementById("ssummary");
  if(el) el.innerHTML = sessionSummary(UI.draft);
}
function refreshPanel(m, keepInputs){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  if(keepInputs){
    /* 手入力欄フォーカス保持のため、乖離部分だけ作り直すのは煩雑なので全体更新+値復元 */
    const focused = document.activeElement;
    const fv = focused && focused.dataset ? {in:focused.dataset.in, v:focused.dataset.v, val:focused.value, ss:focused.selectionStart} : null;
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);
    if(fv && fv.in){
      const nel = el.querySelector('[data-in="'+fv.in+'"][data-v="'+fv.v+'"]');
      if(nel){ nel.value=fv.val; nel.focus(); try{nel.selectionStart=nel.selectionEnd=fv.ss;}catch(e){} }
    }
  } else {
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);
  }
}
function rebindPanelInputs(m){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  el.querySelectorAll("[data-in]").forEach(inp=>{
    inp.oninput = ()=>{
      if(inp.dataset.in==="mborder") m.border=inp.value;
      else if(inp.dataset.in==="mty") m.ty=inp.value;
      refreshPanel(m, true);
    };
  });
}

function bindSessionActions(){
  const s = UI.draft;
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.draft=null; render(); }
      else if(a==="mode"){ s.mode=v; render(); }
      else if(a==="pname"){ s.partnerName=v; render(); }
      else if(a==="applystore"){
        const st=(S.stores||[]).find(x=>String(x.id)===String(v));
        if(st){
          if((st.slotEx||"").trim()!==""){ s.exchange=st.slotEx; S.rates.exchange=st.slotEx; }
          if((st.pachiEx||"").trim()!==""){ s.pExchange=st.pachiEx; S.rates.pExchange=st.pachiEx; }
          render();
        }
      }
      else if(a==="whotab"){ UI.whoTab=v; render(); }
      else if(a==="madd"){
        const nm = {id:uid(),kind:v,name:"",memo:"",who:"me",startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(v==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="maddw"){
        const [k,who]=v.split("|");
        const nm = {id:uid(),kind:k,name:"",memo:"",who,startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(k==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="mdel"){ if(confirm("この台を削除しますか?")){ s.machines=s.machines.filter(x=>String(x.id)!==String(v)); render(); } }
      else if(a==="msug"){
        const [mid,name]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.name=name; render(); }
      }
      else if(a==="mcashadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.cash=m.cash||[]).push({id:uid(),label:"",amount:""}); render(); }
      }
      else if(a==="mcashdel"){
        const [mid,cid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.cash=(m.cash||[]).filter(x=>String(x.id)!==String(cid)); render(); }
      }
      else if(a==="gadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.segments=m.segments||[]).push({id:uid(),kind:"ball",sb:"",ss:"",eb:"",es:"",rpStart:"",rpEnd:""}); render(); }
      }
      else if(a==="gkind"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        const g=m&&(m.segments||[]).find(x=>String(x.id)===String(gid));
        if(g){ g.kind = g.kind==="push"?"ball":"push"; render(); }
      }
      else if(a==="gdel"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.segments=(m.segments||[]).filter(x=>String(x.id)!==String(gid)); render(); }
      }
      else if(a==="xadd"){ s.expenses.push({id:uid(),label:"",amount:""}); render(); }
      else if(a==="xdel"){ s.expenses=s.expenses.filter(x=>String(x.id)!==String(v)); render(); }
      else if(a==="sdel"){
        if(!confirm("この稼働記録を削除しますか?(家計簿の連携分も消えます)")) return;
        S.entries = S.entries.filter(e=>e.id!=="slot-"+s.id);
        S.sessions = S.sessions.filter(x=>x.id!==s.id);
        save(); UI.screen="main"; UI.draft=null; render();
      }
      else if(a==="ssave") saveSession();
    };
  });
}

function saveSession(){
  const s = UI.draft;
  if(!s.date) return;
  const cleaned = Object.assign({}, s, {
    fee: String(num(s.fee))
  });
  delete cleaned.own; delete cleaned.partner; delete cleaned.results;
  if(UI.isNewSess) S.sessions.push(cleaned);
  else S.sessions = S.sessions.map(x=>x.id===s.id?cleaned:x);
  /* レート記憶 */
  if(num(cleaned.exchange)>0) S.rates.exchange = cleaned.exchange;
  if(num(cleaned.pExchange)>0) S.rates.pExchange = cleaned.pExchange;
  if(num(cleaned.pushPayout)>0) S.rates.pushPayout = cleaned.pushPayout;
  if(num(cleaned.pushDraw)>0) S.rates.pushDraw = cleaned.pushDraw;
  /* 家計簿連携 */
  const linkId = "slot-"+s.id;
  const fin = finalOwn(cleaned);
  const isDai = cleaned.mode==="dai";
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date,
      src: isDai ? "daida" : "slot",
      type: fin>0?"income":"expense",
      category: isDai ? "副業" : "遊技",
      amount: Math.abs(fin),
      memo: modeLabel(cleaned.mode)+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.draft=null; render();
}
</script>

  const f = UI.mdbForm;
  if(f){
    document.getElementById("f-name").oninput = e=>f.name=e.target.value;
    document.getElementById("f-memo").oninput = e=>f.memo=e.target.value;
    const d=document.getElementById("f-denom"), t=document.getElementById("f-ty");
    const upB = ()=>{ const el=document.getElementById("f-border"); if(el) el.textContent=mdbBorderLine(f); };
    if(d) d.oninput = e=>{ f.denom=e.target.value; upB(); };
    if(t) t.oninput = e=>{ f.ty=e.target.value; upB(); };
  }
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.mdbForm=null; render(); }
      else if(a==="fnew"){ UI.mdbForm={id:uid(),kind:"pachi",name:"",denom:"",ty:"",memo:""}; render(); }
      else if(a==="fedit"){ const x=S.mdb.find(z=>String(z.id)===String(v)); if(x){ UI.mdbForm=Object.assign({},x); render(); } }
      else if(a==="fkind"){ UI.mdbForm.kind=v; render(); }
      else if(a==="fcancel"){ UI.mdbForm=null; render(); }
      else if(a==="fdel"){
        if(!confirm("この機種データを削除しますか?")) return;
        S.mdb = S.mdb.filter(x=>x.id!==UI.mdbForm.id);
        save(); UI.mdbForm=null; render();
      }
      else if(a==="fsave"){
        if(!(UI.mdbForm.name||"").trim()) return;
        if(S.mdb.some(x=>x.id===UI.mdbForm.id)) S.mdb = S.mdb.map(x=>x.id===UI.mdbForm.id?UI.mdbForm:x);
        else S.mdb.push(UI.mdbForm);
        save(); UI.mdbForm=null; render();
      }
    };
  });
}
</script>
<script>
/* ============================================================
   バックアップ画面
   ============================================================ */
function viewBackup(){
  return '<div class="hdr"><button class="navbtn" data-a="back">‹ 戻る</button>'+
    '<div style="font-size:14px;font-weight:700">バックアップ</div><div style="width:44px"></div></div>'+
    band("クラウド同期")+
    '<div id="syncbox">'+syncBoxHtml()+'</div>'+
    band("エクスポート(全データ)")+
    '<div class="muted" style="font-size:12px;line-height:1.7;margin-bottom:10px">'+
    '家計簿・稼働記録・機種データ・レート設定の全てをJSONファイルとして書き出します。データはこの端末のブラウザ内に保存されているため、ブラウザのデータ消去で消えます。定期的に書き出してください。</div>'+
    '<div class="row" style="gap:8px;margin-bottom:8px">'+
    '<button class="btn primary" style="flex:1;padding:11px 0" data-a="bexport">ファイルに書き出す</button>'+
    '<button class="btn" style="flex:1;padding:11px 0;color:var(--text)" data-a="bcopy">コピー</button></div>'+
    '<button class="btn" style="width:100%;padding:10px 0;color:var(--text);font-size:12px" data-a="csv">CSV形式で書き出す(表計算ソフト用)</button>'+
    band("インポート(復元)")+
    '<div class="muted" style="font-size:12px;line-height:1.7;margin-bottom:10px">'+
    'バックアップJSONの中身を下に貼り付けて取り込みます。<span class="red">現在のデータは貼り付けた内容で完全に置き換わります。</span></div>'+
    '<textarea class="input mono" id="b-import" placeholder=\'{"entries":[...],"sessions":[...]}\'></textarea>'+
    '<button class="btn danger full" style="margin-top:8px;font-weight:700;padding:11px 0" data-a="bimport">このデータで置き換えて復元する</button>'+
    band("保存の診断")+
    '<button class="btn tealb full" style="font-weight:700;padding:11px 0" data-a="btest">保存テストを実行</button>'+
    (UI.msg?'<div class="mono teal" style="font-size:11px;margin-top:10px;line-height:1.8;white-space:pre-wrap">'+esc(UI.msg)+'</div>':'')+
    band("アプリの更新")+
    '<div class="muted" style="font-size:12px;line-height:1.7;margin-bottom:10px">最新版が公開されているか確認し、あれば再読み込みして取り込みます(オンライン時のみ)。</div>'+
    '<button class="btn tealb full" style="font-weight:700;padding:11px 0" data-a="chkupd">更新を確認して再読み込み</button>'+
    '<div class="muted" style="text-align:center;font-size:11px;margin-top:24px;opacity:.7">Tally バージョン '+APP_VERSION+'</div>';
}
function bindBackup(){
  bindSyncBox();
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a;
      if(a==="back"){ UI.screen="main"; render(); }
      else if(a==="chkupd"){ checkForUpdate(true); }
      else if(a==="csv"){ exportCsv(); }
      else if(a==="bexport"){
        dl(JSON.stringify(Object.assign({exportedAt:new Date().toISOString()},S), null, 1),
          "kakeibo_backup_"+todayStr()+".json", "application/json");
        UI.msg = "書き出しました(記録"+S.entries.length+"件 / 稼働"+S.sessions.length+"件 / 機種"+S.mdb.length+"件)";
        render();
      }
      else if(a==="bcopy"){
        const txt = JSON.stringify(Object.assign({exportedAt:new Date().toISOString()},S));
        const ta = document.createElement("textarea");
        ta.value=txt; document.body.appendChild(ta); ta.select();
        let ok=false; try{ ok=document.execCommand("copy"); }catch(e){}
        document.body.removeChild(ta);
        if(!ok && navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>{});
        UI.msg = "クリップボードにコピーしました。メモアプリ等に貼り付けて保存してください。";
        render();
      }
      else if(a==="bimport"){
        const txt = document.getElementById("b-import").value;
        try{
          const d = JSON.parse(txt);
          if(!Array.isArray(d.entries)||!Array.isArray(d.sessions)) throw new Error("形式不正");
          if(!confirm("現在のデータを完全に置き換えます。よろしいですか?")) return;
          S.entries = d.entries;
          S.sessions = d.sessions.map(migrateSession);
          S.rates = Object.assign({medal:"20",ball:"4",push:"245",exchange:"50",pExchange:"250",pushPayout:"230",pushDraw:"245",mjScore:"",mjChip:"",mjBase:"",mjTop:"",mjDrink:""}, d.rates||{});
          S.mdb = Array.isArray(d.mdb)?d.mdb:[];
          S.mjSessions = Array.isArray(d.mjSessions)?d.mjSessions:[];
          save();
          UI.msg = "復元しました(記録"+S.entries.length+"件 / 稼働"+S.sessions.length+"件 / 機種"+S.mdb.length+"件)";
          render();
        }catch(e){
          UI.msg = "取り込めませんでした。JSON全体(先頭の{から末尾の}まで)を貼り付けているか確認してください。";
          render();
        }
      }
      else if(a==="btest"){
        const log=[];
        try{ localStorage.setItem("diag:test", JSON.stringify({t:Date.now()})); log.push("1. テスト書込: OK"); }
        catch(e){ log.push("1. テスト書込: エラー "+e.message); }
        try{ const r=localStorage.getItem("diag:test"); log.push(r?"2. テスト読出: OK":"2. テスト読出: 失敗(値なし)"); }
        catch(e){ log.push("2. テスト読出: エラー "+e.message); }
        try{
          const m=localStorage.getItem(KEY);
          if(m){ const d=JSON.parse(m);
            log.push("3. 本体データ読出: OK(記録"+(d.entries||[]).length+"件 / 稼働"+(d.sessions||[]).length+"件 / 機種"+(d.mdb||[]).length+"件)");
          } else log.push("3. 本体データ読出: 値なし(未保存)");
        }catch(e){ log.push("3. 本体データ読出: エラー "+e.message); }
        log.push("4. 画面上の現在値: 記録"+S.entries.length+"件 / 稼働"+S.sessions.length+"件 / 機種"+S.mdb.length+"件");
        UI.msg = log.join("\n");
        render();
      }
    };
  });
}

/* ============================================================
   クラウド同期(Supabase)
   ローカルファースト: localStorageが作業コピー。
   起動時とオンライン復帰時に、タイムスタンプで新しい方を採用(案ア)。
   ============================================================ */
const SB_URL = "https://uxvihnyrchaczwghykot.supabase.co";
const SB_KEY = "sb_publishable_qjSW1MlyG6fr-GSMj9mGTQ_9c73lmsx";
let sb = null;            // Supabaseクライアント
let sbSession = null;     // ログインセッション
let syncState = "off";    // off | ready | syncing | error | offline | nokey
let pushTimer = null;

function initSb(){
  if(sb) return sb;
  if(window.supabase){
    try{ sb = window.supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:true, autoRefreshToken:true}}); }
    catch(e){ sb = null; }
  }
  return sb;
}
function setSync(s){ syncState = s; updateSyncUi(); }
function syncLabel(){
  return ({off:"未ログイン", ready:"同期済み", syncing:"同期中…", error:"同期エラー", offline:"オフライン", nokey:"読込中"})[syncState] || "";
}
function updateSyncUi(){
  const b = document.getElementById("syncbadge");
  if(b){ b.className = "syncbtn " + syncState; }
  if(UI.screen==="backup"){
    const box = document.getElementById("syncbox");
    if(box){ box.innerHTML = syncBoxHtml(); bindSyncBox(); }
  }
}

async function pushCloud(){
  if(!sb || !sbSession) return;
  try{
    setSync("syncing");
    const { error } = await sb.from("app_data").upsert({
      user_id: sbSession.user.id,
      data: S,
      updated_at: new Date().toISOString()
    }, { onConflict: "user_id" });
    if(error) throw error;
    setSync("ready");
  }catch(e){ setSync("error"); }
}
function schedulePush(){
  if(!sb || !sbSession) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushCloud, 1200);
}
async function fetchCloud(){
  if(!sb || !sbSession) return null;
  const { data, error } = await sb.from("app_data")
    .select("data").eq("user_id", sbSession.user.id).maybeSingle();
  if(error) throw error;
  return data ? data.data : null;
}
async function cloudSync(){
  if(!sb || !sbSession) return;
  try{
    setSync("syncing");
    const cloud = await fetchCloud();
    const localTs = S.updatedAt || 0;
    const cloudTs = cloud ? (cloud.updatedAt || 0) : -1;
    if(cloud && cloudTs > localTs){
      applyData(cloud);         // クラウドが新しい→採用
      saveLocal();
      render();
      toast("クラウドから同期しました");
      setSync("ready");
    }else if(localTs > cloudTs){
      await pushCloud();        // ローカルが新しい→送信
      toast("クラウドへ同期しました");
    }else{
      setSync("ready");
    }
  }catch(e){ setSync("error"); }
}

async function authSignIn(email, pw){
  if(!initSb()) return {error:"接続できません(オフラインの可能性があります)"};
  const { data, error } = await sb.auth.signInWithPassword({email, password:pw});
  if(error) return {error: error.message};
  sbSession = data.session; return {ok:true};
}
async function authSignUp(email, pw){
  if(!initSb()) return {error:"接続できません(オフラインの可能性があります)"};
  const { data, error } = await sb.auth.signUp({email, password:pw});
  if(error) return {error: error.message};
  sbSession = data.session; return {ok:true};
}
async function authSignOut(){
  if(sb){ try{ await sb.auth.signOut(); }catch(e){} }
  sbSession = null; setSync("off");
}

function whenSbReady(cb){
  if(window.supabase) return cb();
  let n=0;
  const iv=setInterval(()=>{
    if(window.supabase){ clearInterval(iv); cb(); }
    else if(++n>40){ clearInterval(iv); setSync(navigator.onLine?"off":"offline"); }
  },150);
}
async function initCloud(){
  if(!initSb()){ setSync(navigator.onLine?"off":"offline"); return; }
  try{
    const { data } = await sb.auth.getSession();
    sbSession = (data && data.session) || null;
    if(sbSession){ await cloudSync(); }
    else setSync("off");
  }catch(e){ setSync("error"); }
}
window.addEventListener("online", ()=>{ if(sbSession) cloudSync(); });
window.addEventListener("offline", ()=>{ if(!sbSession) setSync("offline"); });

/* バックアップ画面のクラウド同期セクション */
function syncBoxHtml(){
  if(sbSession){
    const email = esc((sbSession.user && sbSession.user.email) || "");
    return '<div class="card"><div class="row between" style="align-items:center;margin-bottom:8px">'+
      '<div style="min-width:0"><div style="font-size:13px;font-weight:700">同期中</div>'+
      '<div class="muted ellip" style="font-size:11px">'+email+'</div></div>'+
      '<span class="syncbadge '+syncState+'" id="syncbadge2">'+syncLabel()+'</span></div>'+
      '<div class="row" style="gap:8px">'+
      '<button class="btn tealb" style="flex:1;font-weight:700;padding:10px 0" data-sa="syncnow">今すぐ同期</button>'+
      '<button class="btn" style="flex:1;padding:10px 0;color:var(--text)" data-sa="logout">ログアウト</button></div></div>';
  }
  return '<div class="card">'+
    '<div class="muted" style="font-size:12px;line-height:1.7;margin-bottom:10px">'+
    'メールとパスワードでログインすると、データが自動でクラウドに保存され、複数端末で同期されます。初めての場合は「新規登録」を押してください(同じメール/パスワードで別端末からログインできます)。</div>'+
    '<input class="input" id="sync-email" type="email" inputmode="email" placeholder="メールアドレス" autocomplete="username" style="margin-bottom:8px">'+
    '<input class="input" id="sync-pw" type="password" placeholder="パスワード(6文字以上)" autocomplete="current-password" style="margin-bottom:10px">'+
    '<div class="row" style="gap:8px">'+
    '<button class="btn primary" style="flex:1;font-weight:700;padding:11px 0" data-sa="login">ログイン</button>'+
    '<button class="btn tealb" style="flex:1;font-weight:700;padding:11px 0" data-sa="signup">新規登録</button></div>'+
    (UI.syncMsg?'<div class="'+(UI.syncErr?"red":"teal")+'" style="font-size:11px;margin-top:10px;line-height:1.6">'+esc(UI.syncMsg)+'</div>':'')+'</div>';
}
function bindSyncBox(){
  document.querySelectorAll("[data-sa]").forEach(el=>{
    el.onclick = async ()=>{
      const a = el.dataset.sa;
      if(a==="logout"){ await authSignOut(); UI.syncMsg=""; render(); }
      else if(a==="syncnow"){ await cloudSync(); }
      else if(a==="login" || a==="signup"){
        const email = (document.getElementById("sync-email").value||"").trim();
        const pw = document.getElementById("sync-pw").value||"";
        if(!email || pw.length<6){ UI.syncErr=true; UI.syncMsg="メールアドレスと6文字以上のパスワードを入力してください。"; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg = (a==="login"?"ログイン中…":"登録中…"); updateSyncUi();
        const r = a==="login" ? await authSignIn(email, pw) : await authSignUp(email, pw);
        if(r.error){ UI.syncErr=true; UI.syncMsg = r.error; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg=""; 
        await cloudSync();
        render();
      }
    };
  });
}

/* ---------- 起動 ---------- */
load();
ensureFixedEntries();
render();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{ /* 未対応環境でも本体は動く */ });
}

/* ---------- アプリ更新チェック ---------- */
let updateChecking = false, lastUpdateCheck = 0;
async function checkForUpdate(manual){
  const now = Date.now();
  if(!manual && now - lastUpdateCheck < 60000) return;   /* 自動は60秒throttle。手動は常に実行 */
  if(updateChecking) return;
  updateChecking = true; lastUpdateCheck = now;
  try{
    if("serviceWorker" in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg){ try{ await reg.update(); }catch(e){} }
    }
    const res = await fetch("./index.html?_=" + now, { cache:"no-store" });
    if(!res.ok) throw new Error("fetch " + res.status);
    const txt = await res.text();
    const mt = txt.match(/APP_VERSION\s*=\s*"([\d.]+)"/);
    const latest = mt ? mt[1] : null;
    if(latest && latest !== APP_VERSION) showUpdateBar(latest, manual);
    else if(manual) toast("最新です(" + APP_VERSION + ")");
  }catch(e){
    if(manual) toast("確認できませんでした(オフライン?)");
  }finally{
    updateChecking = false;
  }
}
function showUpdateBar(latest, manual){
  /* 手動は即確認ダイアログ。自動はバー通知のみ(入力中に勝手にリロードしない) */
  if(manual){
    if(confirm("新しいバージョン " + latest + " があります。\n今すぐ再読み込みしますか?(現在 " + APP_VERSION + ")")) reloadForUpdate();
    return;
  }
  if(document.getElementById("updatebar")) return;
  const bar = document.createElement("div");
  bar.id = "updatebar";
  bar.innerHTML = '<span>新バージョン ' + esc(latest) + ' が利用できます</span>'+
    '<button id="updatebar-btn">再読み込み</button>'+
    '<button id="updatebar-x" aria-label="閉じる">×</button>';
  document.body.appendChild(bar);
  document.getElementById("updatebar-btn").onclick = reloadForUpdate;
  document.getElementById("updatebar-x").onclick = ()=>bar.remove();
}
async function reloadForUpdate(){
  try{
    if("serviceWorker" in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg){ try{ await reg.update(); }catch(e){} }
    }
  }catch(e){}
  location.reload();
}
/* 起動時・復帰時の自動チェック */
setTimeout(()=>checkForUpdate(false), 1500);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") checkForUpdate(false); });

setSync("nokey");
whenSbReady(initCloud);
</script>
