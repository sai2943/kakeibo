<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B1F1E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<link rel="manifest" href="manifest.webmanifest?v=2">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tally">
<title>Tally</title>
<style>
  :root{
    --bg:#0B1F1E; --surface:#12302E; --surface2:#1A3E3B; --line:#24504C;
    --amber:#F2B33D; --teal:#2DD4BF; --red:#E57373; --text:#E8F0EF; --muted:#8FAAA7; --blue:#5FA8E8;
    /* --vgap: レイアウトビューポート下端〜物理画面下端の不可視帯(JSが起動時に実測で上書き)
       --navpad: ナビの下余白。不可視帯が大きい間は2px床に張り付き、
                 ビューポートが全画面化したら安全域-12pxまで自動で下がる。12pxが調整ノブ */
    --vgap:62px;
    --navh:64px; /* ナビバー実高。renderが毎回実測で上書き(魔法数根絶) */
    --navpad: max(2px, calc(env(safe-area-inset-bottom,0px) - var(--vgap) - 12px));
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); height:100dvh;
    display:flex; flex-direction:column; overflow:hidden;
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif; font-size:14px;}
  #app{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; width:100%; max-width:560px; margin:0 auto; padding:calc(16px + env(safe-area-inset-top,0px)) 16px calc(max(var(--navh,0px), 60px) + 20px);}
  #navbar{flex:0 0 auto; width:100%; padding:6px 16px var(--navpad); position:relative;}
  /* 描画領域との境界フェード帯(v3.28): navbar上端から上へ24px張り出す透明→bgのグラデ。
     コンテンツはタブピルに激突せず溶けて消える。透明側はbg同色のalpha0(Safariのtransparent=黒混ざり回避)。
     navbarはmain画面(常にダーク)でのみ表示されるため色は固定値でよい */
  #navbar::before{content:""; position:absolute; left:0; right:0; top:-24px; height:24px;
    background:linear-gradient(rgba(11,31,30,0), var(--bg)); pointer-events:none;}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);}
  .teal{color:var(--teal);} .red{color:var(--red);} .amber{color:var(--amber);} .blue{color:var(--blue);}
  .band{display:flex; align-items:center; gap:8px; margin:20px 0 10px;}
  .band .tick{width:4px; height:14px; background:var(--amber); border-radius:2px;}
  .band .label{font-size:12px; letter-spacing:.12em; color:var(--muted); font-weight:600;}
  .band .rule{flex:1; height:1px; background:var(--line);}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .card2{background:var(--surface2); border-radius:8px; padding:8px 10px;}
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .input, select.input, textarea.input{background:var(--surface2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:10px 12px; font-size:14px; outline:none; width:100%;}
  .input.sm{padding:6px 8px; font-size:13px;}
  /* iOSはtype=timeにネイティブの大型コントロール描画を当ててheight指定を無視することがある。
     appearanceを剥がして日付と同じ「ただの箱」として描画させる */
  input[type="time"]{-webkit-appearance:none; appearance:none;}
  /* スコア表=共有ドキュメントは白基調(同卓者への視認性優先)。変数差し替えで一括再テーマ */
  body.nopad-top #app{ padding-top:0; }
  body.sheet-light{
    --bg:#F4F6F6; --surface:#FFFFFF; --surface2:#E9EEED; --line:#C2CFCD;
    --amber:#A9780E; --teal:#0E8C7A; --red:#C0392B; --text:#1B2E2C; --muted:#5E7573; --blue:#2E6DA4;
  }
  .input.r{text-align:right;}
  input[type="date"].input{ -webkit-appearance:none; appearance:none; }
  /* 固定費フォームの期日・金額グリッド: 2列均等・ラベル11px(節ラベルと同格)・全欄同高(高さは推測せず明示=v2.91原則) */
  .fxg{display:flex; gap:8px; margin-bottom:12px;}
  .fxg>div{flex:1; min-width:0;}
  .fxl{font-size:11px; color:var(--muted); margin:0 2px 5px;}
  .fxg .input{height:42px;}
  .btn{border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted);
    font-size:13px; padding:9px 12px; cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--amber); color:#1a1508; border:none; font-weight:700;}
  .btn.danger{border-color:var(--red); color:var(--red);}
  .btn.tealb{border-color:var(--teal); color:var(--teal);}
  .btn.sel{border-color:var(--amber); color:var(--amber); background:rgba(242,179,61,.12); font-weight:600;}
  .btn.dash{border-style:dashed; font-size:12px;}
  .btn.full{width:100%;}
  .chip{padding:4px 10px; border-radius:12px; font-size:11px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-family:inherit;}
  .chip.sel{border-color:var(--teal); color:var(--teal); background:rgba(45,212,191,.12);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .tag{font-size:10px; padding:1px 6px; border-radius:4px; white-space:nowrap;}
  .syncbadge{font-size:10px; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap; border:1px solid var(--line); color:var(--muted);}
  .syncbadge.ready{border-color:var(--teal); color:var(--teal);}
  .syncbadge.syncing{border-color:var(--amber); color:var(--amber);}
  .syncbadge.error{border-color:var(--red); color:var(--red);}
  .syncbadge.offline,.syncbadge.off,.syncbadge.nokey{border-color:var(--line); color:var(--muted);}
  .syncbtn{width:34px; height:34px; border-radius:17px; border:1px solid var(--line); background:none; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex-shrink:0;}
  .syncbtn.ready{color:var(--muted); border-color:var(--line);}
  .syncbtn.syncing{color:var(--teal); border-color:var(--teal);}
  .syncbtn.syncing svg{animation:spin .9s linear infinite;}
  .syncbtn.error{color:var(--red); border-color:var(--red);}
  .syncbtn.offline{color:var(--amber); border-color:var(--amber);}
  .syncbtn.off,.syncbtn.nokey{color:var(--muted); border-color:var(--line);}
  @keyframes spin{to{transform:rotate(360deg);}}
  table.mjt{border-collapse:collapse;width:100%;min-width:280px;}
  table.mjt th,table.mjt td{border:1px solid var(--line);text-align:center;padding:0;}
  table.mjt th{background:var(--surface2);font-size:12px;font-weight:700;padding:6px 2px;}
  .mjt-name{width:100%;background:transparent;border:none;color:var(--text);text-align:center;font-size:13px;font-weight:700;padding:6px 2px;}
  .mjt-no{background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);padding:8px 2px;}
  .mjt-cell{font-size:15px;font-family:ui-monospace,monospace;padding:12px 4px;cursor:pointer;min-width:52px;}
  .mjt-cell.sel{background:rgba(242,179,61,.22);outline:2px solid var(--amber);}
  .mjt-cell.red{color:var(--red);}
  .mjt-ph{color:var(--line);}
  .mjt-x{color:var(--red);font-size:14px;padding:8px 6px;cursor:pointer;width:22px;}
  .mjt-pad{position:sticky;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;background:var(--bg);padding:6px 0;border-top:1px solid var(--line);}
  .mjt-key{padding:9px 0;font-size:17px;font-weight:700;background:var(--surface2);border:1px solid var(--line);border-radius:9px;color:var(--text);}
  .mjt-key.done{background:var(--amber);color:#000;border-color:var(--amber);}
  .mjt-sticky{position:sticky;top:0;z-index:5;background:var(--bg);padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--line);}
  table.mjt.sum .mjt-no{white-space:nowrap;}
  table.mjt.sum td,table.mjt.sum th{border-color:var(--line);}
  .mjt-mini{font-size:10px;font-family:ui-monospace,monospace;color:var(--muted);padding:4px 3px;white-space:nowrap;}
  .mjt-abs{color:var(--muted);font-size:12px;}
  .mjt-cell.abs{background:rgba(143,170,167,.10);}
  .mjt-auto{color:var(--amber);font-style:italic;}
  .mjt-add{color:var(--teal);cursor:pointer;font-weight:700;}
  .mjt-pdel{font-size:9px;color:var(--red);cursor:pointer;margin-top:2px;font-weight:400;}
  .mjt-cell.blue{color:var(--blue);}
  .mjt-pad-wrap{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding-top:8px;}
  .mjt-pad-head{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px;}
  .mjt-pad-wrap .mjt-pad{position:static;border-top:none;padding:0 0 10px;}
  .tabs{max-width:560px; margin:0 auto;
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    display:flex; box-shadow:0 6px 22px rgba(0,0,0,.38); overflow:hidden;}
  .tabs button{flex:1; padding:9px 0 8px; background:none; border:none;
    cursor:pointer; font-size:11px; color:var(--muted); font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tabs button.on{color:var(--amber); font-weight:700;}
  .tabs button svg{width:24px; height:24px;}
  /* 下部マスクは撤去(ナビは通常フローの最下段要素になったため不要) */
  .toast{position:fixed; bottom:calc(max(var(--navh,0px), 58px) + 16px); left:50%; transform:translateX(-50%); background:var(--surface2);
    border:1px solid var(--teal); color:var(--teal); font-size:12px; padding:6px 16px; border-radius:16px;
    z-index:60; opacity:0; transition:opacity .25s; pointer-events:none;}
  .toast.show{opacity:1;}
  #updatebar{position:fixed; left:12px; right:12px; top:calc(env(safe-area-inset-top, 0px) + 10px); z-index:9999;
    background:var(--teal); color:#04201d; border-radius:12px; padding:11px 14px;
    display:flex; align-items:center; gap:10px; box-shadow:0 6px 24px rgba(0,0,0,.4);
    font-size:13px; font-weight:700;}
  #updatebar span{flex:1; line-height:1.4;}
  #updatebar button{border:none; border-radius:8px; font-weight:700; cursor:pointer;}
  #updatebar-btn{background:#04201d; color:#eafff9; padding:8px 12px; font-size:13px;}
  #updatebar-x{background:transparent; color:#04201d; padding:6px 4px; font-size:17px; line-height:1;}
  .hdr{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .navbtn{background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; font-family:inherit;}
  h1{font-size:15px; font-weight:700; letter-spacing:.06em; margin:0 0 4px;}
  h1 small{color:var(--muted); font-weight:400; font-size:11px;}
  .listitem{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; cursor:pointer;}
  .ellip{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar{height:5px; background:var(--surface2); border-radius:3px;}
  .bar>div{height:5px; border-radius:3px; opacity:.85;}
  .xbtn{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 2px;}
  .signbtn{width:38px; height:38px; border-radius:6px; font-size:18px; font-weight:700; cursor:pointer;
    flex-shrink:0; line-height:1; background:transparent; font-family:inherit;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:0;}
  .amberpanel{background:rgba(242,179,61,.08); border:1px solid rgba(242,179,61,.35); border-radius:8px; padding:9px 10px;}
  textarea.input{height:120px; resize:vertical; font-size:11px;}
  #print-area{ display:none; }
  @page{ margin:0; }  /* 余白0=Safariが余白に刷るURL/日付を出さない。内側余白は.pr-wrapで確保 */
  @media print{
    html, body{ background:#fff !important; color:#000 !important; display:block !important; height:auto !important; overflow:visible !important; }
    #app{ overflow:visible !important; height:auto !important; }
    body > *:not(#print-area){ display:none !important; }
    body::after{ display:none !important; }
    #print-area{ display:block !important; background:#fff !important; color:#000 !important; }
    #print-area *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    .pr-break{ page-break-before:always; break-before:page; }
    .pr-tbl tr{ break-inside:avoid; page-break-inside:avoid; }
    .pr-sum{ break-inside:avoid; page-break-inside:avoid; }
  }
  /* 精算票の見た目(印刷と画面上の精算シートで共用) */
  .pr-wrap{ color:#000 !important; background:#fff !important; font-family:-apple-system,sans-serif; padding:10mm; border-radius:10px; }
  .pr-title{ font-size:18px; font-weight:700; color:#000 !important; }
  .pr-sub{ font-size:11px; color:#333 !important; margin:2px 0 10px; }
  .pr-tbl{ border-collapse:collapse; width:100%; margin-bottom:10px; background:#fff !important; table-layout:fixed; }
  .pr-tbl th:first-child, .pr-tbl td:first-child{ width:56px; }
  .pr-tbl th, .pr-tbl td{ border:1px solid #777 !important; padding:2px 4px; text-align:center; font-size:11px; color:#000 !important; background:#fff !important; }
  .pr-tbl th{ background:#dfe9e7 !important; font-weight:700; }
  .pr-no, .pr-lbl{ background:#eee !important; font-weight:700; }
  .pr-tbl td.pr-neg{ color:#c00 !important; }
  .pr-abs{ color:#999 !important; }
  .pr-hist tbody tr:nth-child(even):not(.pr-latest) td{ background:#F2F6F5 !important; }
  .pr-latest td{ background:#FBF3DC !important; }
  .pr-no, .pr-lbl{ white-space:nowrap; }
  /* ↓画面上の精算シート専用の調整(印刷は#print-area経由なので不変) */
  #app .pr-wrap{ padding:14px 8px; }
  #app .pr-title{ font-size:20px; }
  #app .pr-tbl th, #app .pr-tbl td{ font-size:12px; padding:4px 2px; white-space:nowrap; overflow:hidden; }
  #app .pr-sum .pr-final td{ font-size:13px; }
  #app .pr-mid .pr-tbl th, #app .pr-mid .pr-tbl td{ font-size:15px; padding:7px 2px; }
  #app .pr-mid .pr-sum td, #app .pr-mid .pr-sum th{ font-size:13.5px; padding:6px 2px; }
  .pr-sum .pr-final td{ font-weight:700; border-top:2px solid #333 !important; font-size:12px; }
  .pr-foot{ font-size:10px; color:#666 !important; margin-top:6px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="navbar"></div>
<div id="print-area"></div>
<div id="toast" class="toast">保存しました</div>
<script>
"use strict";
/* ============================================================
   Tally 3.29 (localStorage保存・完全オフライン)
   ============================================================ */
const KEY = "kakeibo:v1";
const EXPENSE_CATS = ["消費","娯楽","承認"];  /* 承認=事前承認済みの特別支出。予算バー対象外(承認プロセス自体が統制) */
const INCOME_CATS = ["給与","賞与","副業","臨時"];
const UNIT_LABEL = {medal:"枚", ball:"玉", yen:"円"};
const WD = ["日","月","火","水","木","金","土"];

/* ---------- helpers ---------- */
const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
const fnum = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const yen = n => "¥" + Math.abs(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"−") + yen(n);
const clsPM = n => n>=0 ? "teal" : "red";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const nowHM = () => { const d=new Date(); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); };
const uid = () => Date.now() + Math.floor(Math.random()*1000);

/* ---------- 固定費(定期)テンプレート ----------
   テンプレートが実エントリを生成する方式。日付が過去なら実績、未来なら予定。
   当年12月まで生成。停止すると未来分だけ削除し過去は残す。 */
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();  // m:1-12
/* 日本の祝日判定(オフライン・計算式。春分/秋分は天文近似、ハッピーマンデー・振替休日・国民の休日に対応) */
function jpEquinox(y, spring){
  const base = spring ? 20.8431 : 23.2488;
  return Math.floor(base + 0.242194*(y-1980) - Math.floor((y-1980)/4));
}
function isJpHolidayYMD(y, m, d){
  const FIX = {1:[1], 2:[11,23], 4:[29], 5:[3,4,5], 8:[11], 11:[3,23]};
  if(FIX[m] && FIX[m].indexOf(d)>=0) return true;
  if(m===3 && d===jpEquinox(y,true)) return true;
  if(m===9 && d===jpEquinox(y,false)) return true;
  const dow = new Date(y, m-1, d).getDay();
  if(dow===1){
    const week = Math.floor((d-1)/7)+1;
    if(m===1 && week===2) return true;   // 成人の日
    if(m===7 && week===3) return true;   // 海の日
    if(m===9 && week===3) return true;   // 敬老の日
    if(m===10 && week===2) return true;  // スポーツの日
  }
  return false;
}
function isJpHoliday(dt){
  const DAY=86400000;
  const y=dt.getFullYear(), m=dt.getMonth()+1, d=dt.getDate();
  if(isJpHolidayYMD(y,m,d)) return true;
  let p=new Date(dt.getTime()-DAY);   // 振替休日: 直前の連続祝日が日曜まで遡れる
  while(isJpHolidayYMD(p.getFullYear(),p.getMonth()+1,p.getDate())){
    if(p.getDay()===0) return true;
    p=new Date(p.getTime()-DAY);
  }
  if(dt.getDay()!==0 && dt.getDay()!==6){   // 国民の休日: 前後が祝日の平日
    const pv=new Date(dt.getTime()-DAY), nx=new Date(dt.getTime()+DAY);
    if(isJpHolidayYMD(pv.getFullYear(),pv.getMonth()+1,pv.getDate()) && isJpHolidayYMD(nx.getFullYear(),nx.getMonth()+1,nx.getDate())) return true;
  }
  return false;
}
function isNonBusinessDay(dt){ const g=dt.getDay(); return g===0 || g===6 || isJpHoliday(dt); }
function shiftForHoliday(dt, mode){
  const DAY=86400000; let d=new Date(dt.getTime());
  if(mode==="before"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()-DAY); }
  else if(mode==="after"){ while(isNonBusinessDay(d)) d=new Date(d.getTime()+DAY); }
  return d;
}
function fixedDateFor(tpl, y, m){
  const d = Math.min(num(tpl.day)||1, daysInMonth(y,m));
  return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}
const fmtDate = dt => dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
/* 頻度に応じた発生日リストを返す(今月〜当年12月) */
function fixedOccurrences(tpl){
  const now = new Date();
  const y = now.getFullYear();
  let yEnd = new Date(y, 11, 31);
  if(tpl.end){ const e = new Date(tpl.end+"T00:00:00"); if(e < yEnd) yEnd = e; }  /* 終了日で打ち切り */
  const floor = new Date(y, now.getMonth(), 1);   // 今月1日(過去への遡り防止)
  const freq = tpl.freq || "monthly";
  const out = [];
  if(freq==="days"){
    /* 曜日指定: 開始日〜終了日の範囲で該当曜日に毎回発生(駐輪場・出勤日系) */
    const days = Array.isArray(tpl.days) ? tpl.days : [];
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(floor);
    if(d < floor) d = new Date(floor);
    while(d <= yEnd){ if(days.includes(d.getDay())) out.push(new Date(d)); d = new Date(d.getTime()+86400000); }
  } else if(freq==="weekly" || freq==="biweekly"){
    const step = (freq==="weekly"?7:14) * 86400000;
    let d = tpl.start ? new Date(tpl.start+"T00:00:00") : new Date(y, now.getMonth(), now.getDate());
    while(d < floor) d = new Date(d.getTime()+step);   // 起点を今月まで進める
    while(d <= yEnd){ out.push(new Date(d)); d = new Date(d.getTime()+step); }
  } else {
    const day = num(tpl.day)||1;
    const stepM = (freq==="bimonthly") ? 2 : Math.max(1, Math.min(12, num(tpl.every)||1));
    for(let m=now.getMonth(); m<=11; m+=stepM){
      const dt = new Date(y, m, Math.min(day, daysInMonth(y, m+1)));
      if(dt <= yEnd) out.push(dt);
    }
  }
  const hs = tpl.holidayShift || "none";
  return (hs==="none") ? out : out.map(dt => shiftForHoliday(dt, hs));
}
/* 定期エントリの「出生日」= どの発生回として生まれたか。
   日付や金額を編集しても不変の身元。旧データはIDの -fYYYY-MM-DD から復元(遡及治癒) */
function fixedOccKey(e){
  if(e.fixedDate) return e.fixedDate;
  const m = String(e.id||"").match(/-f(\d{4}-\d{2}-\d{2})$/);
  return m ? m[1] : e.date;
}
function genFixedEntries(tpl){
  const skips = tpl.skips || [];
  fixedOccurrences(tpl).forEach(dt=>{
    const date = fmtDate(dt);
    if(skips.includes(date)) return;
    const exists = S.entries.some(e=>String(e.fixedId)===String(tpl.id) && fixedOccKey(e)===date);
    if(!exists){
      S.entries.push({
        id: uid()+"-f"+date, date, fixedDate: date,
        type: tpl.type, category: tpl.category,
        amount: num(tpl.amount), memo: tpl.name, store: tpl.store||"", item: tpl.item||"",
        src: "fixed", fixedId: tpl.id
      });
    }
  });
}
/* 分身の自動掃除: 同じ定期・同じ出生日のエントリが複数いたら、
   テンプレ通りの未編集クローンだけを消す(ユーザーが触った方=金額/日付/店が違う方は必ず残す)。
   第二サイロ(Safari別ストレージ・旧版キャッシュの他端末)からの注入に対する免疫。 */
function fixedDedupe(){
  const byTpl = {};
  (S.fixed||[]).forEach(t=>{ byTpl[String(t.id)] = t; });
  const groups = {};
  (S.entries||[]).forEach(e=>{
    if(e.fixedId==null) return;
    const k = String(e.fixedId)+"|"+fixedOccKey(e);
    (groups[k]=groups[k]||[]).push(e);
  });
  const removeIds = [];
  Object.keys(groups).forEach(k=>{
    const g = groups[k];
    if(g.length < 2) return;
    const tpl = byTpl[String(g[0].fixedId)];
    const untouched = e => !!tpl
      && e.date === fixedOccKey(e)
      && num(e.amount) === num(tpl.amount)
      && (e.store||"") === (tpl.store||"");
    const touched = g.filter(e=>!untouched(e));
    const keep = touched.length ? touched : [g[0]];
    g.forEach(e=>{ if(!keep.includes(e)) removeIds.push(e.id); });
  });
  if(removeIds.length){
    S.entries = S.entries.filter(e=>!removeIds.includes(e.id));
    saveLocal();
    setTimeout(()=>{ try{ toast("定期の重複"+removeIds.length+"件を自動整理しました"); }catch(e){} }, 600);
  }
  return removeIds.length;
}
function ensureFixedEntries(){
  fixedDedupe();
  (S.fixed||[]).forEach(genFixedEntries);
}
function fixedSchedLabel(t){
  const freq = t.freq || "monthly";
  if(freq==="weekly")   return "毎週("+(t.start||"").slice(5).replace("-","/")+"〜)";
  if(freq==="biweekly") return "2週ごと("+(t.start||"").slice(5).replace("-","/")+"〜)";
  if(freq==="days") return "毎週 "+((t.days||[]).slice().sort().map(d=>"日月火水木金土"[d]).join("·"))+(t.end?"(〜"+t.end.slice(5).replace("-","/")+")":"");
  if(freq==="bimonthly")return "2ヶ月ごと "+num(t.day)+"日";
  const ev=Math.max(1,num(t.every)||1);
  return (ev>1? ev+"ヶ月ごと " : "毎月")+num(t.day)+"日";
}
function stopFixed(id){
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(id) && e.date > today));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}
function updateFixed(tpl){
  /* 編集: 未来の予定分だけ新しい内容に。過去の実績は事実なので変えない */
  const old = (S.fixed||[]).find(t=>String(t.id)===String(tpl.id));
  if(old && old.skips && tpl.skips===undefined) tpl.skips = old.skips;
  const today = todayStr();
  S.entries = S.entries.filter(e=> !(String(e.fixedId)===String(tpl.id) && e.date > today));
  S.fixed = (S.fixed||[]).map(t=> String(t.id)===String(tpl.id) ? tpl : t);
  /* 養子縁組(v3.14): スケジュール変更で出生日が旧暦のまま残った実績を新暦へ。
     新スケジュールの発生日と同じ日付を持つ自テンプレの実績に fixedDate を刻み直し、
     その発生の代表として認知させる(水道27日→2ヶ月15日変更で双子が生まれた事件の再発防止) */
  const occs = fixedOccurrences(tpl).map(fmtDate);
  S.entries.forEach(e=>{
    if(String(e.fixedId)!==String(tpl.id)) return;
    if(occs.includes(e.date) && fixedOccKey(e)!==e.date){ e.fixedDate = e.date; }
  });
  genFixedEntries(tpl);
  save();
}
function deleteFixed(id){
  /* 完全削除: 過去含めてこの固定費の記録を全部消す */
  S.entries = S.entries.filter(e=> String(e.fixedId)!==String(id));
  S.fixed = (S.fixed||[]).filter(t=>String(t.id)!==String(id));
  save();
}

let S = { entries:[], sessions:[], rates:{medal:"20", ball:"4", push:"245", exchange:"50", pExchange:"250", pushPayout:"230", pushDraw:"245", mjScore:"", mjChip:"", mjBase:"", mjTop:"", mjDrink:""}, mdb:[], stores:[], mjSessions:[], fixed:[], mjTables:[], mjPresets:[], wishlist:[], bank:{switch:"",ceiling:"300000",seed:"",txns:[]}, savings:{goals:[],txns:[]}, budgets:{}, borderTool:{id:"bt",kind:"pachi",name:"",segments:[],border:"",ty:"",pushPayout:"",pushDraw:"",kezuri:"5",kachi:"250",genkin:"250",rph:"750",startedAt:0,breakMin:""}, schemaV:3, updatedAt:0 };

function migrateEntry(e){

    if(n.feeTotal==null) n.feeTotal="";

    if(!Array.isArray(n.chipEnd)){ n.chipEnd = (Array.isArray(n.chips)? n.chips.map(c=>c) : new Array(np).fill("")); }
    if(!Array.isArray(n.fees)) n.fees = new Array(np).fill(n.fee||"");
    delete n.chips; delete n.fee;
    return n;
  });
  S.mjPresets = Array.isArray(d.mjPresets)?d.mjPresets:[];
  S.borderTool = Object.assign({id:"bt",kind:"pachi",name:"",segments:[],border:"",ty:"",pushPayout:"",pushDraw:"",kezuri:"5",kachi:"25",genkin:"250",rph:"750",startedAt:0,breakMin:""}, d.borderTool||{});
  (S.borderTool.segments||[]).forEach(g=>{ delete g.kind; }); /* 貯玉プッシュ一本化: 旧区間の kind は不要 */
  if(_sv < 3){
    /* 換金率を全て1000円基準に統一。v2.17で100円にした分(schemaV=2)は×10で戻す。ボーダーの換金率(kachi)は元々100円基準なので全ケースで×10。1回のみ実行し保存 */
    const _x10 = x => (x==="" || x==null) ? x : String(num(x)*10);
    if(_sv >= 2){
      S.rates.exchange = _x10(S.rates.exchange); S.rates.pExchange = _x10(S.rates.pExchange);
      (S.sessions||[]).forEach(se=>{ if(se){ if(se.exchange!==undefined) se.exchange=_x10(se.exchange); if(se.pExchange!==undefined) se.pExchange=_x10(se.pExchange); } });

}

/* ---------- 計算(セッション) ---------- */
const migrateSession = s => {
  /* 旧構造からの移行: 全台に貯玉方式フィールドを補完 */
  const machines = (s.machines||[]).map(m => {
    const nm = Object.assign({who:"me"}, m);
    if(nm.startStock===undefined) nm.startStock="";
    if(nm.endStock===undefined) nm.endStock="";
    if(nm.holdBalls===undefined) nm.holdBalls="";
    if(!nm.cash) nm.cash=[];
    if(nm.kind==="slot"){ delete nm.rsegs; delete nm.hits; } /* 旧判別ログ破棄 */
    return nm;
  });
  const out = Object.assign({}, s, {machines});
  if(out.exchange===undefined) out.exchange="";
  if(out.pExchange===undefined) out.pExchange="";
  if(out.pushPayout===undefined) out.pushPayout="";
  if(out.pushDraw===undefined) out.pushDraw="";
  /* 旧区間の pushes/pp フィールドは残っていても新計算では無視される */
  delete out.results; delete out.own; delete out.partner;
  return out;
};
/* ---------- 計算(貯玉方式・台ごと) ----------
   差枚 = 終了貯玉 − 開始貯玉 + 持ち玉
   収支(円) = 差枚 ÷ 交換枚数 × 1000 − 現金投資合計 */
const machCash = m => (m.cash||[]).reduce((a,c)=>a+num(c.amount),0);
const machSabai = m => num(m.endStock) - num(m.startStock) + num(m.holdBalls);
const machYen = (m, exch) => {
  const ex = num(exch);
  const gross = ex>0 ? Math.round(machSabai(m)/ex*1000) : 0;
  return gross - machCash(m);
};
const machHasData = m => m.startStock!=="" || m.endStock!=="" || m.holdBalls!=="" || machCash(m)>0;
/* 台の換算レート: スロット=交換枚数, パチンコ=換金玉数 */
const machExch = (m, s) => m.kind==="pachi" ? s.pExchange : s.exchange;
const machYenS = (m, s) => machYen(m, machExch(m, s));
/* 収支対象台(スロット+貯玉入力のあるパチンコ) */
const incomeMachines = (s, who) => (s.machines||[]).filter(m =>
  (m.kind==="slot" || (m.kind==="pachi" && machHasData(m))) && (!who || (m.who||"me")===who));
const slotMachines = (s, who) => (s.machines||[]).filter(m => m.kind==="slot" && (!who || (m.who||"me")===who));
const personSlotYen = (s, who) => incomeMachines(s, who).reduce((a,m)=>a+machYenS(m, s), 0);
const poolTotal = s => personSlotYen(s,"me") + personSlotYen(s,"partner");
const expTotal = s => (s.expenses||[]).reduce((a,e)=>a+num(e.amount),0);
/* ---------- 家計簿→セッション経費への振替 ----------
   候補: 支出・非連携(src無し)・セッション日±3日・未選択。元記録の削除は保存時に実行(トランザクション) */
function xferCandidates(dateStr, expenses){
  const used = new Set((expenses||[]).map(x=>String(x.fromEntry)).filter(x=>x!=="undefined"&&x!=="null"));
  const base = new Date((dateStr||todayStr())+"T00:00:00");
  return (S.entries||[]).filter(e=>{
    if(e.type!=="expense" || e.src) return false;
    if(used.has(String(e.id))) return false;
    const d = Math.abs((new Date((e.date||"")+"T00:00:00") - base)/86400000);
    return d<=3;
  }).sort((a,b)=> a.date<b.date?1:-1).slice(0,8);
}
function xferRowsHtml(list, act){
  if(!list.length) return '<div class="muted" style="font-size:11px;margin:6px 0">直近±3日に振替できる支出がありません</div>';
  return list.map(e=>{
    const lbl = e.item || e.store || e.memo || e.category || "支出";
    return '<button class="btn" style="width:100%;text-align:left;margin-top:6px;padding:8px 12px;font-size:12px;display:flex;gap:8px;align-items:center" data-a="'+act+'" data-v="'+e.id+'">'+
      '<span class="muted mono" style="font-size:11px">'+esc((e.date||"").slice(5))+'</span>'+
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(lbl)+'</span>'+
      '<span class="mono">'+yen(num(e.amount))+'</span></button>';
  }).join("");
}
const xferHint = '<div class="muted" style="font-size:10px;margin:8px 2px 0">選ぶと経費に入り、このセッションを保存した時点で元の家計簿記録が削除されます。</div>';
/* 乗り打ちの折半調整: myShareが入力されていればそれを自分の取り分に使う(なければ折半) */
const halfSplit = s => Math.round(poolTotal(s)/2);
const myShare = s => (s.myShare!==undefined && s.myShare!=="") ? num(s.myShare) : halfSplit(s);
const partnerShare = s => poolTotal(s) - myShare(s);
/* 家計簿へ流れる自分の生収支(経費前) */
const grossOwn = s => s.mode==="dai" ? num(s.fee)
                    : s.mode==="nori" ? myShare(s)
                    : personSlotYen(s,"me");
const finalOwn = s => grossOwn(s) - expTotal(s);
/* 代打ちの台勝敗(報告用・家計簿非反映) */
const daiResult = s => incomeMachines(s).reduce((a,m)=>a+machYenS(m, s), 0);

/* ---------- 計算(麻雀) ---------- */
const mjRankCount = m => m.rule==="3" ? 3 : 4;
const mjRanks = m => { const rc=mjRankCount(m); return (m.ranks||[]).map(x=>num(x)).map((v,i)=> i<rc?v:0); };
const mjHanchan = m => mjRanks(m).reduce((a,b)=>a+b,0);
const mjGameFee = m => m.category==="free"
  ? num(m.baseFee)*mjHanchan(m) + num(m.topBonus)*num((m.ranks||[])[0]) + num(m.drinkFee)
  : num(m.setFee);
const mjScoreYen = m => Math.round(fnum(m.score)*fnum(m.scoreRate));
const mjChipYen = m => Math.round(fnum(m.chips)*fnum(m.chipRate));
const mjRaw = m => mjScoreYen(m) + mjChipYen(m);          // ゲーム代抜き(麻雀のみの収支)
const mjExpTotal = m => (m.expenses||[]).reduce((a,e)=>a+num(e.amount),0); // セット飲食等の私的経費
const mjFinal = m => mjRaw(m) - mjGameFee(m) - mjExpTotal(m); // ゲーム代・経費込み(家計簿へ)
const mjAvgRank = m => {
  const h = mjHanchan(m); if(!h) return null;
  const r = mjRanks(m);
  let s=0; for(let i=0;i<r.length;i++) s += (i+1)*r[i];
  return s/h;
};
const modeLabel = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";
const modeShort = m => m==="nori" ? "乗打" : m==="dai" ? "代打" : "単独";

/* ---------- 計算(パチンコ区間) ----------
   貯玉プッシュ: プッシュ数 = 開始残プッシュ − 終了残プッシュ
   台に入った玉(回転率用) = プッシュ数×払出玉 + 開始残玉 − 当たり時残玉
   引き落とし玉(コスト用) = プッシュ数×引き落とし玉 + 開始残玉 − 当たり時残玉 */
const segPushes = g => Math.max(0, num(g.rpStart) - num(g.rpEnd));
const cashBalls = (g, s) => num(g.cash)>0 ? num(g.cash)*fnum((s&&s.genkin)||250)/1000 : 0;   // 現金投資額→玉(貸出レート、削り対応)
const segUsed = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushPayout)||230) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segCost = (g, s) => { s=s||UI.draft; return Math.max(0, segPushes(g)*num((s&&s.pushDraw)||245) + cashBalls(g,s) + num(g.sb) - num(g.eb)); };
const segSpins = g => Math.max(0, num(g.es) - num(g.ss));
/* 貯玉プッシュ一本化 + 現金: 残プッシュ空・現金なしなら持ち玉(残玉差)。現金投資があれば現金区間として成立 */
const segDone = g => g.ss!=="" && g.es!=="" &&
  ((g.rpStart!=="" && g.rpEnd!=="") || (g.sb!=="" && g.eb!=="") || num(g.cash)>0);
function machineTotals(m, s){
  s = s||UI.draft;
  const segs = (m.segments||[]).filter(segDone);
  const balls = segs.reduce((a,g)=>a+segUsed(g, s),0);
  const spins = segs.reduce((a,g)=>a+segSpins(g),0);
  const costBalls = segs.reduce((a,g)=>a+segCost(g, s),0);
  const payouts = [];
  for(let i=0;i<segs.length-1;i++){
    if(segs[i].eb!=="" && segs[i+1].sb!==""){
      const p = num(segs[i+1].sb) - num(segs[i].eb);
      if(p>0) payouts.push(p);
    }
  }
  const avgTY = payouts.length ? payouts.reduce((a,b)=>a+b,0)/payouts.length : null;
  return { balls, spins, payouts, avgTY,
    rate250: balls>0 ? spins/(balls/250) : null,
    costRate250: costBalls>0 ? spins/(costBalls/250) : null };
}
const findMaster = m => S.mdb.find(x => x.kind==="pachi" && (x.name||"").trim()
  && (x.name||"").trim() === (m.name||"").trim());

function moveMonth(d){ UI.m += d;

  render(); }
</script>

/* ---------- カテゴリ内訳(店別ドリルダウン) ---------- */
function viewCatDrill(){
  const cat = UI.drillCat || "消費";
  const mk = monthKey();
  const parts = mk.split("-");
  const NET_SRCS = ["slot","mahjong"];
  const isNetEntry = e => NET_SRCS.includes(e.src);
  const list = S.entries.filter(e=> e.date.startsWith(mk) && e.type==="expense" && e.category===cat && !isNetEntry(e) && (!UI.drillVarOnly || e.fixedId==null));
  const cap = num((S.budgets||{})[cat])||0;
  const spent = list.reduce((a,e)=>a+e.amount,0);
  const pct = cap>0 ? Math.min(100, spent/cap*100) : 0;
  const over = spent - cap;
  if(UI.drillMode==null) UI.drillMode="chain";
  /* チェーン名の導出: 最初の空白(半角/全角)より前。空白なしは全体を1店として扱う */
  const chainKey = n => { const m=n.split(/[\s\u3000]+/).filter(Boolean); return m.length>1 ? m[0] : n; };
  const g = {};
  list.forEach(e=>{
    const ex=(e.store||"").trim()||"店名未入力";
    const k = (UI.drillMode==="chain" && ex!=="店名未入力") ? chainKey(ex) : ex;
    (g[k]=g[k]||[]).push(e);
  });
  /* ジャンル辞書のレンズ: チェーン名単位で引く(1回の割当が全支店・全期間に効く) */
  const genreOf = ch => (S.genres||{})[ch] || "未分類";
  let ggroups = [];
  if(UI.drillMode==="genre"){
    const gc = {};
    list.forEach(e=>{
      const ex=(e.store||"").trim()||"店名未入力";
      const ch = ex==="店名未入力" ? ex : chainKey(ex);
      gc[ch]=gc[ch]||{ch:ch, sum:0, n:0}; gc[ch].sum+=e.amount; gc[ch].n++;
    });
    const gg = {};
    Object.values(gc).forEach(c=>{ const gn=genreOf(c.ch); (gg[gn]=gg[gn]||[]).push(c); });
    ggroups = Object.keys(gg).map(gn=>({gn:gn, chains:gg[gn].sort((a2,b2)=>b2.sum-a2.sum),
      sum:gg[gn].reduce((s2,c)=>s2+c.sum,0), n:gg[gn].reduce((s2,c)=>s2+c.n,0)}))
      .sort((a2,b2)=>b2.sum-a2.sum);
  }
  const groups = Object.keys(g).map(k=>({k:k, sum:g[k].reduce((a,e)=>a+e.amount,0), es:g[k].sort((a,b)=>a.date<b.date?1:-1)})).sort((a,b)=>b.sum-a.sum);

  let h = '<div class="row" style="align-items:center;margin-bottom:10px">'+
    '<button class="navbtn" data-a="drillback" style="font-size:14px">‹ 戻る</button>'+
    '<div style="flex:1;text-align:center;font-weight:700;font-size:15px">'+(UI.drillVarOnly&&cat==="消費"?"変動消費":esc(cat))+'の内訳 <span class="muted" style="font-size:11px">'+num(parts[0])+'年'+num(parts[1])+'月</span></div>'+
    '<button class="navbtn" data-a="setbudget" data-v="'+esc(cat)+'" style="font-size:12px;color:var(--teal)">予算変更</button></div>';
  h += '<div class="card" style="margin-bottom:12px">';
  if(cap>0){
    const col = over>0 ? "var(--red)" : (cat==="娯楽" ? "var(--amber)" : "var(--red)");
    h += '<div class="row between" style="align-items:baseline;margin-bottom:6px"><span style="font-size:12px;font-weight:700">合計</span>'+
      '<span><span class="mono '+(over>0?"red":"")+'" style="font-size:16px;font-weight:700">¥'+spent.toLocaleString("ja-JP")+'</span><span class="muted" style="font-size:11px"> / ¥'+cap.toLocaleString("ja-JP")+'</span></span></div>'+
      '<div style="height:7px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="row between" style="font-size:10px;margin-top:5px">'+(over>0?'<span class="red" style="font-weight:700">超過 ¥'+over.toLocaleString("ja-JP")+'</span>':'<span class="muted">残り ¥'+Math.max(0,cap-spent).toLocaleString("ja-JP")+'</span>')+'<span class="mono muted">'+list.length+'件</span></div>';
  } else {
    h += '<div class="row between"><span style="font-size:12px;font-weight:700">合計</span><span class="mono" style="font-size:16px;font-weight:700">¥'+spent.toLocaleString("ja-JP")+'</span></div>';
  }

    '<button class="btn '+(UI.drillMode==="chain"?"sel":"")+'" data-a="drillmode" data-v="chain" style="flex:1;font-size:11px;padding:7px 0">チェーン集約</button>'+
    '<button class="btn '+(UI.drillMode==="exact"?"sel":"")+'" data-a="drillmode" data-v="exact" style="flex:1;font-size:11px;padding:7px 0">店舗別</button>'+
    '<button class="btn '+(UI.drillMode==="genre"?"sel":"")+'" data-a="drillmode" data-v="genre" style="flex:1;font-size:11px;padding:7px 0">ジャンル</button></div>';
  if(UI.drillMode==="genre"){
    const GEN_STARTER=["食費","日用品","住居","水道光熱","通信","交通","医療","趣味・自己投資"];
    const GEN_SUGG=[...new Set([...GEN_STARTER, ...Object.values(S.genres||{})])];
    if(!ggroups.length){
      h += '<div class="muted" style="text-align:center;font-size:12px;padding:24px 0">この月の'+esc(cat)+'の支出はまだありません</div>';
    } else {
      h += '<div class="muted" style="font-size:10px;margin:0 2px 6px">店をタップでジャンルを割当(全期間の記録に即反映)</div>';
      h += '<div class="card" style="padding:2px 12px">';
      ggroups.forEach((G,gi)=>{
        const open = UI.drillOpenStore===("g:"+G.gn);
        h += '<div class="row" data-a="drillstore" data-v="g:'+esc(G.gn)+'" style="gap:8px;align-items:center;padding:11px 0;cursor:pointer'+(gi>0?';border-top:1px solid var(--line)':'')+'">'+
          '<span style="flex:none;font-size:11px;color:var(--muted);width:12px">'+(open?"▾":"▸")+'</span>'+
          '<span class="ellip" style="flex:1;font-size:13px;font-weight:600;min-width:0'+(G.gn==="未分類"?';color:var(--muted)':'')+'">'+esc(G.gn)+'</span>'+
          '<span class="muted" style="flex:none;font-size:10px">'+G.n+'件</span>'+
          '<span class="mono" style="flex:none;font-size:14px;font-weight:700">¥'+G.sum.toLocaleString("ja-JP")+'</span></div>';
        if(open){
          G.chains.forEach(c=>{
            const asg = UI.drillAssign===c.ch;
            h += '<div class="row" data-a="gassign" data-v="'+esc(c.ch)+'" style="gap:8px;align-items:center;padding:6px 0 6px 20px;border-top:1px solid var(--surface2);cursor:pointer">'+
              '<span class="ellip" style="flex:1;font-size:12px;min-width:0;color:'+(asg?"var(--teal)":"var(--muted)")+'">'+esc(c.ch)+'</span>'+
              '<span class="muted" style="flex:none;font-size:10px">'+c.n+'件</span>'+
              '<span class="mono" style="flex:none;font-size:12px">¥'+c.sum.toLocaleString("ja-JP")+'</span></div>';
            if(asg){
              const cur=(S.genres||{})[c.ch]||"";
              h += '<div class="row" style="flex-wrap:wrap;gap:6px;padding:4px 0 10px 20px;border-top:1px solid var(--surface2)">'+
                GEN_SUGG.map(gn=>'<button class="chip '+(cur===gn?"sel":"")+'" data-a="gset" data-c="'+esc(c.ch)+'" data-v="'+esc(gn)+'">'+esc(gn)+'</button>').join("")+
                '<button class="chip" style="border-style:dashed;color:var(--muted)" data-a="gnew" data-c="'+esc(c.ch)+'">＋新規</button>'+
                (cur?'<button class="chip" style="color:var(--muted)" data-a="gclear" data-c="'+esc(c.ch)+'">未分類へ</button>':'')+
                '</div>';
            }
          });
        }
      });
      h += '</div>';
    }
  } else if(!groups.length){
    h += '<div class="muted" style="text-align:center;font-size:12px;padding:24px 0">この月の'+esc(cat)+'の支出はまだありません</div>';
  } else {
    h += '<div class="card" style="padding:2px 12px">';
    groups.forEach((gr,gi)=>{
      const open = UI.drillOpenStore===gr.k;
      h += '<div class="row" data-a="drillstore" data-v="'+esc(gr.k)+'" style="gap:8px;align-items:center;padding:11px 0;cursor:pointer'+(gi>0?';border-top:1px solid var(--line)':'')+'">'+
        '<span style="flex:none;font-size:11px;color:var(--muted);width:12px">'+(open?"▾":"▸")+'</span>'+
        '<span class="ellip" style="flex:1;font-size:13px;font-weight:600;min-width:0">'+esc(gr.k)+'</span>'+
        '<span class="muted" style="flex:none;font-size:10px">'+gr.es.length+'件</span>'+
        '<span class="mono" style="flex:none;font-size:14px;font-weight:700">¥'+gr.sum.toLocaleString("ja-JP")+'</span></div>';
      if(open){
        gr.es.forEach(e=>{
          const label = (e.item||"").trim() || (e.memo||"").trim() || "—";
          const ex=(e.store||"").trim();
          const br=(UI.drillMode==="chain" && ex && chainKey(ex)!==ex) ? ex.split(/[\s\u3000]+/).filter(Boolean).slice(1).join(" ") : "";
          h += '<div class="row" data-a="drilledit" data-v="'+e.id+'" style="gap:8px;align-items:center;padding:6px 0 6px 20px;border-top:1px solid var(--surface2);cursor:pointer">'+
            '<span class="mono muted" style="flex:none;font-size:11px">'+esc((e.date||"").slice(5).replace("-","/"))+'</span>'+
            '<span class="ellip muted" style="flex:1;font-size:12px;min-width:0">'+esc(label)+'</span>'+
            (br?'<span class="ellip muted" style="flex:none;max-width:100px;font-size:10px">'+esc(br)+'</span>':'')+
            '<span class="mono" style="flex:none;font-size:12px">¥'+e.amount.toLocaleString("ja-JP")+'</span></div>';
        });
      }
    });
    h += '</div>';
  }
  h += saveIndicatorHtml();
  return h;
}
function bindCatDrill(){
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = () => {
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="drillback"){ UI.screen="main"; UI.drillOpenStore=null; render(); }
      else if(a==="drillstore"){ UI.drillOpenStore = (UI.drillOpenStore===v ? null : v); render(); }
      else if(a==="drillmode"){ UI.drillMode=v; UI.drillOpenStore=null; UI.drillAssign=null; render(); }
      else if(a==="gassign"){ UI.drillAssign = (UI.drillAssign===v ? null : v); render(); }
      else if(a==="gset"){ const ch=el.dataset.c; S.genres=S.genres||{}; S.genres[ch]=v; UI.drillAssign=null; save(); render(); }
      else if(a==="gnew"){ const ch=el.dataset.c; const gn=prompt("新しいジャンル名:"); if(gn==null||!gn.trim())return; S.genres=S.genres||{}; S.genres[ch]=gn.trim(); UI.drillAssign=null; save(); render(); }
      else if(a==="gclear"){ const ch=el.dataset.c; if(S.genres){ delete S.genres[ch]; } UI.drillAssign=null; save(); render(); }
      else if(a==="drilledit"){
        const e=S.entries.find(x=>String(x.id)===String(v)); if(!e) return;
        UI.editEntryId=e.id;
        UI.entryForm={date:e.date,type:e.type,category:e.category,amount:String(e.amount),store:e.store||"",item:(e.item!=null?e.item:(e.memo||"")),memo:e.memo||""};
        UI.entryReturn="catdrill";
        UI.screen="entry"; render();
      }
      else if(a==="setbudget"){ const cat=v; const p=prompt(cat+"の月間予算(上限・円):", ((S.budgets||{})[cat])||""); if(p===null)return; (S.budgets=S.budgets||{})[cat]=String(num(p)); save(); render(); }
    };
  });
}

/* ---------- メイン画面 ---------- */
function viewMain(){
  const TABNAMES = {ledger:"家計簿", games:"遊技", assets:"資産", tool:"ツール"};
  let h = '<div class="row" style="align-items:center;margin-bottom:6px">'+
    '<div style="width:34px;flex-shrink:0"></div>'+
    '<div style="flex:1;text-align:center;font-size:18px;font-weight:700;letter-spacing:.02em">'+(TABNAMES[UI.tab]||"")+'</div>'+
    '<button class="syncbtn '+syncState+'" id="syncbadge" data-a="syncnow" title="同期"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>'+
    '</div>';

  if(UI.tab==="tool"){
    h += viewTool();
    return h;
  }

  if(UI.tab==="assets"){
    h += viewAssets();
    return h;
  }

  h += monthNav();
  if(UI.tab==="ledger") h += viewLedger();
  if(UI.tab==="games"){
    const gsub = UI.gameSub || "slot";
    const gmk = monthKey();
    const gme = S.entries.filter(e=>e.date.startsWith(gmk));
    const slotNet = gme.filter(e=>e.src==="slot").reduce((a,e)=>a+(e.type==="income"?e.amount:-e.amount),0);
    const mjNet = gme.filter(e=>e.src==="mahjong").reduce((a,e)=>a+(e.type==="income"?e.amount:-e.amount),0);
    const gambleNet = slotNet + mjNet;
    const hasSlot = gme.some(e=>e.src==="slot"), hasMj = gme.some(e=>e.src==="mahjong");
    const both = hasSlot && hasMj;
    h += '<div class="card" style="margin-top:10px;margin-bottom:12px">'+
      '<div style="text-align:center;padding:2px 0 '+(both?"12px":"2px")+'">'+
        '<div class="muted" style="font-size:12px;letter-spacing:.1em;margin-bottom:3px">当月の遊技収支</div>'+
        '<div class="mono '+clsPM(gambleNet)+'" style="font-size:34px;font-weight:700;line-height:1.15">'+signYen(gambleNet)+'</div></div>'+
      (both ? '<div class="row" style="border-top:1px solid var(--line);padding-top:11px">'+
        '<div style="flex:1;text-align:center"><div class="muted" style="font-size:11px;margin-bottom:3px">パチスロ</div><div class="mono '+clsPM(slotNet)+'" style="font-size:18px;font-weight:700">'+signYen(slotNet)+'</div></div>'+
        '<div style="width:1px;background:var(--line)"></div>'+
        '<div style="flex:1;text-align:center"><div class="muted" style="font-size:11px;margin-bottom:3px">麻雀</div><div class="mono '+clsPM(mjNet)+'" style="font-size:18px;font-weight:700">'+signYen(mjNet)+'</div></div></div>' : '')+
      '</div>';
    h += '<div class="row" style="gap:8px;margin-bottom:12px">'+
      [["slot","パチスロ"],["mahjong","麻雀"]].map(([v,l])=>
        '<button class="btn '+(gsub===v?"sel":"")+'" style="flex:1;padding:8px 0;font-weight:700" data-a="gamesub" data-v="'+v+'">'+l+'</button>').join("")+
      '</div>';
    h += (gsub==="mahjong") ? viewMahjong() : viewSlot();
  }

  return h;
}

function viewLedger(){
  const mk = monthKey();
  const me = S.entries.filter(e=>e.date.startsWith(mk))
    .sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : (String(b.id)>String(a.id)?1:-1));
  /* 収支カテゴリ(純額で見る独立セクション): 勝ち負けする活動。将来の投資もここに追加できる */
  const NET_SRCS = ["slot","mahjong"]; // 収支カテゴリとして扱うsrc
  const isNetEntry = e => NET_SRCS.includes(e.src);
  const income = me.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const expense = me.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  const _inBank = e => (e.src==="slot"||e.src==="mahjong");
  const bal = me.filter(e=>!_inBank(e)).reduce((s,e)=> s + (e.type==="income"?e.amount:-e.amount), 0);
  /* 内訳用: 収支カテゴリを除いた通常の収入・支出 */
  const normIncome = me.filter(e=>e.type==="income" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  const normExpense = me.filter(e=>e.type==="expense" && !isNetEntry(e)).reduce((s,e)=>s+e.amount,0);
  /* 実績/予定(案ア): 日付が今日以前=実績、未来=予定。大きい数字は予定込みの見込み */
  const todayS = todayStr();
  const hasFuture = me.some(e=>e.date>todayS);
  const actualBal = me.filter(e=>e.date<=todayS && !_inBank(e)).reduce((s,e)=> s + (e.type==="income"?e.amount:-e.amount), 0);
  const futIncome = me.filter(e=>e.type==="income" && !isNetEntry(e) && e.date>todayS).reduce((s,e)=>s+e.amount,0);
  const futExpense = me.filter(e=>e.type==="expense" && !isNetEntry(e) && e.date>todayS).reduce((s,e)=>s+e.amount,0);
  let h = '<div class="card" style="margin-top:10px"><div style="text-align:center;margin:4px 0 6px">'+
    '<div style="font-size:12px;letter-spacing:.15em" class="muted">当月収支'+(hasFuture?'(予定込)':'')+'</div>'+
    '<div class="mono '+clsPM(bal)+'" style="font-size:36px;font-weight:700;line-height:1.2">'+signYen(bal)+'</div>'+
    '</div>'+
    '<div class="row" style="border-top:1px solid var(--line);padding-top:10px;margin-top:8px">'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">収入</div><div class="mono teal" style="font-size:16px">'+yen(normIncome)+'</div>'+(hasFuture?'<div class="muted" style="font-size:10px;margin-top:3px">予定 '+yen(futIncome)+'</div>':'')+'</div>'+
    '<div style="width:1px;background:var(--line)"></div>'+
    '<div style="flex:1;text-align:center"><div style="font-size:11px" class="muted">支出</div><div class="mono red" style="font-size:16px">'+yen(normExpense)+'</div>'+(hasFuture?'<div class="muted" style="font-size:10px;margin-top:3px">予定 '+yen(futExpense)+'</div>':'')+'</div></div></div>';


  /* 収入内訳(収支カテゴリを除く) */
  const incCats = {};
  me.filter(e=>e.type==="income" && !isNetEntry(e)).forEach(e=>incCats[e.category]=(incCats[e.category]||0)+e.amount);
  const ict = Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
  if(ict.length){
    h += band("収入内訳") + '<div class="card">' + ict.map(([c,a])=>
      '<div style="margin:8px 0"><div class="row between" style="font-size:12px;margin-bottom:3px">'+
      '<span>'+esc(c)+'</span><span class="mono muted">'+yen(a)+' <span style="font-size:10px">('+Math.round(a/normIncome*100)+'%)</span></span></div>'+
      '<div class="bar"><div style="width:'+(a/normIncome*100)+'%;background:var(--teal)"></div></div></div>'
    ).join("") + '</div>';
  }

  /* 予算(カテゴリ別・月次上限) */
  h += band("予算");
  h += '<div class="card" style="margin-bottom:14px">';
  /* 固定費(消費)の行: 制御不能層はバー無しで可視化。タップで固定費一覧へ */
  const fxSpent = me.filter(e=>e.type==="expense" && e.category==="消費" && e.fixedId!=null && !isNetEntry(e)).reduce((a,e)=>a+e.amount,0);
  const fxDone  = me.filter(e=>e.type==="expense" && e.category==="消費" && e.fixedId!=null && !isNetEntry(e) && e.date<=todayStr()).reduce((a,e)=>a+e.amount,0);
  h += '<div style="cursor:pointer" data-a="fixed">'+
    '<div class="row between" style="align-items:baseline"><span style="font-size:12px;font-weight:700">固定費</span>'+
    '<span><span class="mono" style="font-size:15px;font-weight:700">¥'+fxSpent.toLocaleString("ja-JP")+'</span> <span class="muted">›</span></span></div>'+
    '<div style="font-size:10px;margin-top:3px" class="muted">支払済 ¥'+fxDone.toLocaleString("ja-JP")+' ・ この後の予定 ¥'+Math.max(0,fxSpent-fxDone).toLocaleString("ja-JP")+'</div></div>';
  EXPENSE_CATS.filter(c=>c!=="承認").forEach((cat,i)=>{  /* 承認は予算バー対象外(承認プロセス自体が統制) */
    const cap = num((S.budgets||{})[cat]);
    const spent = me.filter(e=>e.type==="expense" && e.category===cat && !isNetEntry(e) && (cat!=="消費" || e.fixedId==null)).reduce((a,e)=>a+e.amount,0);
    const pct = cap>0 ? Math.min(100, spent/cap*100) : 0;
    const over = spent - cap;
    const col = over>0 ? "var(--red)" : (cat==="娯楽" ? "var(--amber)" : "var(--red)");
    const colCls = over>0 ? "red" : (cat==="娯楽" ? "amber" : "red");
    h += '<div style="cursor:pointer;margin-top:13px;padding-top:13px;border-top:1px solid var(--line)" data-a="'+(cap>0?"catdrill":"setbudget")+'" data-v="'+cat+'">';
    if(cap>0){
      h += '<div class="row between" style="align-items:baseline;margin-bottom:6px"><span style="font-size:12px;font-weight:700">'+(cat==="消費"?"変動消費":"今月の"+cat)+'</span>'+
        '<span><span class="mono '+colCls+'" style="font-size:15px;font-weight:700">¥'+spent.toLocaleString("ja-JP")+'</span><span class="muted" style="font-size:11px"> / ¥'+cap.toLocaleString("ja-JP")+'</span></span></div>'+
        '<div style="height:7px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+'"></div></div>'+
        '<div class="row between" style="font-size:10px;margin-top:5px">'+(over>0?'<span class="red" style="font-weight:700">超過 ¥'+over.toLocaleString("ja-JP")+'</span>':'<span class="muted">残り ¥'+Math.max(0,cap-spent).toLocaleString("ja-JP")+'</span>')+'<span class="mono muted">'+Math.floor(pct)+'% ・ 内訳を見る</span></div>';
    } else {
      h += '<div class="row between" style="align-items:center"><span style="font-size:12px"><span style="font-weight:700">'+(cat==="消費"?"変動消費":"今月の"+cat)+'</span> <span class="mono muted">¥'+spent.toLocaleString("ja-JP")+'</span></span><span class="amber" style="font-size:11px">＋ 上限を設定</span></div>';
    }
    h += '</div>';
    if(cat==="消費" && cap>0){
      const wf=S.waterfall||{};
      const pmk=leakMonths().filter(k2=>k2<mk).sort().reverse()[0];
      const prevSal=pmk?leakAgg(pmk).salary:0;
      if(prevSal>0){
        const auto=prevSal - fxSpent - num(wf.invest) - num((S.budgets||{})["娯楽"]) - num(wf.sink);
        const applied=(auto===cap);
        h += '<div class="row between" style="font-size:10px;margin-top:7px;cursor:pointer" data-a="wfapply">'+
          '<span class="muted">自動案: 前月給与−固定−投資−娯楽−積立</span>'+
          '<span class="mono '+(applied?"muted":"teal")+'" style="font-weight:700">¥'+auto.toLocaleString("ja-JP")+(applied?" 適用中":" ← 適用")+'</span></div>';
      }
    }
  });
  h += '</div>';

  h += band("明細");
  const detEntries = me.filter(e=>!isNetEntry(e));
  if(!detEntries.length) h += '<div style="text-align:center;padding:28px 0;font-size:13px" class="muted">この月の記録はまだありません。右下の「＋」から追加できます。</div>';
  const byDate = {};
  detEntries.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  Object.entries(byDate).sort((a,b)=>a[0]<b[0]?1:-1).forEach(([d,list])=>{
    h += '<div style="margin-bottom:12px"><div class="mono muted" style="font-size:11px;margin:0 4px 4px">'+
      d.slice(5).replace("-","/")+' ('+WD[new Date(d+"T00:00:00").getDay()]+')</div>'+
      '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden">'+
      list.map((e,i)=>{
        const signedAmt = e.type==="income" ? e.amount : -e.amount;
        const isFuture = e.date > todayS;
        const cc = e.type==="income" ? "var(--teal)" : (e.category==="娯楽" ? "var(--amber)" : e.category==="承認" ? "var(--blue)" : "var(--red)");
        return '<div class="row" style="padding:10px 14px;cursor:pointer;'+(i?'border-top:1px solid var(--line);':'')+(isFuture?'opacity:.62;':'')+'" data-a="eedit" data-v="'+e.id+'">'+
        '<div style="flex:1;min-width:0"><div class="row" style="gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px">'+
        '<span class="tag" style="border:1px solid '+cc+';color:'+cc+'">'+esc(e.category)+'</span>'+
        (e.src==="slot"||e.src==="mahjong"?'<span class="tag" style="border:1px solid var(--amber);color:var(--amber);font-size:9px">連携</span>':'')+
        (e.src==="fixed"?'<span class="tag" style="border:1px solid var(--muted);color:var(--muted);font-size:9px">定期</span>':'')+
        (isFuture?'<span class="tag" style="border:1px solid var(--blue);color:var(--blue);font-size:9px">予定</span>':'')+'</div>'+
        entryDetailHtml(e)+'</div>'+
        '<div class="mono '+clsPM(signedAmt)+'" style="font-size:14px">'+signYen(signedAmt)+'</div></div>';
      }).join("")+'</div></div>';
  });
  return h;
}

function viewSlot(foot){
  const mk = monthKey();
  const ms = S.sessions.filter(s=>s.date.startsWith(mk)).sort((a,b)=>a.date<b.date?1:-1);
  const gamble = ms.filter(s=>s.mode!=="dai");
  const daiSess = ms.filter(s=>s.mode==="dai");
  const total = gamble.reduce((a,s)=>a+finalOwn(s),0);
  const daiTotal = daiSess.reduce((a,s)=>a+finalOwn(s),0);
  const exps = ms.reduce((a,s)=>a+expTotal(s),0);
  let h = band("セッション");
  if(!ms.length) h += '<div style="text-align:center;padding:28px 0;font-size:13px" class="muted">この月の稼働記録はありません。右下の「＋」から追加できます。</div>';
  const byDate = {};
  ms.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
  Object.entries(byDate).sort((a,b)=>a[0]<b[0]?1:-1).forEach(([d,list])=>{
    h += '<div style="margin-bottom:12px"><div class="mono muted" style="font-size:11px;margin:0 4px 4px">'+
      d.slice(5).replace("-","/")+' ('+WD[new Date(d+"T00:00:00").getDay()]+')</div>'+
      '<div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden">'+
      list.map((s,i)=>{
        const fin = finalOwn(s);
        const bc = s.mode==="nori"?"var(--amber)":s.mode==="dai"?"var(--teal)":"var(--red)";
        const mnames = [...new Set((s.machines||[]).map(m=>(m.name||"").trim()).filter(Boolean))];
        const machLine = mnames.length ? mnames.join("・") : ((s.machines||[]).length ? (s.machines||[]).length+"台" : "");
        return '<div class="row" style="padding:10px 14px;cursor:pointer;'+(i?'border-top:1px solid var(--line);':'')+'" data-a="sedit" data-v="'+s.id+'">'+
          '<div style="flex:1;min-width:0">'+
          '<div class="row" style="gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px">'+
          '<span class="tag" style="border:1px solid '+bc+';color:'+bc+'">'+modeShort(s.mode)+'</span>'+
          ((s.partnerName||"").trim()?personTag(s.partnerName.trim()):'')+'</div>'+
          '<div class="muted ellip" style="font-size:11px">'+esc(s.store||"店名未入力")+'</div>'+
          (machLine?'<div class="ellip" style="font-size:11px;color:var(--muted);opacity:.7;margin-top:1px">'+esc(machLine)+'</div>':'')+
          '</div>'+
          '<div class="mono '+clsPM(fin)+'" style="font-size:14px;flex-shrink:0;margin-left:8px">'+signYen(fin)+'</div></div>';
      }).join("")+'</div></div>';
  });
  return h;
}

function viewMjStats(){
  /* ルール名 × カテゴリ(フリー/セット)別に集計。同レートで括るのが目的 */
  const groups = {}; // key: category|store
  (S.mjSessions||[]).forEach(s=>{
    const store = (s.store||"").trim() || "(ルール名なし)";
    const key = s.category + "|" + store;
    (groups[key] = groups[key] || {category:s.category, store, list:[]}).list.push(s);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    // フリー→セットの順、その中は半荘数の多い順
    const ga=groups[a], gb=groups[b];
    if(ga.category!==gb.category) return ga.category==="free"?-1:1;
    const ha=ga.list.reduce((x,s)=>x+mjHanchan(s),0), hb=gb.list.reduce((x,s)=>x+mjHanchan(s),0);
    return hb-ha;
  });
  let h = "", any=false;
  keys.forEach(key=>{
    const G = groups[key], list = G.list;
    const H = list.reduce((a,s)=>a+mjHanchan(s),0);
    if(!H) return;
    any = true;
    /* この括りの最大着順数(3麻と4麻が混じっても広い方に合わせる) */
    const rc = Math.max(...list.map(s=>mjRankCount(s)));
    const rankSums = [0,0,0,0];
    list.forEach(s=>{ const r=mjRanks(s); for(let i=0;i<4;i++) rankSums[i]+=(r[i]||0); });
    let rankWeighted=0; for(let i=0;i<4;i++) rankWeighted += (i+1)*rankSums[i];
    const avgRank = rankWeighted/H;
    const _rankLine = (rc+1)/2;
    const _rankR2 = Number(avgRank.toFixed(2));
    const rankCol = _rankR2 < _rankLine ? "teal" : (_rankR2 > _rankLine ? "red" : "amber");
    const sumFinal = list.reduce((a,s)=>a+mjFinal(s),0);
    const sumRaw = list.reduce((a,s)=>a+mjRaw(s),0);
    const sumFee = list.reduce((a,s)=>a+mjGameFee(s),0);
    const sumScore = list.reduce((a,s)=>a+fnum(s.score),0);
    const sumChips = list.reduce((a,s)=>a+fnum(s.chips),0);
    const catC = G.category==="free"?"var(--red)":"var(--amber)";
    h += '<div class="card" style="margin-bottom:8px">'+

  });
  if(!any) h = '<div style="text-align:center;padding:16px 0;font-size:12px;line-height:1.7" class="muted">まだ記録がありません。記録が貯まるとルール名別の平均着順や収支が出ます。</div>';
  return h;

function mjStatRow(label, val, isYen, raw, unit){
  let disp;
  if(raw) disp = (val>=0?"+":"")+fmtPt(val)+(unit||"");
  else if(isYen) disp = signYen(val);
  else disp = "¥"+Math.abs(val).toLocaleString("ja-JP");
  const col = isYen ? clsPM(val) : (raw ? (val>=0?"blue":"red") : "");
  return '<div class="row between" style="font-size:12px;margin:5px 0"><span class="muted">'+label+'</span>'+
    '<span class="mono '+col+'">'+disp+'</span></div>';
}

/* ===== 麻雀スコア表 ===== */
function mjtSeats(t){ return num(t.rule)||3; }
function mjtAbsent(t,ri,pi){ return t.rows[ri][pi]==="x"; }
function mjtRawScore(t,ri,pi){ const v=t.rows[ri][pi]; return (v===""||v==="x"||v==="-"||v==null)?null:num(v); }
function mjtPlaying(t,ri){ const a=[]; for(let p=0;p<t.players.length;p++) if(!mjtAbsent(t,ri,p)) a.push(p); return a; }
function mjtAutoIdx(t,ri){
  const playing=mjtPlaying(t,ri);
  const empties=playing.filter(p=>mjtRawScore(t,ri,p)===null);
  return empties.length===1 ? empties[0] : -1;
}
function mjtScore(t,ri,pi){
  if(mjtAbsent(t,ri,pi)) return null;
  const raw=mjtRawScore(t,ri,pi); if(raw!==null) return raw;
  if(mjtAutoIdx(t,ri)===pi){
    let s=0; mjtPlaying(t,ri).forEach(p=>{ if(p!==pi){ const r=mjtRawScore(t,ri,p); s+=(r||0); } });
    return -s;
  }
  return null;
}
function mjtChipStart(t,pi){ return num((t.chipStart||[])[pi])||0; }
function mjtChipEndRaw(t,pi){ const v=(t.chipEnd||[])[pi]; return (v===""||v==null)?null:num(v); }
function mjtChipAutoIdx(t){
  const empties=[]; for(let p=0;p<t.players.length;p++) if(mjtChipEndRaw(t,p)===null) empties.push(p);
  return empties.length===1 ? empties[0] : -1;
}
function mjtChipNet(t,pi){
  const auto=mjtChipAutoIdx(t);
  if(auto===pi){
    let s=0; for(let p=0;p<t.players.length;p++){ if(p!==pi){ const er=mjtChipEndRaw(t,p); const end=(er===null?mjtChipStart(t,p):er); s+=(end-mjtChipStart(t,p)); } }
    return -s;
  }
  const er=mjtChipEndRaw(t,pi);
  return er===null ? 0 : er-mjtChipStart(t,pi);
}
function mjtChipEndDisp(t,pi){
  const er=mjtChipEndRaw(t,pi);
  if(er!==null) return er;
  if(mjtChipAutoIdx(t)===pi) return mjtChipStart(t,pi)+mjtChipNet(t,pi);
  return null;
}
function mjtRanks(t,ri){
  const playing=mjtPlaying(t,ri);
  const scored=playing.map(p=>[p,mjtScore(t,ri,p)]).filter(x=>x[1]!==null);
  if(scored.length<mjtSeats(t)) return {};
  scored.sort((a,b)=>b[1]-a[1]);
  const m={}; scored.forEach(([p],i)=>m[p]=i+1); return m;
}
function mjtRankCounts(t,pi){
  const c=[0,0,0,0];
  (t.rows||[]).forEach((r,ri)=>{ const rk=mjtRanks(t,ri)[pi]; if(rk&&rk<=4) c[rk-1]++; });
  return c;
}
function mjtCalc(t,pi){
  let sum=0;
  (t.rows||[]).forEach((r,ri)=>{ const s=mjtScore(t,ri,pi); if(s!==null) sum+=s; });
  const chipNet=mjtChipNet(t,pi);
  const sr=num(t.scoreRate)||0, cr=num(t.chipRate)||0, fee=num((t.fees||[])[pi])||0;
  const scoreYen=Math.round(sum*sr);
  const chipYen=Math.round(chipNet*cr);
  const shushi=scoreYen+chipYen;      // スコア金額+チップ金額(ゲーム代引く前)
  const net=shushi-fee;               // 支払(最終)
  return { sum, chipNet, scoreYen, chipYen, shushi, fee, net };
}
const fmtPt = v => Number.isInteger(v) ? String(v) : String(Math.round(v*10)/10);
function mjtInProgress(t){
  return !!(t && (t.playersLocked || (t.rows||[]).some((r,ri)=>(t.players||[]).some((p,ci)=>mjtScore(t,ri,ci)!==null))));
}
/* ---------- 途中経過の画像生成(Canvas)と共有 ----------
   LINE等への共有用。HTML→画像変換(foreignObject)はiOS WebKitで不安定なため、canvasへ直接描画する */
function mjtMidImage(t, full){
  const P=t.players, seats=mjtSeats(t), rows=(t.rows||[]);
  const calcs=P.map((p,ci)=>mjtCalc(t,ci));
  const st=full?mjtSettle(t):null;
  const money=n=>(n<0?"−":"")+"¥"+Math.abs(n).toLocaleString("ja-JP");
  const anyFee=full&&st.rawFees.some(f=>f>0), anyPexp=full&&st.pexp.some(v=>v>0), anyAdj=full&&st.adjs.some(a=>a!==0);
  const notes=full?(st.feeNotes||[]).concat([st.payNote]).filter(Boolean):[];
  const W=720, PAD=24, np=P.length;
  const lblW=112, colW=(W-PAD*2-lblW)/np;
  const F='-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif';
  let lastIdx=-1; rows.forEach((r,ri)=>{ if(P.some((p,ci)=>mjtScore(t,ri,ci)!==null)) lastIdx=ri; });
  const cd=mjtChartData(t);
  /* 高さの見積り */
  const rowH=52, histH=46, chartH=cd?340:0;
  const sumRows = 4 + (full? 2 + (anyFee?1:0) + (anyPexp?1:0) + (anyAdj?1:0) + ((anyFee||anyPexp)?1:0) : 0);
  const PADT = 110;  /* iPhone写真アプリのフルスクリーン表示でDynamic Islandに隠れない上部安全余白 */
  const H = PAD + PADT + 46 + 22 + 10          /* 安全余白+タイトル+サブ */
    + (rowH*sumRows) + (full&&notes.length? notes.length*20+6 : 0) + 14
    + (!full && lastIdx>=0 ? rowH*2 + 14 : 0)  /* 直近(途中経過のみ) */
    + (chartH? chartH+14 : 0)
    + histH*(rows.length+1) + (full?30:0) + PAD;
  const cv=document.createElement("canvas");
  const SCALE=2; cv.width=W*SCALE; cv.height=Math.ceil(H)*SCALE;
  const ctx=cv.getContext("2d"); ctx.scale(SCALE,SCALE);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H);
  ctx.textBaseline="middle";
  let y=PAD+PADT;
  /* タイトル */
  ctx.fillStyle="#000"; ctx.textAlign="left"; ctx.font="bold 32px "+F;
  ctx.fillText(full?"麻雀スコア表":"途中経過", PAD, y+17); y+=44;
  ctx.fillStyle="#444"; ctx.font="15px "+F;
  ctx.fillText((t.date||"")+(t.ruleName?" ・ "+t.ruleName:"")+" ・ "+seats+"人打ち", PAD, y+6); y+=28;
  /* 表描画ヘルパー */
  function cell(x,yy,w,h,text,opt){
    opt=opt||{};
    ctx.fillStyle=opt.bg||"#fff"; ctx.fillRect(x,yy,w,h);
    ctx.strokeStyle="#777"; ctx.lineWidth=1; ctx.strokeRect(x+0.5,yy+0.5,w,h);
    ctx.fillStyle=opt.color||"#000";
    ctx.font=(opt.bold?"bold ":"")+(opt.size||20)+"px "+F;
    ctx.textAlign="center";
    ctx.fillText(String(text), x+w/2, yy+h/2+1);
  }
  const hdrBg="#dfe9e7", lblBg="#eee", zebra="#F2F6F5", latestBg="#FBF3DC", red="#c00", gray="#999";
  function nameRow(yy,label){
    cell(PAD,yy,lblW,rowH,label||"",{bg:hdrBg,bold:true,size:22});
    P.forEach((p,ci)=>cell(PAD+lblW+colW*ci,yy,colW,rowH,p||("P"+(ci+1)),{bg:hdrBg,bold:true,size:22}));
  }
  /* 集計 */
  nameRow(y,""); y+=rowH;
  cell(PAD,y,lblW,rowH,"平均着順",{bg:lblBg,bold:true,size:20});
  P.forEach((p,ci)=>{ const av=mjtAvgRank(t,ci); cell(PAD+lblW+colW*ci,y,colW,rowH,av===null?"–":av.toFixed(2),{size:24}); }); y+=rowH;
  cell(PAD,y,lblW,rowH,"着順内訳",{bg:lblBg,bold:true,size:20});
  P.forEach((p,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,mjtRankCounts(t,ci).slice(0,seats).join("·"),{size:20})); y+=rowH;
  cell(PAD,y,lblW,rowH,"合計",{bg:lblBg,bold:true,size:20});
  calcs.forEach((c,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,fmtPt(c.sum),{bold:true,size:28,color:c.sum<0?red:"#000"})); y+=rowH;
  /* 精算(清算シートのみ) */
  if(full){
    cell(PAD,y,lblW,rowH,"チップ",{bg:lblBg,bold:true,size:20});
    calcs.forEach((c,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,(c.chipNet>0?"+":"")+c.chipNet,{size:22,color:c.chipNet<0?red:"#000"})); y+=rowH;
    cell(PAD,y,lblW,rowH,"収支",{bg:lblBg,bold:true,size:20});
    calcs.forEach((c,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,money(c.shushi),{bold:true,size:20,color:c.shushi<0?red:"#000"})); y+=rowH;
    if(anyFee){ cell(PAD,y,lblW,rowH,"場代",{bg:lblBg,bold:true,size:20});
      st.rawFees.forEach((f,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,f>0?money(-f):"–",{size:18,color:f>0?red:gray})); y+=rowH; }
    if(anyPexp){ cell(PAD,y,lblW,rowH,"経費",{bg:lblBg,bold:true,size:20});
      st.pexp.forEach((v,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,v>0?money(-v):"–",{size:18,color:v>0?red:gray})); y+=rowH; }
    if(anyAdj){ cell(PAD,y,lblW,rowH,"調整",{bg:lblBg,bold:true,size:20});
      st.adjs.forEach((a,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,a===0?"–":(a>0?"+":"")+money(a),{size:18,color:a<0?red:a>0?"#000":gray})); y+=rowH; }
    if(anyFee||anyPexp){
      ctx.strokeStyle="#333"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(PAD,y+0.5); ctx.lineTo(W-PAD,y+0.5); ctx.stroke();
      cell(PAD,y,lblW,rowH,"支払",{bg:lblBg,bold:true,size:20});
      st.pays.forEach((pv,ci)=>cell(PAD+lblW+colW*ci,y,colW,rowH,money(pv),{bold:true,size:20,color:pv<0?red:"#000"})); y+=rowH;
    }
    if(notes.length){ y+=4; ctx.textAlign="left"; ctx.font="13px "+F; ctx.fillStyle="#555";
      notes.forEach(nt=>{ ctx.fillText(nt, PAD, y+10); y+=20; }); y+=2; }
  }
  y+=14;
  /* 直近(途中経過のみ) */
  if(!full && lastIdx>=0){
    nameRow(y,"直近"); y+=rowH;
    cell(PAD,y,lblW,rowH,(lastIdx+1)+"回戦",{bg:latestBg,bold:true,size:20});
    P.forEach((p,ci)=>{
      let tx="",col="#000";
      if(mjtAbsent(t,lastIdx,ci)){ tx="–"; col=gray; }
      else{ const sc=mjtScore(t,lastIdx,ci); if(sc===null){tx="";} else { tx=fmtPt(sc); col=sc<0?red:"#000"; } }
      cell(PAD+lblW+colW*ci,y,colW,rowH,tx,{bg:latestBg,color:col,bold:true,size:26});
    }); y+=rowH+14;
  }
  /* グラフ */
  if(cd){
    const gx=PAD, gw=W-PAD*2, gy=y, gh=chartH;
    ctx.strokeStyle="#999"; ctx.strokeRect(gx+0.5,gy+0.5,gw,gh);
    ctx.fillStyle="#000"; ctx.textAlign="left"; ctx.font="bold 16px "+F;
    ctx.fillText("スコア推移(チップ除く)", gx+10, gy+19);
    const L=gx+56,R=gx+gw-78,T=gy+36,B=gy+gh-30;
    const px=i=> L+(R-L)*(i/(cd.idx.length-1));
    const py=v=> T+(B-T)*(1-(v-cd.mn)/(cd.mx-cd.mn));
    /* 罫線は最小・0・最大の3本のみ(形を読む図に目盛りノイズは不要) */
    Array.from(new Set([cd.mn,0,cd.mx])).forEach(v=>{
      const yy=py(v);
      ctx.strokeStyle = v===0?"#888":"#eaeaea"; ctx.lineWidth = v===0?1.6:1;
      ctx.beginPath(); ctx.moveTo(L,yy); ctx.lineTo(R,yy); ctx.stroke();
      ctx.fillStyle="#666"; ctx.textAlign="right"; ctx.font="13px "+F; ctx.fillText(String(v), L-6, yy+4);
    });
    const stp=Math.max(1,Math.ceil(cd.idx.length/10));
    ctx.fillStyle="#666"; ctx.textAlign="center"; ctx.font="13px "+F;
    cd.idx.forEach((ri,i)=>{ if(i===cd.idx.length-1 || (i%stp===0 && cd.idx.length-1-i>1)) ctx.fillText(String(ri+1), px(i), B+12); });
    cd.series.forEach((a,ci)=>{
      const c=MJT_COLS[ci%MJT_COLS.length];
      ctx.strokeStyle=c; ctx.lineWidth=3; ctx.lineJoin="round";
      ctx.beginPath(); a.forEach((v,i)=>{ const X=px(i),Y=py(v); if(i===0)ctx.moveTo(X,Y); else ctx.lineTo(X,Y); }); ctx.stroke();
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(px(a.length-1),py(a[a.length-1]),3.5,0,Math.PI*2); ctx.fill();
    });
    const lbl=cd.series.map((a,ci)=>({ci:ci,y:py(a[a.length-1])})).sort((a,b)=>a.y-b.y);
    for(let i=1;i<lbl.length;i++){ if(lbl[i].y<lbl[i-1].y+18) lbl[i].y=lbl[i-1].y+18; }

    lbl.forEach(o=>{ ctx.fillStyle=MJT_COLS[o.ci%MJT_COLS.length]; ctx.fillText(P[o.ci]||("P"+(o.ci+1)), R+5, Math.min(Math.max(o.y,T+4),B-2)); });
    y+=gh+14;
  }
  /* 履歴 */
  cell(PAD,y,lblW,histH,"回",{bg:hdrBg,bold:true,size:21});
  P.forEach((p,ci)=>cell(PAD+lblW+colW*ci,y,colW,histH,p||("P"+(ci+1)),{bg:hdrBg,bold:true,size:21})); y+=histH;
  rows.forEach((r,ri)=>{
    const bg = ri===lastIdx? latestBg : (ri%2===1? zebra : "#fff");
    cell(PAD,y,lblW,histH,(ri+1)+"回戦",{bg:(ri===lastIdx?latestBg:lblBg),bold:true,size:19});
    P.forEach((p,ci)=>{
      let tx="",col="#000";
      if(mjtAbsent(t,ri,ci)){ tx="–"; col=gray; }
      else{ const sc=mjtScore(t,ri,ci); if(sc!==null){ tx=fmtPt(sc); col=sc<0?red:"#000"; } }
      cell(PAD+lblW+colW*ci,y,colW,histH,tx,{bg:bg,color:col,size:24});
    });
    y+=histH;
  });
  if(full){ ctx.textAlign="left"; ctx.font="13px "+F; ctx.fillStyle="#666";
    ctx.fillText("スコア1点=¥"+(num(t.scoreRate)||0)+(num(t.chipRate)>0?" / チップ1枚=¥"+num(t.chipRate):"")+" ・ Tally", PAD, y+16); }
  return new Promise(res=>cv.toBlob(res,"image/png"));
}

/* ---------- 端数処理つき精算計算 ----------
   切捨対象は最終支払額(収支−場代)の負け側のみ。単位=なし/100/500/1000円(500=500円刻み切捨)。
   免除合計は受取の大きい順にゼロを割らない範囲で波及控除(帳尻Σ支払=−場代合計は常に一致) */
function mjtSettle(t){
  const P=t.players, calcs=P.map((p,ci)=>mjtCalc(t,ci));
  const rawFees=calcs.map(c=>c.fee);
  const pexp=P.map((p,ci)=>num((t.pexp||[])[ci])||0);       /* 各人の経費(飲食など・店へ) */
  const total=rawFees.reduce((a,b)=>a+b,0)+pexp.reduce((a,b)=>a+b,0);  /* 店への総額 */
  const unit = t.roundPay===true ? 100 : (num(t.roundPay)||0);
  const fu = unit>0 ? unit : 100;
  /* ①場代の移転(全額/金額指定→負担者へ)。旧frac(端数)は互換維持 */
  let fees=rawFees.slice(); const feeNotes=[];
  (t.feeRelief||[]).forEach((r,ci)=>{
    if(!r || !r.m || ci>=P.length) return;
    if(r.by==null || r.by===ci || r.by>=P.length){ if(rawFees[ci]>0) feeNotes.push((P[ci]||("P"+(ci+1)))+"の免除は負担者未選択のため未適用"); return; }
    let relief=0, lbl="";
    if(r.m==="full"){ relief=rawFees[ci]; lbl="全額"; }
    else if(r.m==="amt"){ relief=Math.min(num(r.v)||0, rawFees[ci]); }
    else if(r.m==="frac"){ relief=rawFees[ci]-Math.floor(rawFees[ci]/fu)*fu; lbl="端数"; }
    if(relief<=0) return;
    fees[ci]-=relief; fees[r.by]+=relief;
    feeNotes.push((P[ci]||("P"+(ci+1)))+"の場代"+lbl+"¥"+relief.toLocaleString("ja-JP")+"を"+(P[r.by]||("P"+(r.by+1)))+"が負担");
  });
  /* ②支払算出。調整行の基準は「生場代・経費込み」 */
  const basePays=calcs.map((c,ci)=>c.shushi - rawFees[ci] - pexp[ci]);
  const raw=calcs.map((c,ci)=>c.shushi - fees[ci] - pexp[ci]);
  let pays=raw.slice(), payNote="";
  /* ③精算単位: トップ以外は切捨・端数はトップが引受 */
  if(unit>0){
    let ti=-1,best=0; raw.forEach((p,ci)=>{ if(p>best){best=p;ti=ci;} });
    if(ti<0){ payNote="精算単位: 受取側がいないため適用なし"; }
    else{
      pays=raw.map((p,ci)=>{ if(ci===ti) return 0; return p<0 ? -Math.floor((-p)/unit)*unit : Math.floor(p/unit)*unit; });
      pays[ti] = -total - pays.reduce((a,b,ci)=>ci===ti?a:a+b,0);
      payNote="精算単位"+unit+"円(トップ以外を切捨・端数はトップが調整)";
    }
  }
  const adjs=pays.map((p,ci)=>p-basePays[ci]);   /* 場代移転+丸めの合算(Σ=0)。経費は実費なので含めない */
  return {rawFees:rawFees, fees:fees, pexp:pexp, pays:pays, adjs:adjs, payNote:payNote, feeNotes:feeNotes};
}
const MJT_COLS=["#2E6DA4","#C0392B","#0E8C7A","#A9780E","#7B5EA7","#5D7472"];
function mjtChartData(t){
  const P=t.players, rows=(t.rows||[]);
  const idx=[]; rows.forEach((r,ri)=>{ if(P.some((p,ci)=>mjtScore(t,ri,ci)!==null)) idx.push(ri); });
  if(idx.length<2) return null;
  const series=P.map((p,ci)=>{ let cum=0; return idx.map(ri=>{ const sc=mjtScore(t,ri,ci); if(sc!==null && !mjtAbsent(t,ri,ci)) cum+=sc; return cum; }); });
  let mn=0,mx=0; series.forEach(a=>a.forEach(v=>{ if(v<mn)mn=v; if(v>mx)mx=v; }));
  if(mn===mx) mx=mn+1;
  return {idx:idx, series:series, mn:mn, mx:mx};
}
function mjtChartSvg(t){
  const P=t.players;
  const cd=mjtChartData(t);
  if(!cd) return "";
  const cols=MJT_COLS, idx=cd.idx, series=cd.series, mn=cd.mn, mx=cd.mx;
  const W=640,H=300,L=48,R=58,T=14,B=26;
  const px=i=> L+(W-L-R)*(i/(idx.length-1));
  const py=v=> T+(H-T-B)*(1-(v-mn)/(mx-mn));
  /* 切りの良い目盛り */
  const raw=(mx-mn)/4, pw=Math.pow(10,Math.floor(Math.log10(raw)));
  const step=[1,2,2.5,5,10].map(c=>c*pw).find(c=>c>=raw)||raw;
  const ticks=[]; for(let v=Math.ceil(mn/step)*step; v<=mx+1e-9; v+=step) ticks.push(Math.round(v*100)/100);
  if(ticks.indexOf(0)<0) ticks.push(0);
  let g='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
  ticks.forEach(v=>{ const y=py(v);
    g+='<line x1="'+L+'" y1="'+y.toFixed(1)+'" x2="'+(W-R)+'" y2="'+y.toFixed(1)+'" stroke="'+(v===0?"#888":"#ececec")+'" stroke-width="'+(v===0?1.6:1)+'"/>'+
       '<text x="'+(L-4)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end" font-size="10" fill="#666">'+v+'</text>'; });
  const stp=Math.max(1,Math.ceil(idx.length/10));
  idx.forEach((ri,i)=>{ if(i===idx.length-1 || (i%stp===0 && idx.length-1-i>1)) g+='<text x="'+px(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#666">'+(ri+1)+'</text>'; });
  series.forEach((a,ci)=>{ const c=cols[ci%cols.length];
    g+='<polyline fill="none" stroke="'+c+'" stroke-width="2" stroke-linejoin="round" points="'+a.map((v,i)=>px(i).toFixed(1)+","+py(v).toFixed(1)).join(" ")+'"/>'+
       '<circle cx="'+px(a.length-1).toFixed(1)+'" cy="'+py(a[a.length-1]).toFixed(1)+'" r="2.5" fill="'+c+'"/>'; });
  /* 凡例の代わりに線の右端へ名前を直付け(重なりは縦にずらす) */
  const lbl=series.map((a,ci)=>({ci,y:py(a[a.length-1])})).sort((a,b)=>a.y-b.y);
  for(let i=1;i<lbl.length;i++){ if(lbl[i].y < lbl[i-1].y+11) lbl[i].y = lbl[i-1].y+11; }
  lbl.forEach(o=>{ const y=Math.min(Math.max(o.y,T+4),H-B-2);
    g+='<text x="'+(W-R+5)+'" y="'+(y+3.5).toFixed(1)+'" font-size="10" font-weight="700" fill="'+cols[o.ci%cols.length]+'">'+esc(P[o.ci]||("P"+(o.ci+1)))+'</text>'; });
  g+='</svg>';
  return '<div style="border:1px solid #999;border-radius:6px;padding:8px 8px 2px;margin:2px 0 16px;background:#fff">'+
    '<div style="font-weight:700;font-size:12px;margin:0 0 2px 2px">スコア推移(チップ除く)</div>'+g+'</div>';
}
function mjtPrintHtml(t, mode){

  sum+='<tr><td class="pr-lbl">収支</td>'+calcs.map(c=>'<td class="'+(c.shushi<0?"pr-neg":"")+'">'+money(c.shushi)+'</td>').join("")+'</tr>';
  const st=mjtSettle(t);
  const anyFee=st.rawFees.some(f=>f>0);
  const anyPexp=st.pexp.some(v=>v>0);
  const anyAdj=st.adjs.some(a=>a!==0);
  if(anyFee||anyPexp){
    if(anyFee) sum+='<tr><td class="pr-lbl">場代</td>'+st.rawFees.map(f=>'<td class="pr-neg">'+(f>0?money(-f):"–")+'</td>').join("")+'</tr>';
    if(anyPexp) sum+='<tr><td class="pr-lbl">経費</td>'+st.pexp.map(v=>'<td class="pr-neg">'+(v>0?money(-v):"–")+'</td>').join("")+'</tr>';

    sum+='<tr class="pr-final"><td class="pr-lbl">支払</td>'+st.pays.map(p=>'<td class="'+(p<0?"pr-neg":"")+'">'+money(p)+'</td>').join("")+'</tr>';
  }
  sum+='</tbody></table>';
  const notes=(st.feeNotes||[]).concat([st.payNote]).filter(Boolean);
  if(anyFee && notes.length) sum+='<div class="pr-foot" style="margin:-4px 0 10px">'+notes.map(esc).join(" ／ ")+'</div>';
  const foot='<div class="pr-foot">スコア1点=¥'+(num(t.scoreRate)||0)+(num(t.chipRate)>0?" / チップ1枚=¥"+num(t.chipRate):"")+" ・ Tally</div>";

  /* 途中経過用: 平均着順・着順内訳・合計(点)のみ。円換算・場代・支払は出さない */
  let sumMid='<table class="pr-tbl pr-sum"><thead><tr><th></th>'+P.map((p,i)=>'<th>'+esc(p||("P"+(i+1)))+'</th>').join("")+'</tr></thead><tbody>';
  sumMid+='<tr><td class="pr-lbl">平均着順</td>'+P.map((p,ci)=>{const av=mjtAvgRank(t,ci);return '<td>'+(av===null?"–":av.toFixed(2))+'</td>';}).join("")+'</tr>';
  sumMid+='<tr><td class="pr-lbl">着順内訳</td>'+P.map((p,ci)=>'<td>'+mjtRankCounts(t,ci).slice(0,seats).join("·")+'</td>').join("")+'</tr>';
  sumMid+='<tr class="pr-final"><td class="pr-lbl">合計</td>'+calcs.map(c=>'<td class="'+(c.sum<0?"pr-neg":"")+'">'+fmtPt(c.sum)+'</td>').join("")+'</tr>';
  sumMid+='</tbody></table>';
  const headMid='<div class="pr-title">途中経過</div>'+
    '<div class="pr-sub">'+esc(t.date||"")+(t.ruleName?" ・ "+esc(t.ruleName):"")+" ・ "+seats+"人打ち</div>";

  const body = (mode==="mid")

    : (mode==="screen")
      ? head + sum + chart + tbl(true)
      : head + tbl(false) + '<div class="pr-break"></div>' + chart + sum;
  return '<div class="pr-wrap'+(mode==="mid"?" pr-mid":"")+'">'+body+(mode==="mid"?"":foot)+'</div>';
}

function mjtAvgRank(t, pi){

  /* スコア表 */

  /* ゲーム代(会計フロー) */
  h += secBar("fees", UI.feesOpen, "精算・共有", (num(t.feeTotal)||0)>0 ? "総額 ¥"+(num(t.feeTotal)||0).toLocaleString("ja-JP") : "未入力");
  if(UI.feesOpen){
  const np=P.length;
  const feeTotal=num(t.feeTotal)||0;

  const pexpSum=P.reduce((a,p,ci)=>a+(num((t.pexp||[])[ci])||0),0);
  h += '<div class="card" style="margin-bottom:8px;padding:6px 12px 10px">'+

    }).join("")+'</div>';
  /* 各人の経費(飲食など・店への個別分) */

function mjtKeypadHtml(t){
  const P=t.players;
  let h="";
  if(UI.mjtCell){
    const cell=UI.mjtCell, isScore=cell.k==="s";
    let who=P[cell.c]||("P"+(cell.c+1)), ctx, curVal;
    if(isScore){ ctx=(cell.r+1)+"回戦"; curVal=t.rows[cell.r][cell.c]; }
    else if(cell.k==="cs"){ ctx="チップ開始"; curVal=(t.chipStart||[])[cell.c]; }
    else if(cell.k==="ce"){ ctx="チップ終了"; curVal=(t.chipEnd||[])[cell.c]; }
    else if(cell.k==="uma"){ who="ウマ"; ctx=({uma1:"1着",uma2:"2着",uma3:"3着",uma4:"4着"})[cell.key]; curVal=t[cell.key]; }
    let disp = curVal==="x" ? "抜番" : (curVal===""||curVal==null ? "0" : curVal);
    const dispCol = (curVal==="x") ? "var(--amber)" : (num(curVal)<0 ? "var(--red)" : num(curVal)>0 ? "var(--blue)" : "var(--text)");
    const showTobi = isScore && mjtHasTobi(t);
    /* スコア入力時: ミニ表示行は撤去済み(直上の実テーブル行が選択ハイライト付きで見えるため重複) */
    let headHtml = "";
    if(!isScore){
      headHtml = '<div class="mjt-pad-head"><span class="muted" style="font-size:12px">入力中: <b style="color:var(--text)">'+esc(who)+'</b> · '+ctx+'</span>'+
        '<span class="mono" style="font-size:20px;font-weight:700;color:'+dispCol+'">'+esc(String(disp))+'</span></div>';
    }
    const KS='padding:12px 0;font-size:20px;';
    h += '<div class="mjt-pad-wrap">'+headHtml+
      '<div class="mjt-pad">'+
      ["1","2","3","4","5","6","7","8","9"].map(k=>'<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="'+k+'">'+k+'</button>').join("")+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="±">±</button>'+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="0">0</button>'+
      '<button class="mjt-key" style="'+KS+'" data-mt="key" data-v="⌫">⌫</button>'+
      (isScore ? '' : '<button class="mjt-key done" data-mt="keydone" style="grid-column:span 3;'+KS+'">完了</button>')+
      '</div>'+
      (isScore
        ? '<div style="display:grid;grid-template-columns:'+(showTobi?"1fr 1fr":"1fr")+';gap:5px;margin-top:5px">'+
            '<button class="mjt-key" data-mt="key" data-v="抜" style="padding:7px 0;font-size:13px;color:var(--muted)">抜番</button>'+
            (showTobi?'<button class="mjt-key" data-mt="key" data-v="飛" style="padding:7px 0;font-size:13px;color:var(--amber);border-color:var(--amber)">飛び</button>':'')+
          '</div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px">'+
            '<button class="mjt-key" data-mt="key" data-v="◀" style="padding:12px 0;color:var(--teal);font-size:22px">◀</button>'+
            '<button class="mjt-key" data-mt="key" data-v="▶" style="padding:12px 0;color:var(--teal);font-size:22px">▶</button>'+
          '</div>'+
          '<div style="display:grid;grid-template-columns:1.5fr 1fr;gap:5px;margin-top:6px">'+
            '<button class="mjt-key done" data-mt="lockrow" style="padding:12px 0;font-size:14px;font-weight:700">この回戦を確定 → 次へ</button>'+
            '<button class="mjt-key" data-mt="lockrowlast" style="padding:12px 0;font-size:13px;color:var(--amber);border-color:var(--amber)">ラス半で確定</button></div>'+
          '<button class="btn" data-mt="rowdelcur" style="width:100%;margin-top:6px;padding:6px 0;font-size:11px;color:var(--red);border-color:var(--red)">この回戦(行)を削除</button>'
        : '')+
      '</div>';
  }
  return h;
}
