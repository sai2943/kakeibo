        : [["sb","й–Ӣе§Ӣ зҺүж•°"],["ss","й–Ӣе§Ӣ еӣһи»ўж•°"],["eb","зөӮдәҶ зҺүж•°(еҪ“гҒҹгӮҠжҷӮ)"],["es","зөӮдәҶ еӣһи»ўж•°(еҪ“гҒҹгӮҠжҷӮ)"]];
      h += '<div class="card2" style="margin-bottom:6px"><div class="row between" style="margin-bottom:6px">'+
        '<div class="row" style="gap:6px"><span class="muted" style="font-size:10px;font-weight:700">йҖҡеёёжҷӮ еҢәй–“'+(gi+1)+'</span>'+
        '<button class="chip" style="font-weight:700;border-color:'+(isPush?"var(--amber)":"var(--teal)")+';color:'+(isPush?"var(--amber)":"var(--teal)")+'" '+
        'data-a="gkind" data-v="'+m.id+'|'+g.id+'">'+(isPush?"иІҜзҺүгғ—гғғгӮ·гғҘ":"жҢҒгҒЎзҺү(зҺүж•°)")+'</button></div>'+
        '<div class="row" style="gap:8px"><span class="mono muted" style="font-size:10px" id="gstat-'+g.id+'">'+segStat(g)+'</span>'+
        '<button class="xbtn" style="font-size:14px" data-a="gdel" data-v="'+m.id+'|'+g.id+'">Г—</button></div></div>'+
        '<div class="grid2">'+fields.map(([k,label])=>
          '<div><div class="muted" style="font-size:9px;margin-bottom:2px">'+label+'</div>'+
          '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(g[k]||"")+'"'+
          (k==="sb"&&isPush?' placeholder="0"':'')+' data-in="gseg" data-v="'+m.id+'|'+g.id+'|'+k+'"></div>').join("")+'</div>'+
        '<div class="mono muted" style="font-size:10px;margin-top:5px" id="gform-'+g.id+'">'+segFormula(g)+'</div></div>';
    });
    h += '<button class="btn dash full" style="margin-bottom:6px" data-a="gadd" data-v="'+m.id+'">пјӢ йҖҡеёёжҷӮеҢәй–“(зқҖеёӯжҷӮ/еҪ“гҒҹгӮҠеҫҢгҒ®еҶҚй–ӢжҷӮ/зҸҫйҮ‘иҝҪеҠ жҷӮ)</button>';
    h += '<div id="mpanel-'+m.id+'">'+borderPanel(m)+'</div></div>';
  }

  /* еҸҺж”Ҝ(иІҜзҺүж–№ејҸгғ»д»»ж„Ҹ) */
  h += '<div style="border-top:1px solid var(--line);margin-top:8px;padding-top:8px">'+
    '<div class="muted" style="font-size:10px;font-weight:700;margin-bottom:6px">еҸҺж”Ҝ(иІҜзҺүгғ»д»»ж„Ҹ)</div>'+
    '<div class="grid2" style="margin-bottom:6px">'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">й–Ӣе§ӢиІҜзҺү(зҺү)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.startStock||"")+'" data-in="mstock" data-v="'+m.id+'|startStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">зөӮдәҶиІҜзҺү(зҺү)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.endStock||"")+'" data-in="mstock" data-v="'+m.id+'|endStock"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">зөӮдәҶжҷӮгҒ®жҢҒгҒЎзҺү(зҺү)</div>'+
    '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.holdBalls||"")+'" data-in="mstock" data-v="'+m.id+'|holdBalls"></div>'+
    '<div><div class="muted" style="font-size:9px;margin-bottom:2px">е·®зҺү(иҮӘеӢ•)</div>'+
    '<div class="input sm mono r '+clsPM(machSabai(m))+'" style="border-style:dashed">'+(machSabai(m)>=0?"+":"")+machSabai(m)+'</div></div></div>';
  h += '<div class="muted" style="font-size:9px;margin-bottom:3px">зҸҫйҮ‘жҠ•иіҮ(еҶҶ)</div>';
  (m.cash||[]).forEach(c=>{
    h += '<div class="row" style="gap:6px;margin-bottom:5px">'+
      '<input class="input sm" placeholder="гғЎгғў(д»»ж„Ҹ)" value="'+esc(c.label||"")+'" style="flex:1.3" data-in="mcash" data-v="'+m.id+'|'+c.id+'|label">'+
      '<input class="input sm mono r" type="number" inputmode="numeric" placeholder="йҮ‘йЎҚ" value="'+esc(c.amount||"")+'" style="flex:1" data-in="mcash" data-v="'+m.id+'|'+c.id+'|amount">'+
      '<button class="xbtn" data-a="mcashdel" data-v="'+m.id+'|'+c.id+'">Г—</button></div>';
  });
  h += '<button class="btn dash full" style="font-size:11px" data-a="mcashadd" data-v="'+m.id+'">пјӢ зҸҫйҮ‘жҠ•иіҮ</button>';
  if(machHasData(m)){
    const yv = machYenS(m, s);
    h += '<div class="row between" style="align-items:baseline;margin-top:8px">'+
      '<span style="font-size:11px;font-weight:700">еҸ°еҸҺж”Ҝ</span>'+
      '<span class="mono '+clsPM(yv)+'" style="font-size:16px;font-weight:700">'+signYen(yv)+'</span></div>'+
      (num(s.pExchange)<=0?'<div class="red" style="font-size:10px;margin-top:4px">жҸӣйҮ‘зҺүж•°(гғ‘гғҒгғігӮі)гӮ’е…ҘеҠӣгҒҷгӮӢгҒЁеҶҶжҸӣз®—гҒ•гӮҢгҒҫгҒҷ</div>':'');
  }
  h += '</div>';

  h += '<input class="input sm" placeholder="гғЎгғў(жҚ®гҒҲ/жҢҷеӢ•/гӮ„гӮҒжҷӮгҒӘгҒ©)" value="'+esc(m.memo)+'" data-in="mmemo" data-v="'+m.id+'" style="margin-top:8px"></div>';
  return h;
}
const segStat = g => segDone(g) ? segUsed(g)+"зҷә / "+segSpins(g)+"еӣһи»ў" : "";
const segFormula = g => (g.kind==="push" && segDone(g))
  ? "еҸ°е…Ҙзҗғ = "+segPushes(g)+"гғ—гғғгӮ·гғҘГ—"+num((UI.draft&&UI.draft.pushPayout)||230)+(num(g.sb)?" + ж®Ӣ"+num(g.sb):"")+" вҲ’ "+num(g.eb)+" = "+segUsed(g)+"зҷә" : "";

function borderPanel(m){
  const t = machineTotals(m);
  if(t.rate250===null) return "";
  const master = findMaster(m);
  const denom = master ? fnum(master.denom) : 0;
  const bTheory = denom>0 && master && fnum(master.ty)>0 ? denom*250/fnum(master.ty) : null;
  const bEff = denom>0 && t.avgTY>0 ? denom*250/t.avgTY : null;
  let ab = null;
  if(denom>0) ab = bEff!==null ? bEff : bTheory;
  else {
    const b = fnum(m.border);
    if(b){ const ty=fnum(m.ty); ab = (ty>0 && t.avgTY>0) ? b*(ty/t.avgTY) : b; }
  }
  const dev = ab && t.costRate250!==null ? (t.costRate250/ab-1)*100 : null;

  let h = '<div class="amberpanel"><div class="row between" style="align-items:baseline;margin-bottom:6px">'+
    '<span class="mono muted" style="font-size:11px">зҙҜиЁҲ '+t.balls+'зҷә / '+t.spins+'еӣһи»ў</span>'+
    '<span class="mono amber" style="font-size:15px;font-weight:700">вү’ '+t.rate250.toFixed(2)+' еӣһ/250зҷә</span></div>';
  if(t.costRate250!==null && Math.abs(t.costRate250-t.rate250)>0.005)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">гӮігӮ№гғҲиЈңжӯЈ(иІҜзҺүжүӢж•°ж–ҷиҫј)</span>'+
      '<span class="mono">'+t.costRate250.toFixed(2)+' еӣһ/250зҷә</span></div>';
  if(t.avgTY!==null)
    h += '<div class="row between" style="font-size:11px;margin-bottom:6px"><span class="muted">е®ҹжё¬е№іеқҮеҮәзҺү('+t.payouts.length+'еӣһ)</span>'+
      '<span class="mono">'+Math.round(t.avgTY)+'зҷә</span></div>';
  if(denom>0){
    h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">ж©ҹзЁ®гғҮгғјгӮҝ: 1/'+fnum(master.denom)+
      (fnum(master.ty)>0?' / зҗҶи«–TY '+fnum(master.ty)+'зҷә':'')+'</span>'+
      (bTheory!==null?'<span class="mono">зҗҶи«–B '+bTheory.toFixed(2)+'</span>':'')+'</div>';
    if(bEff!==null)
      h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">е®ҹеҠ№гғңгғјгғҖгғј(е®ҹжё¬TY '+t.payouts.length+'еӣһ)</span>'+
        '<span class="mono" style="font-weight:700">'+bEff.toFixed(2)+' еӣһ/250зҷә</span></div>';
  } else {
    h += '<div class="grid2" style="margin:4px 0 6px">'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">гғңгғјгғҖгғј(еӣһ/еҚғеҶҶ)</div>'+
      '<input class="input sm mono r" type="number" inputmode="decimal" step="0.1" value="'+esc(m.border||"")+'" data-in="mborder" data-v="'+m.id+'"></div>'+
      '<div><div class="muted" style="font-size:9px;margin-bottom:2px">зҗҶи«–е№іеқҮеҮәзҺү(д»»ж„Ҹ)</div>'+
      '<input class="input sm mono r" type="number" inputmode="numeric" value="'+esc(m.ty||"")+'" data-in="mty" data-v="'+m.id+'"></div></div>';
    if(fnum(m.border)>0 && fnum(m.ty)>0 && t.avgTY>0)
      h += '<div class="row between" style="font-size:11px;margin-bottom:4px"><span class="muted">иЈңжӯЈгғңгғјгғҖгғј(еүҠгӮҢеҸҚжҳ )</span>'+
        '<span class="mono">'+(fnum(m.border)*fnum(m.ty)/t.avgTY).toFixed(2)+' еӣһ/250зҷә</span></div>';
  }
  if(dev!==null && ab)
    h += '<div class="row between" style="align-items:baseline;border-top:1px solid rgba(242,179,61,.3);padding-top:6px;margin-top:2px">'+
      '<span style="font-size:11px;font-weight:700">гғңгғјгғҖгғјд№–йӣў</span>'+
      '<span class="mono '+clsPM(dev)+'" style="font-size:15px;font-weight:700">'+(dev>=0?"+":"вҲ’")+Math.abs(dev).toFixed(1)+'%'+
      '<span class="muted" style="font-size:10px;font-weight:400"> ('+(t.costRate250>=ab?"+":"вҲ’")+Math.abs(t.costRate250-ab).toFixed(2)+'еӣһ)</span></span></div>';
  return h+'</div>';
}
</script>
<script>
/* ---------- гӮ»гғғгӮ·гғ§гғіз”»йқўгҒ®гғҗгӮӨгғігғү ---------- */
function bindSession(){
  const s = UI.draft;
  const fm = (id)=>s.machines.find(x=>String(x.id)===String(id));

  /* е…ҘеҠӣ(еҶҚжҸҸз”»гҒӘгҒ—гғ»иЁҲз®—иЎЁзӨәгҒ®гҒҝжӣҙж–°) */
  document.querySelectorAll("[data-in]").forEach(el=>{
    const kind = el.dataset.in, v = el.dataset.v;
    el.oninput = ()=>{
      if(kind==="fee"){ s.fee=el.value; refreshSummary(); }
      else if(kind==="smemo"){ s.memo=el.value; }
      else if(kind==="exchange"){ s.exchange=el.value; refreshSlot(); }
      else if(kind==="pexchange"){ s.pExchange=el.value; refreshSlot(); }
      else if(kind==="pushpayout"){ s.pushPayout=el.value; refreshSlot(); }
      else if(kind==="pushdraw"){ s.pushDraw=el.value; refreshSlot(); }
      else if(kind==="myshare"){ s.myShare=el.value; refreshSlot(); }
      else if(kind==="xlabel"||kind==="xamount"){
        const x = s.expenses.find(e=>String(e.id)===String(v));
        if(!x) return;
        if(kind==="xlabel") x.label=el.value; else x.amount=el.value;
        refreshSummary();
      }
      else if(kind==="mname"){
        const m=fm(v); if(!m) return;
        m.name=el.value;
        const sug=document.getElementById("msug-"+m.id);
        if(sug){
          const q=(m.name||"").trim();
          const hits=S.mdb.filter(x=>x.kind===m.kind&&(x.name||"").trim()&&x.name.includes(q)&&x.name.trim()!==q).slice(0,4);
          sug.innerHTML = hits.length?'<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
            hits.map(x=>'<button class="chip" data-a="msug" data-v="'+m.id+'|'+esc(x.name)+'">'+esc(x.name)+'</button>').join("")+'</div>':'';
          bindSessionActions();
        }
        if(m.kind==="pachi") refreshPanel(m);
      }
      else if(kind==="mmemo"){ const m=fm(v); if(m) m.memo=el.value; }
      else if(kind==="mstock"){
        const [mid,k]=v.split("|");
        const m=fm(mid); if(m){ m[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mcash"){
        const [mid,cid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const c=(m.cash||[]).find(x=>String(x.id)===String(cid)); if(c){ c[k]=el.value; refreshSlot(); }
      }
      else if(kind==="mborder"||kind==="mty"){
        const m=fm(v); if(!m) return;
        if(kind==="mborder") m.border=el.value; else m.ty=el.value;
        refreshPanel(m, true);
      }
      else if(kind==="gseg"){
        const [mid,gid,k]=v.split("|");
        const m=fm(mid); if(!m) return;
        const g=(m.segments||[]).find(x=>String(x.id)===String(gid)); if(!g) return;
        g[k]=el.value;
        const st=document.getElementById("gstat-"+g.id); if(st) st.textContent=segStat(g);
        const fo=document.getElementById("gform-"+g.id); if(fo) fo.textContent=segFormula(g);
        refreshPanel(m);
      }
    };
  });
  document.getElementById("s-date").oninput = e=>s.date=e.target.value;
  document.getElementById("s-store").oninput = e=>s.store=e.target.value;
  const pn = document.getElementById("s-pname");
  if(pn) pn.oninput = e=>s.partnerName=e.target.value;

  bindSessionActions();
}

function refreshSlot(){
  /* иІҜзҺүж–№ејҸгҒҜеҸ°еҸҺж”Ҝгғ»дәәеҗҲиЁҲгғ»гӮөгғһгғӘгғје…ЁгҒҰгҒҢйҖЈеӢ•гҒҷгӮӢгҒҹгӮҒгҖҒгғ•гӮ©гғјгӮ«гӮ№дҝқжҢҒгҒ§е…ЁеҶҚжҸҸз”» */
  const f = document.activeElement;
  const fv = f && f.dataset && f.dataset.in
    ? {in:f.dataset.in, v:(f.dataset.v!==undefined?f.dataset.v:null)} : null;
  render();
  if(fv){
    const sel = fv.v!==null
      ? '[data-in="'+fv.in+'"][data-v="'+fv.v+'"]'
      : '[data-in="'+fv.in+'"]:not([data-v])';
    const nel = document.querySelector(sel);
    if(nel){ nel.focus(); /* numberе…ҘеҠӣгҒҜгӮ«гғјгӮҪгғ«жң«е°ҫгҒ§е•ҸйЎҢгҒӘгҒ„гҒҹгӮҒдҪҚзҪ®еҫ©е…ғгҒ—гҒӘгҒ„ */ }
  }
}
function refreshSummary(){
  const el = document.getElementById("ssummary");
  if(el) el.innerHTML = sessionSummary(UI.draft);
}
function refreshPanel(m, keepInputs){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  if(keepInputs){
    /* жүӢе…ҘеҠӣж¬„гғ•гӮ©гғјгӮ«гӮ№дҝқжҢҒгҒ®гҒҹгӮҒгҖҒд№–йӣўйғЁеҲҶгҒ гҒ‘дҪңгӮҠзӣҙгҒҷгҒ®гҒҜз…©йӣ‘гҒӘгҒ®гҒ§е…ЁдҪ“жӣҙж–°+еҖӨеҫ©е…ғ */
    const focused = document.activeElement;
    const fv = focused && focused.dataset ? {in:focused.dataset.in, v:focused.dataset.v, val:focused.value, ss:focused.selectionStart} : null;
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);
    if(fv && fv.in){
      const nel = el.querySelector('[data-in="'+fv.in+'"][data-v="'+fv.v+'"]');
      if(nel){ nel.value=fv.val; nel.focus(); try{nel.selectionStart=nel.selectionEnd=fv.ss;}catch(e){} }
    }
  } else {
    el.innerHTML = borderPanel(m);
    bindSessionActions(); rebindPanelInputs(m);
  }
}
function rebindPanelInputs(m){
  const el = document.getElementById("mpanel-"+m.id);
  if(!el) return;
  el.querySelectorAll("[data-in]").forEach(inp=>{
    inp.oninput = ()=>{
      if(inp.dataset.in==="mborder") m.border=inp.value;
      else if(inp.dataset.in==="mty") m.ty=inp.value;
      refreshPanel(m, true);
    };
  });
}

function bindSessionActions(){
  const s = UI.draft;
  document.querySelectorAll("[data-a]").forEach(el=>{
    el.onclick = ()=>{
      const a=el.dataset.a, v=el.dataset.v;
      if(a==="back"){ UI.screen="main"; UI.draft=null; render(); }
      else if(a==="mode"){ s.mode=v; render(); }
      else if(a==="pname"){ s.partnerName=v; render(); }
      else if(a==="whotab"){ UI.whoTab=v; render(); }
      else if(a==="madd"){
        const nm = {id:uid(),kind:v,name:"",memo:"",who:"me",startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(v==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="maddw"){
        const [k,who]=v.split("|");
        const nm = {id:uid(),kind:k,name:"",memo:"",who,startStock:"",endStock:"",holdBalls:"",cash:[]};
        if(k==="pachi") nm.segments=[];
        s.machines.push(nm); render();
      }
      else if(a==="mdel"){ if(confirm("гҒ“гҒ®еҸ°гӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?")){ s.machines=s.machines.filter(x=>String(x.id)!==String(v)); render(); } }
      else if(a==="msug"){
        const [mid,name]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.name=name; render(); }
      }
      else if(a==="mcashadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.cash=m.cash||[]).push({id:uid(),label:"",amount:""}); render(); }
      }
      else if(a==="mcashdel"){
        const [mid,cid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.cash=(m.cash||[]).filter(x=>String(x.id)!==String(cid)); render(); }
      }
      else if(a==="gadd"){
        const m=s.machines.find(x=>String(x.id)===String(v));
        if(m){ (m.segments=m.segments||[]).push({id:uid(),kind:"ball",sb:"",ss:"",eb:"",es:"",rpStart:"",rpEnd:""}); render(); }
      }
      else if(a==="gkind"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        const g=m&&(m.segments||[]).find(x=>String(x.id)===String(gid));
        if(g){ g.kind = g.kind==="push"?"ball":"push"; render(); }
      }
      else if(a==="gdel"){
        const [mid,gid]=v.split("|");
        const m=s.machines.find(x=>String(x.id)===String(mid));
        if(m){ m.segments=(m.segments||[]).filter(x=>String(x.id)!==String(gid)); render(); }
      }
      else if(a==="xadd"){ s.expenses.push({id:uid(),label:"",amount:""}); render(); }
      else if(a==="xdel"){ s.expenses=s.expenses.filter(x=>String(x.id)!==String(v)); render(); }
      else if(a==="sdel"){
        if(!confirm("гҒ“гҒ®зЁјеғҚиЁҳйҢІгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?(е®¶иЁҲз°ҝгҒ®йҖЈжҗәеҲҶгӮӮж¶ҲгҒҲгҒҫгҒҷ)")) return;
        S.entries = S.entries.filter(e=>e.id!=="slot-"+s.id);
        S.sessions = S.sessions.filter(x=>x.id!==s.id);
        save(); UI.screen="main"; UI.draft=null; render();
      }
      else if(a==="ssave") saveSession();
    };
  });
}

function saveSession(){
  const s = UI.draft;
  if(!s.date) return;
  const cleaned = Object.assign({}, s, {
    fee: String(num(s.fee))
  });
  delete cleaned.own; delete cleaned.partner; delete cleaned.results;
  if(UI.isNewSess) S.sessions.push(cleaned);
  else S.sessions = S.sessions.map(x=>x.id===s.id?cleaned:x);
  /* гғ¬гғјгғҲиЁҳжҶ¶ */
  if(num(cleaned.exchange)>0) S.rates.exchange = cleaned.exchange;
  if(num(cleaned.pExchange)>0) S.rates.pExchange = cleaned.pExchange;
  if(num(cleaned.pushPayout)>0) S.rates.pushPayout = cleaned.pushPayout;
  if(num(cleaned.pushDraw)>0) S.rates.pushDraw = cleaned.pushDraw;
  /* е®¶иЁҲз°ҝйҖЈжҗә */
  const linkId = "slot-"+s.id;
  const fin = finalOwn(cleaned);
  S.entries = S.entries.filter(e=>e.id!==linkId);
  if(fin!==0){
    S.entries.push({id:linkId, date:cleaned.date, src:"slot",
      type: fin>0?"income":"expense",
      category: "йҒҠжҠҖ",
      amount: Math.abs(fin),
      memo: modeLabel(cleaned.mode)+(cleaned.store?" @"+cleaned.store:"")});
  }
  save(); UI.screen="main"; UI.draft=null; render();
}
</script>
<script>
/* ============================================================
   ж©ҹзЁ®гғһгӮ№гӮҝз”»йқў
   ============================================================ */
function viewMdb(){
  let h = '<div class="hdr"><button class="navbtn" data-a="back">вҖ№ жҲ»гӮӢ</button>'+
    '<div style="font-size:14px;font-weight:700">ж©ҹзЁ®гғҮгғјгӮҝ</div><div style="width:44px"></div></div>';
  const f = UI.mdbForm;
  if(f){
    h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
      [["pachi","гғ‘гғҒгғігӮі"],["slot","гӮ№гғӯгғғгғҲ"]].map(([v,l])=>
        '<button class="btn '+(f.kind===v?"sel":"")+'" style="flex:1" data-a="fkind" data-v="'+v+'">'+l+'</button>').join("")+'</div>'+
      '<input class="input" id="f-name" placeholder="ж©ҹзЁ®еҗҚ" value="'+esc(f.name)+'" style="margin-bottom:10px">';
    if(f.kind==="pachi"){
      h += '<div class="row" style="gap:8px;margin-bottom:10px">'+
        '<div style="flex:1"><div class="muted" style="font-size:10px;margin-bottom:3px">еӨ§еҪ“гҒҹгӮҠзўәзҺҮ еҲҶжҜҚ(дҪҺзўәзҺҮ)</div>'+
        '<input class="input mono r" type="number" inputmode="decimal" step="0.1" id="f-denom" placeholder="дҫӢ: 319.7" value="'+esc(f.denom)+'"></div>'+
        '<div style="flex:1"><div class="muted" style="font-size:10px;margin-bottom:3px">зҗҶи«–TY(еў—еҠ зҺүгғ»йҖЈгғҒгғЈгғіиҫј)</div>'+
        '<input class="input mono r" type="number" inputmode="numeric" id="f-ty" placeholder="дҫӢ: 4500" value="'+esc(f.ty)+'"></div></div>'+
        '<div class="mono amber" style="font-size:12px;margin-bottom:10px" id="f-border">'+mdbBorderLine(f)+'</div>';
    }
    h += '<input class="input" id="f-memo" placeholder="гғЎгғў(гӮ№гғҡгғғгӮҜиЈңи¶ігҒӘгҒ©)" value="'+esc(f.memo)+'" style="margin-bottom:14px">'+
      '<div class="row" style="gap:8px">'+
      (S.mdb.some(x=>x.id===f.id)?'<button class="btn danger" data-a="fdel">еүҠйҷӨ</button>':'')+
      '<button class="btn" data-a="fcancel">жҲ»гӮӢ</button>'+
      '<button class="btn primary" style="flex:1" data-a="fsave">дҝқеӯҳгҒҷгӮӢ</button></div>';
  } else {
    h += '<button class="btn dash full" style="margin-bottom:12px" data-a="fnew">пјӢ ж©ҹзЁ®гӮ’зҷ»йҢІ</button>';

    'гғЎгғјгғ«гҒЁгғ‘гӮ№гғҜгғјгғүгҒ§гғӯгӮ°гӮӨгғігҒҷгӮӢгҒЁгҖҒгғҮгғјгӮҝгҒҢиҮӘеӢ•гҒ§гӮҜгғ©гӮҰгғүгҒ«дҝқеӯҳгҒ•гӮҢгҖҒиӨҮж•°з«Ҝжң«гҒ§еҗҢжңҹгҒ•гӮҢгҒҫгҒҷгҖӮеҲқгӮҒгҒҰгҒ®е ҙеҗҲгҒҜгҖҢж–°иҰҸзҷ»йҢІгҖҚгӮ’жҠјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„(еҗҢгҒҳгғЎгғјгғ«/гғ‘гӮ№гғҜгғјгғүгҒ§еҲҘз«Ҝжң«гҒӢгӮүгғӯгӮ°гӮӨгғігҒ§гҒҚгҒҫгҒҷ)гҖӮ</div>'+
    '<input class="input" id="sync-email" type="email" inputmode="email" placeholder="гғЎгғјгғ«гӮўгғүгғ¬гӮ№" autocomplete="username" style="margin-bottom:8px">'+
    '<input class="input" id="sync-pw" type="password" placeholder="гғ‘гӮ№гғҜгғјгғү(6ж–Үеӯ—д»ҘдёҠ)" autocomplete="current-password" style="margin-bottom:10px">'+
    '<div class="row" style="gap:8px">'+
    '<button class="btn primary" style="flex:1;font-weight:700;padding:11px 0" data-sa="login">гғӯгӮ°гӮӨгғі</button>'+
    '<button class="btn tealb" style="flex:1;font-weight:700;padding:11px 0" data-sa="signup">ж–°иҰҸзҷ»йҢІ</button></div>'+
    (UI.syncMsg?'<div class="'+(UI.syncErr?"red":"teal")+'" style="font-size:11px;margin-top:10px;line-height:1.6">'+esc(UI.syncMsg)+'</div>':'')+'</div>';
}
function bindSyncBox(){
  document.querySelectorAll("[data-sa]").forEach(el=>{
    el.onclick = async ()=>{
      const a = el.dataset.sa;
      if(a==="logout"){ await authSignOut(); UI.syncMsg=""; render(); }
      else if(a==="syncnow"){ await cloudSync(); }
      else if(a==="login" || a==="signup"){
        const email = (document.getElementById("sync-email").value||"").trim();
        const pw = document.getElementById("sync-pw").value||"";
        if(!email || pw.length<6){ UI.syncErr=true; UI.syncMsg="гғЎгғјгғ«гӮўгғүгғ¬гӮ№гҒЁ6ж–Үеӯ—д»ҘдёҠгҒ®гғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ"; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg = (a==="login"?"гғӯгӮ°гӮӨгғідёӯвҖҰ":"зҷ»йҢІдёӯвҖҰ"); updateSyncUi();
        const r = a==="login" ? await authSignIn(email, pw) : await authSignUp(email, pw);
        if(r.error){ UI.syncErr=true; UI.syncMsg = r.error; updateSyncUi(); return; }
        UI.syncErr=false; UI.syncMsg=""; 
        await cloudSync();
        render();
      }
    };
  });
}

load();
ensureFixedEntries();
render();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{ /* жңӘеҜҫеҝңз’°еўғгҒ§гӮӮжң¬дҪ“гҒҜеӢ•гҒҸ */ });
}
setSync("nokey");
whenSbReady(initCloud);
</script>
